<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="SmartWorks PMS"/>
<meta name="theme-color" content="#4F46E5"/>
<title>SmartWorks — Chairman's Office</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%}
body{background:#F8FAFC;-webkit-font-smoothing:antialiased;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const SK="sw_pms_v1";
const EMPTY={buildings:[],people:[],projects:[],subs:[],tasks:[],pb:[]};
const TS={not_started:{l:"Not started",bg:"#F1F5F9",c:"#475569"},in_progress:{l:"In progress",bg:"#FFFBEB",c:"#B45309"},blocked:{l:"Blocked",bg:"#FEF2F2",c:"#B91C1C"},awaiting:{l:"Awaiting",bg:"#F5F3FF",c:"#6D28D9"},done:{l:"Done",bg:"#F0FDF4",c:"#15803D"},deferred:{l:"Deferred",bg:"#F8FAFC",c:"#64748B"}};
const BS={not_started:{l:"Not started",bg:"#F1F5F9",c:"#64748B"},in_progress:{l:"In progress",bg:"#FFFBEB",c:"#B45309"},on_hold:{l:"On hold",bg:"#FFF7ED",c:"#C2410C"},blocked:{l:"Blocked",bg:"#FEF2F2",c:"#B91C1C"},done:{l:"Done",bg:"#F0FDF4",c:"#15803D"}};
const PR={high:{l:"High",c:"#DC2626"},medium:{l:"Med",c:"#D97706"},low:{l:"Low",c:"#16A34A"}};
const CLRS=["#4F46E5","#0891B2","#059669","#DC2626","#D97706","#7C3AED","#DB2777","#0F766E","#EA580C","#0369A1"];
const SCYC=["not_started","in_progress","awaiting","blocked","done"];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const td=()=>new Date().toISOString().slice(0,10);
const fd=d=>d?new Date(d+"T12:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short"}):"";
const isOD=(d,s)=>!!(d&&d<td()&&s!=="done");
const nowFull=()=>new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
function useWW(){const[w,setW]=useState(window.innerWidth);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return w;}
function useData(){const[data,setData]=useState(EMPTY);const[ready,setReady]=useState(false);useEffect(()=>{try{const r=localStorage.getItem(SK);if(r)setData({...EMPTY,...JSON.parse(r)});}catch(e){}setReady(true);},[]);const save=patch=>{setData(prev=>{const next={...prev,...patch};try{localStorage.setItem(SK,JSON.stringify(next));}catch(e){}return next;});};return{data,save,ready};}
function Badge({s,sys}){const i=(sys||TS)[s]||TS.not_started;return <span style={{display:"inline-flex",alignItems:"center",fontSize:10,fontWeight:600,background:i.bg,color:i.c,borderRadius:99,padding:"2px 8px",whiteSpace:"nowrap",border:`1px solid ${i.c}33`}}>{i.l}</span>;}
function Av({name,color,sz=30}){const init=(name||"?").trim().split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();return <div style={{width:sz,height:sz,borderRadius:"50%",background:color||"#4F46E5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*0.36,fontWeight:700,color:"#fff",flexShrink:0}}>{init}</div>;}
function Sheet({title,onClose,children,wide}){const isMobile=window.innerWidth<768;return(<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:400,display:"flex",alignItems:isMobile?"flex-end":"center",justifyContent:"center"}}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",width:"100%",maxWidth:isMobile?480:wide?620:440,borderRadius:isMobile?"20px 20px 0 0":16,maxHeight:"92vh",overflow:"auto",paddingBottom:isMobile?24:0,boxShadow:isMobile?"none":"0 20px 60px rgba(0,0,0,0.15)"}}><div style={{padding:"14px 16px 0"}}>{isMobile&&<div style={{width:36,height:4,background:"#CBD5E1",borderRadius:2,margin:"0 auto 14px"}}/>}<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div style={{fontSize:17,fontWeight:700,color:"#0F172A"}}>{title}</div><button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",background:"#F1F5F9",border:"none",cursor:"pointer",fontSize:18,color:"#64748B",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button></div></div><div style={{padding:"0 16px 16px"}}>{children}</div></div></div>);}
const IS={width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid #E2E8F0",background:"#F8FAFC",fontSize:14,color:"#0F172A",boxSizing:"border-box",outline:"none",fontFamily:"inherit"};
function FI({label,...p}){return<div style={{marginBottom:13}}>{label&&<div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>}<input style={IS} {...p}/></div>;}
function FS({label,children,...p}){return<div style={{marginBottom:13}}>{label&&<div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>}<select style={{...IS,appearance:"auto"}} {...p}>{children}</select></div>;}
function FT({label,...p}){return<div style={{marginBottom:13}}>{label&&<div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>}<textarea style={{...IS,minHeight:68,resize:"vertical"}} {...p}/></div>;}
function Btn({children,onClick,ghost,danger,disabled,sm}){const s={padding:sm?"7px 13px":"11px 18px",borderRadius:9,fontSize:sm?12:14,fontWeight:600,cursor:disabled?"default":"pointer",border:"none",fontFamily:"inherit",background:ghost?(danger?"#FEF2F2":"#F1F5F9"):(disabled?"#A5B4FC":"#4F46E5"),color:ghost?(danger?"#B91C1C":"#475569"):"#fff"};if(ghost&&!danger)s.border="1px solid #E2E8F0";return <button onClick={onClick} disabled={disabled} style={s}>{children}</button>;}
function CLP({value,onChange}){return(<div style={{marginBottom:13}}><div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Color</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{CLRS.map(c=><div key={c} onClick={()=>onChange(c)} style={{width:30,height:30,borderRadius:"50%",background:c,cursor:"pointer",boxSizing:"border-box",border:value===c?"3px solid #0F172A":"3px solid transparent"}}/>)}</div></div>);}
const mBtn=(col,bg)=>({padding:"5px 10px",borderRadius:8,fontSize:12,fontWeight:500,background:bg,color:col,border:`1px solid ${col}33`,cursor:"pointer",whiteSpace:"nowrap"});
function PersonForm({init={},onSave,onCancel}){const[v,setV]=useState({name:"",phone:"",role:"",color:CLRS[0],...init});const u=k=>e=>setV(p=>({...p,[k]:e.target.value}));return<><FI label="Full name" value={v.name} onChange={u("name")} placeholder="e.g. Rajesh Kumar"/><FI label="WhatsApp number" value={v.phone} onChange={u("phone")} placeholder="91XXXXXXXXXX" type="tel"/><FI label="Role" value={v.role} onChange={u("role")} placeholder="e.g. Operations Head"/><CLP value={v.color} onChange={c=>setV(p=>({...p,color:c}))}/><div style={{display:"flex",gap:9}}><Btn ghost onClick={onCancel}>Cancel</Btn><Btn onClick={()=>v.name&&onSave(v)} disabled={!v.name}>Save</Btn></div></>;}
function ProjectForm({init={},onSave,onCancel}){const[v,setV]=useState({name:"",desc:"",deadline:"",status:"not_started",color:CLRS[Math.floor(Math.random()*CLRS.length)],...init});const u=k=>e=>setV(p=>({...p,[k]:e.target.value}));return<><FI label="Project name" value={v.name} onChange={u("name")} placeholder="e.g. Network Upgrade — All Centres"/><FT label="Description" value={v.desc} onChange={u("desc")} placeholder="Brief overview..."/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><FI label="Deadline" value={v.deadline} onChange={u("deadline")} type="date"/><FS label="Status" value={v.status} onChange={u("status")}>{Object.entries(TS).map(([k,s])=><option key={k} value={k}>{s.l}</option>)}</FS></div><CLP value={v.color} onChange={c=>setV(p=>({...p,color:c}))}/><div style={{display:"flex",gap:9}}><Btn ghost onClick={onCancel}>Cancel</Btn><Btn onClick={()=>v.name&&onSave(v)} disabled={!v.name}>Save</Btn></div></>;}
function SubForm({init={},projects,onSave,onCancel}){const[v,setV]=useState({name:"",deadline:"",status:"not_started",projectId:projects[0]?.id||"",...init});const u=k=>e=>setV(p=>({...p,[k]:e.target.value}));return<>{!init.projectId&&<FS label="Project" value={v.projectId} onChange={u("projectId")}>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</FS>}<FI label="Sub-project name" value={v.name} onChange={u("name")} placeholder="e.g. Phase 1 — Planning"/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><FI label="Deadline" value={v.deadline} onChange={u("deadline")} type="date"/><FS label="Status" value={v.status} onChange={u("status")}>{Object.entries(TS).map(([k,s])=><option key={k} value={k}>{s.l}</option>)}</FS></div><div style={{display:"flex",gap:9}}><Btn ghost onClick={onCancel}>Cancel</Btn><Btn onClick={()=>v.name&&v.projectId&&onSave(v)} disabled={!v.name}>Save</Btn></div></>;}
function TaskForm({init={},people,tasks,onSave,onCancel}){const[v,setV]=useState({title:"",notes:"",assignedTo:"",status:"not_started",priority:"medium",dueDate:"",followUp:"",dependsOn:[],...init});const u=k=>e=>setV(p=>({...p,[k]:e.target.value}));const siblings=tasks.filter(t=>t.id!==init.id&&t.projectId===init.projectId&&(init.subProjectId?t.subProjectId===init.subProjectId:!t.subProjectId));const togDep=id=>setV(p=>({...p,dependsOn:p.dependsOn.includes(id)?p.dependsOn.filter(d=>d!==id):[...p.dependsOn,id]}));return<><FI label="Task" value={v.title} onChange={u("title")} placeholder="What needs to be done?"/><FT label="Notes / instructions" value={v.notes} onChange={u("notes")} placeholder="Context, details..."/><FS label="Assigned to" value={v.assignedTo} onChange={u("assignedTo")}><option value="">— Unassigned —</option>{people.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</FS><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><FS label="Status" value={v.status} onChange={u("status")}>{Object.entries(TS).map(([k,s])=><option key={k} value={k}>{s.l}</option>)}</FS><FS label="Priority" value={v.priority} onChange={u("priority")}>{Object.entries(PR).map(([k,p])=><option key={k} value={k}>{p.l}</option>)}</FS></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><FI label="Due date" value={v.dueDate} onChange={u("dueDate")} type="date"/><FI label="Follow-up" value={v.followUp} onChange={u("followUp")} type="date"/></div>{siblings.length>0&&<div style={{marginBottom:13}}><div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Depends on</div><div style={{border:"1px solid #E2E8F0",borderRadius:10,maxHeight:120,overflow:"auto"}}>{siblings.map(t=><label key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",cursor:"pointer",fontSize:13,color:"#334155",borderBottom:"1px solid #F8FAFC"}}><input type="checkbox" checked={v.dependsOn.includes(t.id)} onChange={()=>togDep(t.id)} style={{accentColor:"#4F46E5"}}/>{t.title}</label>)}</div></div>}<div style={{display:"flex",gap:9}}><Btn ghost onClick={onCancel}>Cancel</Btn><Btn onClick={()=>v.title&&onSave(v)} disabled={!v.title}>{init.id?"Update":"Add task"}</Btn></div></>;}
function BuildingImport({existing,onImport,onCancel}){const[raw,setRaw]=useState("");const parse=t=>t.trim().split("\n").map(r=>r.trim()).filter(Boolean).map(r=>{const cols=r.split("\t");if(cols.length>=2)return{name:cols[0].trim(),city:cols[1].trim()};const cc=r.split(",");if(cc.length>=2)return{name:cc[0].trim(),city:cc[1].trim()};return{name:r.trim(),city:""};}).filter(b=>b.name);const preview=raw?parse(raw):[];const eL=existing.map(b=>b.name.toLowerCase());const newOnes=preview.filter(b=>!eL.includes(b.name.toLowerCase()));const dupes=preview.filter(b=>eL.includes(b.name.toLowerCase()));return<><div style={{fontSize:13,color:"#64748B",marginBottom:12,lineHeight:1.6,background:"#F8FAFC",padding:"10px 12px",borderRadius:9,border:"1px solid #E2E8F0"}}>Paste directly from Excel.<br/>Column A: <strong style={{color:"#0F172A"}}>Building Name</strong> · Column B: <strong style={{color:"#0F172A"}}>City</strong></div><FT label="Paste from Excel here" value={raw} onChange={e=>setRaw(e.target.value)} placeholder={"Connaught Place\tNew Delhi\nBKC\tMumbai\nKoramangala\tBengaluru"} style={{minHeight:140,fontFamily:"monospace",fontSize:13}}/>{preview.length>0&&<div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:600,marginBottom:6}}><span style={{color:"#059669"}}>✓ {newOnes.length} new</span>{dupes.length>0&&<span style={{color:"#D97706",marginLeft:8}}>· {dupes.length} duplicates skipped</span>}</div><div style={{border:"1px solid #E2E8F0",borderRadius:10,maxHeight:160,overflow:"auto"}}>{preview.map((b,i)=>{const isDupe=eL.includes(b.name.toLowerCase());return<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderBottom:"1px solid #F8FAFC",background:isDupe?"#FFFBEB":"transparent"}}><span style={{fontSize:12,color:isDupe?"#D97706":"#059669",width:14}}>{isDupe?"⚠":"✓"}</span><span style={{fontSize:13,color:"#334155",flex:1}}>{b.name}</span><span style={{fontSize:12,color:"#94A3B8"}}>{b.city}</span></div>;})}</div></div>}<div style={{display:"flex",gap:9}}><Btn ghost onClick={onCancel}>Cancel</Btn><Btn onClick={()=>newOnes.length&&onImport(newOnes)} disabled={!newOnes.length}>Import {newOnes.length||""} buildings</Btn></div></>;}
function BuildingForm({init={},onSave,onCancel}){const[v,setV]=useState({name:"",city:"",...init});return<><FI label="Building / centre name" value={v.name} onChange={e=>setV(p=>({...p,name:e.target.value}))} placeholder="e.g. Connaught Place"/><FI label="City" value={v.city} onChange={e=>setV(p=>({...p,city:e.target.value}))} placeholder="e.g. New Delhi"/><div style={{display:"flex",gap:9}}><Btn ghost onClick={onCancel}>Cancel</Btn><Btn onClick={()=>v.name&&onSave(v)} disabled={!v.name}>Save</Btn></div></>;}
function AssignBuildingsForm({project,buildings,pb,onSave,onCancel}){const assigned=pb.filter(r=>r.projectId===project.id).map(r=>r.buildingId);const[sel,setSel]=useState(new Set(assigned));const[search,setSearch]=useState("");const filtered=buildings.filter(b=>b.name.toLowerCase().includes(search.toLowerCase())||b.city.toLowerCase().includes(search.toLowerCase()));const tog=id=>setSel(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});const toggleAll=()=>{if(sel.size===buildings.length)setSel(new Set());else setSel(new Set(buildings.map(b=>b.id)));};return<><div style={{fontSize:13,color:"#475569",marginBottom:12}}>Select buildings for <strong style={{color:"#0F172A"}}>{project.name}</strong></div><FI value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search buildings..."/><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:12,color:"#64748B"}}>{sel.size} of {buildings.length} selected</span><button onClick={toggleAll} style={{fontSize:12,color:"#4F46E5",background:"none",border:"none",cursor:"pointer",fontWeight:500}}>{sel.size===buildings.length?"Deselect all":"Select all"}</button></div><div style={{border:"1px solid #E2E8F0",borderRadius:10,maxHeight:300,overflow:"auto",marginBottom:14}}>{filtered.map(b=><label key={b.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",cursor:"pointer",borderBottom:"1px solid #F8FAFC",background:sel.has(b.id)?"#F5F3FF":"transparent"}}><input type="checkbox" checked={sel.has(b.id)} onChange={()=>tog(b.id)} style={{accentColor:"#4F46E5",width:16,height:16}}/><div><div style={{fontSize:13,fontWeight:500,color:"#1E293B"}}>{b.name}</div><div style={{fontSize:11,color:"#94A3B8"}}>{b.city}</div></div></label>)}</div><div style={{display:"flex",gap:9}}><Btn ghost onClick={onCancel}>Cancel</Btn><Btn onClick={()=>onSave([...sel])}>Save</Btn></div></>;}
function PBForm({pb,building,onSave,onCancel}){const[status,setStatus]=useState(pb?.status||"not_started");const[remarks,setRemarks]=useState(pb?.remarks||"");return<><div style={{fontSize:13,color:"#475569",marginBottom:14,padding:"10px 12px",background:"#F8FAFC",borderRadius:9,border:"1px solid #E2E8F0"}}>📍 <strong>{building.name}</strong>{building.city?`, ${building.city}`:""}</div><FS label="Status at this building" value={status} onChange={e=>setStatus(e.target.value)}>{Object.entries(BS).map(([k,s])=><option key={k} value={k}>{s.l}</option>)}</FS><FT label="Remarks (shown in daily digest)" value={remarks} onChange={e=>setRemarks(e.target.value)} placeholder="e.g. Contractor confirmed. Work starts Monday."/><div style={{display:"flex",gap:9}}><Btn ghost onClick={onCancel}>Cancel</Btn><Btn onClick={()=>onSave({status,remarks})}>Save</Btn></div></>;}
function TaskRow({task,data,save,openSheet}){const person=data.people.find(p=>p.id===task.assignedTo);const deps=(task.dependsOn||[]).map(id=>data.tasks.find(t=>t.id===id)).filter(Boolean);const overdue=isOD(task.dueDate,task.status);const cycleStatus=e=>{e.stopPropagation();const idx=SCYC.indexOf(task.status);save({tasks:data.tasks.map(t=>t.id===task.id?{...t,status:SCYC[(idx+1)%SCYC.length]}:t)});};return(<div style={{background:"#fff",borderRadius:11,padding:"10px 12px",marginBottom:7,border:`1px solid ${overdue?"#FECACA":"#E2E8F0"}`,borderLeft:`3px solid ${overdue?"#DC2626":(PR[task.priority]?.c||"#CBD5E1")}`}}><div style={{display:"flex",alignItems:"flex-start",gap:8}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:"#0F172A",marginBottom:5,lineHeight:1.4}}>{task.title}</div><div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}><span onClick={cycleStatus} style={{cursor:"pointer"}}><Badge s={task.status}/></span>{task.dueDate&&<span style={{fontSize:11,color:overdue?"#DC2626":"#94A3B8",fontWeight:overdue?600:400}}>{overdue?"⚠ ":""}{fd(task.dueDate)}</span>}{person&&<Av name={person.name} color={person.color} sz={18}/>}</div>{deps.length>0&&<div style={{marginTop:5,fontSize:11,color:"#6D28D9",background:"#F5F3FF",borderRadius:6,padding:"3px 8px",display:"inline-block"}}>↳ blocked by: {deps.map(d=>d.title).join(", ")}</div>}{task.notes&&<div style={{marginTop:5,fontSize:12,color:"#64748B",lineHeight:1.5}}>{task.notes}</div>}</div><div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}><button onClick={()=>openSheet("task",task)} style={{...mBtn("#475569","#F8FAFC"),padding:"3px 8px",fontSize:11}}>Edit</button><button onClick={()=>{if(window.confirm("Delete task?"))save({tasks:data.tasks.filter(t=>t.id!==task.id)})}} style={{...mBtn("#DC2626","#FEF2F2"),padding:"3px 8px",fontSize:11}}>Del</button></div></div></div>);}
function DashTab({data}){const tasks=data.tasks;const pending=tasks.filter(t=>t.status!=="done");const overdue=pending.filter(t=>isOD(t.dueDate,t.status));const dueToday=pending.filter(t=>t.dueDate===td());const Stat=({n,label,col,bg})=>(<div style={{background:bg,borderRadius:14,padding:"14px 16px",border:`1px solid ${col}22`}}><div style={{fontSize:28,fontWeight:700,color:col,lineHeight:1}}>{n}</div><div style={{fontSize:12,color:"#64748B",marginTop:4,fontWeight:500}}>{label}</div></div>);return(<div style={{padding:14}}><div style={{fontSize:12,color:"#94A3B8",marginBottom:2}}>{nowFull()}</div><div style={{fontSize:22,fontWeight:700,color:"#0F172A",marginBottom:18}}>Chairman's Office</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}><Stat n={data.projects.filter(p=>p.status!=="done").length} label="Active projects" col="#4F46E5" bg="#F5F3FF"/><Stat n={data.buildings.length} label="Buildings" col="#0891B2" bg="#F0F9FF"/><Stat n={pending.length} label="Pending tasks" col="#D97706" bg="#FFFBEB"/><Stat n={overdue.length} label="Overdue" col="#DC2626" bg="#FEF2F2"/></div>{dueToday.length>0&&<div style={{marginBottom:18}}><div style={{fontSize:13,fontWeight:600,color:"#0F172A",marginBottom:10}}>Due today ({dueToday.length})</div>{dueToday.map(t=>{const proj=data.projects.find(p=>p.id===t.projectId);const person=data.people.find(p=>p.id===t.assignedTo);return<div key={t.id} style={{background:"#fff",border:"1px solid #E2E8F0",borderLeft:`3px solid ${proj?.color||"#4F46E5"}`,borderRadius:10,padding:"10px 12px",marginBottom:7}}><div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between"}}><div><div style={{fontSize:13,fontWeight:500,color:"#1E293B"}}>{t.title}</div><div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{proj?.name}</div></div><div style={{display:"flex",alignItems:"center",gap:6}}>{person&&<Av name={person.name} color={person.color} sz={22}/>}<Badge s={t.status}/></div></div></div>;})}</div>}{ function DigestTab({data}){const[copied,setCopied]=useState(null);const buildMsg=person=>{const myTasks=data.tasks.filter(t=>t.assignedTo===person.id&&t.status!=="done");if(!myTasks.length)return null;const byProject={};myTasks.forEach(t=>{if(!byProject[t.projectId])byProject[t.projectId]=[];byProject[t.projectId].push(t);});let msg=`*Task Reminder — ${person.name}*\n${nowFull()}\n`;Object.entries(byProject).forEach(([pid,tasks])=>{const proj=data.projects.find(p=>p.id===pid);if(!proj)return;msg+=`\n━━━━━━━━━━━━━━━━━━\n📁 *${proj.name}*\n`;if(proj.deadline)msg+=`   Deadline: ${fd(proj.deadline)}\n`;const pbRows=data.pb.filter(r=>r.projectId===pid);if(pbRows.length>0){msg+=`\n🏢 *Building Status (${pbRows.length} buildings):*\n`;pbRows.forEach(r=>{const bldg=data.buildings.find(b=>b.id===r.buildingId);if(!bldg)return;msg+=`   • ${bldg.name}, ${bldg.city} → ${BS[r.status]?.l||r.status}\n`;if(r.remarks)msg+=`     ↳ ${r.remarks}\n`;});}msg+=`\n📋 *Your tasks:*\n`;tasks.forEach(t=>{const od=isOD(t.dueDate,t.status);msg+=`\n   ${od?"⚠️":"•"} *${t.title}*\n`;msg+=`      Status: ${TS[t.status]?.l||t.status}${od?" — OVERDUE":""}\n`;if(t.dueDate)msg+=`      Due: ${fd(t.dueDate)}\n`;if(t.notes)msg+=`      Note: ${t.notes}\n`;const deps=(t.dependsOn||[]).map(id=>data.tasks.find(x=>x.id===id)).filter(Boolean).filter(d=>d.status!=="done");if(deps.length>0)msg+=`      ⛓ Awaiting: ${deps.map(d=>d.title).join(", ")}\n`;});});const od=myTasks.filter(t=>isOD(t.dueDate,t.status)).length;msg+=`\n━━━━━━━━━━━━━━━━━━\n📊 *${myTasks.length} pending task${myTasks.length!==1?"s":""}*`;if(od>0)msg+=` · *${od} overdue ⚠️*`;return msg;};const digest=data.people.map(p=>({person:p,msg:buildMsg(p)})).filter(x=>x.msg);const openWA=(person,msg)=>{if(!person.phone){alert(`No WhatsApp number for ${person.name}`);return;}const num=person.phone.replace(/\D/g,"");window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,"_blank");};return(<div style={{padding:14}}><div style={{marginBottom:16}}><div style={{fontSize:19,fontWeight:700,color:"#0F172A"}}>Daily Digest</div><div style={{fontSize:12,color:"#94A3B8",marginTop:2}}>{nowFull()}</div></div>{digest.length===0&&<div style={{textAlign:"center",padding:"50px 20px",background:"#F8FAFC",borderRadius:16}}><div style={{fontSize:36,marginBottom:10}}>🎉</div><div style={{fontSize:15,fontWeight:500,color:"#475569",marginBottom:4}}>All clear!</div><div style={{fontSize:13,color:"#94A3B8"}}>No pending tasks assigned to anyone.</div></div>}{digest.map(({person,msg})=>{const myTasks=data.tasks.filter(t=>t.assignedTo===person.id&&t.status!=="done");const odCount=myTasks.filter(t=>isOD(t.dueDate,t.status)).length;return<div key={person.id} style={{background:"#fff",borderRadius:16,padding:"14px",marginBottom:14,border:"1px solid #E2E8F0"}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}><Av name={person.name} color={person.color} sz={44}/><div style={{flex:1}}><div style={{fontSize:15,fontWeight:600,color:"#0F172A"}}>{person.name}</div>{person.role&&<div style={{fontSize:12,color:"#64748B"}}>{person.role}</div>}<div style={{display:"flex",gap:6,marginTop:4}}><span style={{fontSize:11,background:"#EEF2FF",color:"#4338CA",borderRadius:99,padding:"2px 8px",fontWeight:600}}>{myTasks.length} pending</span>{odCount>0&&<span style={{fontSize:11,background:"#FEF2F2",color:"#B91C1C",borderRadius:99,padding:"2px 8px",fontWeight:600}}>{odCount} overdue ⚠️</span>}</div></div></div><div style={{background:"#F8FAFC",borderRadius:10,padding:"12px",marginBottom:12,fontSize:12,color:"#334155",fontFamily:"'Courier New',monospace",lineHeight:1.8,maxHeight:240,overflow:"auto",whiteSpace:"pre-wrap",border:"1px solid #E2E8F0"}}>{msg}</div><div style={{display:"flex",gap:9}}><button onClick={()=>{navigator.clipboard.writeText(msg).catch(()=>{});setCopied(person.id);setTimeout(()=>setCopied(null),2000);}} style={{flex:1,padding:"11px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",background:copied===person.id?"#D1FAE5":"#F1F5F9",color:copied===person.id?"#065F46":"#475569",border:`1px solid ${copied===person.id?"#A7F3D0":"#E2E8F0"}`}}>{copied===person.id?"✓ Copied!":"📋 Copy"}</button><button onClick={()=>openWA(person,msg)} style={{flex:2,padding:"11px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",background:"#22C55E",color:"#fff",border:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>WhatsApp {person.name.split(" ")[0]}</button></div></div>;})} </div>);}
const TABS=[{id:"dash",label:"Home",icon:"⌂"},{id:"projects",label:"Projects",icon:"📋"},{id:"buildings",label:"Buildings",icon:"🏢"},{id:"people",label:"People",icon:"👥"},{id:"digest",label:"Digest",icon:"📤"}];
function App(){const{data,save,ready}=useData();const[tab,setTab]=useState("dash");const[sheet,setSheet]=useState(null);const w=useWW();const isDesktop=w>=768;const openSheet=(type,payload)=>setSheet({type,payload});const closeSheet=()=>setSheet(null);const handleSave=(key,val)=>{const isEdit=!!sheet.payload?.id;save({[key]:isEdit?data[key].map(x=>x.id===sheet.payload.id?{...x,...val}:x):[...data[key],{id:uid(),...val}]});closeSheet();};
if(!ready)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#F8FAFC"}}><div style={{textAlign:"center"}}><div style={{width:36,height:36,borderRadius:"50%",border:"3px solid #E2E8F0",borderTopColor:"#4F46E5",animation:"spin 0.8s linear infinite",margin:"0 auto 12px"}}/><div style={{fontSize:13,color:"#94A3B8"}}>Loading...</div></div></div>);
const content=(<>{tab==="dash"&&<DashTab data={data}/>}{tab==="projects"&&<ProjectsTab data={data} save={save} openSheet={openSheet}/>}{tab==="buildings"&&<BuildingsTab data={data} save={save} openSheet={openSheet}/>}{tab==="people"&&<PeopleTab data={data} save={save} openSheet={openSheet}/>}{tab==="digest"&&<DigestTab data={data}/>}</>);
return(<div style={{minHeight:"100vh",background:"#F8FAFC",fontFamily:"system-ui,-apple-system,'Segoe UI',sans-serif"}}>{isDesktop?(<div style={{display:"flex",minHeight:"100vh"}}><div style={{width:210,background:"#fff",borderRight:"1px solid #E2E8F0",position:"fixed",top:0,left:0,bottom:0,display:"flex",flexDirection:"column",padding:"24px 0 16px"}}><div style={{padding:"0 20px 28px"}}><div style={{fontSize:13,fontWeight:700,color:"#4F46E5",letterSpacing:"0.05em",textTransform:"uppercase"}}>SmartWorks</div><div style={{fontSize:11,color:"#94A3B8",marginTop:3}}>Chairman's Office PMS</div></div>{TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 20px",background:tab===t.id?"#F5F3FF":"none",border:"none",cursor:"pointer",color:tab===t.id?"#4F46E5":"#64748B",fontWeight:tab===t.id?600:400,fontSize:14,width:"100%",textAlign:"left",borderLeft:tab===t.id?"3px solid #4F46E5":"3px solid transparent",fontFamily:"inherit"}}><span style={{fontSize:17}}>{t.icon}</span>{t.label}</button>)}</div><div style={{marginLeft:210,flex:1,maxWidth:820}}>{content}</div></div>):(<div><div style={{paddingBottom:76}}>{content}</div><div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #E2E8F0",zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0)"}}><div style={{display:"flex"}}>{TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===t.id?"#4F46E5":"#94A3B8",fontFamily:"inherit"}}><span style={{fontSize:20,lineHeight:1}}>{t.icon}</span><span style={{fontSize:9.5,fontWeight:tab===t.id?700:400}}>{t.label}</span></button>)}</div></div></div>)}
{sheet?.type==="person"&&<Sheet title={sheet.payload?.id?"Edit person":"Add person"} onClose={closeSheet}><PersonForm init={sheet.payload||{}} onSave={v=>handleSave("people",v)} onCancel={closeSheet}/></Sheet>}
{sheet?.type==="project"&&<Sheet title={sheet.payload?.id?"Edit project":"New project"} onClose={closeSheet}><ProjectForm init={sheet.payload||{}} onSave={v=>handleSave("projects",v)} onCancel={closeSheet}/></Sheet>}
{sheet?.type==="sub"&&<Sheet title={sheet.payload?.id?"Edit sub-project":"New sub-project"} onClose={closeSheet}><SubForm init={sheet.payload||{}} projects={data.projects} onSave={v=>handleSave("subs",v)} onCancel={closeSheet}/></Sheet>}
{sheet?.type==="task"&&<Sheet title={sheet.payload?.id?"Edit task":"Add task"} onClose={closeSheet}><TaskForm init={sheet.payload||{}} people={data.people} tasks={data.tasks} onSave={v=>{const isEdit=!!sheet.payload?.id;if(isEdit)save({tasks:data.tasks.map(t=>t.id===sheet.payload.id?{...t,...v}:t)});else save({tasks:[...data.tasks,{id:uid(),dependsOn:[],...v}]});closeSheet();}} onCancel={closeSheet}/></Sheet>}
{sheet?.type==="building"&&<Sheet title={sheet.payload?.id?"Edit building":"Add building"} onClose={closeSheet}><BuildingForm init={sheet.payload||{}} onSave={v=>handleSave("buildings",v)} onCancel={closeSheet}/></Sheet>}
{sheet?.type==="buildingImport"&&<Sheet title="Import buildings from Excel" onClose={closeSheet} wide><BuildingImport existing={data.buildings} onImport={newOnes=>{save({buildings:[...data.buildings,...newOnes.map(b=>({id:uid(),...b}))]});closeSheet();}} onCancel={closeSheet}/></Sheet>}
{sheet?.type==="assignBuildings"&&<Sheet title="Assign buildings to project" onClose={closeSheet} wide><AssignBuildingsForm project={sheet.payload} buildings={data.buildings} pb={data.pb} onSave={selectedIds=>{const cleaned=data.pb.filter(r=>r.projectId!==sheet.payload.id);const newRows=selectedIds.map(bid=>{const ex=data.pb.find(r=>r.projectId===sheet.payload.id&&r.buildingId===bid);return ex||{id:uid(),projectId:sheet.payload.id,buildingId:bid,status:"not_started",remarks:""};});save({pb:[...cleaned,...newRows]});closeSheet();}} onCancel={closeSheet}/></Sheet>}
{sheet?.type==="pbStatus"&&<Sheet title="Update building status" onClose={closeSheet}><PBForm pb={sheet.payload?.pb} building={sheet.payload?.building} onSave={({status,remarks})=>{save({pb:data.pb.map(r=>r.id===sheet.payload.pb.id?{...r,status,remarks}:r)});closeSheet();}} onCancel={closeSheet}/></Sheet>}
</div>);}
