async function svBldTsk(id, pid, rid) {
  const ti = val('btf-ti').trim();
  if (!ti) return;
  const obj = {
    title: ti, notes: val('btf-no').trim(),
    assigned_to: val('btf-at')||null,
    status: val('btf-st'), priority: val('btf-pr'),
    due_date: val('btf-dd')||null, follow_up: val('btf-fu')||null,
    project_id: pid, project_building_id: rid,
    sub_project_id: null, depends_on: [],
  };
  if (id) {
    await SB.from('tasks').update(obj).eq('id',id).eq('user_id',CHAIRMAN_UID||[U.id](http://U.id));
    DB.tasks = [DB.tasks.map](http://DB.tasks.map)(x => [x.id](http://x.id)===id ? {...x,...obj, projectId:pid, buildingRefId:rid, assignedTo:obj.assigned_to, dueDate:obj.due_date, followUp:obj.follow_up} : x);
  } else {
    const {data} = await SB.from('tasks').insert({...obj, user_id:CHAIRMAN_UID||[U.id](http://U.id)}).select().single();
    if (data) DB.tasks.push({...data, projectId:data.project_id, milestoneId:null, buildingRefId:data.project_building_id, assignedTo:data.assigned_to, dueDate:data.due_date, followUp:data.follow_up, dependsOn:[]});
  }
  oPBS(rid); // return to building detail
}

async function cyStBS(taskId, rid) {
  const t = DB.tasks.find(x => [x.id](http://x.id)===taskId);
  if (!t) return;
  const i = SCYC.indexOf(t.status);
  t.status = SCYC[(i+1) % SCYC.length];
  await SB.from('tasks').update({status:t.status}).eq('id',taskId).eq('user_id',CHAIRMAN_UID||[U.id](http://U.id));
  oPBS(rid);
}

async function dBldTsk(taskId, rid) {
  if (!confirm('Delete this task?')) return;
  await delRow('tasks', taskId);
  DB.tasks = DB.tasks.filter(t => [t.id](http://t.id)!==taskId);
  oPBS(rid);
}

/* ══════════════════════════════════════════════════════
   BUILDINGS
══════════════════════════════════════════════════════ */
function rBld() {
  const cities = [...new Set([DB.buildings.map](http://DB.buildings.map)(b=>[b.city](http://b.city)).filter(Boolean))].sort();
  const fil    = DB.buildings.filter(b => {
    const q = bSrch.toLowerCase();
    return (!q || [b.name](http://b.name).toLowerCase().includes(q) || ([b.city](http://b.city)||'').toLowerCase().includes(q) || (b.code||'').toLowerCase().includes(q))
        && (!bCity || [b.city](http://b.city)===bCity)
        && (!bType || b.btype===bType);
  }).sort((a,b) => (a.serial||999)-(b.serial||999) || ([a.name](http://a.name)||'').localeCompare([b.name](http://b.name)||''));

  let h = '<div class="ph"><div><div class="pt">Buildings</div><div class="ps">'+DB.buildings.length+' operational centres</div></div>';
  h += '<div style="display:flex;gap:8px"><button class="btn btn-g btn-sm" onclick="oImp()">Import Excel</button><button class="btn btn-p btn-sm" onclick="oAdd()">+ Add</button></div></div>';
  h += '<div class="fg"><input class="gi" placeholder="Search by name, city or code…" value="'+esc(bSrch)+'" oninput="bSrch=this.value;rBld()" style="margin-bottom:8px"></div>';
  if (cities.length) {
    h += '<div class="pls"><button class="pl'+(!bCity?' active':'')+'" onclick="bCity=\'\';rBld()">All cities</button>';
    h += [cities.map](http://cities.map)(c=>'<button class="pl'+(bCity===c?' active':'')+'" onclick="bCity=\''+esc(c)+'\';rBld()">'+esc(c)+'</button>').join('');
    h += '</div>';
  }
  h += '<div class="pls"><button class="pl'+(!bType?' active':'')+'" onclick="bType=\'\';rBld()">All</button><button class="pl'+(bType==='operational'?' active':'')+'" onclick="bType=\'operational\';rBld()">Operational</button><button class="pl'+(bType==='new'?' active':'')+'" onclick="bType=\'new\';rBld()">New</button></div>';

  if (!fil.length) {
    h += '<div class="es"><span class="em">🏢</span><div class="et">'+(DB.buildings.length?'No results':'No buildings yet')+'</div><div class="ed">'+(DB.buildings.length?'Try a different filter':'Import from Excel or tap + Add')+'</div></div>';
    document.getElementById('tab-buildings').innerHTML = h;
    return;
  }

  h += '<div class="tw"><table><thead><tr><th>#</th><th>Centre Name</th><th>Code</th><th>City</th><th>Type</th><th>Soft HO</th><th>Hard HO</th><th></th></tr></thead><tbody>';
  fil.forEach(b => {
    const isN = b.btype==='new';
    const pbs = DB.pb.filter(r=>r.buildingId===[b.id](http://b.id)).map(r=>({...r,proj:DB.projects.find(p=>[p.id](http://p.id)===r.projectId)})).filter(r=>r.proj);
    h += '<tr>';
    h += '<td style="color:var(--txt3);font-weight:500">'+(b.serial||'—')+'</td>';
    h += '<td><div style="font-weight:600">'+esc([b.name](http://b.name))+'</div>';
    if (pbs.length) {
      h += '<div style="display:flex;flex-direction:column;gap:3px;margin-top:5px">';
      pbs.forEach(r => {
        h += '<div style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:'+r.proj.color+'"></div><span style="font-size:11px;color:var(--txt2)">'+esc([r.proj.name](http://r.proj.name))+'</span>'+bdg(r.status,BS)+'</div>';
      });
      h += '</div>';
    }
    h += '</td>';
    h += '<td style="font-family:monospace;color:var(--txt2)">'+esc(b.code||'—')+'</td>';
    h += '<td style="color:var(--txt2)">'+esc([b.city](http://b.city)||'—')+'</td>';
    h += '<td>'+(isN?'<span class="bd" style="background:rgba(99,102,241,.14);color:#818cf8">New</span>':'<span class="bd" style="background:rgba(16,185,129,.12);color:#10b981">Operational</span>')+'</td>';
    h += '<td style="color:var(--txt2)">'+(isN&&b.softHandover?fd(b.softHandover):'<span style="color:var(--txt3)">—</span>')+'</td>';
    h += '<td style="color:var(--txt2)">'+(isN&&b.hardHandover?fd(b.hardHandover):'<span style="color:var(--txt3)">—</span>')+'</td>';
    h += '<td><div style="display:flex;gap:5px"><button class="mb" onclick="oEB(\''+[b.id](http://b.id)+'\')">✎</button><button class="mb dd" onclick="dBld(\''+[b.id](http://b.id)+'\')">×</button></div></td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  document.getElementById('tab-buildings').innerHTML = h;
}

const ER = () => ({serial:'',city:'',code:'',name:'',btype:'operational',softHandover:'',hardHandover:''});
let AR = [ER()];
function arRow(r,i) {
  const isN = r.btype==='new';
  const bg  = isN ? 'rgba(99,102,241,.05)' : 'transparent';
  let h = '<tr style="background:'+bg+'">';
  h += '<td style="color:var(--txt3);text-align:center;font-size:12px">'+(i+1)+'</td>';
  h += '<td><input class="gi" style="padding:6px 8px;font-size:12px;width:56px;margin:0" type="number" placeholder="1" value="'+esc(r.serial)+'" oninput="AR['+i+'].serial=this.value"></td>';
  h += '<td><input class="gi" style="padding:6px 8px;font-size:12px;margin:0" placeholder="Delhi" value="'+esc([r.city](http://r.city))+'" oninput="AR['+i+'].city=this.value"></td>';
  h += '<td><input class="gi" style="padding:6px 8px;font-size:12px;font-family:monospace;margin:0" placeholder="SW-001" value="'+esc(r.code)+'" oninput="AR['+i+'].code=this.value"></td>';
  h += '<td><input class="gi" style="padding:6px 8px;font-size:12px;margin:0" placeholder="Centre name" value="'+esc([r.name](http://r.name))+'" oninput="AR['+i+'].name=this.value"></td>';
  h += '<td><select class="gi" style="padding:6px 8px;font-size:12px;margin:0" onchange="AR['+i+'].btype=this.value;rAT()"><option value="operational"'+(r.btype==='operational'?' selected':'')+'>Operational</option><option value="new"'+(r.btype==='new'?' selected':'')+'>New</option></select></td>';
  h += '<td>'+(isN?'<input class="gi" style="padding:6px 8px;font-size:12px;min-width:110px;margin:0" type="date" value="'+(r.softHandover||'')+'" oninput="AR['+i+'].softHandover=this.value">':'<span style="color:var(--txt3)">—</span>')+'</td>';
  h += '<td>'+(isN?'<input class="gi" style="padding:6px 8px;font-size:12px;min-width:110px;margin:0" type="date" value="'+(r.hardHandover||'')+'" oninput="AR['+i+'].hardHandover=this.value">':'<span style="color:var(--txt3)">—</span>')+'</td>';
  h += '<td><button onclick="rAR('+i+')" style="background:none;border:none;cursor:pointer;color:var(--txt3);font-size:15px">×</button></td>';
  h += '</tr>';
  return h;
}
function rAT() { const tb=document.getElementById('add-tbody'); if(tb) tb.innerHTML=[AR.map](http://AR.map)(arRow).join(''); }
function oAdd() {
  AR = [ER()];
  let h = '<div class="ih">Fill one row per building. Change Type to <strong>New</strong> to unlock handover dates.</div>';
  h += '<div class="tw" style="margin-bottom:10px"><table style="min-width:800px"><thead><tr><th>#</th><th>Sr No</th><th>City</th><th>Code</th><th>Centre Name</th><th>Type</th><th>Soft Handover</th><th>Hard Handover</th><th></th></tr></thead><tbody id="add-tbody">'+[AR.map](http://AR.map)(arRow).join('')+'</tbody></table></div>';
  h += '<button onclick="aAR()" style="width:100%;padding:9px;border:1px dashed rgba(99,102,241,.4);border-radius:10px;background:none;color:var(--ind-l);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px">+ Add row</button>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svAdd()">Save buildings</button></div>';
  OS('Add buildings', h, true);
}
function aAR() { AR.push(ER()); rAT(); }
function rAR(i) { if(AR.length===1){AR[0]=ER();rAT();return;} AR.splice(i,1); rAT(); }
async function svAdd() {
  const vld = AR.filter(r => [r.name](http://r.name).trim());
  if (!vld.length) return;
  const eL  = [DB.buildings.map](http://DB.buildings.map)(b => [b.name](http://b.name).toLowerCase());
  const nw  = vld.filter(r => !eL.includes([r.name](http://r.name).trim().toLowerCase()));
  if (!nw.length) { alert('All entries are duplicates.'); return; }
  const rows = [nw.map](http://nw.map)(r => ({user_id:CHAIRMAN_UID||[U.id](http://U.id), serial:r.serial?parseInt(r.serial):null, city:[r.city](http://r.city).trim(), code:r.code.trim(), name:[r.name](http://r.name).trim(), btype:r.btype||'operational', soft_handover:r.btype==='new'&&r.softHandover?r.softHandover:null, hard_handover:r.btype==='new'&&r.hardHandover?r.hardHandover:null}));
  const {data} = await SB.from('buildings').insert(rows).select();
  if (data) data.forEach(b => DB.buildings.push({...b,softHandover:b.soft_handover,hardHandover:b.hard_handover,btype:b.btype||'operational'}));
  CS(); rBld();
  if (vld.length-nw.length > 0) alert(nw.length+' added. '+(vld.length-nw.length)+' duplicate(s) skipped.');
}
function oEB(id) {
  const b = DB.buildings.find(x => [x.id](http://x.id)===id); if (!b) return;
  const isN = b.btype==='new';
  let h = '<div class="fg"><label class="fl">Sr No</label><input id="eb-sr" class="gi" type="number" value="'+(b.serial||'')+'" style="width:80px"></div>';
  h += '<div class="fr"><div class="fg"><label class="fl">City</label><input id="eb-ci" class="gi" value="'+esc([b.city](http://b.city)||'')+'"></div><div class="fg"><label class="fl">Centre Code</label><input id="eb-co" class="gi" style="font-family:monospace" value="'+esc(b.code||'')+'"></div></div>';
  h += '<div class="fg"><label class="fl">Centre Name</label><input id="eb-nm" class="gi" value="'+esc([b.name](http://b.name)||'')+'"></div>';
  h += '<div class="fg"><label class="fl">Type</label><select id="eb-ty" class="gi" onchange="tHO(this.value)"><option value="operational"'+(!isN?' selected':'')+'>Operational</option><option value="new"'+(isN?' selected':'')+'>New</option></select></div>';
  h += '<div id="eb-ho" style="display:'+(isN?'block':'none')+'"><div class="fr"><div class="fg"><label class="fl">Soft Handover</label><input id="eb-so" class="gi" type="date" value="'+(b.softHandover||'')+'"></div><div class="fg"><label class="fl">Hard Handover</label><input id="eb-ha" class="gi" type="date" value="'+(b.hardHandover||'')+'"></div></div></div>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svEB(\''+id+'\')">Save</button></div>';

function tHO(t) { const e=document.getElementById('eb-ho'); if(e) [e.style](http://e.style).display=t==='new'?'block':'none'; }
async function svEB(id) {
  const nm=val('eb-nm').trim(); if(!nm) return;
  const ty=val('eb-ty');
  const obj={name:nm,city:val('eb-ci').trim(),code:val('eb-co').trim(),serial:val('eb-sr')?parseInt(val('eb-sr')):null,btype:ty,soft_handover:ty==='new'&&val('eb-so')?val('eb-so'):null,hard_handover:ty==='new'&&val('eb-ha')?val('eb-ha'):null};
  await SB.from('buildings').update(obj).eq('id',id).eq('user_id',CHAIRMAN_UID||[U.id](http://U.id));
  DB.buildings = [DB.buildings.map](http://DB.buildings.map)(x => [x.id](http://x.id)===id ? {...x,...obj,softHandover:obj.soft_handover,hardHandover:obj.hard_handover} : x);
  CS(); rBld();
}
async function dBld(id) {
  if (!confirm('Delete this building?')) return;
  await delRow('buildings', id);
  DB.buildings = DB.buildings.filter(x => [x.id](http://x.id)!==id);
  DB.pb        = DB.pb.filter(r => r.buildingId!==id);
  rBld();
}

let impP = [];
function oImp() {
  let h = '<div class="ih">Paste from Excel. Columns in order:<br><strong>Sr No · City · Centre Code · Centre Name · Type · Soft Handover · Hard Handover</strong><br><span style="font-size:12px;color:var(--txt3)">Dates as YYYY-MM-DD. Cols 6–7 for New centres only.</span></div>';
  h += '<div class="fg"><label class="fl">Paste here</label><textarea id="ir" class="gi" style="min-height:130px;font-family:monospace;font-size:12px" placeholder="1\tDelhi\tSW-001\tConnaught Place\toperational" oninput="pImp()"></textarea></div>';
  h += '<div id="ip"></div>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" id="ib" disabled onclick="doImp()">Import</button></div>';
  OS('Import from Excel', h, true);
}
function pImp() {
  const raw = val('ir');
  const eL  = [DB.buildings.map](http://DB.buildings.map)(b => [b.name](http://b.name).toLowerCase());
  impP = raw.trim().split('\n').map(r=>r.trim()).filter(Boolean).map(r => {
    const c = r.split('\t');
    if (c.length<4) return null;
    return {serial:c[0]?parseInt(c[0]):null,city:(c[1]||'').trim(),code:(c[2]||'').trim(),name:(c[3]||'').trim(),btype:(c[4]||'').trim().toLowerCase()==='new'?'new':'operational',softHandover:(c[5]||'').trim(),hardHandover:(c[6]||'').trim()};
  }).filter(b => b && [b.name](http://b.name));

  const nw = impP.filter(b => !eL.includes([b.name](http://b.name).toLowerCase()));
  const dp = impP.filter(b =>  eL.includes([b.name](http://b.name).toLowerCase()));
  const btn = document.getElementById('ib');
  if (btn) { btn.disabled=!nw.length; btn.textContent='Import '+nw.length+' buildings'; }

  const wrap = document.getElementById('ip');
  if (!wrap||!impP.length) { if(wrap) wrap.innerHTML=''; return; }
  let h = '<div style="font-size:12px;font-weight:600;margin-bottom:8px"><span style="color:#10b981">✓ '+nw.length+' new</span>'+(dp.length?'<span style="color:#f59e0b;margin-left:8px">· '+dp.length+' duplicates</span>':'')+'</div>';
  h += '<div style="border:1px solid var(--bdr);border-radius:10px;max-height:150px;overflow:auto;margin-bottom:14px">';
  impP.forEach(b => {

/* ══════════════════════════════════════════════════════
   DIGEST
══════════════════════════════════════════════════════ */
function buildMsg(person) {
  const today     = tday();
  const oneWeek   = new Date(); oneWeek.setDate(oneWeek.getDate()+7);
  const weekStr   = oneWeek.toISOString().slice(0,10);
  const threeDays = new Date(); threeDays.setDate(threeDays.getDate()-3);
  const threeDayStr = threeDays.toISOString().slice(0,10);

  const ownedProjs = DB.projects.filter(pr => pr.primaryOwnerId===[person.id](http://person.id) && pr.status!=='done');
  if (!ownedProjs.length) return null;

  // ── Gather every signal per project ─────────────────────────────────────
  const signals = [];

  ownedProjs.forEach(proj => {
    const allT    = DB.tasks.filter(t => t.projectId===[proj.id](http://proj.id));
    const pendT   = allT.filter(t => t.status!=='done');
    const pct     = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;

    // 1. Overdue tasks
    const overdue = pendT.filter(t => isOD(t.dueDate, t.status));

    // 2. Blocked tasks
    const blocked = pendT.filter(t => t.status==='blocked');

    // 3. Awaiting tasks
    const awaiting = pendT.filter(t => t.status==='awaiting');

    // 4. Critical overdue >3 days
    const critOD = overdue.filter(t => t.dueDate && t.dueDate < threeDayStr);

    // 5. Tasks due this week (upcoming urgency)
    const dueSoon = pendT.filter(t => t.dueDate && t.dueDate > today && t.dueDate <= weekStr && t.status!=='blocked');

    // 6. Tasks with no assignee but have a due date
    const unassigned = pendT.filter(t => !t.assignedTo && t.dueDate);

    // 7. Milestones due this week
    const milsDue = DB.milestones.filter(m =>
      m.projectId===[proj.id](http://proj.id) && m.status!=='done' && m.deadline && m.deadline<=weekStr
    );

    // 8. Buildings on hold or blocked
    const pbIssues = DB.pb.filter(r =>
      r.projectId===[proj.id](http://proj.id) && (r.status==='blocked'||r.status==='on_hold')
    ).map(r => ({...r, b:DB.buildings.find(b=>[b.id](http://b.id)===r.buildingId)})).filter(r=>r.b);

    // 9. Project health signal
    const healthIssue = ['delayed','at_risk','not_started'].includes([proj.health](http://proj.health)||'');

    // 10. Zero progress on active project
    const zeroProgress = allT.length > 0 && pct === 0;

    // 11. Project past deadline
    const pastDeadline = proj.deadline && proj.deadline < today && proj.status !== 'done';

    // 12. Pending documents
    const pendingDocs = [DB.docs](http://DB.docs).filter(d =>
      d.entity_type==='project' && d.entity_id===[proj.id](http://proj.id) && d.doc_status==='pending'
    );
    const pbPendingDocs = DB.pb
      .filter(r=>r.projectId===[proj.id](http://proj.id))
      .flatMap(r => [DB.docs](http://DB.docs).filter(d=>d.entity_type==='project_building'&&d.entity_id===[r.id](http://r.id)&&d.doc_status==='pending')
        .map(d=>({...d,bName:(DB.buildings.find(b=>[b.id](http://b.id)===r.buildingId)||{}).name||''}))
      );

    const hasAnything = overdue.length||blocked.length||awaiting.length||milsDue.length||
      pbIssues.length||healthIssue||zeroProgress||pastDeadline||unassigned.length||
      pendingDocs.length||pbPendingDocs.length;

    if (hasAnything) {
      signals.push({
        proj, pct, overdue, critOD, blocked, awaiting,
        dueSoon, unassigned, milsDue, pbIssues,
        healthIssue, zeroProgress, pastDeadline,
        pendingDocs, pbPendingDocs
      });
    }
  });

  if (!signals.length) return null;

  const totalOverdue  = signals.reduce((s,x)=>s+x.overdue.length,0);
  const totalBlocked  = signals.reduce((s,x)=>s+x.blocked.length,0);
  const totalAwaiting = signals.reduce((s,x)=>s+x.awaiting.length,0);

  let msg = '*Founder\'s Office — Daily Status · '+[person.name](http://person.name)+'*\n';
  msg += fd(today)+'\n';
  msg += '━━━━━━━━━━━━━━━━━━━━━━━━\n';

  // Summary line
  const parts = [];
  if (totalOverdue)  parts.push(totalOverdue+' overdue');
  if (totalBlocked)  parts.push(totalBlocked+' blocked');
  if (totalAwaiting) parts.push(totalAwaiting+' awaiting');
  if (parts.length) msg += '🔴 Needs immediate action: '+parts.join(' · ')+'\n';
  msg += '\n';

  signals.forEach(({proj,pct,overdue,critOD,blocked,awaiting,dueSoon,unassigned,milsDue,pbIssues,healthIssue,zeroProgress,pastDeadline,pendingDocs,pbPendingDocs}) => {

    // Project header
    const healthLabel = {on_track:'✅ On Track',at_risk:'⚠️ At Risk',delayed:'🔴 Delayed',not_started:'⭕ Not Started'}[[proj.health](http://proj.health)||'on_track'];
    msg += '━━━━━━━━━━━━━━━━━━━━━━━━\n';
    msg += '📁 *'+[proj.name](http://proj.name)+'*';
    msg += '  '+healthLabel+'  '+pct+'% complete\n';
    if (proj.deadline) {
      const isPastDL = proj.deadline < today;
      msg += '   📅 Deadline: '+fd(proj.deadline)+(isPastDL?' 🔴 PAST DUE':'')+ '\n';
    }
    msg += '\n';

    // Critical overdue (>3 days)
    if (critOD.length) {
      msg += '   🚨 *CRITICAL — Overdue >3 days ('+critOD.length+')*\n';
      critOD.forEach(t => {
        const pe   = DB.people.find(p=>[p.id](http://p.id)===t.assignedTo);
        const daysOD = Math.floor(([Date.now](http://Date.now)()-new Date(t.dueDate+'T12:00:00').getTime())/86400000);
        msg += '   • '+t.title+'\n';
        msg += '     Was due: '+fd(t.dueDate)+' ('+daysOD+' days ago)\n';
        if (pe) msg += '     Responsible: '+[pe.name](http://pe.name)+'\n';
        if (t.notes) msg += '     Note: '+t.notes+'\n';
      });
      msg += '\n';
    }

    // Regular overdue (≤3 days)
    const regularOD = overdue.filter(t=>!critOD.includes(t));
    if (regularOD.length) {
      msg += '   ⚠️ *Overdue tasks ('+regularOD.length+')*\n';
      regularOD.forEach(t => {
        const pe = DB.people.find(p=>[p.id](http://p.id)===t.assignedTo);
        msg += '   • '+t.title+' — was due '+fd(t.dueDate);
        if (pe) msg += ' · '+[pe.name](http://pe.name);
        msg += '\n';
      });
      msg += '\n';
    }

    // Blocked
    if (blocked.length) {
      msg += '   🔴 *Blocked tasks ('+blocked.length+')*\n';
      blocked.forEach(t => {
        const pe   = DB.people.find(p=>[p.id](http://p.id)===t.assignedTo);
        const deps = (t.dependsOn||[]).map(id=>DB.tasks.find(x=>[x.id](http://x.id)===id)).filter(Boolean).filter(d=>d.status!=='done');
        msg += '   • '+t.title;
        if (pe) msg += ' · '+[pe.name](http://pe.name);
        msg += '\n';
        if (deps.length) msg += '     ⛓ Blocked by: '+[deps.map](http://deps.map)(d=>d.title).join(', ')+'\n';
        if (t.notes) msg += '     Note: '+t.notes+'\n';
      });
      msg += '\n';
    }

    // Awaiting
    if (awaiting.length) {
      msg += '   ⏳ *Awaiting response ('+awaiting.length+')*\n';
      awaiting.forEach(t => {
        const pe = DB.people.find(p=>[p.id](http://p.id)===t.assignedTo);
        msg += '   • '+t.title;
        if (pe) msg += ' · '+[pe.name](http://pe.name);
        if (t.dueDate) msg += ' · due '+fd(t.dueDate);
        msg += '\n';
      });
      msg += '\n';
    }

    // Due this week (upcoming)
    if (dueSoon.length) {
      msg += '   📅 *Due this week ('+dueSoon.length+')*\n';
      dueSoon.slice(0,5).forEach(t => {
        const pe = DB.people.find(p=>[p.id](http://p.id)===t.assignedTo);
        msg += '   • '+t.title+' — '+fd(t.dueDate);
        if (pe) msg += ' · '+[pe.name](http://pe.name);
        msg += '\n';
      });
      if (dueSoon.length>5) msg += '   … and '+(dueSoon.length-5)+' more\n';
      msg += '\n';
    }

    // Unassigned tasks with due dates
    if (unassigned.length) {
      msg += '   👤 *Unassigned ('+unassigned.length+') — no one is responsible*\n';
      unassigned.forEach(t => {
        msg += '   • '+t.title+' — due '+fd(t.dueDate)+'\n';
      });
      msg += '\n';
    }

    // Milestones due this week
    if (milsDue.length) {
      msg += '   🏁 *Milestones due this week*\n';
      milsDue.forEach(m => {
        msg += '   • '+[m.name](http://m.name)+' — '+fd(m.deadline)+'\n';
      });
      msg += '\n';
    }

    // Buildings on hold / blocked
    if (pbIssues.length) {
      msg += '   🏢 *Buildings needing action*\n';
      pbIssues.forEach(r => {
        const statusLabel = BS[r.status]?.l||r.status;
        msg += '   • '+[r.b.name](http://r.b.name)+([r.b.city](http://r.b.city)?', '+[r.b.city](http://r.b.city):'')+' — '+statusLabel+'\n';
        if (r.remarks) msg += '     '+r.remarks+'\n';
        if (r.targetCompletion) msg += '     Target: '+fd(r.targetCompletion)+'\n';
      });
      msg += '\n';
    }

    // Pending documents
    if (pendingDocs.length||pbPendingDocs.length) {
      msg += '   📎 *Documents pending*\n';
      pendingDocs.forEach(d=>{msg+='   • '+[d.name](http://d.name)+(d.notes?' — '+d.notes:'')+'\n';});
      pbPendingDocs.forEach(d=>{msg+='   • '+[d.name](http://d.name)+(d.bName?' ('+d.bName+')':'')+(d.notes?' — '+d.notes:'')+'\n';});
      msg += '\n';
    }

    // Zero progress warning
    if (zeroProgress) {
      msg += '   ⭕ *No tasks completed yet on this project*\n\n';
    }
  });

  msg += '━━━━━━━━━━━━━━━━━━━━━━━━\n';
  msg += '📊 Summary: '+signals.length+' project'+(signals.length!==1?'s':'')+' need attention';
  if (totalOverdue)  msg += ' · '+totalOverdue+' overdue';
  if (totalBlocked)  msg += ' · '+totalBlocked+' blocked';
  if (totalAwaiting) msg += ' · '+totalAwaiting+' awaiting';
  msg += '\n\n_Sent by Taskora — Founder\'s Office_';

  return msg;
}

    h += '</div>';

  return h || '<div style="font-size:12px;color:var(--txt3);text-align:center;padding:10px">All projects on track — nothing to flag</div>';
}

  // All people who own at least one active project
  const owners = DB.people.filter(p => DB.projects.some(pr => pr.primaryOwnerId===[p.id](http://p.id) && pr.status!=='done'));

  // Global summary counts across all owners
  const today   = tday();

function cpM(pid) {
  const el  = document.getElementById('de-'+pid);
  const msg = el ? el.value : '';
  if (!msg) return;
  navigator.clipboard.writeText(msg).catch(()=>{}).finally(() => {
    const b = document.getElementById('cp-'+pid);
    if (b) { b.textContent='✓ Copied!'; b.classList.add('ok'); setTimeout(()=>{ b.textContent='📋 Copy'; b.classList.remove('ok'); },2000); }
  });
}
function oWA(pid) {
  const el  = document.getElementById('de-'+pid);
  const msg = el ? el.value : '';
  const p   = DB.people.find(x => [x.id](http://x.id)===pid);
  if (!p?.phone) { alert('No WhatsApp number for '+p?.name); return; }
  if (!msg) return;
  [window.open](http://window.open)('https://wa.me/'+p.phone.replace(/\D/g,'')+'?text='+encodeURIComponent(msg), '_blank');
}

async function svProfile() {
  const dn  = val('pr-dn').trim();
  const pw1 = val('pr-pw1');
  const pw2 = val('pr-pw2');
  const el  = document.getElementById('pr-msg');
  const sm  = (m,ok) => { if(el) el.innerHTML='<div class="amsg '+(ok?'ok':'err')+'" style="margin-bottom:0">'+m+'</div>'; };
  let changed = false;
  if (dn) {
    const {error} = await SB.auth.updateUser({data:{display_name:dn}});
    if (error) { sm('Error: '+error.message); return; }
    document.getElementById('sb-name').textContent = dn;
    changed = true;
  }
  if (pw1||pw2) {
    if (pw1!==pw2)   { sm('Passwords do not match.'); return; }
    if (pw1.length<8) { sm('Password must be at least 8 characters.'); return; }
    const {error} = await SB.auth.updateUser({password:pw1});
    if (error) { sm('Error: '+error.message); return; }
    changed = true;
  }
  sm(changed ? 'Changes saved!' : 'No changes to save.', changed);
}

async function rActivityLog(projId) {
  const el = document.getElementById('act-log-'+projId);
  if (!el) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--txt3);padding:6px 0">Loading history…</div>';
  const {data} = await SB.from('activity_log')
    .select('*').eq('workspace_id', CHAIRMAN_UID||[U.id](http://U.id))
    .eq('entity_id', projId).order('created_at',{ascending:false}).limit(20);
  if (!data||!data.length) { el.innerHTML='<div style="font-size:12px;color:var(--txt3);padding:6px 0;text-align:center">No activity yet</div>'; return; }
  const ACTION_ICON = {created:'✨',updated:'✎',deleted:'🗑',status_changed:'🔄',assigned:'👤'};
  el.innerHTML = [data.map](http://data.map)(a => {
    const icon = ACTION_ICON[a.action]||'•';
    const ago = timeAgo(a.created_at);
    let detail = '';
    if (a.field_changed && a.old_value!=null && [a.new](http://a.new)_value!=null)
      detail = ' — '+esc(a.field_changed)+': <span style="color:var(--rose)">'+esc(a.old_value)+'</span> → <span style="color:var(--grn)">'+esc([a.new](http://a.new)_value)+'</span>';
    else if ([a.new](http://a.new)_value) detail = ': '+esc([a.new](http://a.new)_value);
    return '<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:12px">'
      +'<span style="flex-shrink:0;font-size:14px">'+icon+'</span>'
      +'<div style="flex:1;min-width:0"><span style="color:var(--txt);font-weight:500">'+esc([a.actor](http://a.actor)_name)+'</span>'
      +' <span style="color:var(--txt2)">'+a.action+'</span>'
      +' <span style="color:var(--txt2)">'+esc(a.entity_type)+' <em>'+esc(a.entity_name)+'</em></span>'+detail+'</div>'
      +'<span style="color:var(--txt3);flex-shrink:0;white-space:nowrap">'+ago+'</span></div>';
  }).join('');
}

function timeAgo(ts) {
  const diff = [Date.now](http://Date.now)() - new Date(ts).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m+'m ago';
  const h = Math.floor(m/60);
  if (h < 24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function rNotifications() {
  const el = document.getElementById('tab-notifications');
  if (!el) return;
  const unread = DB.notifications.filter(n=>![n.read](http://n.read));
  const NOTIF_ICON = {overdue:'⚠',due_today:'📅',blocked:'🔴',escalation:'🚨',invite_accepted:'✓',status_changed:'🔄',digest_ready:'📤',default:'🔔'};
  const NOTIF_COLOR = {overdue:'var(--rose)',due_today:'#f59e0b',blocked:'var(--rose)',escalation:'var(--rose)',invite_accepted:'var(--grn)',status_changed:'var(--ind-l)',digest_ready:'var(--teal)',default:'var(--txt2)'};

  let h = '<div class="ph"><div><div class="pt">Notifications</div><div class="ps">'+unread.length+' unread</div></div>';
  if (unread.length) h += '<button class="btn btn-g btn-sm" onclick="markAllNotifsRead()">Mark all read</button>';
  h += '</div>';

  // Generate live alerts from data (escalation engine)
  const today = tday();
  const threeDaysAgo = new Date(); threeDaysAgo.setDate(threeDaysAgo.getDate()-3);
  const threeDayStr = threeDaysAgo.toISOString().slice(0,10);
  const sevenDayStr = new Date([Date.now](http://Date.now)()-7*86400000).toISOString().slice(0,10);

  const liveAlerts = [];
  const myProjs = visibleProjects().filter(p=>p.status!=='done');
  const myProjIds = new Set([myProjs.map](http://myProjs.map)(p=>[p.id](http://p.id)));
  const myTasks = visibleTasks(myProjIds);

  // Overdue >3 days
  myTasks.filter(t=>t.dueDate && t.dueDate < threeDayStr && t.status!=='done').forEach(t => {
    const proj = DB.projects.find(p=>[p.id](http://p.id)===t.projectId);
    const pe = DB.people.find(p=>[p.id](http://p.id)===t.assignedTo);
    liveAlerts.push({type:'overdue',icon:'🚨',color:'var(--rose)',title:'Task overdue >3 days',body:esc(t.title)+(pe?' · '+esc([pe.name](http://pe.name)):'')+(proj?' · '+esc([proj.name](http://proj.name)):''),age:'Persistent'});
  });
  // Blocked >2 days
  myTasks.filter(t=>t.status==='blocked').forEach(t => {
    const proj = DB.projects.find(p=>[p.id](http://p.id)===t.projectId);
    liveAlerts.push({type:'blocked',icon:'🔴',color:'var(--rose)',title:'Task blocked',body:esc(t.title)+(proj?' · '+esc([proj.name](http://proj.name)):''),age:'Action needed'});
  });
  // Projects at risk >7 days (based on health — we can't track when it changed without activity log)
  myProjs.filter(p=>[p.health](http://p.health)==='delayed').forEach(p => {
    const owner = DB.people.find(pe=>[pe.id](http://pe.id)===p.primaryOwnerId);
    liveAlerts.push({type:'escalation',icon:'🚨',color:'var(--rose)',title:'Project delayed',body:esc([p.name](http://p.name))+(owner?' · Owner: '+esc([owner.name](http://owner.name)):''),age:'Escalation'});
  });
  // Follow-ups due today
  myTasks.filter(t=>t.followUp===today && t.status!=='done').forEach(t => {
    liveAlerts.push({type:'due_today',icon:'📋',color:'#f59e0b',title:'Follow-up due today',body:esc(t.title),age:'Today'});
  });

  if (liveAlerts.length) {
    h += '<div style="font-size:11px;font-weight:700;color:var(--rose);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">⚡ Live Alerts</div>';
    liveAlerts.forEach(a => {
      h += '<div style="display:flex;gap:10px;padding:10px 12px;background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.2);border-radius:10px;margin-bottom:6px">';
      h += '<span style="font-size:18px;flex-shrink:0">'+a.icon+'</span>';
      h += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:'+a.color+'">'+a.title+'</div>';
      h += '<div style="font-size:12px;color:var(--txt2);margin-top:2px">'+a.body+'</div></div>';
      h += '<span style="font-size:11px;color:var(--txt3);flex-shrink:0;white-space:nowrap">'+a.age+'</span></div>';
    });
    h += '<div style="margin-bottom:20px"></div>';
  }

  if (!DB.notifications.length && !liveAlerts.length) {
    h += '<div class="es"><span class="em">🔔</span><div class="et">All clear</div><div class="ed">No notifications yet. Activity alerts will appear here.</div></div>';
    el.innerHTML = h;
    return;
  }

  if (DB.notifications.length) {
    h += '<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">History</div>';
    DB.notifications.forEach(n => {
      const icon = NOTIF_ICON[n.type]||NOTIF_ICON.default;
      const color = NOTIF_COLOR[n.type]||NOTIF_COLOR.default;
      h += '<div style="display:flex;gap:10px;padding:10px 12px;background:'+([n.read](http://n.read)?'var(--glass)':'rgba(99,102,241,.07)')+';border:1px solid '+([n.read](http://n.read)?'var(--bdr)':'rgba(99,102,241,.25)')+';border-radius:10px;margin-bottom:5px">';

/* ══════════════════════════════════════════════════════
   PHASE 2 — ESCALATION PANEL (Command Centre)
══════════════════════════════════════════════════════ */
function rEscalationPanel() {
  const threeDayStr = new Date([Date.now](http://Date.now)()-3*86400000).toISOString().slice(0,10);
  const myProjs  = visibleProjects().filter(p=>p.status!=='done');
  const myProjIds= new Set([myProjs.map](http://myProjs.map)(p=>[p.id](http://p.id)));
  const myTasks  = visibleTasks(myProjIds);

  const severeOD  = myTasks.filter(t=>t.dueDate && t.dueDate<threeDayStr && t.status!=='done');
  const blocked   = myTasks.filter(t=>t.status==='blocked');
  const delayed   = myProjs.filter(p=>[p.health](http://p.health)==='delayed');

  if (!severeOD.length && !blocked.length && !delayed.length) return '';

  let h = '<div style="background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.2);border-radius:12px;padding:14px;margin-bottom:20px">';
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:18px">🚨</span><div style="font-size:13px;font-weight:700;color:var(--rose)">Escalation Required</div>';
  h += '<div style="display:flex;gap:5px;margin-left:auto">';
  if (severeOD.length) h += '<span class="bd" style="background:rgba(244,63,94,.15);color:var(--rose)">'+severeOD.length+' critical overdue</span>';
  if (blocked.length)  h += '<span class="bd" style="background:rgba(244,63,94,.12);color:var(--rose)">'+blocked.length+' blocked</span>';
  if (delayed.length)  h += '<span class="bd" style="background:rgba(244,63,94,.12);color:var(--rose)">'+delayed.length+' delayed projects</span>';
  h += '</div></div>';

  // Critical overdue tasks (>3 days)
  severeOD.slice(0,4).forEach(t => {
    const proj = DB.projects.find(p=>[p.id](http://p.id)===t.projectId);
    const pe   = DB.people.find(p=>[p.id](http://p.id)===t.assignedTo);
    const owner= proj ? DB.people.find(p=>[p.id](http://p.id)===proj.primaryOwnerId) : null;
    const daysOD = Math.floor(([Date.now](http://Date.now)()-new Date(t.dueDate+'T12:00:00').getTime())/86400000);
    h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(244,63,94,.08);border-radius:8px;margin-bottom:4px">';
    h += '<span style="font-size:12px;color:var(--rose);flex-shrink:0">⚠</span>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--txt)">'+esc(t.title)+'</div>';
    h += '<div style="font-size:11px;color:var(--txt2);margin-top:1px">';
    if (proj) h += esc([proj.name](http://proj.name))+' · ';
    if (pe)   h += esc([pe.name](http://pe.name))+' · ';
    h += '<span style="color:var(--rose);font-weight:600">'+daysOD+' days overdue</span></div></div>';
    if (owner) h += av([owner.name](http://owner.name),owner.color,22);
    h += '</div>';
  });

  // Blocked tasks
  blocked.slice(0,3).forEach(t => {
    const proj = DB.projects.find(p=>[p.id](http://p.id)===t.projectId);
    h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(244,63,94,.05);border-radius:8px;margin-bottom:4px">';
    h += '<span style="font-size:12px;flex-shrink:0">🔴</span>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--txt)">'+esc(t.title)+'</div>';
    if (proj) h += '<div style="font-size:11px;color:var(--txt2)">'+esc([proj.name](http://proj.name))+'</div>';
    h += '</div><span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">Blocked</span></div>';
  });

  // Delayed projects
  delayed.slice(0,3).forEach(p => {
    const owner = DB.people.find(pe=>[pe.id](http://pe.id)===p.primaryOwnerId);
    const allT = DB.tasks.filter(t=>t.projectId===[p.id](http://p.id));
    const pct = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
    h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(244,63,94,.05);border-radius:8px;margin-bottom:4px">';
    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+p.color+';flex-shrink:0"></div>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--txt)">'+esc([p.name](http://p.name))+'</div>';
    if (owner) h += '<div style="font-size:11px;color:var(--txt2)">'+esc([owner.name](http://owner.name))+' · '+pct+'% done</div>';
    h += '</div><span class="bd h-dl">Delayed</span></div>';
  });

  h += '</div>';
  return h;
}

  let h = '<div style="margin-top:10px;border-top:1px solid var(--bdr);padding-top:10px">';

      h += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500">'+esc([doc.name](http://doc.name))+'</div>';
      if (doc.notes) h += '<div style="font-size:11px;color:var(--txt3)">'+esc(doc.notes)+'</div>';
      h += '</div>';
      if (doc.url) h += '<a href="'+esc(doc.url)+'" target="_blank" style="font-size:11px;color:var(--ind-l);text-decoration:none;flex-shrink:0">View ↗</a>';
      h += '<span class="bd" style="background:'+[st.bg](http://st.bg)+';color:'+st.c+'">'+st.l+'</span>';

      h += '<button onclick="delDoc([this.dataset.id](http://this.dataset.id),[this.dataset.et](http://this.dataset.et),this.dataset.eid)" data-id="'+[doc.id](http://doc.id)+'" data-et="'+entityType+'" data-eid="'+entityId+'" class="mb dd" style="font-size:11px;padding:2px 7px">×</button>';

function oDocF(entityType, entityId) {
  let h = '<div class="fg"><label class="fl">Document name</label><input id="df-n" class="gi" placeholder="e.g. Lease Agreement, LL Doc, NOC" ></div>';
  h += '<div class="fg"><label class="fl">Status</label><select id="df-st" class="gi"><option value="pending">Pending</option><option value="received">Received</option><option value="rejected">Rejected</option></select></div>';
  h += '<div class="fg"><label class="fl">URL / link (optional)</label><input id="df-u" class="gi" type="url" placeholder="https://drive.google.com/…"></div>';
  h += '<div class="fg"><label class="fl">Notes</label><textarea id="df-no" class="gi" placeholder="e.g. Awaiting landlord signature"></textarea></div>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svDoc([this.dataset.et](http://this.dataset.et),this.dataset.eid)" data-et="'+entityType+'" data-eid="'+entityId+'">Save</button></div>';
  OS('Add document', h);
}
async function svDoc(entityType, entityId) {
  const name = val('df-n').trim(); if (!name) return;
  const obj = {workspace_id:CHAIRMAN_UID||[U.id](http://U.id), entity_type:entityType, entity_id:entityId, name, doc_status:val('df-st'), url:val('df-u').trim(), notes:val('df-no').trim(), uploaded_by:[U.id](http://U.id)};
  const {data} = await SB.from('documents').insert(obj).select().single();
  if (data) [DB.docs](http://DB.docs).push(data);
  CS();
  if (curTab==='projects') rProj();
}
async function cycleDocStatus(docId) {
  const doc = [DB.docs](http://DB.docs).find(d=>[d.id](http://d.id)===docId); if (!doc) return;
  const cycle = ['pending','received','rejected'];
  const next = cycle[(cycle.indexOf(doc.doc_status)+1)%cycle.length];
  await SB.from('documents').update({doc_status:next}).eq('id',docId);
  [DB.docs](http://DB.docs) = [DB.docs.map](http://DB.docs.map)(d=>[d.id](http://d.id)===docId?{...d,doc_status:next}:d);
  if (curTab==='projects') rProj();
}
async function delDoc(docId, et, eid) {
  if (!confirm('Delete this document?')) return;
  await SB.from('documents').delete().eq('id',docId);
  [DB.docs](http://DB.docs) = [DB.docs](http://DB.docs).filter(d=>[d.id](http://d.id)!==docId);
  if (curTab==='projects') rProj();
}

async function saveTemplate(projId) {
  const proj = DB.projects.find(p=>[p.id](http://p.id)===projId); if (!proj) return;
  const name = prompt('Template name:', [proj.name](http://proj.name)+' (template)');
  if (!name) return;
  const mils = DB.milestones.filter(m=>m.projectId===projId).map(m=>({name:[m.name](http://m.name),deadline_offset:null,tasks:DB.tasks.filter(t=>t.milestoneId===[m.id](http://m.id)).map(t=>({title:t.title,notes:t.notes,priority:t.priority}))}));
  const directTasks = DB.tasks.filter(t=>t.projectId===projId&&!t.milestoneId).map(t=>({title:t.title,notes:t.notes,priority:t.priority}));
  const structure = {milestones:mils, directTasks};
  const {data} = await SB.from('project_templates').insert({user_id:CHAIRMAN_UID||[U.id](http://U.id),name,description:proj.description||'',structure}).select().single();
  if (data) { DB.templates.push(data); showToast('Template saved: '+name,'ok'); }
}

function oApplyTemplate(projId) {
  if (!DB.templates.length) { showToast('No templates saved yet. Save a template from an existing project first.','err'); return; }
  let h = '<div style="font-size:13px;color:var(--txt2);margin-bottom:14px">Select a template to apply. This adds its milestones and tasks to the project.</div>';
  h += '<div style="border:1px solid var(--bdr);border-radius:10px;overflow:auto;max-height:250px;margin-bottom:14px">';

    h += '<div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc([t.name](http://t.name))+'</div>';
    h += '<div style="font-size:11px;color:var(--txt2)">'+mCount+' milestones · '+tCount+' tasks</div></div>';
    h += '<span style="font-size:12px;color:var(--ind-l)">Apply →</span></div>';
  });
  h += '</div>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button></div>';

async function applyTemplate(templateId, projId) {
  const tpl = DB.templates.find(t=>[t.id](http://t.id)===templateId); if (!tpl) return;
  const uid = CHAIRMAN_UID||[U.id](http://U.id);
  CS();
  // Create milestones
  for (const m of (tpl.structure.milestones||[])) {
    const {data:mil} = await SB.from('sub_projects').insert({user_id:uid,project_id:projId,name:[m.name](http://m.name),status:'not_started'}).select().single();
    if (mil) {
      DB.milestones.push({...mil,projectId:projId});
      for (const t of (m.tasks||[])) {
        const {data:task} = await SB.from('tasks').insert({user_id:uid,project_id:projId,sub_project_id:[mil.id](http://mil.id),title:t.title,notes:t.notes||'',priority:t.priority||'medium',status:'not_started',depends_on:[]}).select().single();
        if (task) DB.tasks.push({...task,projectId:projId,milestoneId:[mil.id](http://mil.id),assignedTo:null,dueDate:null,followUp:null,dependsOn:[]});
      }
    }
  }
  // Create direct tasks
  for (const t of (tpl.structure.directTasks||[])) {
    const {data:task} = await SB.from('tasks').insert({user_id:uid,project_id:projId,title:t.title,notes:t.notes||'',priority:t.priority||'medium',status:'not_started',depends_on:[]}).select().single();
    if (task) DB.tasks.push({...task,projectId:projId,milestoneId:null,assignedTo:null,dueDate:null,followUp:null,dependsOn:[]});
  }
  showToast('Template applied ✓','ok');
  rProj();
}

      const oOD    = oTasks.filter(t=>isOD(t.dueDate,t.status)).length;
      const pct    = oTasks.length ? Math.round(oTasks.filter(t=>t.status==='done').length/oTasks.length*100) : 0;
      const worst  = ownedP.some(p=>[p.health](http://p.health)==='delayed')?'delayed':ownedP.some(p=>[p.health](http://p.health)==='at_risk')?'at_risk':'on_track';
      h += '<tr>';
      h += '<td><div style="display:flex;align-items:center;gap:7px">'+av([person.name](http://person.name),person.color,24)+'<span style="font-size:12px;font-weight:600">'+esc([person.name](http://person.name).split(' ')[0])+'</span></div></td>';
      h += '<td style="text-align:center">'+ownedP.length+'</td>';
      h += '<td style="text-align:center">'+oPend+'</td>';
      h += '<td style="text-align:center;color:'+(oOD?'var(--rose)':'var(--txt2)')+'">'+( oOD||'—')+'</td>';
      h += '<td style="text-align:center"><div style="display:flex;align-items:center;gap:6px"><div style="flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--grn)"></div></div><span style="font-size:11px;color:var(--txt2);width:30px">'+pct+'%</span></div></td>';
      h += '<td>'+hBdg(worst)+'</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
  }

  // Building progress by city
  const cities = [...new Set([DB.buildings.map](http://DB.buildings.map)(b=>[b.city](http://b.city)).filter(Boolean))].sort();
  if (cities.length) {
    h += '<div class="gc" style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Building Progress by City</div>';
    h += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">';
    cities.forEach(city => {
      const cityBlds = DB.buildings.filter(b=>[b.city](http://b.city)===city);
      const cityPBs  = DB.pb.filter(r=>cityBlds.some(b=>[b.id](http://b.id)===r.buildingId));
      const doneB    = cityPBs.filter(r=>r.status==='done').length;
      const inProg   = cityPBs.filter(r=>r.status==='in_progress').length;
      const blocked  = cityPBs.filter(r=>r.status==='blocked'||r.status==='on_hold').length;
      h += '<div style="padding:10px 12px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)">';
      h += '<div style="font-size:12px;font-weight:600;margin-bottom:6px">'+esc(city)+' <span style="color:var(--txt3);font-weight:400">('+cityBlds.length+')</span></div>';
      h += '<div style="display:flex;gap:5px;flex-wrap:wrap">';
      if (doneB)   h += '<span class="bd" style="background:rgba(16,185,129,.12);color:#10b981">✓ '+doneB+'</span>';
      if (inProg)  h += '<span class="bd" style="background:rgba(245,158,11,.1);color:#f59e0b">▶ '+inProg+'</span>';
      if (blocked) h += '<span class="bd" style="background:rgba(244,63,94,.1);color:var(--rose)">⊘ '+blocked+'</span>';
      if (!cityPBs.length) h += '<span style="font-size:11px;color:var(--txt3)">Not in any project</span>';
      h += '</div></div>';
    });
    h += '</div></div>';
  }

  // Task priority breakdown
  const priorCounts = {critical:0,high:0,medium:0,low:0};
  pending.forEach(t=>{ if(t.priority in priorCounts) priorCounts[t.priority]++; });
  h += '<div class="gc" style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Pending Tasks by Priority</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">';
  [['critical','Critical','var(--rose)'],['high','High','#f59e0b'],['medium','Medium','var(--ind-l)'],['low','Low','var(--txt3)']].forEach(([k,l,c])=>{
    h += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)">';
    h += '<div style="width:4px;height:36px;background:'+c+';border-radius:2px;flex-shrink:0"></div>';
    h += '<div><div style="font-size:20px;font-weight:700;color:'+c+'">'+priorCounts[k]+'</div><div style="font-size:11px;color:var(--txt2)">'+l+'</div></div>';
    h += '</div>';
  });
  h += '</div></div>';

  // Digest schedule settings
  h += '<div class="gc"><div style="font-size:13px;font-weight:700;margin-bottom:12px">⏰ Daily Digest Schedule</div>';
  const sch = DB.schedule;
  h += '<div style="font-size:12px;color:var(--txt2);margin-bottom:12px">Auto-generate a digest notification each day at a set time. Requires the daily-digest Edge Function to be triggered via a cron job.</div>';
  h += '<div class="fr"><div class="fg"><label class="fl">Send time</label><input id="sch-t" class="gi" type="time" value="'+(sch?sch.send_time.slice(0,5):'08:00')+'"></div>';
  h += '<div class="fg"><label class="fl">Timezone</label><select id="sch-tz" class="gi"><option value="Asia/Kolkata"'+((!sch||sch.timezone==='Asia/Kolkata')?' selected':'')+'>IST (Asia/Kolkata)</option><option value="UTC"'+(sch?.timezone==='UTC'?' selected':'')+'>UTC</option><option value="America/New_York"'+(sch?.timezone==='America/New_York'?' selected':'')+'>EST</option></select></div></div>';
  h += '<div class="fg"><label class="fl">Auto-schedule</label><label style="display:flex;align-items:center;gap:10px;cursor:pointer"><input type="checkbox" id="sch-en" '+(sch?.enabled?'checked':'')+' style="accent-color:var(--ind);width:16px;height:16px"><span style="font-size:13px;color:var(--txt2)">Enable daily digest notification</span></label></div>';
  h += '<button onclick="svSchedule()" class="btn btn-p btn-sm">Save schedule</button></div>';

  el.innerHTML = h;
}

async function svSchedule() {
  const obj = {chairman_id:CHAIRMAN_UID||[U.id](http://U.id), send_time:val('sch-t')||'08:00:00', timezone:val('sch-tz')||'Asia/Kolkata', enabled:document.getElementById('sch-en')?.checked||false};
  const {data} = await SB.from('digest_schedule').upsert(obj,{onConflict:'chairman_id'}).select().single();
  if (data) { DB.schedule=data; showToast('Schedule saved ✓','ok'); }
}

/* ══════════════════════════════════════════════════════
   PORTFOLIO — Themes → Programs → Projects hierarchy
══════════════════════════════════════════════════════ */

const THEME_COLORS  = ['#1D4ED8','#0284C7','#0D9488','#059669','#65A30D','#D97706','#DC2626','#9333EA','#DB2777','#475569'];
const PROG_STATUSES = {active:{l:'Active',c:'#059669',bg:'#F0FDF4',bdr:'#BBF7D0'},on_hold:{l:'On Hold',c:'#D97706',bg:'#FFFBEB',bdr:'#FDE68A'},completed:{l:'Completed',c:'#1D4ED8',bg:'#EFF6FF',bdr:'#BFDBFE'},archived:{l:'Archived',c:'#475569',bg:'#F8FAFC',bdr:'#E2E8F0'}};

// ── Expand/collapse state ──
let expTheme = {}, expProg = {};

function rPortfolio() {
  const el = document.getElementById('tab-portfolio');
  if (!el) return;

  // Gather stats
  const totalThemes   = DB.themes.filter(t=>t.status==='active').length;
  const totalPrograms = DB.programs.filter(p=>p.status!=='archived').length;
  const totalProjects = DB.projects.filter(p=>p.status!=='done').length;
  const totalOverdue  = DB.tasks.filter(t=>isOD(t.dueDate,t.status)).length;

  let h = '<div class="ph"><div><div class="pt">Portfolio</div><div class="ps">Themes · Programs · Projects</div></div>';
  if (MY_ROLE==='super_admin') {
    h += '<div style="display:flex;gap:6px">';
    h += '<button class="btn btn-g btn-sm" onclick="oThemeF()">+ Theme</button>';
    h += '<button class="btn btn-p btn-sm" onclick="oProgF()">+ Program</button>';
    h += '</div>';
  }
  h += '</div>';

  // Summary strip
  h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px">';
  const strips = [{n:totalThemes,l:'Themes',c:'var(--ind-l)'},{n:totalPrograms,l:'Programs',c:'var(--teal)'},{n:totalProjects,l:'Active projects',c:'var(--txt)'},{n:totalOverdue,l:'Overdue tasks',c:'var(--rose)'}];
  strips.forEach(s=>{
    h += '<div style="background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px">';
    h += '<div style="font-size:22px;font-weight:700;color:'+s.c+'">'+s.n+'</div>';
    h += '<div style="font-size:11px;color:var(--txt3);margin-top:3px">'+s.l+'</div>';
    h += '</div>';
  });
  h += '</div>';

  // Unassigned projects (not in any program)
  const unassignedProjs = DB.projects.filter(p=>p.status!=='done'&&!p.programId);

  if (!DB.themes.length && !DB.programs.length) {
    h += '<div class="es"><span class="em">🗂</span><div class="et">No portfolio structure yet</div><div class="ed">Create Themes to group strategic areas, then Programs to group related projects underneath.</div></div>';
    if (unassignedProjs.length) {
      h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Unassigned Projects ('+unassignedProjs.length+')</div>';
      unassignedProjs.forEach(proj => { h += portfolioProjectRow(proj); });
    }
    el.innerHTML = h;
    return;
  }

  // ── THEMES ──────────────────────────────────────────
  const activeThemes = DB.themes.filter(t=>t.status==='active');
  activeThemes.forEach(theme => {
    const themePrograms = DB.programs.filter(p=>p.theme_id===[theme.id](http://theme.id)&&p.status!=='archived');
    const themeProjects = DB.projects.filter(p=>p.status!=='done'&&themePrograms.some(prog=>[prog.id](http://prog.id)===p.programId));
    const themeOD = DB.tasks.filter(t=>themeProjects.some(p=>[p.id](http://p.id)===t.projectId)&&isOD(t.dueDate,t.status)).length;
    const isExpT = expTheme[[theme.id](http://theme.id)]!==false; // default expanded

    h += '<div style="margin-bottom:16px">';
    // Theme header row
    h += '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--glass);border:1px solid var(--bdr);border-left:4px solid '+theme.color+';border-radius:var(--r);cursor:pointer;margin-bottom:2px" onclick="expTheme[\''+[theme.id](http://theme.id)+'\']=expTheme[\''+[theme.id](http://theme.id)+'\']==='+(isExpT?'false':'true')+'===false?true:false;rPortfolio()">';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:14px;font-weight:700;color:var(--txt)">'+esc([theme.name](http://theme.name))+'</div>';
    if (theme.description) h += '<div style="font-size:12px;color:var(--txt3);margin-top:1px">'+esc(theme.description)+'</div>';
    h += '</div>';
    h += '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">';
    h += '<span style="font-size:11px;color:var(--txt3)">'+themePrograms.length+' program'+(themePrograms.length!==1?'s':'')+' · '+themeProjects.length+' project'+(themeProjects.length!==1?'s':'')+'</span>';
    if (themeOD) h += '<span class="bd p-cr">'+themeOD+' overdue</span>';
    if (MY_ROLE==='super_admin') h += '<button onclick="event.stopPropagation();oThemeF(\''+[theme.id](http://theme.id)+'\')" class="mb" style="font-size:11px;padding:3px 8px">✎</button>';
    h += '<span style="font-size:12px;color:var(--txt3)">'+(isExpT?'▾':'▸')+'</span>';
    h += '</div></div>';

    if (isExpT) {
      // Programs under this theme
      if (!themePrograms.length) {
        h += '<div style="margin-left:20px;padding:10px 14px;background:var(--glass2);border-radius:var(--r-sm);border:1px dashed var(--bdr);font-size:12px;color:var(--txt3);margin-bottom:4px">No programs yet — <button onclick="oProgF(null,\''+[theme.id](http://theme.id)+'\')" style="background:none;border:none;color:var(--ind-l);cursor:pointer;font-size:12px;font-weight:500">+ Add program</button></div>';
      } else {
        themePrograms.forEach(prog => { h += portfolioProgramBlock(prog, theme); });
      }
    }
    h += '</div>';
  });

  // Programs without a theme
  const orphanPrograms = DB.programs.filter(p=>!p.theme_id&&p.status!=='archived');
  if (orphanPrograms.length) {
    h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Programs (no theme)</div>';
    orphanPrograms.forEach(prog => { h += portfolioProgramBlock(prog, null); });
  }

  // Unassigned projects
  if (unassignedProjs.length) {
    h += '<div style="border-top:1px solid var(--bdr);margin-top:16px;padding-top:16px">';
    h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Projects not in any program ('+unassignedProjs.length+')</div>';
    unassignedProjs.forEach(proj => { h += portfolioProjectRow(proj); });
    h += '</div>';
  }

  el.innerHTML = h;
}

function portfolioProgramBlock(prog, theme) {
  const progProjects = DB.projects.filter(p=>p.status!=='done'&&p.programId===[prog.id](http://prog.id));
  const progOD = DB.tasks.filter(t=>progProjects.some(p=>[p.id](http://p.id)===t.projectId)&&isOD(t.dueDate,t.status)).length;
  const progDone = progProjects.filter(p=>p.status==='done').length;
  const pct = progProjects.length ? Math.round(progDone/progProjects.length*100) : 0;
  const owner = DB.people.find(p=>[p.id](http://p.id)===prog.primaryOwnerId);
  const st = PROG_STATUSES[prog.status]||PROG_STATUSES.active;
  const isExpP = expProg[[prog.id](http://prog.id)]!==false; // default expanded
  const accentColor = theme?.color||prog.color||'#0284C7';

  let h = '<div style="margin-left:20px;margin-bottom:8px">';
  // Program header
  h += '<div style="background:var(--glass);border:1px solid var(--bdr);border-left:3px solid '+accentColor+';border-radius:var(--r-sm);overflow:hidden">';
  h += '<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer" onclick="expProg[\''+[prog.id](http://prog.id)+'\']=expProg[\''+[prog.id](http://prog.id)+'\']==='+(isExpP?'false':'true')+'===false?true:false;rPortfolio()">';
  h += '<div style="flex:1;min-width:0">';
  h += '<div style="display:flex;align-items:center;gap:8px">';
  h += '<span style="font-size:13px;font-weight:600;color:var(--txt)">'+esc([prog.name](http://prog.name))+'</span>';
  h += '<span class="bd" style="background:'+[st.bg](http://st.bg)+';color:'+st.c+';border-color:'+st.bdr+'">'+st.l+'</span>';
  if (owner) h += av([owner.name](http://owner.name),owner.color,20)+'<span style="font-size:11px;color:var(--txt3)">'+esc([owner.name](http://owner.name).split(' ')[0])+'</span>';
  h += '</div>';
  if (prog.description) h += '<div style="font-size:11px;color:var(--txt3);margin-top:2px">'+esc(prog.description)+'</div>';
  h += '</div>';
  h += '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">';
  if (progOD) h += '<span class="bd p-cr">⚠ '+progOD+'</span>';
  h += '<span style="font-size:11px;color:var(--txt3)">'+progProjects.length+' project'+(progProjects.length!==1?'s':'')+'</span>';
  if (MY_ROLE==='super_admin') h += '<button onclick="event.stopPropagation();oProgF(\''+[prog.id](http://prog.id)+'\')" class="mb" style="font-size:11px;padding:3px 8px">✎</button>';
  h += '<span style="font-size:12px;color:var(--txt3)">'+(isExpP?'▾':'▸')+'</span>';
  h += '</div></div>';

  // Thin progress bar
  if (progProjects.length) {
    h += '<div style="height:3px;background:var(--bdr)"><div style="height:100%;width:'+pct+'%;background:'+accentColor+';transition:width .4s"></div></div>';
  }

  // Projects in this program
  if (isExpP) {
    h += '<div style="padding:8px 12px;border-top:1px solid var(--bdr)">';
    if (!progProjects.length) {
      h += '<div style="font-size:12px;color:var(--txt3);text-align:center;padding:8px">No active projects · <button onclick="oPrF()" style="background:none;border:none;color:var(--ind-l);cursor:pointer;font-size:12px;font-weight:500">+ New project</button></div>';
    } else {
      progProjects.forEach(proj => { h += portfolioProjectRow(proj); });
    }
    if (MY_ROLE==='super_admin') {
      h += '<button onclick="oPrFWithProgram(\''+[prog.id](http://prog.id)+'\')" style="width:100%;padding:6px;border:1px dashed var(--bdr2);border-radius:var(--r-sm);background:none;color:var(--txt3);font-size:12px;cursor:pointer;margin-top:4px">+ Add project to this program</button>';
    }
    h += '</div>';
  }

  h += '</div></div>';
  return h;
}

function portfolioProjectRow(proj) {
  const owner   = DB.people.find(p=>[p.id](http://p.id)===proj.primaryOwnerId);
  const allT    = DB.tasks.filter(t=>t.projectId===[proj.id](http://proj.id));
  const pct     = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
  const odCount = allT.filter(t=>isOD(t.dueDate,t.status)).length;

  let h = '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--glass2);border-radius:var(--r-sm);border:1px solid var(--bdr);margin-bottom:4px;cursor:pointer" onclick="switchTab(\'projects\');setTimeout(()=>{expP[\''+[proj.id](http://proj.id)+'\']=true;rProj();},60)">';
  h += '<div style="width:8px;height:8px;border-radius:50%;background:'+proj.color+';flex-shrink:0"></div>';
  h += '<div style="flex:1;min-width:0">';
  h += '<div style="font-size:13px;font-weight:500;color:var(--txt)">'+esc([proj.name](http://proj.name))+'</div>';
  h += '<div style="display:flex;align-items:center;gap:8px;margin-top:3px">';
  h += hBdg([proj.health](http://proj.health)||'on_track');
  if (owner) h += '<span style="font-size:11px;color:var(--txt3)">'+esc([owner.name](http://owner.name).split(' ')[0])+'</span>';
  if (proj.deadline) h += '<span style="font-size:11px;color:var(--txt3)">📅 '+fd(proj.deadline)+'</span>';
  h += '</div></div>';
  // Mini progress
  h += '<div style="width:60px;flex-shrink:0">';
  h += '<div style="height:3px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-bottom:3px"><div style="height:100%;width:'+pct+'%;background:var(--ind-l)"></div></div>';
  h += '<div style="font-size:10px;color:var(--txt3);text-align:right">'+pct+'%</div>';
  h += '</div>';
  if (odCount) h += '<span class="bd p-cr" style="flex-shrink:0">'+odCount+'</span>';
  h += '<span style="font-size:11px;color:var(--txt3);flex-shrink:0">→</span>';
  h += '</div>';
  return h;
}

// ── Theme CRUD ──
function oThemeF(id) {
  const t   = id ? DB.themes.find(x=>[x.id](http://x.id)===id) : null;
  const rc  = t?.color || THEME_COLORS[DB.themes.length % THEME_COLORS.length];
  let h = '<div class="fg"><label class="fl">Theme name</label><input id="tf-n" class="gi" placeholder="e.g. Real Estate Expansion" value="'+esc(t?.name||'')+'"></div>';
  h += '<div class="fg"><label class="fl">Description</label><textarea id="tf-d" class="gi" placeholder="What this strategic area covers">'+esc(t?.description||'')+'</textarea></div>';
  h += '<div class="fg"><label class="fl">Colour</label><div class="sw-wrap">';
  THEME_COLORS.forEach(c=>{h+='<div class="sw'+(c===rc?' on':'')+'" style="background:'+c+'" onclick="SC(\'tf-c\',\''+c+'\')"></div>';});
  h += '</div><input type="hidden" id="tf-c" value="'+rc+'"></div>';
  if (id) h += '<div class="fg"><label class="fl">Status</label><select id="tf-st" class="gi"><option value="active"'+(t?.status==='active'?' selected':'')+'>Active</option><option value="archived"'+(t?.status==='archived'?' selected':'')+'>Archived</option></select></div>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svTheme(\''+( id||'')+'\')">Save theme</button></div>';
  OS(id?'Edit theme':'New theme', h);
}
async function svTheme(id) {
  const name = val('tf-n').trim(); if (!name) return;
  const obj = {name, description:val('tf-d').trim(), color:val('tf-c'), status:val('tf-st')||'active'};
  const uid = CHAIRMAN_UID||[U.id](http://U.id);
  if (id) {
    await SB.from('themes').update(obj).eq('id',id).eq('user_id',uid);
    DB.themes = [DB.themes.map](http://DB.themes.map)(x=>[x.id](http://x.id)===id?{...x,...obj}:x);
  } else {
    const {data} = await SB.from('themes').insert({...obj,user_id:uid,seq:DB.themes.length}).select().single();
    if (data) DB.themes.push(data);
  }
  CS(); rPortfolio();
}

// ── Program CRUD ──
function oProgF(id, defaultThemeId) {
  const p   = id ? DB.programs.find(x=>[x.id](http://x.id)===id) : null;
  const rc  = p?.color || '#0284C7';
  let h = '<div class="fg"><label class="fl">Program name</label><input id="pgf-n" class="gi" placeholder="e.g. Mumbai Cluster Rollout" value="'+esc(p?.name||'')+'"></div>';
  h += '<div class="fg"><label class="fl">Description</label><textarea id="pgf-d" class="gi" placeholder="What this program delivers">'+esc(p?.description||'')+'</textarea></div>';
  h += '<div class="fg"><label class="fl">Theme</label><select id="pgf-th" class="gi"><option value="">— No theme —</option>';
  DB.themes.filter(t=>t.status==='active').forEach(t=>{
    const sel = (p?.theme_id||defaultThemeId)===[t.id](http://t.id)?' selected':'';
    h += '<option value="'+[t.id](http://t.id)+'"'+sel+'>'+esc([t.name](http://t.name))+'</option>';
  });
  h += '</select></div>';
  h += '<div class="fg"><label class="fl">Program lead</label><select id="pgf-po" class="gi"><option value="">— Unassigned —</option>';
  DB.people.forEach(pe=>{h+='<option value="'+[pe.id](http://pe.id)+'"'+([pe.id](http://pe.id)===p?.primaryOwnerId?' selected':'')+'>'+esc([pe.name](http://pe.name))+(pe.role?' ('+esc(pe.role)+')':'')+'</option>';});
  h += '</select></div>';
  h += '<div class="fr"><div class="fg"><label class="fl">Deadline</label><input id="pgf-dl" class="gi" type="date" value="'+(p?.deadline||'')+'"></div>';
  h += '<div class="fg"><label class="fl">Status</label><select id="pgf-st" class="gi">';

async function svProg(id) {
  const name = val('pgf-n').trim(); if (!name) return;
  const obj = {name, description:val('pgf-d').trim(), theme_id:val('pgf-th')||null, primary_stakeholder_id:val('pgf-po')||null, deadline:val('pgf-dl')||null, status:val('pgf-st')||'active'};
  const uid = CHAIRMAN_UID||[U.id](http://U.id);
  if (id) {
    await SB.from('programs').update(obj).eq('id',id).eq('user_id',uid);
    DB.programs = [DB.programs.map](http://DB.programs.map)(x=>[x.id](http://x.id)===id?{...x,...obj,themeId:obj.theme_id,primaryOwnerId:obj.primary_stakeholder_id}:x);
  } else {
    const {data} = await SB.from('programs').insert({...obj,user_id:uid,seq:DB.programs.length}).select().single();
    if (data) DB.programs.push({...data,themeId:data.theme_id,primaryOwnerId:data.primary_stakeholder_id});
  }
  CS(); rPortfolio();
}

let _platData = null;

async function callPlatformAPI(body) {
  const { data:{ session } } = await SB.auth.getSession();
  const token = session?.access_token;
  const res = await fetch(PLATFORM_FN_URL, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer '+token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),

  h+='</select></div><div class="fg"><label class="fl">Deal value (USD/yr)</label><input id="df-val" class="gi" type="number" value="'+(deal?.deal_value_usd||'')+'"></div></div>';
  h+='<div class="fg"><label class="fl">Next action</label><input id="df-na" class="gi" value="'+esc(deal?.next_action||'')+'"></div>';
  h+='<div class="fg"><label class="fl">Next action date</label><input id="df-nd" class="gi" type="date" value="'+(deal?.next_action_date||'')+'"></div>';
  h+='<div class="fg"><label class="fl">Notes</label><textarea id="df-notes" class="gi">'+esc(deal?.notes||'')+'</textarea></div>';
  h+='<div class="br">';
  if (dealId) h+='<button class="btn btn-g" onclick="deleteDeal(\''+dealId+'\')">Delete</button>';
  h+='<button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svDeal(\''+( dealId||'')+'\')">Save</button></div>';
  OS(deal?'Edit: '+[deal.company](http://deal.company)_name:'New deal',h);
}

async function svDeal(id) {
  const deal={company_name:val('df-cn').trim(),contact_name:val('df-ct').trim(),contact_email:val('df-em').trim(),stage:val('df-st'),deal_value_usd:parseFloat(val('df-val'))||0,next_action:val('df-na').trim(),next_action_date:val('df-nd')||null,notes:val('df-notes').trim()};
  if (![deal.company](http://deal.company)_name) { showToast('Company required','err'); return; }
  const res=await callPlatformAPI({action:'upsert_deal',deal:{id:id||undefined,...deal}});
  if ([res.data](http://res.data)) {
    if (!_platData) _platData={pipeline:[]};
    if (id) { _platData.pipeline=(_platData.pipeline||[]).map(d=>[d.id](http://d.id)===id?[res.data](http://res.data):d); } else { (_platData.pipeline=_platData.pipeline||[]).push([res.data](http://res.data)); }
    CS(); showToast('Deal saved ✓','ok'); _platTab='pipeline'; rPlatformAdmin();
  } else { showToast('Error: '+(res.error||'unknown'),'err'); }
}

async function deleteDeal(id) {
  if (!confirm('Delete this deal?')) return;
  await callPlatformAPI({action:'delete_deal',id});
  if (_platData) _platData.pipeline=(_platData.pipeline||[]).filter(d=>[d.id](http://d.id)!==id);
  CS(); showToast('Deal deleted','ok'); rPlatformAdmin();
}

function showToast(msg, type) {
  // Remove any existing toast
  const existing = document.getElementById('_toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  [t.id](http://t.id) = '_toast';
  [t.style](http://t.style).cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:800;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;animation:fadeIn .2s;box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none';
  [t.style](http://t.style).background = type === 'ok' ? 'var(--grn)' : type === 'err' ? 'var(--rose)' : 'var(--ind)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.remove(); }, 2800);
}

async function checkTeamRequests() {
  if (!U?.email) return;
  try {
    const { data } = await SB.from('team_requests')
      .select('*')
      .eq('invitee_email', [U.email](http://U.email))
      .eq('status', 'pending');

        <button onclick="declineTeamReq('${[req.id](http://req.id)}')" style="padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.15);color:#fff;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.3);cursor:pointer">✕</button>
      </div>
