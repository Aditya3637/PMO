  });

  banner.innerHTML = inner;
  document.body.prepend(banner);
  // Push content down
  const contentEl = document.getElementById('content');
  if (contentEl) [contentEl.style](http://contentEl.style).paddingTop = (banner.offsetHeight + 4) + 'px';
}

async function acceptTeamReq(reqId, personId) {
  try {
    await SB.from('team_requests').update({ status: 'accepted' }).eq('id', reqId);
    await SB.from('people').update({ invite_status: 'accepted' }).eq('id', personId);
    DB.people = [DB.people.map](http://DB.people.map)(p => [p.id](http://p.id) === personId ? { ...p, invite_status: 'accepted' } : p);

    const { data: req } = await SB.from('team_requests').select('*').eq('id', reqId).single();
    if (req) {
      const person = DB.people.find(p => [p.id](http://p.id) === personId);
      await SB.from('workspace_access').upsert({
        chairman_user_id: req.chairman_id,
        member_user_id: [U.id](http://U.id),
        role_level: person?.role_level || 'member',
        person_id: personId,
      }, { onConflict: 'chairman_user_id,member_user_id' });
      MY_ROLE      = person?.role_level || 'member';
      MY_PERSON_ID = personId;
      CHAIRMAN_UID = req.chairman_id;
    }
  } catch(e) {}

  const banner = document.getElementById('team-req-banner');
  if (banner) banner.remove();
  const contentEl = document.getElementById('content');
  if (contentEl) [contentEl.style](http://contentEl.style).paddingTop = '';

  showToast('✓ You\'re now part of Founder\'s Office!', 'ok');
  await load();
  buildNav();
  renderTab('dash');
}

async function declineTeamReq(reqId) {
  try {
    await SB.from('team_requests').update({ status: 'declined' }).eq('id', reqId);
  } catch(e) {}
  const banner = document.getElementById('team-req-banner');
  if (banner) banner.remove();
  const contentEl = document.getElementById('content');
  if (contentEl) [contentEl.style](http://contentEl.style).paddingTop = '';
}



/* ══════════════════════════════════════════════════════
   REPORTS — Stakeholder Performance Analysis
   Access: super_admin + primary_stakeholder
   Views: Monthly / Yearly, filterable by stakeholder
══════════════════════════════════════════════════════ */

// Report state
let _rptPeriod = 'month'; // 'month' | 'year'
let _rptOwner  = '__all__';
let _rptYear   = new Date().getFullYear();
let _rptMonth  = new Date().getMonth(); // 0-indexed

function rReports() {
  const el = document.getElementById('tab-reports');
  if (!el) return;
  if (MY_ROLE !== 'super_admin' && MY_ROLE !== 'primary_stakeholder') {
    el.innerHTML = '<div class="es"><span class="em">🔒</span><div class="et">Not authorised</div></div>';
    return;
  }

  // Determine visible stakeholders
  const isSuper = MY_ROLE === 'super_admin';
  const owners = isSuper
    ? DB.people.filter(p => DB.projects.some(pr => pr.primaryOwnerId === [p.id](http://p.id)))
    : DB.people.filter(p => [p.id](http://p.id) === MY_PERSON_ID);

  // If primary_stakeholder, lock owner filter to themselves
  if (!isSuper && owners.length === 1) _rptOwner = owners[0].id;

  const nowDate = new Date();
  const years = [];
  for (let y = 2024; y <= nowDate.getFullYear(); y++) years.push(y);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let h = '<div class="ph"><div><div class="pt">Reports</div>';
  h += '<div class="ps">Stakeholder performance analysis</div></div>';
  h += '<button class="btn btn-g btn-sm" onclick="exportReport()">⬇ Export CSV</button></div>';

  // ── Filter bar ──────────────────────────────────────────────────────────
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px;padding:12px 14px;background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r)">';

  // Period toggle
  h += '<div style="display:flex;background:var(--glass2);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:2px;gap:2px">';
  h += '<button class="'+((_rptPeriod==='month')?'btn btn-p':'btn btn-g')+' btn-sm" onclick="_rptPeriod=\'month\';rReports()">Monthly</button>';
  h += '<button class="'+((_rptPeriod==='year')?'btn btn-p':'btn btn-g')+' btn-sm" onclick="_rptPeriod=\'year\';rReports()">Yearly</button>';
  h += '</div>';

  // Year picker
  h += '<select class="gi" style="margin:0;width:auto;padding:6px 10px" onchange="_rptYear=parseInt(this.value);rReports()">';
  years.forEach(y => { h += '<option value="'+y+'"'+(y===_rptYear?' selected':'')+'>'+y+'</option>'; });
  h += '</select>';

  // Month picker (only in monthly mode)
  if (_rptPeriod === 'month') {
    h += '<select class="gi" style="margin:0;width:auto;padding:6px 10px" onchange="_rptMonth=parseInt(this.value);rReports()">';
    months.forEach((m,i) => { h += '<option value="'+i+'"'+(i===_rptMonth?' selected':'')+'>'+m+'</option>'; });
    h += '</select>';
  }

  // Stakeholder picker (super_admin only)
  if (isSuper) {
    h += '<select class="gi" style="margin:0;width:auto;padding:6px 10px;flex:1;min-width:160px" onchange="_rptOwner=this.value;rReports()">';
    h += '<option value="__all__"'+((_rptOwner==='__all__')?' selected':'')+'>All stakeholders</option>';
    owners.forEach(p => { h += '<option value="'+[p.id](http://p.id)+'"'+([p.id](http://p.id)===_rptOwner?' selected':'')+'>'+esc([p.name](http://p.name))+'</option>'; });
    h += '</select>';
  }
  h += '</div>';

  // ── Compute date range ──────────────────────────────────────────────────
  let rangeStart, rangeEnd, rangeLabel;
  if (_rptPeriod === 'month') {
    rangeStart = new Date(_rptYear, _rptMonth, 1);
    rangeEnd   = new Date(_rptYear, _rptMonth + 1, 0); // last day of month
    rangeLabel = months[_rptMonth] + ' ' + _rptYear;
  } else {
    rangeStart = new Date(_rptYear, 0, 1);
    rangeEnd   = new Date(_rptYear, 11, 31);
    rangeLabel = 'Full Year ' + _rptYear;
  }
  const startStr = rangeStart.toISOString().slice(0,10);
  const endStr   = rangeEnd.toISOString().slice(0,10);

  // ── Determine which owners to show ──────────────────────────────────────
  const showOwners = (_rptOwner === '__all__') ? owners : owners.filter(p => [p.id](http://p.id) === _rptOwner);

  if (!showOwners.length) {
    h += '<div class="es"><span class="em">📭</span><div class="et">No data</div><div class="ed">No primary stakeholders with projects found.</div></div>';
    el.innerHTML = h;
    return;
  }

  // ── Per-stakeholder report blocks ────────────────────────────────────────
  showOwners.forEach(person => {
    const ownedProjs = DB.projects.filter(p => p.primaryOwnerId === [person.id](http://person.id));
    const projIds    = new Set([ownedProjs.map](http://ownedProjs.map)(p => [p.id](http://p.id)));
    const allTasks   = DB.tasks.filter(t => projIds.has(t.projectId));

    // Filter tasks to the selected period using due_date OR completed_at
    const periodTasks = allTasks.filter(t => {
      const dateStr = t.completedAt || t.dueDate || t.created_at;
      if (!dateStr) return false;
      const d = dateStr.slice(0,10);
      return d >= startStr && d <= endStr;
    });

    // Task breakdown
    const tasksTotal    = periodTasks.length;
    const tasksDone     = periodTasks.filter(t => t.status === 'done').length;
    const tasksInProg   = periodTasks.filter(t => t.status === 'in_progress').length;
    const tasksBlocked  = periodTasks.filter(t => t.status === 'blocked').length;
    const tasksAwaiting = periodTasks.filter(t => t.status === 'awaiting').length;
    const tasksDeferred = periodTasks.filter(t => t.status === 'deferred').length;
    const tasksNotStart = periodTasks.filter(t => t.status === 'not_started').length;
    const tasksOverdue  = periodTasks.filter(t => isOD(t.dueDate, t.status)).length;
    const tasksDepsBlocked = periodTasks.filter(t => (t.dependsOn||[]).some(depId => { const dep = DB.tasks.find(x=>[x.id](http://x.id)===depId); return dep && dep.status !== 'done'; })).length;
    const completionRate = tasksTotal ? Math.round(tasksDone / tasksTotal * 100) : 0;

    // Overall tasks (not period-filtered) for context
    const allOD = allTasks.filter(t => isOD(t.dueDate, t.status)).length;
    const allDone = allTasks.filter(t => t.status === 'done').length;
    const allPct  = allTasks.length ? Math.round(allDone / allTasks.length * 100) : 0;

    // Period label for the block
    const statusColor = completionRate >= 75 ? 'var(--grn)' : completionRate >= 40 ? 'var(--amb)' : 'var(--rose)';
    const borderColor = tasksOverdue > 0 ? 'var(--rose)' : tasksBlocked > 0 ? 'var(--amb)' : 'var(--bdr)';

    h += '<div style="background:var(--glass);border:1px solid '+borderColor+';border-radius:var(--r);padding:16px;margin-bottom:16px">';

    // Header
    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bdr)">';
    h += av([person.name](http://person.name), person.color, 40);
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:16px;font-weight:700;color:var(--txt)">'+esc([person.name](http://person.name))+'</div>';
    h += '<div style="font-size:12px;color:var(--txt3);margin-top:2px">'+esc(person.role||'Primary Stakeholder')+' · '+ownedProjs.length+' project'+(ownedProjs.length!==1?'s':'')+'</div>';
    h += '</div>';
    // Completion ring
    h += '<div style="text-align:center;flex-shrink:0">';
    h += '<div style="font-size:28px;font-weight:800;color:'+statusColor+'">'+completionRate+'%</div>';
    h += '<div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em">'+rangeLabel+'</div>';
    h += '</div></div>';

    // KPI stat grid
    h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">';
    const stats = [
      {n:tasksTotal,    l:'Tasks in period', c:'var(--txt)'},
      {n:tasksDone,     l:'Completed',       c:'var(--grn)'},
      {n:tasksOverdue,  l:'Overdue',         c:tasksOverdue>0?'var(--rose)':'var(--txt3)'},
      {n:tasksBlocked,  l:'Blocked',         c:tasksBlocked>0?'var(--rose)':'var(--txt3)'},
      {n:tasksInProg,   l:'In progress',     c:'var(--amb)'},
      {n:tasksAwaiting, l:'Awaiting',        c:'var(--teal)'},
      {n:tasksDepsBlocked,l:'Dependency blocks', c:tasksDepsBlocked>0?'var(--rose)':'var(--txt3)'},
      {n:tasksDeferred, l:'Deferred',        c:'var(--txt3)'},
    ];
    stats.forEach(s => {
      h += '<div style="background:var(--glass2);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:10px;text-align:center">';
      h += '<div style="font-size:20px;font-weight:700;color:'+s.c+'">'+s.n+'</div>';
      h += '<div style="font-size:10px;color:var(--txt3);margin-top:3px;text-transform:uppercase;letter-spacing:.04em">'+s.l+'</div>';
      h += '</div>';
    });
    h += '</div>';

    // Progress bar for period
    if (tasksTotal > 0) {
      const donePct     = Math.round(tasksDone/tasksTotal*100);
      const inProcPct   = Math.round(tasksInProg/tasksTotal*100);
      const blockedPct  = Math.round(tasksBlocked/tasksTotal*100);
      const restPct     = 100 - donePct - inProcPct - blockedPct;
      h += '<div style="margin-bottom:14px">';
      h += '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);margin-bottom:5px"><span>Task status breakdown</span><span>'+tasksDone+'/'+tasksTotal+' done</span></div>';
      h += '<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px">';
      if (donePct>0)    h += '<div style="width:'+donePct+'%;background:var(--grn);border-radius:3px 0 0 3px"></div>';
      if (inProcPct>0)  h += '<div style="width:'+inProcPct+'%;background:var(--amb)"></div>';
      if (blockedPct>0) h += '<div style="width:'+blockedPct+'%;background:var(--rose)"></div>';
      if (restPct>0)    h += '<div style="width:'+restPct+'%;background:var(--bdr2);border-radius:0 3px 3px 0"></div>';
      h += '</div>';
      h += '<div style="display:flex;gap:10px;margin-top:5px;flex-wrap:wrap">';
      [{c:'var(--grn)',l:'Done'},{c:'var(--amb)',l:'In progress'},{c:'var(--rose)',l:'Blocked'},{c:'var(--bdr2)',l:'Other'}].forEach(lg=>{
        h += '<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:'+lg.c+'"></div><span style="font-size:11px;color:var(--txt3)">'+lg.l+'</span></div>';
      });
      h += '</div></div>';
    }

    // Projects owned with health
    if (ownedProjs.length) {
      h += '<div style="margin-bottom:14px">';
      h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Projects owned</div>';
      h += '<div style="display:flex;flex-direction:column;gap:4px">';
      ownedProjs.forEach(proj => {
        const projTasks = allTasks.filter(t=>t.projectId===[proj.id](http://proj.id));
        const pct = projTasks.length ? Math.round(projTasks.filter(t=>t.status==='done').length/projTasks.length*100) : 0;
        const projOD = projTasks.filter(t=>isOD(t.dueDate,t.status)).length;
        h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--glass2);border-radius:var(--r-sm);border:1px solid var(--bdr)">';
        h += '<div style="width:7px;height:7px;border-radius:50%;background:'+proj.color+';flex-shrink:0"></div>';
        h += '<div style="flex:1;min-width:0;font-size:12px;font-weight:500">'+esc([proj.name](http://proj.name))+'</div>';
        h += hBdg([proj.health](http://proj.health)||'on_track');
        if (projOD) h += '<span class="bd p-cr">⚠ '+projOD+' OD</span>';
        h += '<div style="width:80px;flex-shrink:0">';
        h += '<div style="height:4px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-bottom:2px"><div style="height:100%;width:'+pct+'%;background:var(--ind-l)"></div></div>';
        h += '<div style="font-size:10px;color:var(--txt3);text-align:right">'+pct+'%</div>';
        h += '</div></div>';
      });
      h += '</div></div>';
    }

    // Detailed task table for the period
    if (periodTasks.length) {
      h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Task detail — '+rangeLabel+'</div>';
      h += '<div class="tw"><table><thead><tr>';
      ['Task','Project','Status','Priority','Due date','Assigned to','Blocked by','Notes'].forEach(c=>{h+='<th>'+c+'</th>';});
      h += '</tr></thead><tbody>';

      const statusColors2 = {done:'var(--grn)',in_progress:'var(--amb)',blocked:'var(--rose)',awaiting:'var(--teal)',not_started:'var(--txt3)',deferred:'var(--txt3)'};
      const priorityColors = {critical:'var(--rose)',high:'var(--amb)',medium:'var(--ind-l)',low:'var(--txt3)'};

      [...periodTasks].sort((a,b)=>{
        // Sort: overdue first, then by status (blocked, in_progress, awaiting, not_started, done, deferred)
        const order = {blocked:0,in_progress:1,awaiting:2,not_started:3,done:4,deferred:5};
        const aOD = isOD(a.dueDate,a.status) ? -1 : 0;
        const bOD = isOD(b.dueDate,b.status) ? -1 : 0;
        if (aOD !== bOD) return aOD - bOD;
        return (order[a.status]||3) - (order[b.status]||3);
      }).forEach(t => {
        const proj    = DB.projects.find(p=>[p.id](http://p.id)===t.projectId);
        const pe2     = DB.people.find(p=>[p.id](http://p.id)===t.assignedTo);
        const od2     = isOD(t.dueDate, t.status);
        const deps2   = (t.dependsOn||[]).map(id=>DB.tasks.find(x=>[x.id](http://x.id)===id)).filter(Boolean).filter(d=>d.status!=='done');
        const sc      = statusColors2[t.status] || 'var(--txt3)';
        const pc      = priorityColors[t.priority] || 'var(--txt3)';

        h += '<tr style="background:'+(od2?'rgba(220,38,38,.03)':'transparent')+'">';
        h += '<td style="max-width:200px"><div style="font-weight:500;font-size:12px">'+esc(t.title)+'</div>';
        if (od2) h += '<div style="font-size:10px;color:var(--rose);margin-top:2px">⚠ Overdue</div>';
        h += '</td>';
        h += '<td style="font-size:11px;color:var(--txt2)">'+(proj?esc([proj.name](http://proj.name)):'—')+'</td>';
        h += '<td><span style="display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;background:'+sc+'18;color:'+sc+'">'+((TS[t.status]&&TS[t.status].l)||t.status)+'</span></td>';
        h += '<td><span style="font-size:11px;color:'+pc+'">'+(t.priority||'medium')+'</span></td>';
        h += '<td style="font-size:11px;color:'+(od2?'var(--rose)':'var(--txt2)')+';white-space:nowrap">'+(t.dueDate?fd(t.dueDate):'—')+'</td>';
        h += '<td style="font-size:11px">'+(pe2?'<div style="display:flex;align-items:center;gap:5px">'+av([pe2.name](http://pe2.name),pe2.color,18)+'<span>'+esc([pe2.name](http://pe2.name).split(' ')[0])+'</span></div>':'—')+'</td>';
        h += '<td style="font-size:11px;color:var(--rose)">'+(deps2.length?[deps2.map](http://deps2.map)(d=>'<div>'+esc(d.title.slice(0,30))+'</div>').join(''):'—')+'</td>';
        h += '<td style="font-size:11px;color:var(--txt3);max-width:160px">'+(t.notes?esc(t.notes.slice(0,80))+(t.notes.length>80?'…':''):'—')+'</td>';
        h += '</tr>';
      });
      h += '</tbody></table></div>';
    } else {
      h += '<div style="text-align:center;padding:20px;font-size:13px;color:var(--txt3);background:var(--glass2);border-radius:var(--r-sm);border:1px solid var(--bdr)">No tasks found for '+rangeLabel+'</div>';
    }

    // Overall portfolio summary (all time, not period-filtered)
    h += '<div style="margin-top:12px;padding:10px 12px;background:var(--glass2);border-radius:var(--r-sm);border:1px solid var(--bdr);display:flex;gap:16px;flex-wrap:wrap">';
    h += '<span style="font-size:12px;color:var(--txt3)">Overall (all time):</span>';
    h += '<span style="font-size:12px;color:var(--txt2)"><strong>'+allTasks.length+'</strong> total tasks</span>';
    h += '<span style="font-size:12px;color:var(--grn)"><strong>'+allDone+'</strong> done</span>';
    h += '<span style="font-size:12px;color:'+(allOD?'var(--rose)':'var(--txt3)')+'"><strong>'+allOD+'</strong> overdue</span>';
    h += '<span style="font-size:12px;color:var(--txt2)"><strong>'+allPct+'%</strong> completion rate</span>';
    h += '</div>';

    h += '</div>'; // end stakeholder block
  });

  // Comparison table (super_admin only, all view)
  if (isSuper && _rptOwner === '__all__' && showOwners.length > 1) {
    h += '<div style="margin-top:20px">';
    h += '<div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr)">Stakeholder Comparison — '+rangeLabel+'</div>';
    h += '<div class="tw"><table><thead><tr>';
    ['Stakeholder','Projects','Tasks in period','Done','Overdue','Blocked','Dep. blocks','% Complete','Performance'].forEach(c=>{h+='<th>'+c+'</th>';});
    h += '</tr></thead><tbody>';

    const ranked = [showOwners.map](http://showOwners.map)(person => {
      const ownedProjs = DB.projects.filter(p=>p.primaryOwnerId===[person.id](http://person.id));
      const projIds    = new Set([ownedProjs.map](http://ownedProjs.map)(p=>[p.id](http://p.id)));
      const allT       = DB.tasks.filter(t=>projIds.has(t.projectId));
      const periodT    = allT.filter(t=>{
        const dateStr = t.completedAt||t.dueDate||t.created_at;
        if (!dateStr) return false;
        const d = dateStr.slice(0,10);
        return d >= startStr && d <= endStr;
      });
      const done     = periodT.filter(t=>t.status==='done').length;
      const od       = periodT.filter(t=>isOD(t.dueDate,t.status)).length;
      const blocked  = periodT.filter(t=>t.status==='blocked').length;
      const depB     = periodT.filter(t=>(t.dependsOn||[]).some(id=>{const dep=DB.tasks.find(x=>[x.id](http://x.id)===id);return dep&&dep.status!=='done';})).length;
      const rate     = periodT.length ? Math.round(done/periodT.length*100) : 0;
      return {person, ownedProjs, periodT, done, od, blocked, depB, rate};
    }).sort((a,b) => b.rate - a.rate);

    ranked.forEach((r, idx) => {
      const perf = r.rate >= 80 ? {l:'Excellent',c:'var(--grn)'} : r.rate >= 60 ? {l:'Good',c:'var(--teal)'} : r.rate >= 40 ? {l:'Fair',c:'var(--amb)'} : {l:'Needs attention',c:'var(--rose)'};
      const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';
      h += '<tr>';
      h += '<td><div style="display:flex;align-items:center;gap:7px">'+av([r.person.name](http://r.person.name),r.person.color,24)+'<div><div style="font-size:12px;font-weight:600">'+medal+' '+esc([r.person.name](http://r.person.name))+'</div><div style="font-size:10px;color:var(--txt3)">'+esc(r.person.role||'')+'</div></div></div></td>';
      h += '<td style="text-align:center">'+r.ownedProjs.length+'</td>';
      h += '<td style="text-align:center">'+r.periodT.length+'</td>';
      h += '<td style="text-align:center;color:var(--grn);font-weight:600">'+r.done+'</td>';
      h += '<td style="text-align:center;color:'+(r.od?'var(--rose)':'var(--txt3)')+'">'+( r.od||'—')+'</td>';
      h += '<td style="text-align:center;color:'+(r.blocked?'var(--rose)':'var(--txt3)')+'">'+( r.blocked||'—')+'</td>';
      h += '<td style="text-align:center;color:'+(r.depB?'var(--amb)':'var(--txt3)')+'">'+( r.depB||'—')+'</td>';
      h += '<td><div style="display:flex;align-items:center;gap:6px"><div style="flex:1;height:5px;background:var(--bdr);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+r.rate+'%;background:var(--ind-l)"></div></div><span style="font-size:11px;width:32px;flex-shrink:0">'+r.rate+'%</span></div></td>';
      h += '<td><span style="font-size:11px;font-weight:600;color:'+perf.c+'">'+perf.l+'</span></td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
  }

  el.innerHTML = h;
}

// ── CSV Export ──────────────────────────────────────────────────────────────
function exportReport() {
  const isSuper = MY_ROLE === 'super_admin';
  const owners = isSuper
    ? DB.people.filter(p => DB.projects.some(pr => pr.primaryOwnerId === [p.id](http://p.id)))
    : DB.people.filter(p => [p.id](http://p.id) === MY_PERSON_ID);
  const showOwners = (_rptOwner === '__all__') ? owners : owners.filter(p => [p.id](http://p.id) === _rptOwner);

  const nowDate = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let startStr, endStr, rangeLabel;
  if (_rptPeriod === 'month') {
    const rs = new Date(_rptYear, _rptMonth, 1);
    const re = new Date(_rptYear, _rptMonth + 1, 0);
    startStr = rs.toISOString().slice(0,10);
    endStr   = re.toISOString().slice(0,10);
    rangeLabel = months[_rptMonth] + '_' + _rptYear;
  } else {
    startStr = _rptYear + '-01-01';
    endStr   = _rptYear + '-12-31';
    rangeLabel = 'Year_' + _rptYear;
  }

  const rows = [['Stakeholder','Role','Project','Task','Status','Priority','Due Date','Assigned To','Blocked By','Dep. Blocks','Overdue','Notes']];

  showOwners.forEach(person => {
    const ownedProjs = DB.projects.filter(p=>p.primaryOwnerId===[person.id](http://person.id));
    const projIds    = new Set([ownedProjs.map](http://ownedProjs.map)(p=>[p.id](http://p.id)));
    const allTasks   = DB.tasks.filter(t=>projIds.has(t.projectId));
    const periodTasks = allTasks.filter(t=>{
      const d = (t.completedAt||t.dueDate||t.created_at||'').slice(0,10);
      return d >= startStr && d <= endStr;
    });
    periodTasks.forEach(t => {
      const proj  = DB.projects.find(p=>[p.id](http://p.id)===t.projectId);
      const pe2   = DB.people.find(p=>[p.id](http://p.id)===t.assignedTo);
      const deps  = (t.dependsOn||[]).map(id=>DB.tasks.find(x=>[x.id](http://x.id)===id)).filter(Boolean).filter(d=>d.status!=='done');
      const od    = isOD(t.dueDate,t.status);
      rows.push([
        [person.name](http://person.name), person.role||'', proj?.name||'', t.title,
        (TS[t.status]?.l||t.status), t.priority||'medium',
        t.dueDate||'', pe2?.name||'',
        deps.length ? [deps.map](http://deps.map)(d=>d.title).join('; ') : '',
        deps.length, od ? 'Yes' : 'No', (t.notes||'').replace(/\n/g,' '),
      ]);
    });
  });

  const csv = [rows.map](http://rows.map)(r => [r.map](http://r.map)(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; [a.download](http://a.download) = 'taskora_report_'+rangeLabel+'.csv';
  [a.click](http://a.click)(); URL.revokeObjectURL(url);
  showToast('Report exported ✓','ok');
}

let _waitingSW = null;

function applyUpdate() {
  if (_waitingSW) {
    // Tell the waiting SW to activate immediately
    _waitingSW.postMessage({ type: 'SKIP_WAITING' });
  }
  // Hide banner — reload will happen via controllerchange
  document.getElementById('update-banner').classList.remove('show');
}

function dismissUpdate() {
  document.getElementById('update-banner').classList.remove('show');
}

function showUpdateBanner() {
  const b = document.getElementById('update-banner');
  if (b) b.classList.add('show');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => {
      // ── Check for a new SW already waiting (e.g. page was refreshed) ──
      if (reg.waiting) {
        _waitingSW = reg.waiting;
        showUpdateBanner();
      }

      // ── A new SW just started installing ──
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            // New SW installed and waiting — existing content is still being served
            _waitingSW = newSW;
            showUpdateBanner();
          }
        });
      });

      // ── Periodically check for updates (every 60 minutes) ──
      setInterval(() => reg.update(), 60 * 60 * 1000);
    })
    .catch(() => {}); // Silently fail if SW not supported/blocked

  // ── When the SW controller changes (new SW took over), reload the page ──
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) {
      refreshing = true;
      window.location.reload();
    }
  });
}

boot();
