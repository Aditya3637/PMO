<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Taskora"/>
<meta name="theme-color" content="#0f0f1a"/>
<link rel="manifest" href="manifest.json"/>
<title>Taskora</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--ind:#6366f1;--ind-d:#4f46e5;--ind-l:#818cf8;--teal:#14b8a6;--rose:#f43f5e;--amb:#f59e0b;--grn:#10b981;--pur:#a855f7;--bg:#0f0f1a;--glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.08);--glass3:rgba(255,255,255,.13);--bdr:rgba(255,255,255,.09);--bdr2:rgba(255,255,255,.16);--txt:#f1f5f9;--txt2:#94a3b8;--txt3:#64748b;--r:14px;--r-sm:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(99,102,241,.17) 0%,transparent 55%),radial-gradient(ellipse at 85% 80%,rgba(20,184,166,.11) 0%,transparent 55%);pointer-events:none;z-index:0}
#root{position:relative;z-index:1;min-height:100vh}

/* LOADING */
#ls{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:999;transition:opacity .3s}
.spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(99,102,241,.2);border-top-color:var(--ind);animation:spin .7s linear infinite}
.lb{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--ind-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* AUTH */
#auth-scr{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .4s}
.auth-card{background:rgba(22,22,46,.92);backdrop-filter:blur(24px);border:1px solid var(--bdr2);border-radius:24px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.auth-brand{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--ind-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;letter-spacing:-.02em}
.auth-tag{font-size:11px;color:var(--txt3);text-align:center;margin-top:4px;margin-bottom:32px;letter-spacing:.06em;text-transform:uppercase}
.auth-tabs{display:flex;background:rgba(255,255,255,.06);border-radius:11px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.auth-tab.on{background:var(--ind);color:#fff}
.auth-tab:not(.on){background:transparent;color:var(--txt2)}
.amsg{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;line-height:1.5}
.amsg.err{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.25);color:#fca5a5}
.amsg.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}

/* INPUTS */
.gi{width:100%;padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:14px;outline:none;transition:border-color .2s,background .2s;margin-bottom:11px}
.gi:focus{border-color:rgba(99,102,241,.5);background:var(--glass2)}
.gi::placeholder{color:var(--txt3)}
select.gi option{background:#1a1a2e;color:var(--txt)}
textarea.gi{min-height:68px;resize:vertical;margin-bottom:0}
.fl{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;display:block}
.fg{margin-bottom:13px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* BUTTONS */
.btn{padding:11px 18px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn-p{background:linear-gradient(135deg,var(--ind),var(--ind-d));color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.btn-p:hover{box-shadow:0 6px 20px rgba(99,102,241,.4);transform:translateY(-1px)}
.btn-p:disabled{opacity:.5;cursor:default;transform:none}
.btn-g{background:var(--glass);color:var(--txt2);border:1px solid var(--bdr)}
.btn-g:hover{background:var(--glass2);color:var(--txt)}
.btn-sm{padding:7px 13px;font-size:12px}
.br{display:flex;gap:9px}.br .btn-g{flex:1}.br .btn-p{flex:2}
.mb{padding:5px 10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);transition:all .15s}
.mb:hover{background:var(--glass2);color:var(--txt)}
.mb.dd{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.25);color:#f87171}
.wa-b{flex:2;padding:12px;border-radius:var(--r-sm);font-size:13px;font-weight:700;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.cp-b{flex:1;padding:12px;border-radius:var(--r-sm);font-size:13px;font-weight:600;background:var(--glass);color:var(--txt2);border:1px solid var(--bdr);cursor:pointer;transition:all .2s}
.cp-b.ok{background:rgba(16,185,129,.12);color:#6ee7b7;border-color:rgba(16,185,129,.3)}

/* LAYOUT */
#app{display:flex;min-height:100vh}
#sb{width:224px;background:rgba(20,20,42,.65);backdrop-filter:blur(20px);border-right:1px solid var(--bdr);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50;transition:transform .3s}
.sb-top{padding:24px 18px 16px}
.sb-brand{font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--ind-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.01em}
.sb-tag{font-size:10px;color:var(--txt3);margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.sb-nav{flex:1;padding:6px 10px;overflow-y:auto}
.sb-b{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);background:none;border:none;color:var(--txt2);font-size:13px;font-weight:500;width:100%;text-align:left;cursor:pointer;transition:all .15s;margin-bottom:2px}
.sb-b:hover{background:var(--glass);color:var(--txt)}
.sb-b.active{background:rgba(99,102,241,.14);color:var(--ind-l);border:1px solid rgba(99,102,241,.2)}
.sb-b .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-bot{padding:12px}
.prof-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;background:var(--glass);border:1px solid var(--bdr);cursor:pointer;margin-bottom:8px;width:100%;transition:background .15s;text-align:left}
.prof-btn:hover{background:var(--glass2)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0}
.sdot.sy{background:var(--amb);animation:pulse 1s infinite}
.sdot.er{background:var(--rose)}
.so-b{width:100%;padding:9px;border-radius:9px;background:rgba(244,63,94,.08);color:#f87171;border:1px solid rgba(244,63,94,.18);font-size:12px;font-weight:600;cursor:pointer}
.so-b:hover{background:rgba(244,63,94,.15)}
#content{flex:1;margin-left:224px;overflow-y:auto;min-height:100vh;padding-bottom:40px}
.page{padding:22px;display:none;animation:fadeIn .2s ease}
.page.active{display:block}
#bn{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,26,.9);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;padding:10px 4px 8px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt3);cursor:pointer;transition:color .15s}
.nb.active{color:var(--ind-l)}
.nb .ic{font-size:20px;line-height:1}
.nb .lb{font-size:9px;font-weight:500}
@media(max-width:767px){
  #sb{transform:translateX(-100%)}
  #content{margin-left:0;padding-bottom:70px}
  #bn{display:flex}
  .page{padding:14px}
}

/* CARDS + COMPONENTS */
.gc{background:rgba(255,255,255,.04);backdrop-filter:blur(10px);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;margin-bottom:11px;transition:border-color .2s}
.gc:hover{border-color:var(--bdr2)}
.gc.red{border-color:rgba(244,63,94,.25)}
.gc.amb{border-color:rgba(245,158,11,.25)}
.gc.exp{border-color:rgba(99,102,241,.22);box-shadow:0 8px 28px rgba(99,102,241,.09)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:20px}
.sc{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:-18px;right:-18px;width:56px;height:56px;border-radius:50%;background:var(--ac,var(--ind));opacity:.1}
.sn{font-size:30px;font-weight:700;line-height:1;color:var(--ac,var(--ind-l))}
.sl{font-size:12px;color:var(--txt2);margin-top:5px;font-weight:500}
.bd{display:inline-flex;align-items:center;font-size:10px;font-weight:600;border-radius:99px;padding:2px 8px;white-space:nowrap}
.pw{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:8px}
.pb{height:100%;border-radius:2px;transition:width .4s}
.pls{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;flex-shrink:0}
.pl{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s}
.pl.active{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.35);color:var(--ind-l)}
.pl:hover:not(.active){background:var(--glass2);color:var(--txt)}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.sw-wrap{display:flex;gap:8px;flex-wrap:wrap}
.sw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;box-sizing:border-box;transition:transform .15s}
.sw.on{border-color:#fff;transform:scale(1.15)}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:12px}
table{width:100%;border-collapse:collapse;min-width:560px}
thead tr{background:rgba(255,255,255,.03)}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.dta{width:100%;min-height:200px;padding:13px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:12px;font-family:'SF Mono',monospace;line-height:1.9;resize:vertical;outline:none;box-sizing:border-box}
.dta:focus{border-color:rgba(99,102,241,.4)}
.ih{font-size:13px;color:var(--txt2);line-height:1.7;background:var(--glass);padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--bdr);margin-bottom:14px}
.es{text-align:center;padding:52px 20px;color:var(--txt2)}
.es .em{font-size:44px;margin-bottom:14px;display:block}
.es .et{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:5px}
.es .ed{font-size:13px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.pt{font-size:21px;font-weight:700}
.ps{font-size:12px;color:var(--txt2);margin-top:3px}
.tr-row{background:var(--glass);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:6px;border:1px solid var(--bdr);border-left:3px solid var(--txt3)}
.tr-row.od{border-color:rgba(244,63,94,.25);border-left-color:var(--rose)}
.tm{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:5px}
.sr{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--glass);border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--bdr);margin-bottom:3px}
.sr:hover{border-color:var(--bdr2)}
.bpr{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--glass);border-radius:var(--r-sm);margin-bottom:5px;border:1px solid var(--bdr);cursor:pointer}
.bpr:hover{border-color:var(--bdr2)}

/* HEALTH BADGES */
.h-ot{background:rgba(16,185,129,.14);color:#10b981}
.h-ar{background:rgba(245,158,11,.14);color:#f59e0b}
.h-dl{background:rgba(244,63,94,.14);color:#f43f5e}
.h-ns{background:rgba(100,116,139,.12);color:#64748b}

/* PRIORITY BADGES */
.p-cr{background:rgba(244,63,94,.14);color:#f43f5e}
.p-hi{background:rgba(245,158,11,.14);color:#f59e0b}
.p-me{background:rgba(99,102,241,.14);color:#818cf8}
.p-lo{background:rgba(100,116,139,.12);color:#64748b}

/* SHEET */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:400;display:none;align-items:flex-end;justify-content:center}
#ov.op{display:flex;animation:fadeIn .15s}
#sh{background:rgba(18,18,42,.97);backdrop-filter:blur(24px);border:1px solid var(--bdr2);border-bottom:none;width:100%;max-width:520px;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,24px);animation:slideUp .22s cubic-bezier(.32,0,.67,0)}
.sh-hd{width:40px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:14px auto 0}
.sh-row{display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
.sh-ti{font-size:16px;font-weight:700}
.sh-cl{width:28px;height:28px;border-radius:50%;background:var(--glass2);border:1px solid var(--bdr);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.sh-cl:hover{background:var(--glass3);color:var(--txt)}
.sh-bod{padding:0 18px 18px}
@media(min-width:768px){
  #ov{align-items:center}
  #sh{border-radius:20px;border-bottom:1px solid var(--bdr2);max-width:500px;box-shadow:0 24px 64px rgba(0,0,0,.55)}
  #sh.wide{max-width:640px}
  .sh-hd{display:none}
}
</style>
</head>
<body>
<div id="ls"><div class="spin"></div><div class="lb">Taskora</div></div>

<div id="auth-scr" style="display:none">
  <div class="auth-card">
    <div class="auth-brand">Taskora</div>
    <div class="auth-tag">Chairman's PMO · Project Intelligence</div>
    <div class="auth-tabs">
      <button id="at-si" class="auth-tab on" onclick="swAT('si')">Sign in</button>
      <button id="at-su" class="auth-tab" onclick="swAT('su')">Create account</button>
    </div>
    <div id="amsg"></div>
    <div id="form-si">
      <input class="gi" id="si-em" type="email" placeholder="Email address" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('si-pw').focus()"/>
      <input class="gi" id="si-pw" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSI()"/>
      <button class="btn btn-p" style="width:100%;margin-top:4px" onclick="doSI()">Sign in →</button>
    </div>
    <div id="form-su" style="display:none">
      <input class="gi" id="su-em" type="email" placeholder="Email address" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('su-pw').focus()"/>
      <input class="gi" id="su-pw" type="password" placeholder="Password (min 8 characters)" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSU()"/>
      <button class="btn btn-p" style="width:100%;margin-top:4px" onclick="doSU()">Create account →</button>
    </div>
  </div>
</div>

<div id="root" style="display:none">
  <div id="app">
    <div id="sb">
      <div class="sb-top">
        <div class="sb-brand">Taskora</div>
        <div class="sb-tag">Chairman's PMO</div>
      </div>
      <div class="sb-nav">
        <button class="sb-b active" data-tab="dash"><span class="ic">⌂</span> Command Centre</button>
        <button class="sb-b" data-tab="projects"><span class="ic">📋</span> Projects</button>
        <button class="sb-b" data-tab="stakeholders"><span class="ic">👥</span> Stakeholders</button>
        <button class="sb-b" data-tab="buildings"><span class="ic">🏢</span> Buildings</button>
        <button class="sb-b" data-tab="digest"><span class="ic">📤</span> Digest</button>
      </div>
      <div class="sb-bot">
        <button class="prof-btn" onclick="openProfile()">
          <div id="sb-av" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ind),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0">?</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="sb-name">Account</div>
            <div style="font-size:10px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="uem">—</div>
          </div>
          <div style="display:flex;align-items:center;gap:5px;flex-shrink:0"><div class="sdot" id="sd"></div><span style="font-size:11px;color:var(--txt3)">⚙</span></div>
        </button>
        <button class="so-b" onclick="doSO()">↪ Sign out</button>
      </div>
    </div>

    <div id="content">
      <div id="tab-dash" class="page active"></div>
      <div id="tab-projects" class="page"></div>
      <div id="tab-stakeholders" class="page"></div>
      <div id="tab-buildings" class="page"></div>
      <div id="tab-digest" class="page"></div>
    </div>

    <div id="bn">
      <button class="nb active" data-tab="dash"><span class="ic">⌂</span><span class="lb">Home</span></button>
      <button class="nb" data-tab="projects"><span class="ic">📋</span><span class="lb">Projects</span></button>
      <button class="nb" data-tab="stakeholders"><span class="ic">👥</span><span class="lb">People</span></button>
      <button class="nb" data-tab="buildings"><span class="ic">🏢</span><span class="lb">Buildings</span></button>
      <button class="nb" data-tab="digest"><span class="ic">📤</span><span class="lb">Digest</span></button>
      <button class="nb" onclick="openProfile()"><span class="ic">👤</span><span class="lb">Profile</span></button>
    </div>
  </div>
</div>

<div id="ov"><div id="sh">
  <div class="sh-hd"></div>
  <div class="sh-row"><div class="sh-ti" id="sh-ti"></div><button class="sh-cl" onclick="CS()">×</button></div>
  <div class="sh-bod" id="sh-bd"></div>
</div></div>

<script>
const SB=supabase.createClient('https://blvijiqrgddvparsnpnh.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdmlqaXFyZ2RkdnBhcnNucG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODc4NTAsImV4cCI6MjA5MDM2Mzg1MH0.J9wB4a384TRLfISIQC35pn5no-Pp52iZoB8fBiEExj8');

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const TS={not_started:{l:'Not started',bg:'rgba(148,163,184,.12)',c:'#94a3b8'},in_progress:{l:'In progress',bg:'rgba(245,158,11,.12)',c:'#f59e0b'},blocked:{l:'Blocked',bg:'rgba(244,63,94,.14)',c:'#f43f5e'},awaiting:{l:'Awaiting',bg:'rgba(168,85,247,.14)',c:'#c084fc'},done:{l:'Done',bg:'rgba(16,185,129,.14)',c:'#10b981'},deferred:{l:'Deferred',bg:'rgba(100,116,139,.1)',c:'#64748b'}};
const BS={not_started:{l:'Not started',bg:'rgba(148,163,184,.12)',c:'#94a3b8'},in_progress:{l:'In progress',bg:'rgba(245,158,11,.12)',c:'#f59e0b'},on_hold:{l:'On hold',bg:'rgba(251,146,60,.12)',c:'#fb923c'},blocked:{l:'Blocked',bg:'rgba(244,63,94,.14)',c:'#f43f5e'},done:{l:'Done',bg:'rgba(16,185,129,.14)',c:'#10b981'}};
const HS={on_track:{l:'On Track',cls:'h-ot'},at_risk:{l:'At Risk',cls:'h-ar'},delayed:{l:'Delayed',cls:'h-dl'},not_started:{l:'Not Started',cls:'h-ns'}};
const PS={critical:{l:'Critical',cls:'p-cr'},high:{l:'High',cls:'p-hi'},medium:{l:'Medium',cls:'p-me'},low:{l:'Low',cls:'p-lo'}};
const PR={high:{l:'High',c:'#f43f5e'},medium:{l:'Med',c:'#f59e0b'},low:{l:'Low',c:'#10b981'}};
const CLRS=['#6366f1','#14b8a6','#10b981','#f43f5e','#f59e0b','#a855f7','#ec4899','#0ea5e9','#f97316','#06b6d4'];
const SCYC=['not_started','in_progress','awaiting','blocked','done'];
const td=()=>new Date().toISOString().slice(0,10);
const fd=d=>d?new Date(d+'T12:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
const isOD=(d,s)=>!!(d&&d<td()&&s!=='done');
const nowFull=()=>new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const val=id=>{const e=document.getElementById(id);return e?e.value:'';};
const bdg=(s,sys)=>{const i=(sys||TS)[s]||TS.not_started;return `<span class="bd" style="background:${i.bg};color:${i.c}">${i.l}</span>`;};
const hBdg=h=>{const i=HS[h]||HS.on_track;return `<span class="bd ${i.cls}">${i.l}</span>`;};
const pBdg=p=>{const i=PS[p]||PS.medium;return `<span class="bd ${i.cls}">${i.l}</span>`;};
const av=(n,c,sz=30)=>{const i=(n||'?').trim().split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();return `<div class="av" style="width:${sz}px;height:${sz}px;background:${c||'#6366f1'};font-size:${sz*.36}px">${i}</div>`;};

// ── STATE ─────────────────────────────────────────────────────────────────────
let U=null,curTab='dash',expP={},expS={},bSrch='',bCity='',bType='',pFil='active',skTab='primary';
let DB={buildings:[],people:[],projects:[],subs:[],tasks:[],pb:[],de:{}};

// ── SYNC ──────────────────────────────────────────────────────────────────────
function ss(s){const d=document.getElementById('sd');if(!d)return;d.className='sdot'+(s==='sy'?' sy':s==='er'?' er':'');}
async function load(){
  if(!U)return;ss('sy');
  try{
    const uid=U.id;
    const[b,p,pr,sp,t,pb,de]=await Promise.all([
      SB.from('buildings').select('*').eq('user_id',uid).order('serial'),
      SB.from('people').select('*').eq('user_id',uid).order('name'),
      SB.from('projects').select('*').eq('user_id',uid).order('created_at'),
      SB.from('sub_projects').select('*').eq('user_id',uid).order('seq').order('created_at'),
      SB.from('tasks').select('*').eq('user_id',uid).order('created_at'),
      SB.from('project_buildings').select('*').eq('user_id',uid),
      SB.from('digest_edits').select('*').eq('user_id',uid),
    ]);
    DB.buildings=(b.data||[]).map(x=>({...x,softHandover:x.soft_handover,hardHandover:x.hard_handover,btype:x.btype||'operational'}));
    DB.people=p.data||[];
    DB.projects=(pr.data||[]).map(x=>({...x,desc:x.description,primaryStakeholderId:x.primary_stakeholder_id,health:x.health||'on_track',priority:x.priority||'medium'}));
    DB.tasks=(t.data||[]).map(x=>({...x,projectId:x.project_id,subProjectId:x.sub_project_id,assignedTo:x.assigned_to,dueDate:x.due_date,followUp:x.follow_up,dependsOn:x.depends_on||[]}));
    DB.pb=(pb.data||[]).map(x=>({...x,projectId:x.project_id,buildingId:x.building_id}));
    const ed={};(de.data||[]).forEach(x=>{ed[x.person_id]=x.content;});DB.de=ed;
    ss('ok');
  }catch(e){ss('er');}
}
async function del(tbl,id){ss('sy');const r=await SB.from(tbl).delete().eq('id',id).eq('user_id',U.id);ss(r.error?'er':'ok');return r;}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function amsg(m,ok=false){const el=document.getElementById('amsg');if(el)el.innerHTML=`<div class="amsg ${ok?'ok':'err'}">${m}</div>`;}
function swAT(t){const si=t==='si';document.getElementById('at-si').classList.toggle('on',si);document.getElementById('at-su').classList.toggle('on',!si);document.getElementById('form-si').style.display=si?'':'none';document.getElementById('form-su').style.display=si?'none':'';document.getElementById('amsg').innerHTML='';}
async function doSI(){const e=val('si-em').trim(),p=val('si-pw');if(!e||!p){amsg('Please enter email and password.');return;}const btn=document.querySelector('#form-si .btn-p');if(btn){btn.disabled=true;btn.textContent='Signing in…';}const{error}=await SB.auth.signInWithPassword({email:e,password:p});if(btn){btn.disabled=false;btn.textContent='Sign in →';}if(error)amsg(error.message==='Invalid login credentials'?'Incorrect email or password.':error.message);}
async function doSU(){const e=val('su-em').trim(),p=val('su-pw');if(!e||!p){amsg('Please fill all fields.');return;}if(p.length<8){amsg('Password must be at least 8 characters.');return;}const btn=document.querySelector('#form-su .btn-p');if(btn){btn.disabled=true;btn.textContent='Creating…';}const{error}=await SB.auth.signUp({email:e,password:p});if(btn){btn.disabled=false;btn.textContent='Create account →';}if(error)amsg(error.message);}
async function doSO(){await SB.auth.signOut();}

// ── BOOT ──────────────────────────────────────────────────────────────────────
async function boot(){
  const{data:{session}}=await SB.auth.getSession();
  document.getElementById('ls').style.opacity='0';
  setTimeout(()=>document.getElementById('ls').style.display='none',300);
  if(session){U=session.user;showApp();}
  else{document.getElementById('auth-scr').style.display='flex';}
  SB.auth.onAuthStateChange(async(ev,ses)=>{
    if(ses){U=ses.user;document.getElementById('auth-scr').style.display='none';showApp();}
    else{U=null;document.getElementById('root').style.display='none';DB={buildings:[],people:[],projects:[],subs:[],tasks:[],pb:[],de:{}};document.getElementById('auth-scr').style.display='flex';}
  });
}
async function showApp(){
  document.getElementById('root').style.display='';
  const email=U.email||'';
  document.getElementById('uem').textContent=email;
  document.getElementById('sb-name').textContent=U.user_metadata?.display_name||email.split('@')[0]||'Account';
  document.getElementById('sb-av').textContent=email.slice(0,2).toUpperCase();
  await load();renderTab(curTab);
  document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
}
function switchTab(id){curTab=id;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));renderTab(id);}
function renderTab(id){if(id==='dash')rDash();else if(id==='projects')rProj();else if(id==='stakeholders')rSK();else if(id==='buildings')rBld();else if(id==='digest')rDig();}

document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))CS();});

function CP(fid,cur){return `<div class="fg"><label class="fl">Color</label><div class="sw-wrap">${CLRS.map(c=>`<div class="sw${c===cur?' on':''}" style="background:${c}" onclick="SC('${fid}','${c}')"></div>`).join('')}</div><input type="hidden" id="${fid}" value="${cur||CLRS[0]}"></div>`;}
function SC(fid,color){document.getElementById(fid).value=color;document.querySelectorAll('#sh-bd .sw').forEach(s=>s.classList.toggle('on',s.getAttribute('onclick').includes(`'${color}'`)));}
function SS(id,cur,sys){const s=sys||TS;return `<select id="${id}" class="gi">${Object.entries(s).map(([k,v])=>`<option value="${k}"${k===cur?' selected':''}>${v.l}</option>`).join('')}</select>`;}
function stakeSelOpts(cur){return `<option value="">— None —</option>${DB.people.map(p=>`<option value="${p.id}"${p.id===cur?' selected':''}>${esc(p.name)}${p.stakeholder_type==='primary'?' (Primary)':''}</option>`).join('')}`;}

// ── COMMAND CENTRE (DASH) ─────────────────────────────────────────────────────
function rDash(){
  const tmr = new Date(); tmr.setDate(tmr.getDate()+1);
  const todayStr = td();
  const tmrStr = tmr.toISOString().slice(0,10);

  // All people who own at least one active project
  const owners = DB.people.filter(p =>
    DB.projects.some(pr => pr.primaryStakeholderId === p.id && pr.status !== 'done')
  );

  let h = `<div class="ph"><div><div class="pt">Command Centre</div><div class="ps">${nowFull()}</div></div></div>`;

  // ── GLOBAL PULSE BAR ───────────────────────────────────────────────────────
  const active = DB.projects.filter(p=>p.status!=='done');
  const hCounts = {on_track:0,at_risk:0,delayed:0};
  active.forEach(p=>{const k=p.health||'on_track';if(k in hCounts)hCounts[k]++;});
  const totalOD = DB.tasks.filter(t=>isOD(t.dueDate,t.status)).length;
  const todayAll = DB.tasks.filter(t=>t.status!=='done'&&t.dueDate===todayStr).length;
  const tmrAll  = DB.tasks.filter(t=>t.status!=='done'&&t.dueDate===tmrStr).length;

  h += `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px">
    <div style="grid-column:1/-1;display:flex;gap:6px">
      ${hCounts.on_track?`<div style="flex:1;text-align:center;padding:9px 8px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#10b981">${hCounts.on_track}</div><div style="font-size:10px;color:#10b981;margin-top:1px">On Track</div></div>`:''}
      ${hCounts.at_risk?`<div style="flex:1;text-align:center;padding:9px 8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#f59e0b">${hCounts.at_risk}</div><div style="font-size:10px;color:#f59e0b;margin-top:1px">At Risk</div></div>`:''}
      ${hCounts.delayed?`<div style="flex:1;text-align:center;padding:9px 8px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#f43f5e">${hCounts.delayed}</div><div style="font-size:10px;color:#f43f5e;margin-top:1px">Delayed</div></div>`:''}
      ${!active.length?`<div style="flex:1;padding:10px;background:var(--glass);border:1px solid var(--bdr);border-radius:10px;font-size:12px;color:var(--txt2);text-align:center">No active projects</div>`:''}
    </div>
    <div class="sc" style="--ac:#f87171;padding:12px"><div class="sn" style="font-size:24px">${totalOD}</div><div class="sl">Overdue</div></div>
    <div class="sc" style="--ac:#fbbf24;padding:12px"><div class="sn" style="font-size:24px">${todayAll+tmrAll}</div><div class="sl">Due today &amp; tomorrow</div></div>
  </div>`;

  if(!owners.length){
    h += `<div class="es"><span class="em">🏗</span><div class="et">Welcome to Taskora PMO</div><div class="ed">Add people, assign them as project owners, and your Command Centre will populate here.</div></div>`;
    document.getElementById('tab-dash').innerHTML=h;
    return;
  }

  // ── STAKEHOLDER CARDS ──────────────────────────────────────────────────────
  h += `<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Project Owners</div>`;

  owners.forEach(person => {
    const ownedProjs = DB.projects.filter(p => p.primaryStakeholderId === person.id && p.status !== 'done');

    // All tasks across ALL owned projects
    const allProjIds = new Set(ownedProjs.map(p=>p.id));
    const allTasks   = DB.tasks.filter(t => allProjIds.has(t.projectId));
    const pending    = allTasks.filter(t => t.status !== 'done');
    const done       = allTasks.filter(t => t.status === 'done');
    const pct        = allTasks.length ? Math.round(done.length/allTasks.length*100) : 0;
    const overdueT   = pending.filter(t => isOD(t.dueDate, t.status));

    // Tasks due today and tomorrow (across their owned projects)
    const dueTT = pending.filter(t => t.dueDate === todayStr || t.dueDate === tmrStr);
    const dueToday = pending.filter(t => t.dueDate === todayStr);
    const dueTmr   = pending.filter(t => t.dueDate === tmrStr);

    // Health of their projects — worst one
    const worstHealth = ownedProjs.some(p=>p.health==='delayed') ? 'delayed'
      : ownedProjs.some(p=>p.health==='at_risk') ? 'at_risk'
      : ownedProjs.every(p=>p.health==='on_track') ? 'on_track' : 'not_started';

    // Ring colour by worst health
    const ringColor = worstHealth==='delayed'?'#f43f5e':worstHealth==='at_risk'?'#f59e0b':'#10b981';

    h += `<div class="gc" style="margin-bottom:14px;border-color:${overdueT.length?'rgba(244,63,94,.2)':dueTT.length?'rgba(245,158,11,.18)':'var(--bdr)'}">

      <!-- TOP ROW: avatar + name + stats -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="position:relative;flex-shrink:0">
          ${av(person.name,person.color,48)}
          <div style="position:absolute;inset:-3px;border-radius:50%;border:2.5px solid ${ringColor};pointer-events:none"></div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:700;line-height:1.2">${esc(person.name)}</div>
          ${person.role?`<div style="font-size:11px;color:var(--txt2);margin-top:1px">${esc(person.role)}</div>`:''}
        </div>
        <!-- KPI pills -->
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
          ${overdueT.length?`<span class="bd" style="background:rgba(244,63,94,.15);color:var(--rose)">⚠ ${overdueT.length} overdue</span>`:''}
          ${dueTT.length&&!overdueT.length?`<span class="bd" style="background:rgba(245,158,11,.12);color:#f59e0b">📅 ${dueTT.length} due soon</span>`:''}
          ${hBdg(worstHealth)}
        </div>
      </div>

      <!-- KPI ROW: projects · tasks · completion -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
        <div style="text-align:center;padding:9px 6px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)">
          <div style="font-size:20px;font-weight:700;color:var(--ind-l)">${ownedProjs.length}</div>
          <div style="font-size:10px;color:var(--txt2);margin-top:2px">Projects</div>
        </div>
        <div style="text-align:center;padding:9px 6px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)">
          <div style="font-size:20px;font-weight:700;color:${overdueT.length?'var(--rose)':'var(--txt)'}">${pending.length}</div>
          <div style="font-size:10px;color:var(--txt2);margin-top:2px">Pending tasks</div>
        </div>
        <div style="text-align:center;padding:9px 6px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)">
          <div style="font-size:20px;font-weight:700;color:${pct===100?'var(--grn)':pct>=60?'var(--teal)':'var(--txt)'}">${pct}%</div>
          <div style="font-size:10px;color:var(--txt2);margin-top:2px">Complete</div>
        </div>
      </div>

      <!-- PROGRESS BAR -->
      <div style="height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-bottom:14px">
        <div style="height:100%;width:${pct}%;background:${pct===100?'var(--grn)':person.color};border-radius:2px;transition:width .4s;box-shadow:0 0 5px ${person.color}66"></div>
      </div>

      <!-- DUE TODAY & TOMORROW — actionable task list -->
      ${dueTT.length ? `
        <div style="border-top:1px solid var(--bdr);padding-top:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
            <div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em">Due today &amp; tomorrow</div>
            <div style="display:flex;gap:5px">
              ${dueToday.length?`<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">${dueToday.length} today</span>`:''}
              ${dueTmr.length?`<span class="bd" style="background:rgba(245,158,11,.12);color:#f59e0b">${dueTmr.length} tomorrow</span>`:''}
            </div>
          </div>
          ${dueTT.map(t => {
            const proj = DB.projects.find(p=>p.id===t.projectId);
            const executor = DB.people.find(p=>p.id===t.assignedTo);
            const isToday = t.dueDate === todayStr;
            const isOd = isOD(t.dueDate, t.status);
            return `<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:${isOd?'rgba(244,63,94,.07)':isToday?'rgba(245,158,11,.07)':'var(--glass)'};border-radius:9px;border:1px solid ${isOd?'rgba(244,63,94,.2)':isToday?'rgba(245,158,11,.15)':'var(--bdr)'};margin-bottom:5px">
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:500;line-height:1.3">${esc(t.title)}</div>
                <div style="font-size:11px;color:var(--txt2);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
                  <span style="color:${isOd?'var(--rose)':isToday?'#f59e0b':'var(--txt3)'};font-weight:${isToday||isOd?600:400}">${isOd?'⚠ Overdue':isToday?'Today':'Tomorrow'}</span>
                  ${proj?`<span>· ${esc(proj.name)}</span>`:''}
                  ${executor&&executor.id!==person.id?`<span>· ${esc(executor.name.split(' ')[0])}</span>`:''}
                </div>
              </div>
              <!-- Cycle status button -->
              <button onclick="dshCySt('${t.id}')" style="flex-shrink:0;padding:4px 9px;border-radius:7px;border:1px solid var(--bdr);background:var(--glass);cursor:pointer;font-size:11px;font-weight:600;color:${TS[t.status]?.c||'var(--txt2)'};white-space:nowrap">${TS[t.status]?.l||'—'}</button>
            </div>`;
          }).join('')}
        </div>
      ` : `
        <div style="border-top:1px solid var(--bdr);padding-top:12px;text-align:center;font-size:12px;color:var(--txt3)">
          ${overdueT.length ? `<span style="color:var(--rose)">⚠ ${overdueT.length} overdue — open Projects to action them</span>` : '✓ Nothing due in the next 2 days'}
        </div>
      `}

      <!-- Projects owned — compact chips -->
      ${ownedProjs.length ? `
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;border-top:1px solid var(--bdr);padding-top:11px">
          ${ownedProjs.map(proj=>`
            <button onclick="switchTab('projects');setTimeout(()=>{expP['${proj.id}']=true;rProj();},50)" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:var(--glass);border:1px solid var(--bdr);cursor:pointer;font-size:11px;font-weight:500;color:var(--txt2)">
              <div style="width:7px;height:7px;border-radius:50%;background:${proj.color};flex-shrink:0"></div>
              ${esc(proj.name)}
            </button>
          `).join('')}
        </div>
      ` : ''}
    </div>`;
  });

  document.getElementById('tab-dash').innerHTML=h;
}

// Cycle task status from dashboard — then re-render dash
async function dshCySt(id){
  const t=DB.tasks.find(x=>x.id===id);if(!t)return;
  const i=SCYC.indexOf(t.status);
  t.status=SCYC[(i+1)%SCYC.length];
  await SB.from('tasks').update({status:t.status}).eq('id',id).eq('user_id',U.id);
  rDash();
}

// ── PEOPLE ────────────────────────────────────────────────────────────────────
function rSK(){
  let h=`<div class="ph"><div><div class="pt">People</div><div class="ps">${DB.people.length} team members</div></div><button class="btn btn-p btn-sm" onclick="oSKF()">+ Add person</button></div>`;

  if(!DB.people.length)h+=`<div class="es"><span class="em">👥</span><div class="et">No people yet</div><div class="ed">Add your team. Assign people as project owners or task executors — the same person can own one project and execute tasks on another.</div></div>`;

  DB.people.forEach(person=>{
    // Projects where this person is the primary stakeholder (owner)
    const ownedProjs=DB.projects.filter(p=>p.primaryStakeholderId===person.id&&p.status!=='done');
    // Tasks assigned to this person
    const myTasks=DB.tasks.filter(t=>t.assignedTo===person.id&&t.status!=='done');
    const myOD=myTasks.filter(t=>isOD(t.dueDate,t.status));

    h+=`<div class="gc">
      <div style="display:flex;align-items:flex-start;gap:12px">
        ${av(person.name,person.color,48)}
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:700">${esc(person.name)}</div>
          ${person.role?`<div style="font-size:12px;color:var(--txt2);margin-top:2px">${esc(person.role)}</div>`:''}
          ${person.phone?`<div style="font-size:12px;color:var(--txt3);margin-top:2px">📱 ${esc(person.phone)}</div>`:''}

async function svSK(id){
  const name=val('sk-n').trim();if(!name)return;
  const obj={name,role:val('sk-r').trim(),phone:val('sk-p').trim(),color:val('sk-c')};
  if(id){await SB.from('people').update(obj).eq('id',id).eq('user_id',U.id);DB.people=DB.people.map(x=>x.id===id?{...x,...obj}:x);}
  else{const{data}=await SB.from('people').insert({...obj,user_id:U.id}).select().single();if(data)DB.people.push(data);}
  CS();rSK();
}
async function dSK(id){
  if(!confirm('Delete this person?'))return;
  await del('people',id);
  DB.people=DB.people.filter(x=>x.id!==id);
  DB.tasks=DB.tasks.map(t=>t.assignedTo===id?{...t,assignedTo:null}:t);
  DB.projects=DB.projects.map(p=>p.primaryStakeholderId===id?{...p,primaryStakeholderId:null}:p);
  rSK();
}

  const pe=DB.people.find(p=>p.id===t.assignedTo);
  const deps=(t.dependsOn||[]).map(id=>DB.tasks.find(x=>x.id===id)).filter(Boolean).filter(d=>d.status!=='done');
  const od=isOD(t.dueDate,t.status);
  return `<div class="tr-row${od?' od':''}" style="border-left-color:${od?'var(--rose)':(PR[t.priority]?.c||'var(--txt3)')}">
    <div style="display:flex;align-items:flex-start;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px">${esc(t.title)}</div>
        <div class="tm">
          <span onclick="cySt('${t.id}')" style="cursor:pointer">${bdg(t.status)}</span>
          ${t.dueDate?`<span style="font-size:11px;color:${od?'var(--rose)':'var(--txt3)'};font-weight:${od?600:400}">${od?'⚠ ':''}${fd(t.dueDate)}</span>`:''}
          ${pe?`<div style="display:flex;align-items:center;gap:5px">${av(pe.name,pe.color,18)}<span style="font-size:11px;color:var(--txt2)">${esc(pe.name.split(' ')[0])}</span></div>`:''}
        </div>
        ${deps.length?`<div style="margin-top:5px;font-size:11px;color:#c084fc;background:rgba(168,85,247,.1);border-radius:6px;padding:3px 8px;display:inline-block">↳ blocked by: ${deps.map(d=>esc(d.title)).join(', ')}</div>`:''}
        ${t.notes?`<div style="margin-top:5px;font-size:12px;color:var(--txt2);line-height:1.5">${esc(t.notes)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
        <button class="mb" onclick="oTF('${t.projectId}','${t.subProjectId||''}','${t.id}')">✎</button>
        <button class="mb dd" onclick="dTsk('${t.id}')">×</button>
      </div>

  </div>`;
}

function rProj(){
  const projs=DB.projects.filter(p=>pFil==='all'?true:pFil==='done'?p.status==='done':p.status!=='done');
  let h=`<div class="ph"><div><div class="pt">Projects</div><div class="ps">${DB.projects.filter(p=>p.status!=='done').length} active</div></div><button class="btn btn-p btn-sm" onclick="oPrF()">+ New project</button></div>
  <div class="pls">
    <button class="pl${pFil==='active'?' active':''}" onclick="pFil='active';rProj()">Active</button>
    <button class="pl${pFil==='done'?' active':''}" onclick="pFil='done';rProj()">Done</button>
    <button class="pl${pFil==='all'?' active':''}" onclick="pFil='all';rProj()">All</button>
  </div>`;

  if(!projs.length)h+=`<div class="es"><span class="em">📋</span><div class="et">No projects yet</div><div class="ed">Create your first project and assign a primary stakeholder</div></div>`;

  projs.forEach(proj=>{
    const owner=DB.people.find(p=>p.id===proj.primaryStakeholderId);
    const subs=DB.subs.filter(s=>s.projectId===proj.id);
    const allT=DB.tasks.filter(t=>t.projectId===proj.id);
    const dirT=allT.filter(t=>!t.subProjectId);
    const pend=allT.filter(t=>t.status!=='done').length;
    const ovdT=allT.filter(t=>isOD(t.dueDate,t.status));
    const pct=allT.length?Math.round(allT.filter(t=>t.status==='done').length/allT.length*100):0;
    const pbs=DB.pb.filter(r=>r.projectId===proj.id).map(r=>({...r,b:DB.buildings.find(b=>b.id===r.buildingId)})).filter(r=>r.b);
    const bDone=pbs.filter(r=>r.status==='done').length;
    const isExp=!!expP[proj.id];
    const nextMilestone=subs.filter(s=>s.status!=='done'&&s.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline))[0];
    const cardBorder=proj.health==='delayed'?'red':proj.health==='at_risk'?'amb':'';

    h+=`<div class="gc${cardBorder?' '+cardBorder:''}${isExp?' exp':''}">
      <div onclick="expP['${proj.id}']=!expP['${proj.id}'];rProj()" style="cursor:pointer">
        <!-- Top row: dot + name + health + priority + badges -->
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
          <div style="width:10px;height:10px;border-radius:50%;background:${proj.color};flex-shrink:0;margin-top:5px;box-shadow:0 0 8px ${proj.color}66"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:700;line-height:1.3;margin-bottom:5px">${esc(proj.name)}</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
              ${hBdg(proj.health)}
              ${proj.priority!=='medium'?pBdg(proj.priority):''}
              ${proj.deadline?`<span style="font-size:11px;color:var(--txt3)">📅 ${fd(proj.deadline)}</span>`:''}
              ${pbs.length?`<span style="font-size:11px;color:var(--teal);background:rgba(20,184,166,.1);border-radius:99px;padding:1px 7px">🏢 ${bDone}/${pbs.length}</span>`:''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
            ${ovdT.length?`<span class="bd" style="background:rgba(244,63,94,.15);color:var(--rose)">⚠ ${ovdT.length}</span>`:''}
            ${pend?`<span class="bd" style="background:rgba(99,102,241,.14);color:var(--ind-l)">${pend}</span>`:''}
            <span style="font-size:13px;color:var(--txt3)">${isExp?'▾':'▸'}</span>
          </div>
        </div>

        <!-- Primary stakeholder row — PROMINENT -->
        <div style="display:flex;align-items:center;gap:10px;padding:8px 11px;background:${owner?'rgba(99,102,241,.07)':'var(--glass)'};border-radius:9px;border:1px solid ${owner?'rgba(99,102,241,.15)':'var(--bdr)'}">
          ${owner?av(owner.name,owner.color,28):av('?','#64748b',28)}
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;color:${owner?'var(--ind-l)':'var(--txt3)'}">${owner?esc(owner.name):'No primary stakeholder assigned'}</div>
            ${owner?.role?`<div style="font-size:11px;color:var(--txt2)">${esc(owner.role)}</div>`:''}
          </div>
          <div style="font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Owner</div>
        </div>

        <!-- Progress -->
        ${allT.length?`<div style="margin-top:10px"><div class="pw"><div class="pb" style="width:${pct}%;background:${pct===100?'var(--grn)':proj.color};box-shadow:0 0 5px ${proj.color}55"></div></div><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:var(--txt3)">${pct}% complete · ${allT.length} tasks</span>${nextMilestone?`<span style="font-size:11px;color:var(--amb)">Next: ${esc(nextMilestone.name)} ${fd(nextMilestone.deadline)}</span>`:''}</div></div>`:''}
      </div>

      <!-- EXPANDED -->
      ${isExp?`<div style="border-top:1px solid var(--bdr);padding-top:14px;margin-top:14px">
        <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
          <button class="mb" onclick="oMilF('${proj.id}')">+ Milestone</button>
          <button class="mb" onclick="oTF('${proj.id}','')">+ Task</button>
          <button class="mb" onclick="oAsn('${proj.id}')">🏢 Buildings</button>
          <button class="mb" onclick="oPrF('${proj.id}')">Edit</button>
          <button class="mb dd" onclick="dPrj('${proj.id}')">Delete</button>
        </div>

        <!-- BUILDINGS -->
        ${pbs.length?`<div style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em">Buildings (${pbs.length})</div>
        ${pbs.map(r=>`<div class="bpr" onclick="oPBS('${r.id}')"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">${esc(r.b.name)}<span style="font-size:11px;color:var(--txt3);font-weight:400"> — ${esc(r.b.city||'')}</span></div>${r.remarks?`<div style="font-size:11px;color:var(--txt2);margin-top:3px;font-style:italic">${esc(r.remarks)}</div>`:''}</div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0">${bdg(r.status,BS)}<span style="font-size:11px;color:var(--txt3)">✎</span></div></div>`).join('')}<div style="margin-bottom:12px"></div>`:''}

        <!-- MILESTONES + TASKS -->
        ${subs.map(sub=>{
          const st=DB.tasks.filter(t=>t.subProjectId===sub.id);
          const sp=st.filter(t=>t.status!=='done').length;
          const isExpS=!!expS[sub.id];
          const subOD=st.some(t=>isOD(t.dueDate,t.status));
          return `<div style="margin-bottom:8px">
            <div class="sr${subOD?' style=border-color:rgba(244,63,94,.25)':''}" onclick="expS['${sub.id}']=!expS['${sub.id}'];rProj()">
              <span style="font-size:11px;color:var(--txt3);width:10px">${isExpS?'▾':'▸'}</span>
              <span style="font-size:13px;font-weight:600;flex:1">📍 ${esc(sub.name)}</span>
              ${sp?`<span class="bd" style="background:rgba(99,102,241,.14);color:var(--ind-l)">${sp}</span>`:''}
              ${sub.deadline?`<span style="font-size:11px;color:${isOD(sub.deadline,sub.status)?'var(--rose)':'var(--txt3)'}">${fd(sub.deadline)}</span>`:''}
              ${bdg(sub.status)}
              <button class="mb" style="font-size:11px;padding:2px 8px" onclick="event.stopPropagation();oTF('${proj.id}','${sub.id}')">+Task</button>
              <button onclick="event.stopPropagation();oMilF('${proj.id}','${sub.id}')" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--txt3)">✎</button>
              <button onclick="event.stopPropagation();dMil('${sub.id}')" style="background:none;border:none;cursor:pointer;font-size:15px;color:var(--txt3)">×</button>
            </div>
            ${isExpS&&st.length?`<div style="padding:6px 0 0 12px">${st.map(t=>trow(t)).join('')}</div>`:''}
            ${isExpS&&!st.length?`<div style="padding:8px 12px;font-size:12px;color:var(--txt3)">No tasks yet · <button onclick="oTF('${proj.id}','${sub.id}')" style="background:none;border:none;color:var(--ind-l);cursor:pointer;font-size:12px;font-weight:500">+ Add task</button></div>`:''}
          </div>`;
        }).join('')}

        <!-- DIRECT TASKS (grouped by secondary stakeholder) -->
        ${dirT.length?`<div>
          ${subs.length?`<div style="font-size:11px;color:var(--txt3);margin:10px 0 6px;padding-left:2px;font-weight:600">Direct Tasks</div>`:''}
          ${(()=>{
            // Group by assigned person
            const byPerson={};
            dirT.forEach(t=>{const key=t.assignedTo||'__none__';if(!byPerson[key])byPerson[key]=[];byPerson[key].push(t);});
            return Object.entries(byPerson).map(([key,tasks])=>{
              const pe=DB.people.find(p=>p.id===key);
              return `${pe?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;margin-top:10px">${av(pe.name,pe.color,22)}<span style="font-size:12px;font-weight:600;color:var(--txt2)">${esc(pe.name)}</span></div>`:''}
              ${tasks.map(t=>trow(t)).join('')}`;
            }).join('');
          })()}
        </div>`:''}
      </div>`:''}
    </div>`;
  });
  document.getElementById('tab-projects').innerHTML=h;
}

async function cySt(id){const t=DB.tasks.find(x=>x.id===id);if(!t)return;const i=SCYC.indexOf(t.status);t.status=SCYC[(i+1)%SCYC.length];await SB.from('tasks').update({status:t.status}).eq('id',id).eq('user_id',U.id);rProj();}
async function dTsk(id){if(!confirm('Delete task?'))return;await del('tasks',id);DB.tasks=DB.tasks.filter(t=>t.id!==id);rProj();}
async function dMil(id){const s=DB.subs.find(x=>x.id===id);if(!confirm(`Delete milestone "${s?.name}" and its tasks?`))return;await del('sub_projects',id);DB.subs=DB.subs.filter(x=>x.id!==id);DB.tasks=DB.tasks.filter(t=>t.subProjectId!==id);rProj();}
async function dPrj(id){const p=DB.projects.find(x=>x.id===id);if(!confirm(`Delete "${p?.name}" and all its data?`))return;await del('projects',id);DB.projects=DB.projects.filter(x=>x.id!==id);DB.subs=DB.subs.filter(s=>s.projectId!==id);DB.tasks=DB.tasks.filter(t=>t.projectId!==id);DB.pb=DB.pb.filter(r=>r.projectId!==id);rProj();}

async function svPr(id){
  const nm=val('pf-n').trim();if(!nm)return;
  const obj={name:nm,description:val('pf-d').trim(),primary_stakeholder_id:val('pf-ps')||null,status:val('pf-s'),health:val('pf-h'),priority:val('pf-pr'),deadline:val('pf-dl')||null,color:val('pf-c')};
  if(id){await SB.from('projects').update(obj).eq('id',id).eq('user_id',U.id);DB.projects=DB.projects.map(x=>x.id===id?{...x,...obj,primaryStakeholderId:obj.primary_stakeholder_id,desc:obj.description}:x);}
  else{const{data}=await SB.from('projects').insert({...obj,user_id:U.id}).select().single();if(data)DB.projects.push({...data,primaryStakeholderId:data.primary_stakeholder_id,desc:data.description,health:data.health||'on_track',priority:data.priority||'medium'});}
  CS();rProj();rDash&&curTab==='dash'&&rDash();
}

async function svMil(id,pid){

  CS();rProj();
}

function oTF(pid,sid,id){
  const t=id?DB.tasks.find(x=>x.id===id):null;const p=t?.projectId||pid;const s=t?.subProjectId||(sid||'');
  const sibs=DB.tasks.filter(x=>x.id!==id&&x.projectId===p&&(s?x.subProjectId===s:!x.subProjectId));
  const dC=t?.dependsOn||[];
  // Get secondary stakeholders for this project
  const projPrimary=DB.projects.find(pr=>pr.id===p)?.primaryStakeholderId;
  OS(id?'Edit task':'Add task',`
    <div class="fg"><label class="fl">Task</label><input id="tf-ti" class="gi" placeholder="What needs to be done?" value="${esc(t?.title||'')}"></div>
    <div class="fg"><label class="fl">Notes / instructions</label><textarea id="tf-no" class="gi">${esc(t?.notes||'')}</textarea></div>
    <div class="fg"><label class="fl">Assigned to (secondary stakeholder)</label><select id="tf-at" class="gi"><option value="">— Unassigned —</option>${DB.people.map(pe=>`<option value="${pe.id}"${t?.assignedTo===pe.id?' selected':''}>${esc(pe.name)}${pe.stakeholder_type==='primary'?' ★':''}</option>`).join('')}</select></div>

// ── DIGEST ────────────────────────────────────────────────────────────────────
// Generated per project OWNER — focused on overdue and at-risk items only
function aMsg(person){
  const ownedProjs=DB.projects.filter(p=>p.primaryStakeholderId===person.id&&p.status!=='done');
  if(!ownedProjs.length)return null;

  // Collect all overdue tasks across their projects
  const overdueByProj={};
  const atRiskProjs=[];
  ownedProjs.forEach(proj=>{
    const projTasks=DB.tasks.filter(t=>t.projectId===proj.id&&t.status!=='done');
    const od=projTasks.filter(t=>isOD(t.dueDate,t.status));
    if(od.length)overdueByProj[proj.id]={proj,tasks:od};
    if(proj.health==='at_risk'||proj.health==='delayed')atRiskProjs.push(proj);
  });

  const hasOverdue=Object.keys(overdueByProj).length>0;
  const hasAtRisk=atRiskProjs.length>0;

  // If nothing to flag, return null (clean slate = no digest needed)
  if(!hasOverdue&&!hasAtRisk)return null;

  let msg=`*⚠ Action Required — ${person.name}*\n${nowFull()}\n`;

  // OVERDUE SECTION
  if(hasOverdue){
    msg+=`\n━━━━━━━━━━━━━━━━━━\n🔴 *OVERDUE TASKS*\n`;
    Object.values(overdueByProj).forEach(({proj,tasks})=>{
      msg+=`\n📁 *${proj.name}*\n`;
      tasks.forEach(t=>{
        const pe=DB.people.find(p=>p.id===t.assignedTo);
        msg+=`   ⚠️ *${t.title}*\n`;
        msg+=`      Was due: ${fd(t.dueDate)}\n`;
        if(pe)msg+=`      Responsible: ${pe.name}\n`;
        if(t.notes)msg+=`      Note: ${t.notes}\n`;
        const deps=(t.dependsOn||[]).map(id=>DB.tasks.find(x=>x.id===id)).filter(Boolean).filter(d=>d.status!=='done');
        if(deps.length)msg+=`      ⛓ Blocked by: ${deps.map(d=>d.title).join(', ')}\n`;
      });
    });
  }

  // AT RISK / DELAYED SECTION
  if(hasAtRisk){
    msg+=`\n━━━━━━━━━━━━━━━━━━\n🟡 *PROJECTS NEEDING ATTENTION*\n`;
    atRiskProjs.forEach(proj=>{
      const allT=DB.tasks.filter(t=>t.projectId===proj.id);
      const pct=allT.length?Math.round(allT.filter(t=>t.status==='done').length/allT.length*100):0;
      const nextMil=DB.subs.filter(s=>s.projectId===proj.id&&s.status!=='done'&&s.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline))[0];
      const pbs=DB.pb.filter(r=>r.projectId===proj.id);
      msg+=`\n📁 *${proj.name}* — ${HS[proj.health]?.l||'At Risk'}\n`;
      msg+=`   Progress: ${pct}%\n`;
      if(proj.deadline)msg+=`   Deadline: ${fd(proj.deadline)}\n`;
      if(nextMil)msg+=`   Next milestone: ${nextMil.name} (${fd(nextMil.deadline)})\n`;
      // Blocked building statuses
      const blockedBlds=pbs.filter(r=>r.status==='blocked'||r.status==='on_hold');
      if(blockedBlds.length){
        msg+=`   🏢 Blocked buildings:\n`;
        blockedBlds.forEach(r=>{const bl=DB.buildings.find(b=>b.id===r.buildingId);if(!bl)return;msg+=`      • ${bl.name}${bl.city?', '+bl.city:''} — ${BS[r.status]?.l||r.status}${r.remarks?' ('+r.remarks+')':''}\n`;});
      }
    });
  }

  msg+=`\n━━━━━━━━━━━━━━━━━━`;
  const totalOD=Object.values(overdueByProj).reduce((s,{tasks})=>s+tasks.length,0);
  if(totalOD)msg+=`\n📊 *${totalOD} overdue task${totalOD!==1?'s':''} require immediate action*`;
  return msg;
}
async function svDE(pid){const el=document.getElementById('de-'+pid);if(!el)return;const content=el.value;DB.de[pid]=content;await SB.from('digest_edits').upsert({user_id:U.id,person_id:pid,content,updated_at:new Date().toISOString()},{onConflict:'user_id,person_id'});const ind=document.getElementById('di-'+pid);if(ind){ind.textContent='Saved ✓';ind.style.color='var(--grn)';setTimeout(()=>{if(ind)ind.textContent='';},1500);}}
async function rgDig(pid){if(!confirm('Discard your edits and regenerate?'))return;const person=DB.people.find(p=>p.id===pid);const fresh=aMsg(person)||'';const el=document.getElementById('de-'+pid);if(el)el.value=fresh;delete DB.de[pid];await SB.from('digest_edits').delete().eq('user_id',U.id).eq('person_id',pid);const ind=document.getElementById('di-'+pid);if(ind){ind.textContent='Regenerated';ind.style.color='var(--ind-l)';setTimeout(()=>{if(ind)ind.textContent='';},1500);}}
async function rgAll(){if(!confirm('Discard ALL edits and regenerate all messages?'))return;DB.de={};await SB.from('digest_edits').delete().eq('user_id',U.id);rDig();}
function rDig(){
  const dig=DB.people.filter(p=>DB.projects.some(pr=>pr.primaryStakeholderId===p.id&&pr.status!=='done')).map(p=>{const auto=aMsg(p);const msg=DB.de[p.id]!==undefined?DB.de[p.id]:auto;return{person:p,msg,auto,hasEdit:DB.de[p.id]!==undefined};}).filter(x=>x.auto);
  let h=`<div class="ph"><div><div class="pt">Daily Digest</div><div class="ps">Overdue & at-risk items only · ${nowFull()}</div></div><button class="btn btn-g btn-sm" onclick="rgAll()">↺ Regen all</button></div>
  <div style="font-size:12px;color:var(--txt2);margin-bottom:20px;padding:10px 14px;background:var(--glass);border-radius:10px;border:1px solid var(--bdr)">Generated per project owner. Only shows <strong style="color:var(--rose)">overdue tasks</strong> and <strong style="color:var(--amb)">at-risk/delayed projects</strong> — nothing else.</div>`;
  if(!dig.length)h+=`<div class="es"><span class="em">🎉</span><div class="et">All clear!</div><div class="ed">No overdue tasks or at-risk projects. Nothing to flag today.</div></div>`;
  dig.forEach(({person,msg,auto,hasEdit})=>{
    const ownedProjs=DB.projects.filter(p=>p.primaryStakeholderId===person.id&&p.status!=='done');
    const totalOD=DB.tasks.filter(t=>ownedProjs.some(p=>p.id===t.projectId)&&isOD(t.dueDate,t.status)).length;
    const atRisk=ownedProjs.filter(p=>p.health==='at_risk'||p.health==='delayed').length;
    const isEd=hasEdit&&msg!==auto;
    h+=`<div class="gc" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        ${av(person.name,person.color,46)}
        <div style="flex:1"><div style="font-size:15px;font-weight:700">${esc(person.name)}</div><div style="font-size:12px;color:var(--txt2)">${esc(person.role||'Project Owner')}</div>
        <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
          ${totalOD?`<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">🔴 ${totalOD} overdue</span>`:''}
          ${atRisk?`<span class="bd" style="background:rgba(245,158,11,.14);color:#f59e0b">🟡 ${atRisk} at risk</span>`:''}
          ${isEd?`<span class="bd" style="background:rgba(245,158,11,.12);color:#fbbf24">✎ Edited</span>`:''}
        </div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
          <button onclick="rgDig('${person.id}')" class="mb" style="font-size:11px">↺ Reset</button>
          <span id="di-${person.id}" style="font-size:11px;color:var(--txt3);min-height:14px"></span>
        </div>
      </div>
      <textarea id="de-${person.id}" class="dta" oninput="svDE('${person.id}')">${esc(msg)}</textarea>
      <div style="display:flex;gap:10px;margin-top:10px">
        <button class="cp-b" id="cp-${person.id}" onclick="cpM('${person.id}')">📋 Copy</button>
        <button class="wa-b" onclick="oWA('${person.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>WhatsApp ${esc(person.name.split(' ')[0])}</button>
      </div>
    </div>`;
  });
  document.getElementById('tab-digest').innerHTML=h;
}
function cpM(pid){const el=document.getElementById('de-'+pid);const msg=el?el.value:'';if(!msg)return;navigator.clipboard.writeText(msg).catch(()=>{}).finally(()=>{const b=document.getElementById('cp-'+pid);if(b){b.textContent='✓ Copied!';b.classList.add('ok');setTimeout(()=>{b.textContent='📋 Copy';b.classList.remove('ok');},2000);}});}
function oWA(pid){const el=document.getElementById('de-'+pid);const msg=el?el.value:'';const p=DB.people.find(x=>x.id===pid);if(!p?.phone){alert('No WhatsApp number for '+p?.name);return;}if(!msg)return;window.open(`https://wa.me/${p.phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');}

// ── PROFILE ───────────────────────────────────────────────────────────────────
function openProfile(){
  const email=U.email||'';const dn=U.user_metadata?.display_name||email.split('@')[0]||'';
  OS('My Account',`<div style="display:flex;flex-direction:column;align-items:center;padding:10px 0 22px;border-bottom:1px solid var(--bdr);margin-bottom:22px"><div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--ind),var(--teal));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:12px">${email.slice(0,2).toUpperCase()}</div><div style="font-size:16px;font-weight:700">${esc(dn)}</div><div style="font-size:12px;color:var(--txt3);margin-top:3px">${esc(email)}</div></div>
  <div class="fg"><label class="fl">Display name</label><input id="pr-dn" class="gi" placeholder="Your name" value="${esc(dn)}"></div>
  <div style="border-top:1px solid var(--bdr);margin:18px 0"></div>
  <div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px">Change password</div>
  <div class="fg"><label class="fl">New password</label><input id="pr-pw1" class="gi" type="password" placeholder="Min 8 characters"></div>
  <div class="fg"><label class="fl">Confirm password</label><input id="pr-pw2" class="gi" type="password" placeholder="Repeat password"></div>
  <div id="pr-msg"></div>
  <div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svProfile()">Save changes</button></div>
  <div style="border-top:1px solid var(--bdr);margin-top:22px;padding-top:16px"><button onclick="doSO()" style="width:100%;padding:11px;border-radius:var(--r-sm);background:rgba(244,63,94,.08);color:#f87171;border:1px solid rgba(244,63,94,.18);font-size:13px;font-weight:600;cursor:pointer">↪ Sign out of Taskora</button></div>`);
}
async function svProfile(){const dn=val('pr-dn').trim();const pw1=val('pr-pw1');const pw2=val('pr-pw2');const el=document.getElementById('pr-msg');const sm=(m,ok=false)=>{if(el)el.innerHTML=`<div class="amsg ${ok?'ok':'err'}" style="margin-bottom:0">${m}</div>`;};let changed=false;if(dn){const{error}=await SB.auth.updateUser({data:{display_name:dn}});if(error){sm('Error: '+error.message);return;}document.getElementById('sb-name').textContent=dn;changed=true;}if(pw1||pw2){if(pw1!==pw2){sm('Passwords do not match.');return;}if(pw1.length<8){sm('Password must be at least 8 characters.');return;}const{error}=await SB.auth.updateUser({password:pw1});if(error){sm('Error: '+error.message);return;}changed=true;}if(changed)sm('Changes saved!',true);else sm('No changes to save.');}

// ── PWA ───────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

boot();
</script>
