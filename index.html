<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Taskora"/>
<meta name="theme-color" content="#0f0f1a"/>
<link rel="manifest" href="manifest.json"/>
<title>Taskora — Founder's Office</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --ind:#6366f1;--ind-d:#4f46e5;--ind-l:#818cf8;
  --teal:#14b8a6;--rose:#f43f5e;--amb:#f59e0b;--grn:#10b981;
  --bg:#0a0a14;
  --glass:rgba(255,255,255,.045);--glass2:rgba(255,255,255,.08);--glass3:rgba(255,255,255,.12);
  --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.15);
  --txt:#f1f5f9;--txt2:#94a3b8;--txt3:#64748b;
  --r:14px;--r-sm:10px;
  --shadow-sm:0 2px 8px rgba(0,0,0,.25);
  --shadow-md:0 8px 24px rgba(0,0,0,.35);
  --shadow-lg:0 20px 60px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
input,select,textarea,button{font-family:inherit;letter-spacing:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
@keyframes bounceIn{0%{transform:scale(.92);opacity:0}60%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 10% 10%,rgba(99,102,241,.15) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 85%,rgba(20,184,166,.09) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(99,102,241,.03) 0%,transparent 70%);
}
#root{position:relative;z-index:1;min-height:100vh}

/* ── UPDATE BANNER ────────────────────────────────────────────────────────── */
#update-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  color:#fff;display:none;align-items:center;gap:12px;
  padding:12px 18px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0));
  box-shadow:0 -4px 24px rgba(99,102,241,.4);
  animation:slideUp .3s cubic-bezier(.32,0,.67,0);
}
#update-banner.show{display:flex}
#update-banner .ub-msg{flex:1;font-size:13px;font-weight:600}
#update-banner .ub-sub{font-size:11px;opacity:.75;margin-top:1px}
#update-banner button{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:opacity .15s}
#update-banner .ub-ok{background:#fff;color:#4f46e5}
#update-banner .ub-ok:hover{opacity:.92}
#update-banner .ub-skip{background:rgba(255,255,255,.15);color:#fff;margin-left:4px}

/* ── LOADING ────────────────────────────────────────────────────────────────*/
#ls{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999;transition:opacity .4s}
.spin{width:32px;height:32px;border-radius:50%;border:2.5px solid rgba(99,102,241,.18);border-top-color:var(--ind);animation:spin .65s linear infinite}
#ls .lb{font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--ind-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
#ls .ls-sub{font-size:11px;color:var(--txt3);letter-spacing:.04em;text-transform:uppercase}

/* ── AUTH ───────────────────────────────────────────────────────────────────*/
#auth-scr{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .4s}
.auth-card{background:rgba(16,16,36,.95);backdrop-filter:blur(32px);border:1px solid var(--bdr2);border-radius:24px;padding:40px 32px;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.auth-brand{font-size:30px;font-weight:900;background:linear-gradient(135deg,var(--ind-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;letter-spacing:-.03em}
.auth-tag{font-size:11px;color:var(--txt3);text-align:center;margin-top:4px;margin-bottom:32px;letter-spacing:.07em;text-transform:uppercase}
.auth-tabs{display:flex;background:rgba(255,255,255,.05);border-radius:11px;padding:4px;margin-bottom:24px;gap:4px}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.auth-tab.on{background:var(--ind);color:#fff;box-shadow:0 2px 12px rgba(99,102,241,.4)}
.auth-tab:not(.on){background:transparent;color:var(--txt2)}
.amsg{padding:11px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:14px;line-height:1.5}
.amsg.err{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.22);color:#fca5a5}
.amsg.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.22);color:#6ee7b7}

/* ── FORM ELEMENTS ──────────────────────────────────────────────────────────*/
.gi{width:100%;padding:11px 14px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:14px;outline:none;transition:border-color .18s,background .18s,box-shadow .18s;margin-bottom:11px}
.gi:focus{border-color:rgba(99,102,241,.55);background:var(--glass2);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.gi::placeholder{color:var(--txt3)}
select.gi{cursor:pointer}
select.gi option{background:#1a1a2e;color:var(--txt)}
textarea.gi{min-height:72px;resize:vertical;margin-bottom:0;line-height:1.6}
.fl{font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.065em;display:block}
.fg{margin-bottom:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Reusable section label utility */
.lbl{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em}

/* ── BUTTONS ────────────────────────────────────────────────────────────────*/
.btn{padding:11px 18px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .18s;font-family:inherit;letter-spacing:-.01em}
.btn-p{background:linear-gradient(135deg,var(--ind),var(--ind-d));color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.btn-p:hover{box-shadow:0 6px 22px rgba(99,102,241,.45);transform:translateY(-1px)}
.btn-p:active{transform:translateY(0);box-shadow:0 2px 8px rgba(99,102,241,.3)}
.btn-p:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
.btn-g{background:var(--glass);color:var(--txt2);border:1px solid var(--bdr)}
.btn-g:hover{background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}
.btn-g:active{background:var(--glass3)}
.btn-sm{padding:7px 13px;font-size:12px}
.br{display:flex;gap:9px}
.br .btn-g{flex:1}
.br .btn-p{flex:2}
/* Mini action button */
.mb{padding:5px 10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);transition:all .15s}
.mb:hover{background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}
.mb:active{background:var(--glass3)}
.mb.dd{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.2);color:#f87171}
.mb.dd:hover{background:rgba(244,63,94,.15);border-color:rgba(244,63,94,.35);color:#fca5a5}
.wa-b{flex:2;padding:12px;border-radius:var(--r-sm);font-size:13px;font-weight:700;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 4px 14px rgba(34,197,94,.25);transition:all .18s}
.wa-b:hover{box-shadow:0 6px 20px rgba(34,197,94,.35);transform:translateY(-1px)}
.wa-b:active{transform:translateY(0)}
.cp-b{flex:1;padding:12px;border-radius:var(--r-sm);font-size:13px;font-weight:600;background:var(--glass);color:var(--txt2);border:1px solid var(--bdr);cursor:pointer;transition:all .18s}
.cp-b:hover{background:var(--glass2);color:var(--txt)}
.cp-b.ok{background:rgba(16,185,129,.12);color:#6ee7b7;border-color:rgba(16,185,129,.3)}

/* ── LAYOUT ─────────────────────────────────────────────────────────────────*/
#app{display:flex;min-height:100vh}
#sb{width:232px;background:rgba(12,12,28,.8);backdrop-filter:blur(24px);border-right:1px solid var(--bdr);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50}
.sb-top{padding:20px 16px 12px}
.sb-brand{font-size:16px;font-weight:900;background:linear-gradient(135deg,var(--ind-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.sb-tag{font-size:10px;color:var(--txt3);margin-top:2px;letter-spacing:.05em;text-transform:uppercase}
.sb-div{height:1px;background:var(--bdr);margin:8px 16px}
.sb-nav{flex:1;padding:4px 8px;overflow-y:auto}
.sb-b{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);background:none;border:none;border-left:2px solid transparent;color:var(--txt2);font-size:13px;font-weight:500;width:100%;text-align:left;cursor:pointer;transition:all .15s;margin-bottom:1px;position:relative}
.sb-b:hover{background:var(--glass);color:var(--txt)}
.sb-b.active{background:rgba(99,102,241,.12);color:var(--ind-l);border-left-color:var(--ind);font-weight:600}
.sb-b .ic{font-size:15px;width:20px;text-align:center;flex-shrink:0;opacity:.8}
.sb-b.active .ic{opacity:1}
.sb-bot{padding:12px}
.prof-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;background:var(--glass);border:1px solid var(--bdr);cursor:pointer;margin-bottom:8px;width:100%;transition:all .15s;text-align:left}
.prof-btn:hover{background:var(--glass2);border-color:var(--bdr2)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0;box-shadow:0 0 5px var(--grn)}
.sdot.sy{background:var(--amb);box-shadow:0 0 5px var(--amb);animation:pulse 1.2s infinite}
.sdot.er{background:var(--rose);box-shadow:0 0 5px var(--rose)}
.so-b{width:100%;padding:9px;border-radius:9px;background:rgba(244,63,94,.07);color:#f87171;border:1px solid rgba(244,63,94,.15);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.so-b:hover{background:rgba(244,63,94,.13);border-color:rgba(244,63,94,.28)}
#content{flex:1;margin-left:232px;overflow-y:auto;min-height:100vh;padding-bottom:40px}
.page{padding:24px;display:none;animation:fadeIn .22s ease}
.page.active{display:block}

/* ── BOTTOM NAV ─────────────────────────────────────────────────────────────*/
#bn{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,20,.92);backdrop-filter:blur(24px);border-top:1px solid var(--bdr);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;padding:10px 4px 9px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt3);cursor:pointer;transition:color .15s;position:relative}
.nb.active{color:var(--ind-l)}
.nb .ic{font-size:20px;line-height:1}
.nb .lb{font-size:10px;font-weight:600;letter-spacing:.01em}

@media(max-width:767px){
  #sb{transform:translateX(-100%)}
  #content{margin-left:0;padding-bottom:72px}
  #bn{display:flex}
  .page{padding:14px}
}
@media(min-width:768px){
  #bn{display:none!important}
}

/* ── CARDS ──────────────────────────────────────────────────────────────────*/
.gc{background:rgba(255,255,255,.035);backdrop-filter:blur(12px);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:12px;transition:border-color .2s,box-shadow .2s,transform .2s}
.gc:hover{border-color:var(--bdr2);box-shadow:0 4px 20px rgba(0,0,0,.2)}
@media(min-width:768px){.gc:hover{transform:translateY(-1px)}}
.gc.red{border-color:rgba(244,63,94,.22);box-shadow:0 2px 12px rgba(244,63,94,.06)}
.gc.amb{border-color:rgba(245,158,11,.22);box-shadow:0 2px 12px rgba(245,158,11,.06)}
.gc.exp{border-color:rgba(99,102,241,.2);box-shadow:0 8px 32px rgba(99,102,241,.1)}

/* ── STAT CARDS ─────────────────────────────────────────────────────────────*/
.sg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:20px}
.sc{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;transition:border-color .2s}
.sc::before{content:'';position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;background:var(--ac,var(--ind));opacity:.12}
.sn{font-size:32px;font-weight:800;line-height:1;color:var(--ac,var(--ind-l));letter-spacing:-.02em}
.sl{font-size:12px;color:var(--txt2);margin-top:5px;font-weight:500}

/* ── PAGE HEADER ─────────────────────────────────────────────────────────── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.pt{font-size:22px;font-weight:800;letter-spacing:-.02em}
.ps{font-size:12px;color:var(--txt2);margin-top:3px;font-weight:400}

/* ── BADGES ─────────────────────────────────────────────────────────────────*/
.bd{display:inline-flex;align-items:center;font-size:11px;font-weight:600;border-radius:99px;padding:3px 9px;white-space:nowrap;border:1px solid transparent;line-height:1.4}
/* Health badges */
.h-ot{background:rgba(16,185,129,.12);color:#10b981;border-color:rgba(16,185,129,.2)}
.h-ar{background:rgba(245,158,11,.12);color:#f59e0b;border-color:rgba(245,158,11,.2)}
.h-dl{background:rgba(244,63,94,.12);color:#f43f5e;border-color:rgba(244,63,94,.2)}
.h-ns{background:rgba(100,116,139,.1);color:#64748b;border-color:rgba(100,116,139,.15)}
/* Priority badges */
.p-cr{background:rgba(244,63,94,.12);color:#f43f5e;border-color:rgba(244,63,94,.2)}
.p-hi{background:rgba(245,158,11,.12);color:#f59e0b;border-color:rgba(245,158,11,.2)}
.p-me{background:rgba(99,102,241,.12);color:#818cf8;border-color:rgba(99,102,241,.2)}
.p-lo{background:rgba(100,116,139,.1);color:#64748b;border-color:rgba(100,116,139,.15)}

/* ── PROGRESS BARS ──────────────────────────────────────────────────────────*/
.pw{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── FILTER PILLS ───────────────────────────────────────────────────────────*/
.pls{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pls::-webkit-scrollbar{display:none}
.pl{padding:5px 13px;border-radius:99px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s}
.pl.active{background:rgba(99,102,241,.16);border-color:rgba(99,102,241,.35);color:var(--ind-l);font-weight:600}
.pl:hover:not(.active){background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}

/* ── AVATARS ─────────────────────────────────────────────────────────────── */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:.01em}

/* ── OWNER HIGHLIGHT BOX ─────────────────────────────────────────────────── */
.owner-box{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;border:1px solid rgba(99,102,241,.18);background:rgba(99,102,241,.06);margin-bottom:10px}
.owner-box.empty{border-color:var(--bdr);background:var(--glass)}

/* ── COLOUR SWATCHES ─────────────────────────────────────────────────────── */
.sw-wrap{display:flex;gap:7px;flex-wrap:wrap}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;box-sizing:border-box;transition:transform .15s,border-color .15s}
.sw.on{border-color:#fff;transform:scale(1.2);box-shadow:0 0 8px rgba(255,255,255,.3)}
.sw:hover:not(.on){transform:scale(1.1)}

/* ── TABLE ──────────────────────────────────────────────────────────────────*/
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:12px;background:rgba(255,255,255,.02)}
table{width:100%;border-collapse:collapse;min-width:560px}
thead tr{background:rgba(255,255,255,.03)}
th{text-align:left;padding:10px 13px;font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.055em;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:9px 13px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* ── DIGEST TEXTAREA ─────────────────────────────────────────────────────── */
.dta{width:100%;min-height:200px;padding:13px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:12px;font-family:'SF Mono',ui-monospace,monospace;line-height:2;resize:vertical;outline:none;box-sizing:border-box;transition:border-color .18s,box-shadow .18s}
.dta:focus{border-color:rgba(99,102,241,.4);box-shadow:0 0 0 3px rgba(99,102,241,.08)}

/* ── INLINE INFO BOX ─────────────────────────────────────────────────────── */
.ih{font-size:13px;color:var(--txt2);line-height:1.7;background:var(--glass);padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--bdr);margin-bottom:14px}

/* ── EMPTY STATE ─────────────────────────────────────────────────────────── */
.es{text-align:center;padding:56px 20px;color:var(--txt2)}
.es .em{font-size:48px;margin-bottom:16px;display:block;animation:bounceIn .4s}
.es .et{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:6px;letter-spacing:-.01em}
.es .ed{font-size:13px;line-height:1.6;max-width:280px;margin:0 auto}

/* ── TASK ROW ────────────────────────────────────────────────────────────── */
.tr-row{background:var(--glass);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:5px;border:1px solid var(--bdr);border-left:3px solid var(--txt3);transition:border-color .15s}
.tr-row:hover{border-color:var(--bdr2)}
.tr-row.od{border-left-color:var(--rose);background:rgba(244,63,94,.04)}
.tm{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:4px}

/* ── SORTABLE ROW / SEARCH ROW ──────────────────────────────────────────────*/
.sr{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--glass);border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--bdr);margin-bottom:3px;transition:border-color .15s,background .15s}
.sr:hover{background:var(--glass2);border-color:var(--bdr2)}
.bpr{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--glass);border-radius:var(--r-sm);margin-bottom:5px;border:1px solid var(--bdr);cursor:pointer;transition:border-color .15s,background .15s}
.bpr:hover{background:var(--glass2);border-color:var(--bdr2)}

/* ── INVITE STATUS CHIPS ─────────────────────────────────────────────────── */
.invite-pending{background:rgba(245,158,11,.1);color:#f59e0b;border-color:rgba(245,158,11,.22)}
.invite-accepted{background:rgba(16,185,129,.1);color:#10b981;border-color:rgba(16,185,129,.22)}

/* ── BOTTOM SHEET / MODAL ────────────────────────────────────────────────── */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:400;display:none;align-items:flex-end;justify-content:center}
#ov.op{display:flex;animation:fadeIn .15s}
#sh{background:rgba(14,14,32,.98);backdrop-filter:blur(32px);border:1px solid var(--bdr2);border-bottom:none;width:100%;max-width:520px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0) + 24px);animation:slideUp .24s cubic-bezier(.25,.8,.25,1)}
.sh-hd{width:36px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:14px auto 0}
.sh-row{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 12px}
.sh-ti{font-size:17px;font-weight:700;letter-spacing:-.01em}
.sh-cl{width:28px;height:28px;border-radius:50%;background:var(--glass2);border:1px solid var(--bdr);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.sh-cl:hover{background:var(--glass3);color:var(--txt)}
.sh-bod{padding:0 18px 4px}
@media(min-width:768px){
  #ov{align-items:center}
  #sh{border-radius:22px;border-bottom:1px solid var(--bdr2);max-width:500px;box-shadow:var(--shadow-lg);animation:bounceIn .25s}
  #sh.wide{max-width:660px}
  .sh-hd{display:none}
}

.notif-badge{display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);min-width:18px;height:18px;border-radius:99px;background:var(--rose);color:#fff;font-size:10px;font-weight:700;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 2px 6px rgba(244,63,94,.4)}
</style>
</head>
<body>

<div id="ls"><div class="spin"></div><div class="lb">Taskora</div><div class="ls-sub">Founder's Office</div></div>

<!-- Update banner — shown when a new SW version is waiting -->
<div id="update-banner">
  <div style="font-size:20px;flex-shrink:0">✨</div>
  <div style="flex:1;min-width:0">
    <div class="ub-msg">New version available</div>
    <div class="ub-sub">Tap Update to get the latest features</div>
  </div>
  <button class="ub-ok" onclick="applyUpdate()">Update now</button>
  <button class="ub-skip" onclick="dismissUpdate()">Later</button>
</div>

<div id="auth-scr" style="display:none">
  <div class="auth-card">
    <div class="auth-brand">Taskora</div>
    <div class="auth-tag">Founder's Office · Project Intelligence</div>
    <div class="auth-tabs">
      <button id="at-si" class="auth-tab on" onclick="swAT('si')">Sign in</button>
      <button id="at-su" class="auth-tab" onclick="swAT('su')">Create account</button>
    </div>
    <div id="amsg"></div>
    <div id="form-si">
      <input class="gi" id="si-em" type="email" placeholder="Email address" autocomplete="email"
        onkeydown="if(event.key==='Enter')document.getElementById('si-pw').focus()"/>
      <input class="gi" id="si-pw" type="password" placeholder="Password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doSI()"/>
      <button class="btn btn-p" style="width:100%;margin-top:4px" onclick="doSI()">Sign in →</button>
    </div>
    <div id="form-su" style="display:none">
      <input class="gi" id="su-em" type="email" placeholder="Email address" autocomplete="email"
        onkeydown="if(event.key==='Enter')document.getElementById('su-pw').focus()"/>
      <input class="gi" id="su-pw" type="password" placeholder="Password (min 8 characters)" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')doSU()"/>
      <button class="btn btn-p" style="width:100%;margin-top:4px" onclick="doSU()">Create account →</button>
    </div>
  </div>
</div>

<div id="root" style="display:none">
  <div id="app">
    <div id="sb">
      <div class="sb-top">
        <div class="sb-brand">Taskora</div>
        <div class="sb-tag">Founder's Office</div>
      </div>
      <div class="sb-nav">
        <button class="sb-b active" data-tab="dash"><span class="ic">⌂</span> Command Centre</button>
        <button class="sb-b" data-tab="projects"><span class="ic">📋</span> Projects</button>
        <button class="sb-b" data-tab="people"><span class="ic">👥</span> People</button>
        <button class="sb-b" data-tab="buildings"><span class="ic">🏢</span> Buildings</button>
        <button class="sb-b" data-tab="digest"><span class="ic">📤</span> Digest</button>
      </div>
      <div class="sb-bot">
        <button class="prof-btn" onclick="openProfile()">
          <div id="sb-av" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ind),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0">?</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="sb-name">Account</div>
            <div style="font-size:10px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="uem">—</div>
          </div>
          <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
            <div class="sdot" id="sd"></div>
            <span style="font-size:11px;color:var(--txt3)">⚙</span>
          </div>
        </button>
        <button class="so-b" onclick="doSO()">↪ Sign out</button>
      </div>
    </div>

    <div id="content">
      <div id="tab-dash" class="page active"></div>
      <div id="tab-projects" class="page"></div>
      <div id="tab-people" class="page"></div>
      <div id="tab-buildings" class="page"></div>
      <div id="tab-digest" class="page"></div>
      <div id="tab-roles" class="page"></div>
      <div id="tab-notifications" class="page"></div>
      <div id="tab-analytics" class="page"></div>
    </div>

    <div id="bn">
      <button class="nb active" data-tab="dash"><span class="ic">⌂</span><span class="lb">Home</span></button>
      <button class="nb" data-tab="projects"><span class="ic">📋</span><span class="lb">Projects</span></button>
      <button class="nb" data-tab="people"><span class="ic">👥</span><span class="lb">People</span></button>
      <button class="nb" data-tab="buildings"><span class="ic">🏢</span><span class="lb">Buildings</span></button>
      <button class="nb" data-tab="digest"><span class="ic">📤</span><span class="lb">Digest</span></button>
      <button class="nb" onclick="openProfile()"><span class="ic">👤</span><span class="lb">Me</span></button>
    </div>
  </div>
</div>

<div id="ov">
  <div id="sh">
    <div class="sh-hd"></div>
    <div class="sh-row">
      <div class="sh-ti" id="sh-ti"></div>
      <button class="sh-cl" onclick="CS()">×</button>
    </div>
    <div class="sh-bod" id="sh-bd"></div>
  </div>
</div>

<script>
/* ── SUPABASE ── */
const SB = supabase.createClient(
  'https://blvijiqrgddvparsnpnh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdmlqaXFyZ2RkdnBhcnNucG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODc4NTAsImV4cCI6MjA5MDM2Mzg1MH0.J9wB4a384TRLfISIQC35pn5no-Pp52iZoB8fBiEExj8'
);

/* ── CONSTANTS ── */
const TS = {
  not_started: {l:'Not started', bg:'rgba(148,163,184,.12)', c:'#94a3b8'},
  in_progress:  {l:'In progress', bg:'rgba(245,158,11,.12)',  c:'#f59e0b'},
  blocked:      {l:'Blocked',     bg:'rgba(244,63,94,.14)',   c:'#f43f5e'},
  awaiting:     {l:'Awaiting',    bg:'rgba(168,85,247,.14)',  c:'#c084fc'},
  done:         {l:'Done',        bg:'rgba(16,185,129,.14)',  c:'#10b981'},
  deferred:     {l:'Deferred',    bg:'rgba(100,116,139,.1)',  c:'#64748b'},
};
const BS = {
  not_started: {l:'Not started', bg:'rgba(148,163,184,.12)', c:'#94a3b8'},
  in_progress:  {l:'In progress', bg:'rgba(245,158,11,.12)',  c:'#f59e0b'},
  on_hold:      {l:'On hold',     bg:'rgba(251,146,60,.12)',  c:'#fb923c'},
  blocked:      {l:'Blocked',     bg:'rgba(244,63,94,.14)',   c:'#f43f5e'},
  done:         {l:'Done',        bg:'rgba(16,185,129,.14)',  c:'#10b981'},
};
const HS = {
  on_track:    {l:'On Track',    cls:'h-ot'},
  at_risk:     {l:'At Risk',     cls:'h-ar'},
  delayed:     {l:'Delayed',     cls:'h-dl'},
  not_started: {l:'Not Started', cls:'h-ns'},
};
const PS = {
  critical: {l:'Critical', cls:'p-cr'},
  high:     {l:'High',     cls:'p-hi'},
  medium:   {l:'Medium',   cls:'p-me'},
  low:      {l:'Low',      cls:'p-lo'},
};
const PR  = {high:{l:'High',c:'#f43f5e'}, medium:{l:'Med',c:'#f59e0b'}, low:{l:'Low',c:'#10b981'}};
const CLRS = ['#6366f1','#14b8a6','#10b981','#f43f5e','#f59e0b','#a855f7','#ec4899','#0ea5e9','#f97316','#06b6d4'];
const SCYC = ['not_started','in_progress','awaiting','blocked','done'];

const tday  = () => new Date().toISOString().slice(0,10);
const tmrDay = () => { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); };
const fd    = d => d ? new Date(d+'T12:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '';
const isOD  = (d,s) => !!(d && d < tday() && s !== 'done');
const nowFull = () => new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const val   = id => { const e=document.getElementById(id); return e ? e.value : ''; };
const bdg   = (s,sys) => { const i=(sys||TS)[s]||TS.not_started; return '<span class="bd" style="background:'+i.bg+';color:'+i.c+'">'+i.l+'</span>'; };
const hBdg  = h => { const i=HS[h]||HS.on_track; return '<span class="bd '+i.cls+'">'+i.l+'</span>'; };
const pBdg  = p => { const i=PS[p]||PS.medium;   return '<span class="bd '+i.cls+'">'+i.l+'</span>'; };
const av    = (n,c,sz) => {
  sz = sz||30;
  const initials = (n||'?').trim().split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+(c||'#6366f1')+';font-size:'+(sz*.36)+'px">'+initials+'</div>';
};

/* ── STATE ── */
let U = null, curTab = 'dash';
let MY_ROLE = 'super_admin';
let MY_PERSON_ID = null;
let CHAIRMAN_UID = null;
let expP = {}, expS = {}, ganttP = {}, bSrch = '', bCity = '', bType = '', pFil = 'active', projView = 'list';
let bulkMode = false, selTasks = new Set();
let notifCount = 0;
let DB = {
  buildings:[], people:[], projects:[], milestones:[], tasks:[],
  pb:[], de:{}, templates:[], docs:[], notifications:[], schedule:null
};

/* ── SYNC ── */
function ss(s) {
  const d = document.getElementById('sd');
  if (!d) return;
  d.className = 'sdot' + (s==='sy' ? ' sy' : s==='er' ? ' er' : '');
}

async function load() {
  if (!U) return;
  ss('sy');
  try {
    const uid = CHAIRMAN_UID || U.id;
    const myUid = U.id;
    const [b,p,pr,ms,t,pb,de,tpl,docs,notifs,sched] = await Promise.all([
      SB.from('buildings').select('*').eq('user_id',uid).order('serial'),
      SB.from('people').select('*').eq('user_id',uid).order('name'),
      SB.from('projects').select('*').eq('user_id',uid).order('created_at'),
      SB.from('sub_projects').select('*').eq('user_id',uid).order('seq').order('created_at'),
      SB.from('tasks').select('*').eq('user_id',uid).order('created_at'),
      SB.from('project_buildings').select('*').eq('user_id',uid),
      SB.from('digest_edits').select('*').eq('user_id',uid),
      SB.from('project_templates').select('*').eq('user_id',CHAIRMAN_UID||U.id).order('created_at'),
      SB.from('documents').select('*').eq('workspace_id',uid),
      SB.from('notifications').select('*').eq('for_user_id',myUid).order('created_at',{ascending:false}).limit(50),
      SB.from('digest_schedule').select('*').eq('chairman_id',CHAIRMAN_UID||U.id).maybeSingle(),
    ]);
    DB.buildings  = (b.data||[]).map(x => ({...x, softHandover:x.soft_handover, hardHandover:x.hard_handover, btype:x.btype||'operational'}));
    DB.people     = p.data||[];
    DB.projects   = (pr.data||[]).map(x => ({...x, desc:x.description, primaryOwnerId:x.primary_stakeholder_id, health:x.health||'on_track', priority:x.priority||'medium'}));
    DB.milestones = (ms.data||[]).map(x => ({...x, projectId:x.project_id}));
    DB.tasks      = (t.data||[]).map(x => ({...x, projectId:x.project_id, milestoneId:x.sub_project_id, buildingRefId:x.project_building_id, assignedTo:x.assigned_to, dueDate:x.due_date, followUp:x.follow_up, dependsOn:x.depends_on||[]}));
    DB.pb         = (pb.data||[]).map(x => ({...x, projectId:x.project_id, buildingId:x.building_id, targetCompletion:x.target_completion, secondaryOwnerId:x.secondary_owner_id}));
    const ed = {};
    (de.data||[]).forEach(x => { ed[x.person_id] = x.content; });
    DB.de = ed;
    DB.templates    = tpl.data||[];
    DB.docs         = docs.data||[];
    DB.notifications= notifs.data||[];
    DB.schedule     = sched.data||null;
    notifCount      = DB.notifications.filter(n=>!n.read).length;
    updateNotifBadge();
    ss('ok');
  } catch(e) { ss('er'); }
}

async function delRow(tbl, id) {
  ss('sy');
  const r = await SB.from(tbl).delete().eq('id',id).eq('user_id',CHAIRMAN_UID||U.id);
  ss(r.error ? 'er' : 'ok');
  return r;
}

/* ── AUTH ── */
function amsg(m, ok) {
  const el = document.getElementById('amsg');
  if (el) el.innerHTML = '<div class="amsg '+(ok?'ok':'err')+'">'+m+'</div>';
}
function swAT(t) {
  const si = t==='si';
  document.getElementById('at-si').classList.toggle('on', si);
  document.getElementById('at-su').classList.toggle('on', !si);
  document.getElementById('form-si').style.display = si ? '' : 'none';
  document.getElementById('form-su').style.display = si ? 'none' : '';
  document.getElementById('amsg').innerHTML = '';
}
async function doSI() {
  const email=val('si-em').trim(), pass=val('si-pw');
  if (!email||!pass) { amsg('Please enter email and password.'); return; }
  const btn = document.querySelector('#form-si .btn-p');
  if (btn) { btn.disabled=true; btn.textContent='Signing in…'; }
  const {error} = await SB.auth.signInWithPassword({email, password:pass});
  if (btn) { btn.disabled=false; btn.textContent='Sign in →'; }
  if (error) amsg(error.message==='Invalid login credentials' ? 'Incorrect email or password.' : error.message);
}
async function doSU() {
  const email=val('su-em').trim(), pass=val('su-pw');
  if (!email||!pass) { amsg('Please fill all fields.'); return; }
  if (pass.length<8) { amsg('Password must be at least 8 characters.'); return; }
  const btn = document.querySelector('#form-su .btn-p');
  if (btn) { btn.disabled=true; btn.textContent='Creating…'; }
  const {error} = await SB.auth.signUp({email, password:pass});
  if (btn) { btn.disabled=false; btn.textContent='Create account →'; }
  if (error) amsg(error.message);
}
async function doSO() { await SB.auth.signOut(); }

/* ── BOOT ── */
async function boot() {
  const {data:{session}} = await SB.auth.getSession();
  document.getElementById('ls').style.opacity = '0';
  setTimeout(() => { document.getElementById('ls').style.display='none'; }, 300);
  if (session) { U=session.user; showApp(); }
  else { document.getElementById('auth-scr').style.display='flex'; }

  SB.auth.onAuthStateChange(async (ev, ses) => {
    if (ses) {
      U = ses.user;
      document.getElementById('auth-scr').style.display = 'none';
      showApp();
    } else {
      U = null;
      document.getElementById('root').style.display = 'none';
      DB = {buildings:[],people:[],projects:[],milestones:[],tasks:[],pb:[],de:{}};
      document.getElementById('auth-scr').style.display = 'flex';
    }
  });
}

async function showApp() {
  document.getElementById('root').style.display = '';
  const email = U.email||'';
  document.getElementById('uem').textContent = email;
  document.getElementById('sb-name').textContent = U.user_metadata?.display_name||email.split('@')[0]||'Account';
  document.getElementById('sb-av').textContent = email.slice(0,2).toUpperCase();

  // ── ROLE DETECTION ──────────────────────────────────────────────────────────
  // Check if this user is a team member in someone else's workspace
  const {data:accessRow} = await SB.from('workspace_access')
    .select('*').eq('member_user_id', U.id).maybeSingle();

  if (accessRow) {
    // Team member — load data from chairman's workspace
    MY_ROLE        = accessRow.role_level || 'member';
    MY_PERSON_ID   = accessRow.person_id;
    CHAIRMAN_UID   = accessRow.chairman_user_id;
  } else {
    // Chairman (owns this workspace)
    MY_ROLE      = 'super_admin';
    MY_PERSON_ID = null;
    CHAIRMAN_UID = U.id;
  }

  await load();

  // Auto-accept invite if email matches a pending people record
  if (email) {
    const matched = DB.people.filter(p => p.email && p.email.toLowerCase()===email.toLowerCase() && p.invite_status==='pending');
    for (const person of matched) {
      await SB.from('people').update({invite_status:'accepted'}).eq('id', person.id);
      person.invite_status = 'accepted';
      // Also link workspace_access if not already done
      if (!accessRow && person.user_id) {
        await SB.from('workspace_access').upsert({
          chairman_user_id: person.user_id,
          member_user_id: U.id,
          role_level: person.role_level||'member',
          person_id: person.id,
        }, {onConflict:'chairman_user_id,member_user_id'});
      }
    }
  }

  // Check for pending team requests addressed to this user
  await checkTeamRequests();

  // Build nav based on role
  buildNav();
  renderTab(curTab);
  document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });
}

function updateNotifBadge() {
  document.querySelectorAll('.notif-badge').forEach(el => {
    el.style.display = notifCount > 0 ? 'flex' : 'none';
    el.textContent = notifCount > 9 ? '9+' : String(notifCount);
  });
}

function buildNav() {
  const isSuper   = MY_ROLE === 'super_admin';
  const isPrimary = MY_ROLE === 'primary_stakeholder';
  const nb = '<span class="notif-badge" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);min-width:18px;height:18px;border-radius:99px;background:var(--rose);color:#fff;font-size:10px;font-weight:700;align-items:center;justify-content:center;padding:0 4px"></span>';

  const sbNav = document.querySelector('.sb-nav');
  if (sbNav) {
    sbNav.innerHTML =
      '<button class="sb-b active" data-tab="dash" style="position:relative"><span class="ic">⌂</span> '+(isSuper?'Command Centre':'My Dashboard')+'</button>'+
      '<button class="sb-b" data-tab="projects"><span class="ic">📋</span> Projects</button>'+
      (isSuper||isPrimary ? '<button class="sb-b" data-tab="people"><span class="ic">👥</span> People</button>' : '')+
      (isSuper ? '<button class="sb-b" data-tab="buildings"><span class="ic">🏢</span> Buildings</button>' : '')+
      (isSuper ? '<button class="sb-b" data-tab="digest"><span class="ic">📤</span> Digest</button>' : '')+
      '<button class="sb-b" data-tab="notifications" style="position:relative"><span class="ic">🔔</span> Notifications'+nb+'</button>'+
      (isSuper ? '<button class="sb-b" data-tab="analytics"><span class="ic">📊</span> Analytics</button>' : '')+
      (isSuper ? '<button class="sb-b" data-tab="roles"><span class="ic">🔑</span> Roles &amp; Access</button>' : '');
  }
  const bn = document.getElementById('bn');
  if (bn) {
    bn.innerHTML =
      '<button class="nb active" data-tab="dash"><span class="ic">⌂</span><span class="lb">Home</span></button>'+
      '<button class="nb" data-tab="projects"><span class="ic">📋</span><span class="lb">Projects</span></button>'+
      (isSuper ? '<button class="nb" data-tab="analytics"><span class="ic">📊</span><span class="lb">Analytics</span></button>' : '')+
      '<button class="nb" data-tab="notifications" style="position:relative"><span class="ic">🔔</span><span class="lb">Alerts</span>'+nb+'</button>'+
      (isSuper ? '<button class="nb" data-tab="digest"><span class="ic">📤</span><span class="lb">Digest</span></button>' : '')+
      '<button class="nb" onclick="openProfile()"><span class="ic">👤</span><span class="lb">Me</span></button>';
  }
  ['roles','notifications','analytics'].forEach(id => {
    if (!document.getElementById('tab-'+id)) {
      const d = document.createElement('div'); d.id='tab-'+id; d.className='page';
      document.getElementById('content').appendChild(d);
    }
  });
  updateNotifBadge();
  // Re-attach click listeners after rebuilding nav HTML
  document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });
}

function switchTab(id) {
  curTab = id;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const tabEl = document.getElementById('tab-'+id);
  if (tabEl) tabEl.classList.add('active');
  document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b => {
    b.classList.toggle('active', b.dataset.tab===id);
  });
  renderTab(id);
}
function renderTab(id) {
  if      (id==='dash')          rDash();
  else if (id==='projects')      rProj();
  else if (id==='people')        rPpl();
  else if (id==='buildings')     rBld();
  else if (id==='digest')        rDig();
  else if (id==='roles')         rRoles();
  else if (id==='notifications') rNotifications();
  else if (id==='analytics')     rAnalytics();
}


/* ── SHEET ── */
function OS(ti, html, wide) {
  document.getElementById('sh-ti').textContent = ti;
  document.getElementById('sh-bd').innerHTML = html;
  document.getElementById('sh').classList.toggle('wide', !!wide);
  document.getElementById('ov').classList.add('op');
}
function CS() { document.getElementById('ov').classList.remove('op'); }
document.getElementById('ov').addEventListener('click', e => { if (e.target===document.getElementById('ov')) CS(); });

/* ── HELPERS ── */
function CP(fid, cur) {
  const swatches = CLRS.map(c => {
    const on = c===cur ? ' on' : '';
    return '<div class="sw'+on+'" style="background:'+c+'" onclick="SC(\''+fid+'\',\''+c+'\')"></div>';
  }).join('');
  return '<div class="fg"><label class="fl">Colour</label><div class="sw-wrap">'+swatches+'</div><input type="hidden" id="'+fid+'" value="'+(cur||CLRS[0])+'"></div>';
}
function SC(fid, color) {
  document.getElementById(fid).value = color;
  document.querySelectorAll('#sh-bd .sw').forEach(s => {
    s.classList.toggle('on', s.getAttribute('onclick').includes("'"+color+"'"));
  });
}
function selOpts(id, cur, map) {
  const opts = Object.entries(map).map(([k,v]) => '<option value="'+k+'"'+(k===cur?' selected':'')+'>'+(v.l||v)+'</option>').join('');
  return '<select id="'+id+'" class="gi">'+opts+'</select>';
}
function peopleOpts(cur, emptyLabel) {
  const empty = '<option value="">'+(emptyLabel||'— None —')+'</option>';
  const opts  = DB.people.map(p => '<option value="'+p.id+'"'+(p.id===cur?' selected':'')+'>'+esc(p.name)+(p.role?' ('+esc(p.role)+')':'')+'</option>').join('');
  return empty+opts;
}

/* ══════════════════════════════════════════════════════
   ROLE-BASED DATA FILTERS
   super_admin     → sees everything
   primary_stakeholder → sees projects they own + tasks within
   member          → sees only tasks assigned to them
══════════════════════════════════════════════════════ */
function visibleProjects() {
  const all = DB.projects;
  if (MY_ROLE === 'super_admin') return all;
  if (MY_ROLE === 'primary_stakeholder') return all.filter(p => p.primaryOwnerId === MY_PERSON_ID);
  // member — projects they have tasks in
  const myProjIds = new Set(DB.tasks.filter(t => t.assignedTo===MY_PERSON_ID).map(t => t.projectId));
  return all.filter(p => myProjIds.has(p.id));
}
function visibleTasks(projIds) {
  const all = DB.tasks.filter(t => !projIds || projIds.has(t.projectId));
  if (MY_ROLE === 'super_admin') return all;
  if (MY_ROLE === 'primary_stakeholder') return all; // all tasks in their projects
  return all.filter(t => t.assignedTo === MY_PERSON_ID);
}

/* ══════════════════════════════════════════════════════
   COMMAND CENTRE
══════════════════════════════════════════════════════ */
function rDash() {
  const todayStr = tday();
  const tmrStr   = tmrDay();
  const myProjs  = visibleProjects();
  const active   = myProjs.filter(p => p.status!=='done');
  const myProjIds = new Set(active.map(p => p.id));
  const myTasks  = visibleTasks(myProjIds);

  const hCounts  = {on_track:0, at_risk:0, delayed:0};
  active.forEach(p => { const k=p.health||'on_track'; if (k in hCounts) hCounts[k]++; });
  const totalOD  = myTasks.filter(t => isOD(t.dueDate,t.status)).length;
  const dueSoon  = myTasks.filter(t => t.status!=='done' && (t.dueDate===todayStr||t.dueDate===tmrStr)).length;

  let h = '<div class="ph"><div><div class="pt">'+(MY_ROLE==='member'?'My Dashboard':'Command Centre')+'</div><div class="ps">'+nowFull()+'</div></div></div>';

  // For members, show a personal task view instead of owner cards
  if (MY_ROLE === 'member') {
    h += rMemberDash(todayStr, tmrStr, myTasks);
    document.getElementById('tab-dash').innerHTML = h;
    return;
  }

  // people who own at least one active project (visible to this user)
  const owners = DB.people.filter(p => active.some(pr => pr.primaryOwnerId===p.id));

  // health pulse bar
  h += '<div style="display:flex;gap:6px;margin-bottom:12px">';
  if (hCounts.on_track) h += '<div style="flex:1;text-align:center;padding:10px 8px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#10b981">'+hCounts.on_track+'</div><div style="font-size:10px;color:#10b981;margin-top:1px">On Track</div></div>';
  if (hCounts.at_risk)  h += '<div style="flex:1;text-align:center;padding:10px 8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#f59e0b">'+hCounts.at_risk+'</div><div style="font-size:10px;color:#f59e0b;margin-top:1px">At Risk</div></div>';
  if (hCounts.delayed)  h += '<div style="flex:1;text-align:center;padding:10px 8px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#f43f5e">'+hCounts.delayed+'</div><div style="font-size:10px;color:#f43f5e;margin-top:1px">Delayed</div></div>';
  if (!active.length)   h += '<div style="flex:1;padding:10px;background:var(--glass);border:1px solid var(--bdr);border-radius:10px;font-size:12px;color:var(--txt2);text-align:center">No active projects yet</div>';
  h += '</div>';

  // mini stat row
  h += '<div class="sg" style="margin-bottom:16px">';
  h += '<div class="sc" style="--ac:#f87171;padding:12px"><div class="sn" style="font-size:24px">'+totalOD+'</div><div class="sl">Overdue</div></div>';
  h += '<div class="sc" style="--ac:#fbbf24;padding:12px"><div class="sn" style="font-size:24px">'+dueSoon+'</div><div class="sl">Due today &amp; tomorrow</div></div>';
  h += '</div>';

  // ── ESCALATION PANEL ──
  h += rEscalationPanel();
  // ── FOLLOW-UP ENGINE ──
  h += rFollowUpSection();

  if (!owners.length) {
    h += '<div class="es"><span class="em">🏗</span><div class="et">Welcome to Taskora</div><div class="ed">Add your team in People, create projects and assign owners — they\'ll appear here.</div></div>';
    document.getElementById('tab-dash').innerHTML = h;
    return;
  }

  h += '<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Project Owners</div>';

  owners.forEach(person => {
    const ownedProjs = active.filter(pr => pr.primaryOwnerId===person.id);
    const projIds    = new Set(ownedProjs.map(pr => pr.id));
    const allTasks   = visibleTasks(projIds);
    const pending    = allTasks.filter(t => t.status!=='done');
    const done       = allTasks.filter(t => t.status==='done');
    const pct        = allTasks.length ? Math.round(done.length/allTasks.length*100) : 0;
    const overdueTasks = pending.filter(t => isOD(t.dueDate,t.status));
    const dueTT      = pending.filter(t => t.dueDate===todayStr || t.dueDate===tmrStr);
    const dueToday   = pending.filter(t => t.dueDate===todayStr);
    const dueTmr     = pending.filter(t => t.dueDate===tmrStr);

    const worstH = ownedProjs.some(pr=>pr.health==='delayed') ? 'delayed'
                 : ownedProjs.some(pr=>pr.health==='at_risk')  ? 'at_risk'
                 : ownedProjs.every(pr=>pr.health==='on_track') ? 'on_track' : 'not_started';
    const ringColor = worstH==='delayed' ? '#f43f5e' : worstH==='at_risk' ? '#f59e0b' : '#10b981';
    const cardBdr   = overdueTasks.length ? 'rgba(244,63,94,.2)' : dueTT.length ? 'rgba(245,158,11,.18)' : 'var(--bdr)';

    h += '<div class="gc" style="margin-bottom:14px;border-color:'+cardBdr+'">';

    // top row
    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
    h += '<div style="position:relative;flex-shrink:0">'+av(person.name,person.color,48)+'<div style="position:absolute;inset:-3px;border-radius:50%;border:2.5px solid '+ringColor+';pointer-events:none"></div></div>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700;line-height:1.2">'+esc(person.name)+'</div>'+(person.role ? '<div style="font-size:11px;color:var(--txt2);margin-top:1px">'+esc(person.role)+'</div>' : '')+'</div>';
    h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">';
    if (overdueTasks.length) h += '<span class="bd" style="background:rgba(244,63,94,.15);color:var(--rose)">⚠ '+overdueTasks.length+' overdue</span>';
    else if (dueTT.length)   h += '<span class="bd" style="background:rgba(245,158,11,.12);color:#f59e0b">📅 '+dueTT.length+' due soon</span>';
    h += hBdg(worstH)+'</div></div>';

    // KPI boxes
    h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">';
    h += '<div style="text-align:center;padding:9px 6px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)"><div style="font-size:20px;font-weight:700;color:var(--ind-l)">'+ownedProjs.length+'</div><div style="font-size:10px;color:var(--txt2);margin-top:2px">Projects</div></div>';
    h += '<div style="text-align:center;padding:9px 6px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)"><div style="font-size:20px;font-weight:700;color:'+(overdueTasks.length?'var(--rose)':'var(--txt)')+'">'+pending.length+'</div><div style="font-size:10px;color:var(--txt2);margin-top:2px">Pending</div></div>';
    h += '<div style="text-align:center;padding:9px 6px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)"><div style="font-size:20px;font-weight:700;color:'+(pct===100?'var(--grn)':pct>=60?'var(--teal)':'var(--txt)')+'">'+pct+'%</div><div style="font-size:10px;color:var(--txt2);margin-top:2px">Done</div></div>';
    h += '</div>';

    // progress bar
    h += '<div class="pw" style="margin-bottom:14px"><div class="pb" style="width:'+pct+'%;background:'+(pct===100?'var(--grn)':person.color)+';box-shadow:0 0 5px '+person.color+'66"></div></div>';

    // due today & tomorrow
    h += '<div style="border-top:1px solid var(--bdr);padding-top:12px">';
    if (dueTT.length) {
      h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">';
      h += '<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em">Due today &amp; tomorrow</div>';
      h += '<div style="display:flex;gap:5px">';
      if (dueToday.length) h += '<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">'+dueToday.length+' today</span>';
      if (dueTmr.length)   h += '<span class="bd" style="background:rgba(245,158,11,.12);color:#f59e0b">'+dueTmr.length+' tomorrow</span>';
      h += '</div></div>';

      dueTT.forEach(t => {
        const proj     = DB.projects.find(pr => pr.id===t.projectId);
        const executor = DB.people.find(pe => pe.id===t.assignedTo);
        const isToday  = t.dueDate===todayStr;
        const isOd     = isOD(t.dueDate,t.status);
        const rowBg    = isOd ? 'rgba(244,63,94,.07)' : isToday ? 'rgba(245,158,11,.07)' : 'var(--glass)';
        const rowBdr   = isOd ? 'rgba(244,63,94,.2)'  : isToday ? 'rgba(245,158,11,.15)' : 'var(--bdr)';
        const whenColor = isOd ? 'var(--rose)' : isToday ? '#f59e0b' : 'var(--txt3)';
        const whenLabel = isOd ? '⚠ Overdue' : isToday ? 'Today' : 'Tomorrow';
        const statusStyle = 'flex-shrink:0;padding:4px 9px;border-radius:7px;border:1px solid var(--bdr);background:var(--glass);cursor:pointer;font-size:11px;font-weight:600;color:'+(TS[t.status]?.c||'var(--txt2)')+';white-space:nowrap';

        h += '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:'+rowBg+';border-radius:9px;border:1px solid '+rowBdr+';margin-bottom:5px">';
        h += '<div style="flex:1;min-width:0">';
        h += '<div style="font-size:13px;font-weight:500;line-height:1.3">'+esc(t.title)+'</div>';
        h += '<div style="font-size:11px;color:var(--txt2);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">';
        h += '<span style="color:'+whenColor+';font-weight:'+(isToday||isOd?600:400)+'">'+whenLabel+'</span>';
        if (proj)                              h += '<span>· '+esc(proj.name)+'</span>';
        if (executor && executor.id!==person.id) h += '<span>· '+esc(executor.name.split(' ')[0])+'</span>';
        h += '</div></div>';
        h += '<button onclick="dshCySt(\''+t.id+'\')" style="'+statusStyle+'">'+((TS[t.status]&&TS[t.status].l)||'—')+'</button>';
        h += '</div>';
      });
    } else {
      h += '<div style="text-align:center;font-size:12px;color:var(--txt3)">';
      if (overdueTasks.length) h += '<span style="color:var(--rose)">⚠ '+overdueTasks.length+' overdue — open Projects to action them</span>';
      else h += '✓ Nothing due in the next 2 days';
      h += '</div>';
    }
    h += '</div>';

    // project chips
    if (ownedProjs.length) {
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;border-top:1px solid var(--bdr);padding-top:11px">';
      ownedProjs.forEach(pr => {
        h += '<button onclick="switchTab(\'projects\');setTimeout(function(){expP[\''+pr.id+'\']=true;rProj();},50)" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:var(--glass);border:1px solid var(--bdr);cursor:pointer;font-size:11px;font-weight:500;color:var(--txt2)">';
        h += '<div style="width:7px;height:7px;border-radius:50%;background:'+pr.color+';flex-shrink:0"></div>'+esc(pr.name)+'</button>';
      });
      h += '</div>';
    }
    h += '</div>';
  });

  document.getElementById('tab-dash').innerHTML = h;
}

async function dshCySt(id) {
  const t = DB.tasks.find(x => x.id===id);
  if (!t) return;
  const i = SCYC.indexOf(t.status);
  t.status = SCYC[(i+1) % SCYC.length];
  await SB.from('tasks').update({status:t.status}).eq('id',id).eq('user_id', CHAIRMAN_UID||U.id);
  rDash();
}

// ── MEMBER DASHBOARD — shows only tasks assigned to logged-in team member ──
function rMemberDash(todayStr, tmrStr, myTasks) {
  const me = DB.people.find(p => p.id===MY_PERSON_ID);
  let h = '';
  if (me) {
    h += '<div style="display:flex;align-items:center;gap:12px;padding:14px;background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.2);border-radius:12px;margin-bottom:20px">';
    h += av(me.name,me.color,44);
    h += '<div><div style="font-size:15px;font-weight:700">'+esc(me.name)+'</div>';
    h += '<div style="font-size:12px;color:var(--teal);margin-top:2px">'+esc(me.role||'Team member')+'</div></div>';
    h += '</div>';
  }
  const pending  = myTasks.filter(t => t.status!=='done');
  const overdue  = pending.filter(t => isOD(t.dueDate,t.status));
  const todayT   = pending.filter(t => t.dueDate===todayStr);
  const tmrT     = pending.filter(t => t.dueDate===tmrStr);
  const upcoming = pending.filter(t => t.dueDate && t.dueDate>tmrStr).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,5);

  h += '<div class="sg" style="margin-bottom:20px">';
  h += '<div class="sc" style="--ac:#f87171;padding:12px"><div class="sn" style="font-size:24px">'+overdue.length+'</div><div class="sl">Overdue</div></div>';
  h += '<div class="sc" style="--ac:#fbbf24;padding:12px"><div class="sn" style="font-size:24px">'+(todayT.length+tmrT.length)+'</div><div class="sl">Due today & tomorrow</div></div>';
  h += '</div>';

  const sections = [
    {label:'⚠ Overdue', tasks:overdue, bg:'rgba(244,63,94,.07)', bdr:'rgba(244,63,94,.2)', tc:'var(--rose)'},
    {label:'📅 Today', tasks:todayT, bg:'rgba(245,158,11,.07)', bdr:'rgba(245,158,11,.2)', tc:'#f59e0b'},
    {label:'📅 Tomorrow', tasks:tmrT, bg:'rgba(99,102,241,.06)', bdr:'rgba(99,102,241,.15)', tc:'var(--ind-l)'},
    {label:'🗓 Upcoming', tasks:upcoming, bg:'var(--glass)', bdr:'var(--bdr)', tc:'var(--txt2)'},
  ];
  sections.forEach(({label,tasks,bg,bdr,tc}) => {
    if (!tasks.length) return;
    h += '<div style="font-size:11px;font-weight:700;color:'+tc+';text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">'+label+' ('+tasks.length+')</div>';
    tasks.forEach(t => {
      const proj = DB.projects.find(p => p.id===t.projectId);
      const od = isOD(t.dueDate,t.status);
      h += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:'+bg+';border:1px solid '+bdr+';border-radius:9px;margin-bottom:5px">';
      h += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+esc(t.title)+'</div>';
      h += '<div style="font-size:11px;color:var(--txt2);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap">';
      if (proj) h += '<span>'+esc(proj.name)+'</span>';
      if (t.dueDate) h += '<span style="color:'+(od?'var(--rose)':tc)+';font-weight:'+(od?600:400)+'">'+(od?'⚠ ':'')+fd(t.dueDate)+'</span>';
      if (t.notes) h += '<span style="color:var(--txt3)">'+esc(t.notes.slice(0,40))+(t.notes.length>40?'…':'')+'</span>';
      h += '</div></div>';
      h += '<button onclick="mbCySt(\''+t.id+'\')" style="flex-shrink:0;padding:4px 9px;border-radius:7px;border:1px solid var(--bdr);background:var(--glass);cursor:pointer;font-size:11px;font-weight:600;color:'+(TS[t.status]?.c||'var(--txt2)')+';white-space:nowrap">'+(TS[t.status]?.l||'—')+'</button>';
      h += '</div>';
    });
    h += '<div style="margin-bottom:14px"></div>';
  });
  if (!pending.length) h += '<div class="es"><span class="em">🎉</span><div class="et">All caught up!</div><div class="ed">No pending tasks assigned to you.</div></div>';
  return h;
}
async function mbCySt(id) {
  const t = DB.tasks.find(x => x.id===id);
  if (!t) return;
  const i = SCYC.indexOf(t.status);
  t.status = SCYC[(i+1) % SCYC.length];
  await SB.from('tasks').update({status:t.status}).eq('id',id).eq('user_id', CHAIRMAN_UID||U.id);
  rDash();
}

async function setRole(personId, newRole) {
  const superAdmins = DB.people.filter(p => p.role_level==='super_admin' && p.id!==personId);
  if (newRole==='super_admin' && superAdmins.length>=2) {
    showToast('Max 2 super admins allowed. Remove one first.','err');
    rRoles();
    return;
  }
  // Update people record
  await SB.from('people').update({role_level:newRole}).eq('id',personId).eq('user_id',CHAIRMAN_UID||U.id);
  DB.people = DB.people.map(p => p.id===personId ? {...p,role_level:newRole} : p);
  // Update workspace_access if exists
  await SB.from('workspace_access').update({role_level:newRole}).eq('person_id',personId).eq('chairman_user_id',U.id);
  showToast('Role updated ✓','ok');
  rRoles();
}

    if (person.role)  h += '<div style="font-size:12px;color:var(--txt2);margin-top:2px">'+esc(person.role)+'</div>';
    if (person.email) h += '<div style="font-size:12px;color:var(--txt3);margin-top:1px">✉ '+esc(person.email)+'</div>';

function oPplF(id) {
  const p = id ? DB.people.find(x => x.id===id) : null;

  const isEdit = !!p;

  let h = '';
  if (!isEdit) {
    h += '<div style="font-size:13px;color:var(--txt2);margin-bottom:16px;padding:11px 14px;background:rgba(99,102,241,.08);border-radius:10px;border:1px solid rgba(99,102,241,.2)">✉ A sign-in link will be sent to their email so they can access Taskora.</div>';
  }
  h += '<div class="fr"><div class="fg"><label class="fl">Full name</label><input id="pf-n" class="gi" placeholder="e.g. Rajesh Kumar" value="'+esc(p?.name||'')+'"></div>';
  h += '<div class="fg"><label class="fl">Role / title</label><input id="pf-r" class="gi" placeholder="e.g. VP Operations" value="'+esc(p?.role||'')+'"></div></div>';
  if (!isEdit) {
    h += '<div class="fg"><label class="fl">Email address <span style="color:var(--rose)">*</span></label><input id="pf-e" class="gi" type="email" placeholder="name@company.com" value="'+esc(p?.email||'')+'"></div>';
  }
  h += '<div class="fg"><label class="fl">WhatsApp number</label><input id="pf-p" class="gi" type="tel" placeholder="91XXXXXXXXXX" value="'+esc(p?.phone||'')+'"></div>';

  const btnLabel = isEdit ? 'Save' : 'Invite to Taskora';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svPpl(\''+( id||'')+'\')">'+btnLabel+'</button></div>';

async function svPpl(id) {
  const name  = val('pf-n').trim();
  if (!name) return;
  const email = id ? null : val('pf-e').trim();
  if (!id && !email) { alert('Email is required to send an invite.'); return; }

  const obj = {name, role:val('pf-r').trim(), phone:val('pf-p').trim(), color:val('pf-c')};
  if (email) obj.email = email;

  if (id) {
    await SB.from('people').update(obj).eq('id',id).eq('user_id',CHAIRMAN_UID||U.id);
    DB.people = DB.people.map(x => x.id===id ? {...x,...obj} : x);
    CS();
    rPpl();
  } else {
    // Save person record
    obj.invite_status = 'pending';
    const {data:inserted} = await SB.from('people').insert({...obj, user_id:CHAIRMAN_UID||U.id}).select().single();
    if (inserted) {
      DB.people.push(inserted);
      // Create a team_request so the invitee sees the accept banner when they log in
      const chairmanName = U.user_metadata?.display_name || (U.email||'').split('@')[0] || 'The chairman';
      await SB.from('team_requests').insert({
        chairman_id: U.id,
        person_id: inserted.id,
        invitee_email: email,
        chairman_name: chairmanName,
        status: 'pending',
      });
    }
    CS();
    rPpl();
    // Open chairman's email client with pre-filled invite
    const appUrl = window.location.origin + window.location.pathname;
    const subject = encodeURIComponent("You've been added to Taskora — Founder's Office");
    const body = encodeURIComponent(
      "Hi " + name + ",\n\n" +
      "You've been added to our project management system — Taskora, Founder's Office.\n\n" +
      "To get started:\n" +
      "1. Open this link: " + appUrl + "\n" +
      "2. Click 'Create account'\n" +
      "3. Sign up using this email address: " + email + "\n\n" +
      "Once you sign in, you'll see a notification to accept the workspace invitation.\n\n" +
      "Regards"
    );
    window.open('mailto:' + email + '?subject=' + subject + '&body=' + body);
  }
}

async function dPpl(id) {
  if (!confirm('Delete this person? They will be unassigned from all tasks and projects.')) return;
  await delRow('people', id);
  DB.people   = DB.people.filter(x => x.id!==id);
  DB.tasks    = DB.tasks.map(t => t.assignedTo===id ? {...t, assignedTo:null} : t);
  DB.projects = DB.projects.map(pr => pr.primaryOwnerId===id ? {...pr, primaryOwnerId:null} : pr);
  rPpl();
}

function rProj() {
  const allVisible = visibleProjects();
  const projs = allVisible.filter(pr => {
    if (pFil==='done')   return pr.status==='done';
    if (pFil==='active') return pr.status!=='done';
    return true;
  });

  let h = '<div class="ph"><div><div class="pt">Projects</div><div class="ps">'+visibleProjects().filter(pr=>pr.status!=='done').length+' active</div></div>';
  h += '<button class="btn btn-p btn-sm" onclick="oPrF()">+ New project</button></div>';

  // View toggle + filter row
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
  // Status filters
  h += '<div class="pls" style="margin-bottom:0;flex:1">';
  h += '<button class="pl'+(pFil==='active'&&projView==='list'?' active':'')+'" onclick="projView=\'list\';pFil=\'active\';rProj()">Active</button>';
  h += '<button class="pl'+(pFil==='done'&&projView==='list'?' active':'')+'" onclick="projView=\'list\';pFil=\'done\';rProj()">Done</button>';
  h += '<button class="pl'+(pFil==='all'&&projView==='list'?' active':'')+'" onclick="projView=\'list\';pFil=\'all\';rProj()">All</button>';
  h += '</div>';
  // Gantt toggle button — right side, prominent
  h += '<button onclick="projView=projView===\'gantt\'?\'list\':\'gantt\';rProj()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid '+(projView==='gantt'?'rgba(99,102,241,.5)':'var(--bdr)')+';background:'+(projView==='gantt'?'rgba(99,102,241,.18)':'var(--glass)')+';color:'+(projView==='gantt'?'var(--ind-l)':'var(--txt2)')+'"><span style="font-size:14px">📊</span>'+(projView==='gantt'?'Exit Gantt':'Gantt view')+'</button>';
  h += '</div>';

  // ── GANTT VIEW ──
  if (projView === 'gantt') {
    h += rGanttFull();
    document.getElementById('tab-projects').innerHTML = h;
    return;
  }

  if (!projs.length) {
    h += '<div class="es"><span class="em">📋</span><div class="et">No projects</div><div class="ed">Create your first project and assign a primary owner</div></div>';
    document.getElementById('tab-projects').innerHTML = h;

  }

  projs.forEach(proj => {
    const owner    = DB.people.find(p => p.id===proj.primaryOwnerId);
    const mils     = DB.milestones.filter(m => m.projectId===proj.id);
    const allT     = DB.tasks.filter(t => t.projectId===proj.id);
    const dirT     = allT.filter(t => !t.milestoneId);
    const pend     = allT.filter(t => t.status!=='done').length;
    const ovdT     = allT.filter(t => isOD(t.dueDate,t.status));
    const pct      = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
    const pbs      = DB.pb.filter(r => r.projectId===proj.id).map(r => ({...r, b:DB.buildings.find(b=>b.id===r.buildingId)})).filter(r => r.b);
    const bDone    = pbs.filter(r => r.status==='done').length;
    const isExp    = !!expP[proj.id];
    const nextMil  = mils.filter(m => m.status!=='done' && m.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline))[0];
    const cardClass = proj.health==='delayed' ? ' red' : proj.health==='at_risk' ? ' amb' : '';

    // derive deadline from building completion dates if no manual deadline set
    const bDates = pbs.map(r=>r.targetCompletion).filter(Boolean);

          const bPct       = bTasks.length ? Math.round(bDoneCount/bTasks.length*100) : 0;

          // Building row
          h += '<div style="background:var(--glass);border:1px solid '+(bOverdue.length?'rgba(244,63,94,.25)':'var(--bdr)')+';border-radius:10px;margin-bottom:6px;overflow:hidden">';

          h += '<span style="font-size:11px;color:var(--txt3)">'+esc(r.b.city||'')+(r.b.code?' · '+esc(r.b.code):'')+'</span>';

          if (r.remarks) h += '<div style="font-size:11px;color:var(--txt2);margin-top:2px;font-style:italic">'+esc(r.remarks)+'</div>';
          if (secOwner) h += '<div style="display:flex;align-items:center;gap:5px;margin-top:4px">'+av(secOwner.name,secOwner.color,16)+'<span style="font-size:11px;color:var(--txt2)">'+esc(secOwner.name.split(' ')[0])+'</span></div>';
          h += '</div>';
          // right side: task count bubble + completion + status + edit
          h += '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
          if (bTasks.length) {
            const bubbleColor = bOverdue.length ? 'rgba(244,63,94,.18)' : 'rgba(99,102,241,.15)';
            const bubbleTxt   = bOverdue.length ? 'var(--rose)' : 'var(--ind-l)';
            h += '<div style="background:'+bubbleColor+';color:'+bubbleTxt+';border-radius:99px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap">';
            h += (bOverdue.length ? '⚠ '+bOverdue.length+' overdue' : bPending.length+' task'+(bPending.length!==1?'s':''))+'</div>';
          }
          if (r.targetCompletion) h += '<span style="font-size:11px;color:var(--txt3)">📅 '+fd(r.targetCompletion)+'</span>';
          h += bdg(r.status,BS);
          h += '<button onclick="event.stopPropagation();oEB(\''+r.b.id+'\')" class="mb" style="font-size:11px;padding:3px 8px" title="Edit building details">✎</button>';
          h += '</div></div>';

          // Task mini-list — always visible if tasks exist
          if (bTasks.length) {
            h += '<div style="border-top:1px solid var(--bdr);padding:8px 12px">';
            if (bPct > 0) {
              h += '<div style="height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:'+bPct+'%;background:'+(bPct===100?'var(--grn)':'var(--ind-l)')+';border-radius:2px"></div></div>';
            }
            bTasks.forEach(t => {
              const pe = DB.people.find(p => p.id===t.assignedTo);
              const od = isOD(t.dueDate, t.status);
              h += '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:'+(od?'rgba(244,63,94,.06)':'rgba(255,255,255,.03)')+';border-radius:7px;margin-bottom:3px;border:1px solid '+(od?'rgba(244,63,94,.15)':'rgba(255,255,255,.04)')+'">';
              h += '<span onclick="cyStBS(\''+t.id+'\',\''+r.id+'\')" style="cursor:pointer;flex-shrink:0">'+bdg(t.status)+'</span>';
              h += '<span style="flex:1;font-size:12px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</span>';
              if (t.dueDate) { const dc=od?'var(--rose)':'var(--txt3)'; h += '<span style="font-size:11px;color:'+dc+';flex-shrink:0">'+(od?'⚠ ':'')+fd(t.dueDate)+'</span>'; }
              if (pe) h += '<span style="flex-shrink:0">'+av(pe.name,pe.color,18)+'</span>';
              h += '<button onclick="oBldTF(\''+r.id+'\',\''+r.projectId+'\',\''+t.id+'\')" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--txt3);flex-shrink:0;padding:0 2px">✎</button>';
              h += '</div>';
            });
            h += '<button onclick="oBldTF(\''+r.id+'\',\''+r.projectId+'\')" style="width:100%;margin-top:4px;padding:5px;border:1px dashed rgba(99,102,241,.3);border-radius:7px;background:none;color:var(--ind-l);font-size:11px;font-weight:500;cursor:pointer">+ Add task</button>';
            h += '</div>';
          } else {
            h += '<div style="border-top:1px solid var(--bdr);padding:7px 12px;display:flex;align-items:center;justify-content:space-between">';
            h += '<span style="font-size:11px;color:var(--txt3)">No tasks yet</span>';
            h += '<button onclick="oBldTF(\''+r.id+'\',\''+r.projectId+'\')" style="padding:3px 10px;border:1px dashed rgba(99,102,241,.3);border-radius:7px;background:none;color:var(--ind-l);font-size:11px;font-weight:500;cursor:pointer">+ Add task</button>';
            h += '</div>';
          }

          h += '</div>'; // end building card
        });
        h += '<div style="margin-bottom:12px"></div>';
      }

      // milestones
      mils.forEach(mil => {
        const mt     = DB.tasks.filter(t => t.milestoneId===mil.id);
        const mp     = mt.filter(t => t.status!=='done').length;
        const isExpM = !!expS[mil.id];
        const milOD  = mt.some(t => isOD(t.dueDate,t.status));
        const milBdr = milOD ? 'border-color:rgba(244,63,94,.25)' : '';

        h += '<div style="margin-bottom:8px">';
        h += '<div class="sr" style="'+milBdr+'" onclick="expS[\''+mil.id+'\']=!expS[\''+mil.id+'\'];rProj()">';
        h += '<span style="font-size:11px;color:var(--txt3);width:10px">'+(isExpM?'▾':'▸')+'</span>';
        h += '<span style="font-size:13px;font-weight:600;flex:1">📍 '+esc(mil.name)+'</span>';
        if (mp) h += '<span class="bd" style="background:rgba(99,102,241,.14);color:var(--ind-l)">'+mp+'</span>';
        if (mil.deadline) h += '<span style="font-size:11px;color:'+(isOD(mil.deadline,mil.status)?'var(--rose)':'var(--txt3)')+'">'+fd(mil.deadline)+'</span>';
        h += bdg(mil.status);
        h += '<button class="mb" style="font-size:11px;padding:2px 8px" onclick="event.stopPropagation();oTF(\''+proj.id+'\',\''+mil.id+'\')">+Task</button>';
        h += '<button onclick="event.stopPropagation();oMilF(\''+proj.id+'\',\''+mil.id+'\')" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--txt3)">✎</button>';
        h += '<button onclick="event.stopPropagation();dMil(\''+mil.id+'\')" style="background:none;border:none;cursor:pointer;font-size:15px;color:var(--txt3)">×</button>';
        h += '</div>';
        if (isExpM) {
          if (mt.length) h += '<div style="padding:6px 0 0 12px">'+mt.map(t=>taskRow(t)).join('')+'</div>';
          else h += '<div style="padding:8px 12px;font-size:12px;color:var(--txt3)">No tasks yet — <button onclick="oTF(\''+proj.id+'\',\''+mil.id+'\')" style="background:none;border:none;color:var(--ind-l);cursor:pointer;font-size:12px;font-weight:500">+ Add task</button></div>';
        }
        h += '</div>';
      });

      // direct tasks grouped by assignee
      if (dirT.length) {
        if (mils.length) h += '<div style="font-size:11px;color:var(--txt3);margin:10px 0 6px;font-weight:600">Direct Tasks</div>';
        const byPerson = {};
        dirT.forEach(t => { const k=t.assignedTo||'__none__'; if(!byPerson[k]) byPerson[k]=[]; byPerson[k].push(t); });
        Object.entries(byPerson).forEach(([k,tasks]) => {
          const pe = DB.people.find(p => p.id===k);
          if (pe) h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;margin-top:10px">'+av(pe.name,pe.color,22)+'<span style="font-size:12px;font-weight:600;color:var(--txt2)">'+esc(pe.name)+'</span></div>';
          h += tasks.map(t => taskRow(t)).join('');
        });
      }
      } // end else (list view)

      // ── DOCUMENTS section ──
      if (MY_ROLE==='super_admin' || MY_ROLE==='primary_stakeholder') {
        h += rDocSection('project', proj.id);
      }

      // ── ACTIVITY LOG ──
      if (MY_ROLE==='super_admin') {
        h += '<div style="border-top:1px solid var(--bdr);padding-top:12px;margin-top:8px">';
        h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
