<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Taskora"/>
<meta name="theme-color" content="#0f0f1a"/>
<link rel="manifest" href="manifest.json"/>
<title>Taskora — Founder's Office</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --ind:#6366f1;--ind-d:#4f46e5;--ind-l:#818cf8;
  --teal:#14b8a6;--rose:#f43f5e;--amb:#f59e0b;--grn:#10b981;
  --bg:#0f0f1a;
  --glass:rgba(255,255,255,.05);--glass2:rgba(255,255,255,.08);--glass3:rgba(255,255,255,.13);
  --bdr:rgba(255,255,255,.09);--bdr2:rgba(255,255,255,.16);
  --txt:#f1f5f9;--txt2:#94a3b8;--txt3:#64748b;
  --r:14px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 15% 15%,rgba(99,102,241,.17) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 80%,rgba(20,184,166,.11) 0%,transparent 55%);
}
#root{position:relative;z-index:1;min-height:100vh}

/* ── LOADING ── */
#ls{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:999;transition:opacity .3s}
.spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(99,102,241,.2);border-top-color:var(--ind);animation:spin .7s linear infinite}
.lb{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--ind-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── AUTH ── */
#auth-scr{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .4s}
.auth-card{background:rgba(22,22,46,.92);backdrop-filter:blur(24px);border:1px solid var(--bdr2);border-radius:24px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.auth-brand{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--ind-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;letter-spacing:-.02em}
.auth-tag{font-size:11px;color:var(--txt3);text-align:center;margin-top:4px;margin-bottom:32px;letter-spacing:.06em;text-transform:uppercase}
.auth-tabs{display:flex;background:rgba(255,255,255,.06);border-radius:11px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.auth-tab.on{background:var(--ind);color:#fff}
.auth-tab:not(.on){background:transparent;color:var(--txt2)}
.amsg{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;line-height:1.5}
.amsg.err{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.25);color:#fca5a5}
.amsg.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}

/* ── FORM ELEMENTS ── */
.gi{width:100%;padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:14px;outline:none;transition:border-color .2s,background .2s;margin-bottom:11px}
.gi:focus{border-color:rgba(99,102,241,.5);background:var(--glass2)}
.gi::placeholder{color:var(--txt3)}
select.gi option{background:#1a1a2e;color:var(--txt)}
textarea.gi{min-height:68px;resize:vertical;margin-bottom:0}
.fl{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;display:block}
.fg{margin-bottom:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── BUTTONS ── */
.btn{padding:11px 18px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn-p{background:linear-gradient(135deg,var(--ind),var(--ind-d));color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.btn-p:hover{box-shadow:0 6px 20px rgba(99,102,241,.4);transform:translateY(-1px)}
.btn-p:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
.btn-g{background:var(--glass);color:var(--txt2);border:1px solid var(--bdr)}
.btn-g:hover{background:var(--glass2);color:var(--txt)}
.btn-sm{padding:7px 13px;font-size:12px}
.br{display:flex;gap:9px}
.br .btn-g{flex:1}
.br .btn-p{flex:2}
.mb{padding:5px 10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);transition:all .15s}
.mb:hover{background:var(--glass2);color:var(--txt)}
.mb.dd{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.25);color:#f87171}
.wa-b{flex:2;padding:12px;border-radius:var(--r-sm);font-size:13px;font-weight:700;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.cp-b{flex:1;padding:12px;border-radius:var(--r-sm);font-size:13px;font-weight:600;background:var(--glass);color:var(--txt2);border:1px solid var(--bdr);cursor:pointer;transition:all .2s}
.cp-b.ok{background:rgba(16,185,129,.12);color:#6ee7b7;border-color:rgba(16,185,129,.3)}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh}
#sb{width:228px;background:rgba(20,20,42,.68);backdrop-filter:blur(20px);border-right:1px solid var(--bdr);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50}
.sb-top{padding:24px 18px 14px}
.sb-brand{font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--ind-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.01em}
.sb-tag{font-size:10px;color:var(--txt3);margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.sb-nav{flex:1;padding:6px 10px;overflow-y:auto}
.sb-b{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);background:none;border:none;color:var(--txt2);font-size:13px;font-weight:500;width:100%;text-align:left;cursor:pointer;transition:all .15s;margin-bottom:2px}
.sb-b:hover{background:var(--glass);color:var(--txt)}
.sb-b.active{background:rgba(99,102,241,.14);color:var(--ind-l);border:1px solid rgba(99,102,241,.2)}
.sb-b .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-bot{padding:12px}
.prof-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;background:var(--glass);border:1px solid var(--bdr);cursor:pointer;margin-bottom:8px;width:100%;transition:background .15s;text-align:left}
.prof-btn:hover{background:var(--glass2)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0}
.sdot.sy{background:var(--amb);animation:pulse 1s infinite}
.sdot.er{background:var(--rose)}
.so-b{width:100%;padding:9px;border-radius:9px;background:rgba(244,63,94,.08);color:#f87171;border:1px solid rgba(244,63,94,.18);font-size:12px;font-weight:600;cursor:pointer}
.so-b:hover{background:rgba(244,63,94,.15)}
#content{flex:1;margin-left:228px;overflow-y:auto;min-height:100vh;padding-bottom:40px}
.page{padding:22px;display:none;animation:fadeIn .2s ease}
.page.active{display:block}
#bn{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,26,.9);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;padding:10px 4px 8px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt3);cursor:pointer;transition:color .15s}
.nb.active{color:var(--ind-l)}
.nb .ic{font-size:20px;line-height:1}
.nb .lb{font-size:9px;font-weight:500}
@media(max-width:767px){
  #sb{transform:translateX(-100%)}
  #content{margin-left:0;padding-bottom:70px}
  #bn{display:flex}
  .page{padding:14px}
}

/* ── CARDS ── */
.gc{background:rgba(255,255,255,.04);backdrop-filter:blur(10px);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;margin-bottom:11px;transition:border-color .2s}
.gc:hover{border-color:var(--bdr2)}
.gc.red{border-color:rgba(244,63,94,.25)}
.gc.amb{border-color:rgba(245,158,11,.25)}
.gc.exp{border-color:rgba(99,102,241,.22);box-shadow:0 8px 28px rgba(99,102,241,.09)}

/* ── STAT CARDS ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:20px}
.sc{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:-18px;right:-18px;width:56px;height:56px;border-radius:50%;background:var(--ac,var(--ind));opacity:.1}
.sn{font-size:30px;font-weight:700;line-height:1;color:var(--ac,var(--ind-l))}
.sl{font-size:12px;color:var(--txt2);margin-top:5px;font-weight:500}

/* ── MISC ── */
.bd{display:inline-flex;align-items:center;font-size:10px;font-weight:600;border-radius:99px;padding:2px 8px;white-space:nowrap}
.pw{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.pb{height:100%;border-radius:2px;transition:width .4s}
.pls{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.pl{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s}
.pl.active{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.35);color:var(--ind-l)}
.pl:hover:not(.active){background:var(--glass2);color:var(--txt)}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.sw-wrap{display:flex;gap:8px;flex-wrap:wrap}
.sw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;box-sizing:border-box;transition:transform .15s}
.sw.on{border-color:#fff;transform:scale(1.15)}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:12px}
table{width:100%;border-collapse:collapse;min-width:560px}
thead tr{background:rgba(255,255,255,.03)}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.dta{width:100%;min-height:200px;padding:13px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:12px;font-family:'SF Mono',monospace;line-height:1.9;resize:vertical;outline:none;box-sizing:border-box}
.dta:focus{border-color:rgba(99,102,241,.4)}
.ih{font-size:13px;color:var(--txt2);line-height:1.7;background:var(--glass);padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--bdr);margin-bottom:14px}
.es{text-align:center;padding:52px 20px;color:var(--txt2)}
.es .em{font-size:44px;margin-bottom:14px;display:block}
.es .et{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:5px}
.es .ed{font-size:13px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.pt{font-size:21px;font-weight:700}
.ps{font-size:12px;color:var(--txt2);margin-top:3px}
.tr-row{background:var(--glass);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:6px;border:1px solid var(--bdr);border-left:3px solid var(--txt3)}
.tr-row.od{border-color:rgba(244,63,94,.25);border-left-color:var(--rose)}
.tm{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:5px}
.sr{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--glass);border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--bdr);margin-bottom:3px}
.sr:hover{border-color:var(--bdr2)}
.bpr{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--glass);border-radius:var(--r-sm);margin-bottom:5px;border:1px solid var(--bdr);cursor:pointer}
.bpr:hover{border-color:var(--bdr2)}

/* ── HEALTH / PRIORITY BADGES ── */
.h-ot{background:rgba(16,185,129,.14);color:#10b981}
.h-ar{background:rgba(245,158,11,.14);color:#f59e0b}
.h-dl{background:rgba(244,63,94,.14);color:#f43f5e}
.h-ns{background:rgba(100,116,139,.12);color:#64748b}
.p-cr{background:rgba(244,63,94,.14);color:#f43f5e}
.p-hi{background:rgba(245,158,11,.14);color:#f59e0b}
.p-me{background:rgba(99,102,241,.14);color:#818cf8}
.p-lo{background:rgba(100,116,139,.12);color:#64748b}

/* ── OWNER HIGHLIGHT BOX ── */
.owner-box{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;border:1px solid rgba(99,102,241,.2);background:rgba(99,102,241,.07);margin-bottom:10px}
.owner-box.empty{border-color:var(--bdr);background:var(--glass)}

/* ── SHEET ── */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:400;display:none;align-items:flex-end;justify-content:center}
#ov.op{display:flex;animation:fadeIn .15s}
#sh{background:rgba(18,18,42,.97);backdrop-filter:blur(24px);border:1px solid var(--bdr2);border-bottom:none;width:100%;max-width:520px;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,24px);animation:slideUp .22s cubic-bezier(.32,0,.67,0)}
.sh-hd{width:40px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:14px auto 0}
.sh-row{display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
.sh-ti{font-size:16px;font-weight:700}
.sh-cl{width:28px;height:28px;border-radius:50%;background:var(--glass2);border:1px solid var(--bdr);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.sh-cl:hover{background:var(--glass3);color:var(--txt)}
.sh-bod{padding:0 18px 18px}
@media(min-width:768px){
  #ov{align-items:center}
  #sh{border-radius:20px;border-bottom:1px solid var(--bdr2);max-width:500px;box-shadow:0 24px 64px rgba(0,0,0,.55)}
  #sh.wide{max-width:640px}
  .sh-hd{display:none}
}

/* ── INVITE STATUS ── */
.invite-pending{background:rgba(245,158,11,.12);color:#f59e0b;border-color:rgba(245,158,11,.25)}
.invite-accepted{background:rgba(16,185,129,.12);color:#10b981;border-color:rgba(16,185,129,.25)}
</style>
</head>
<body>

<div id="ls"><div class="spin"></div><div class="lb">Taskora</div></div>

<div id="auth-scr" style="display:none">
  <div class="auth-card">
    <div class="auth-brand">Taskora</div>
    <div class="auth-tag">Founder's Office · Project Intelligence</div>
    <div class="auth-tabs">
      <button id="at-si" class="auth-tab on" onclick="swAT('si')">Sign in</button>
      <button id="at-su" class="auth-tab" onclick="swAT('su')">Create account</button>
    </div>
    <div id="amsg"></div>
    <div id="form-si">
      <input class="gi" id="si-em" type="email" placeholder="Email address" autocomplete="email"
        onkeydown="if(event.key==='Enter')document.getElementById('si-pw').focus()"/>
      <input class="gi" id="si-pw" type="password" placeholder="Password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doSI()"/>
      <button class="btn btn-p" style="width:100%;margin-top:4px" onclick="doSI()">Sign in →</button>
    </div>
    <div id="form-su" style="display:none">
      <input class="gi" id="su-em" type="email" placeholder="Email address" autocomplete="email"
        onkeydown="if(event.key==='Enter')document.getElementById('su-pw').focus()"/>
      <input class="gi" id="su-pw" type="password" placeholder="Password (min 8 characters)" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')doSU()"/>
      <button class="btn btn-p" style="width:100%;margin-top:4px" onclick="doSU()">Create account →</button>
    </div>
  </div>
</div>

<div id="root" style="display:none">
  <div id="app">
    <div id="sb">
      <div class="sb-top">
        <div class="sb-brand">Taskora</div>
        <div class="sb-tag">Founder's Office</div>
      </div>
      <div class="sb-nav">
        <button class="sb-b active" data-tab="dash"><span class="ic">⌂</span> Command Centre</button>
        <button class="sb-b" data-tab="projects"><span class="ic">📋</span> Projects</button>
        <button class="sb-b" data-tab="people"><span class="ic">👥</span> People</button>
        <button class="sb-b" data-tab="buildings"><span class="ic">🏢</span> Buildings</button>
        <button class="sb-b" data-tab="digest"><span class="ic">📤</span> Digest</button>
      </div>
      <div class="sb-bot">
        <button class="prof-btn" onclick="openProfile()">
          <div id="sb-av" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ind),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0">?</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="sb-name">Account</div>
            <div style="font-size:10px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="uem">—</div>
          </div>
          <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
            <div class="sdot" id="sd"></div>
            <span style="font-size:11px;color:var(--txt3)">⚙</span>
          </div>
        </button>
        <button class="so-b" onclick="doSO()">↪ Sign out</button>
      </div>
    </div>

    <div id="content">
      <div id="tab-dash" class="page active"></div>
      <div id="tab-projects" class="page"></div>
      <div id="tab-people" class="page"></div>
      <div id="tab-buildings" class="page"></div>
      <div id="tab-digest" class="page"></div>
    </div>

    <div id="bn">
      <button class="nb active" data-tab="dash"><span class="ic">⌂</span><span class="lb">Home</span></button>
      <button class="nb" data-tab="projects"><span class="ic">📋</span><span class="lb">Projects</span></button>
      <button class="nb" data-tab="people"><span class="ic">👥</span><span class="lb">People</span></button>
      <button class="nb" data-tab="buildings"><span class="ic">🏢</span><span class="lb">Buildings</span></button>
      <button class="nb" data-tab="digest"><span class="ic">📤</span><span class="lb">Digest</span></button>
      <button class="nb" onclick="openProfile()"><span class="ic">👤</span><span class="lb">Me</span></button>
    </div>
  </div>
</div>

<div id="ov">
  <div id="sh">
    <div class="sh-hd"></div>
    <div class="sh-row">
      <div class="sh-ti" id="sh-ti"></div>
      <button class="sh-cl" onclick="CS()">×</button>
    </div>
    <div class="sh-bod" id="sh-bd"></div>
  </div>
</div>

<script>
/* ── SUPABASE ── */

/* ── SYNC ── */
function ss(s) {
  const d = document.getElementById('sd');
  if (!d) return;
  d.className = 'sdot' + (s==='sy' ? ' sy' : s==='er' ? ' er' : '');
}

async function load() {
  if (!U) return;
  ss('sy');
  try {
    const uid = U.id;
    const [b,p,pr,ms,t,pb,de] = await Promise.all([
      SB.from('buildings').select('*').eq('user_id',uid).order('serial'),
      SB.from('people').select('*').eq('user_id',uid).order('name'),
      SB.from('projects').select('*').eq('user_id',uid).order('created_at'),
      SB.from('sub_projects').select('*').eq('user_id',uid).order('seq').order('created_at'),
      SB.from('tasks').select('*').eq('user_id',uid).order('created_at'),
      SB.from('project_buildings').select('*').eq('user_id',uid),
      SB.from('digest_edits').select('*').eq('user_id',uid),
    ]);
    DB.buildings  = (b.data||[]).map(x => ({...x, softHandover:x.soft_handover, hardHandover:x.hard_handover, btype:x.btype||'operational'}));
    DB.people     = p.data||[];
    DB.projects   = (pr.data||[]).map(x => ({...x, desc:x.description, primaryOwnerId:x.primary_stakeholder_id, health:x.health||'on_track', priority:x.priority||'medium'}));
    DB.milestones = (ms.data||[]).map(x => ({...x, projectId:x.project_id}));
    DB.tasks      = (t.data||[]).map(x => ({...x, projectId:x.project_id, milestoneId:x.sub_project_id, buildingRefId:x.project_building_id, assignedTo:x.assigned_to, dueDate:x.due_date, followUp:x.follow_up, dependsOn:x.depends_on||[]}));
    DB.pb         = (pb.data||[]).map(x => ({...x, projectId:x.project_id, buildingId:x.building_id, targetCompletion:x.target_completion, secondaryOwnerId:x.secondary_owner_id}));
    const ed = {};
    (de.data||[]).forEach(x => { ed[x.person_id] = x.content; });
    DB.de = ed;
    ss('ok');
  } catch(e) { ss('er'); }
}

async function delRow(tbl, id) {
  ss('sy');

  return r;
}

/* ── AUTH ── */
function amsg(m, ok) {
  const el = document.getElementById('amsg');
  if (el) el.innerHTML = '<div class="amsg '+(ok?'ok':'err')+'">'+m+'</div>';
}
function swAT(t) {
  const si = t==='si';
  document.getElementById('at-si').classList.toggle('on', si);
  document.getElementById('at-su').classList.toggle('on', !si);
  document.getElementById('form-si').style.display = si ? '' : 'none';
  document.getElementById('form-su').style.display = si ? 'none' : '';
  document.getElementById('amsg').innerHTML = '';
}
async function doSI() {
  const email=val('si-em').trim(), pass=val('si-pw');
  if (!email||!pass) { amsg('Please enter email and password.'); return; }
  const btn = document.querySelector('#form-si .btn-p');
  if (btn) { btn.disabled=true; btn.textContent='Signing in…'; }
  const {error} = await SB.auth.signInWithPassword({email, password:pass});
  if (btn) { btn.disabled=false; btn.textContent='Sign in →'; }
  if (error) amsg(error.message==='Invalid login credentials' ? 'Incorrect email or password.' : error.message);
}
async function doSU() {
  const email=val('su-em').trim(), pass=val('su-pw');
  if (!email||!pass) { amsg('Please fill all fields.'); return; }
  if (pass.length<8) { amsg('Password must be at least 8 characters.'); return; }
  const btn = document.querySelector('#form-su .btn-p');
  if (btn) { btn.disabled=true; btn.textContent='Creating…'; }
  const {error} = await SB.auth.signUp({email, password:pass});
  if (btn) { btn.disabled=false; btn.textContent='Create account →'; }
  if (error) amsg(error.message);
}
async function doSO() { await SB.auth.signOut(); }

/* ── BOOT ── */
async function boot() {
  const {data:{session}} = await SB.auth.getSession();
  document.getElementById('ls').style.opacity = '0';
  setTimeout(() => { document.getElementById('ls').style.display='none'; }, 300);
  if (session) { U=session.user; showApp(); }
  else { document.getElementById('auth-scr').style.display='flex'; }

  SB.auth.onAuthStateChange(async (ev, ses) => {
    if (ses) {
      U = ses.user;
      document.getElementById('auth-scr').style.display = 'none';
      showApp();
    } else {
      U = null;
      document.getElementById('root').style.display = 'none';
      DB = {buildings:[],people:[],projects:[],milestones:[],tasks:[],pb:[],de:{}};
      document.getElementById('auth-scr').style.display = 'flex';
    }
  });
}

async function showApp() {
  document.getElementById('root').style.display = '';
  const email = U.email||'';
  document.getElementById('uem').textContent = email;
  document.getElementById('sb-name').textContent = U.user_metadata?.display_name||email.split('@')[0]||'Account';
  document.getElementById('sb-av').textContent = email.slice(0,2).toUpperCase();
  await load();

  // Auto-accept invite: if a people record with this email is still 'pending', mark it accepted
  // This fires when an invited person signs up and logs in for the first time
  if (email) {
    const matched = DB.people.filter(p => p.email && p.email.toLowerCase()===email.toLowerCase() && p.invite_status==='pending');
    for (const person of matched) {
      await SB.from('people').update({invite_status:'accepted'}).eq('id', person.id);
      person.invite_status = 'accepted';
    }
  }

  renderTab(curTab);
  document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });
}

function switchTab(id) {
  curTab = id;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b => {
    b.classList.toggle('active', b.dataset.tab===id);
  });
  renderTab(id);
}
function renderTab(id) {
  if      (id==='dash')      rDash();
  else if (id==='projects')  rProj();
  else if (id==='people')    rPpl();
  else if (id==='buildings') rBld();
  else if (id==='digest')    rDig();
}

/* ══════════════════════════════════════════════════════
   COMMAND CENTRE
══════════════════════════════════════════════════════ */
function rDash() {
  const todayStr = tday();
  const tmrStr   = tmrDay();
  const active   = DB.projects.filter(p => p.status!=='done');
  const hCounts  = {on_track:0, at_risk:0, delayed:0};
  active.forEach(p => { const k=p.health||'on_track'; if (k in hCounts) hCounts[k]++; });
  const totalOD  = DB.tasks.filter(t => isOD(t.dueDate,t.status)).length;
  const dueSoon  = DB.tasks.filter(t => t.status!=='done' && (t.dueDate===todayStr||t.dueDate===tmrStr)).length;

  // people who own at least one active project
  const owners = DB.people.filter(p => active.some(pr => pr.primaryOwnerId===p.id));

  let h = '<div class="ph"><div><div class="pt">Command Centre</div><div class="ps">'+nowFull()+'</div></div></div>';

  // health pulse bar
  h += '<div style="display:flex;gap:6px;margin-bottom:12px">';
  if (hCounts.on_track) h += '<div style="flex:1;text-align:center;padding:10px 8px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#10b981">'+hCounts.on_track+'</div><div style="font-size:10px;color:#10b981;margin-top:1px">On Track</div></div>';
  if (hCounts.at_risk)  h += '<div style="flex:1;text-align:center;padding:10px 8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#f59e0b">'+hCounts.at_risk+'</div><div style="font-size:10px;color:#f59e0b;margin-top:1px">At Risk</div></div>';
  if (hCounts.delayed)  h += '<div style="flex:1;text-align:center;padding:10px 8px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#f43f5e">'+hCounts.delayed+'</div><div style="font-size:10px;color:#f43f5e;margin-top:1px">Delayed</div></div>';
  if (!active.length)   h += '<div style="flex:1;padding:10px;background:var(--glass);border:1px solid var(--bdr);border-radius:10px;font-size:12px;color:var(--txt2);text-align:center">No active projects yet</div>';
  h += '</div>';

  // mini stat row
  h += '<div class="sg" style="margin-bottom:20px">';
  h += '<div class="sc" style="--ac:#f87171;padding:12px"><div class="sn" style="font-size:24px">'+totalOD+'</div><div class="sl">Overdue</div></div>';
  h += '<div class="sc" style="--ac:#fbbf24;padding:12px"><div class="sn" style="font-size:24px">'+dueSoon+'</div><div class="sl">Due today &amp; tomorrow</div></div>';
  h += '</div>';

  if (!owners.length) {
    h += '<div class="es"><span class="em">🏗</span><div class="et">Welcome to Taskora</div><div class="ed">Add your team in People, create projects and assign owners — they\'ll appear here.</div></div>';
    document.getElementById('tab-dash').innerHTML = h;
    return;
  }

  h += '<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Project Owners</div>';

  owners.forEach(person => {
    const ownedProjs = active.filter(pr => pr.primaryOwnerId===person.id);
    const projIds    = new Set(ownedProjs.map(pr => pr.id));
    const allTasks   = DB.tasks.filter(t => projIds.has(t.projectId));
    const pending    = allTasks.filter(t => t.status!=='done');
    const done       = allTasks.filter(t => t.status==='done');
    const pct        = allTasks.length ? Math.round(done.length/allTasks.length*100) : 0;
    const overdueTasks = pending.filter(t => isOD(t.dueDate,t.status));
    const dueTT      = pending.filter(t => t.dueDate===todayStr || t.dueDate===tmrStr);
    const dueToday   = pending.filter(t => t.dueDate===todayStr);
    const dueTmr     = pending.filter(t => t.dueDate===tmrStr);

    const worstH = ownedProjs.some(pr=>pr.health==='delayed') ? 'delayed'
                 : ownedProjs.some(pr=>pr.health==='at_risk')  ? 'at_risk'
                 : ownedProjs.every(pr=>pr.health==='on_track') ? 'on_track' : 'not_started';
    const ringColor = worstH==='delayed' ? '#f43f5e' : worstH==='at_risk' ? '#f59e0b' : '#10b981';
    const cardBdr   = overdueTasks.length ? 'rgba(244,63,94,.2)' : dueTT.length ? 'rgba(245,158,11,.18)' : 'var(--bdr)';

    h += '<div class="gc" style="margin-bottom:14px;border-color:'+cardBdr+'">';

    // top row
    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
    h += '<div style="position:relative;flex-shrink:0">'+av(person.name,person.color,48)+'<div style="position:absolute;inset:-3px;border-radius:50%;border:2.5px solid '+ringColor+';pointer-events:none"></div></div>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700;line-height:1.2">'+esc(person.name)+'</div>'+(person.role ? '<div style="font-size:11px;color:var(--txt2);margin-top:1px">'+esc(person.role)+'</div>' : '')+'</div>';
    h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">';
    if (overdueTasks.length) h += '<span class="bd" style="background:rgba(244,63,94,.15);color:var(--rose)">⚠ '+overdueTasks.length+' overdue</span>';
    else if (dueTT.length)   h += '<span class="bd" style="background:rgba(245,158,11,.12);color:#f59e0b">📅 '+dueTT.length+' due soon</span>';
    h += hBdg(worstH)+'</div></div>';

    // KPI boxes
    h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">';
    h += '<div style="text-align:center;padding:9px 6px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)"><div style="font-size:20px;font-weight:700;color:var(--ind-l)">'+ownedProjs.length+'</div><div style="font-size:10px;color:var(--txt2);margin-top:2px">Projects</div></div>';
    h += '<div style="text-align:center;padding:9px 6px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)"><div style="font-size:20px;font-weight:700;color:'+(overdueTasks.length?'var(--rose)':'var(--txt)')+'">'+pending.length+'</div><div style="font-size:10px;color:var(--txt2);margin-top:2px">Pending</div></div>';
    h += '<div style="text-align:center;padding:9px 6px;background:var(--glass);border-radius:9px;border:1px solid var(--bdr)"><div style="font-size:20px;font-weight:700;color:'+(pct===100?'var(--grn)':pct>=60?'var(--teal)':'var(--txt)')+'">'+pct+'%</div><div style="font-size:10px;color:var(--txt2);margin-top:2px">Done</div></div>';
    h += '</div>';

    // progress bar
    h += '<div class="pw" style="margin-bottom:14px"><div class="pb" style="width:'+pct+'%;background:'+(pct===100?'var(--grn)':person.color)+';box-shadow:0 0 5px '+person.color+'66"></div></div>';

    // due today & tomorrow
    h += '<div style="border-top:1px solid var(--bdr);padding-top:12px">';
    if (dueTT.length) {
      h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">';
      h += '<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em">Due today &amp; tomorrow</div>';
      h += '<div style="display:flex;gap:5px">';
      if (dueToday.length) h += '<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">'+dueToday.length+' today</span>';
      if (dueTmr.length)   h += '<span class="bd" style="background:rgba(245,158,11,.12);color:#f59e0b">'+dueTmr.length+' tomorrow</span>';
      h += '</div></div>';

      dueTT.forEach(t => {
        const proj     = DB.projects.find(pr => pr.id===t.projectId);
        const executor = DB.people.find(pe => pe.id===t.assignedTo);
        const isToday  = t.dueDate===todayStr;
        const isOd     = isOD(t.dueDate,t.status);
        const rowBg    = isOd ? 'rgba(244,63,94,.07)' : isToday ? 'rgba(245,158,11,.07)' : 'var(--glass)';
        const rowBdr   = isOd ? 'rgba(244,63,94,.2)'  : isToday ? 'rgba(245,158,11,.15)' : 'var(--bdr)';
        const whenColor = isOd ? 'var(--rose)' : isToday ? '#f59e0b' : 'var(--txt3)';
        const whenLabel = isOd ? '⚠ Overdue' : isToday ? 'Today' : 'Tomorrow';
        const statusStyle = 'flex-shrink:0;padding:4px 9px;border-radius:7px;border:1px solid var(--bdr);background:var(--glass);cursor:pointer;font-size:11px;font-weight:600;color:'+(TS[t.status]?.c||'var(--txt2)')+';white-space:nowrap';

        h += '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:'+rowBg+';border-radius:9px;border:1px solid '+rowBdr+';margin-bottom:5px">';
        h += '<div style="flex:1;min-width:0">';
        h += '<div style="font-size:13px;font-weight:500;line-height:1.3">'+esc(t.title)+'</div>';
        h += '<div style="font-size:11px;color:var(--txt2);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">';
        h += '<span style="color:'+whenColor+';font-weight:'+(isToday||isOd?600:400)+'">'+whenLabel+'</span>';
        if (proj)                              h += '<span>· '+esc(proj.name)+'</span>';
        if (executor && executor.id!==person.id) h += '<span>· '+esc(executor.name.split(' ')[0])+'</span>';
        h += '</div></div>';
        h += '<button onclick="dshCySt(\''+t.id+'\')" style="'+statusStyle+'">'+((TS[t.status]&&TS[t.status].l)||'—')+'</button>';
        h += '</div>';
      });
    } else {
      h += '<div style="text-align:center;font-size:12px;color:var(--txt3)">';
      if (overdueTasks.length) h += '<span style="color:var(--rose)">⚠ '+overdueTasks.length+' overdue — open Projects to action them</span>';
      else h += '✓ Nothing due in the next 2 days';
      h += '</div>';
    }
    h += '</div>';

    // project chips
    if (ownedProjs.length) {
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;border-top:1px solid var(--bdr);padding-top:11px">';
      ownedProjs.forEach(pr => {

async function dshCySt(id) {

    if (person.email) h += '<div style="font-size:12px;color:var(--txt3);margin-top:1px">✉ '+esc(person.email)+'</div>';

        h += '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--glass);border-radius:8px;cursor:pointer" onclick="switchTab(\'projects\');setTimeout(function(){expP[\''+pr.id+'\']=true;rProj();},100)">';

function oPplF(id) {
  const p = id ? DB.people.find(x => x.id===id) : null;
  const rc = p?.color || CLRS[Math.floor(Math.random()*CLRS.length)];
  const isEdit = !!p;

  let h = '';
  if (!isEdit) {
    h += '<div style="font-size:13px;color:var(--txt2);margin-bottom:16px;padding:11px 14px;background:rgba(99,102,241,.08);border-radius:10px;border:1px solid rgba(99,102,241,.2)">✉ A sign-in link will be sent to their email so they can access Taskora.</div>';
  }
  h += '<div class="fr"><div class="fg"><label class="fl">Full name</label><input id="pf-n" class="gi" placeholder="e.g. Rajesh Kumar" value="'+esc(p?.name||'')+'"></div>';
  h += '<div class="fg"><label class="fl">Role / title</label><input id="pf-r" class="gi" placeholder="e.g. VP Operations" value="'+esc(p?.role||'')+'"></div></div>';
  if (!isEdit) {
    h += '<div class="fg"><label class="fl">Email address <span style="color:var(--rose)">*</span></label><input id="pf-e" class="gi" type="email" placeholder="name@company.com" value="'+esc(p?.email||'')+'"></div>';
  }
  h += '<div class="fg"><label class="fl">WhatsApp number</label><input id="pf-p" class="gi" type="tel" placeholder="91XXXXXXXXXX" value="'+esc(p?.phone||'')+'"></div>';
  h += CP('pf-c', rc);
  const btnLabel = isEdit ? 'Save' : 'Invite to Taskora';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svPpl(\''+( id||'')+'\')">'+btnLabel+'</button></div>';

  OS(isEdit ? 'Edit person' : 'Invite person', h);
}

async function svPpl(id) {
  const name  = val('pf-n').trim();
  if (!name) return;
  const email = id ? null : val('pf-e').trim();
  if (!id && !email) { alert('Email is required to send an invite.'); return; }

  const obj = {name, role:val('pf-r').trim(), phone:val('pf-p').trim(), color:val('pf-c')};
  if (email) obj.email = email;

  if (id) {
    await SB.from('people').update(obj).eq('id',id).eq('user_id',U.id);
    DB.people = DB.people.map(x => x.id===id ? {...x,...obj} : x);
    CS();
    rPpl();
  } else {
    // Save person record
    obj.invite_status = 'pending';
    const {data:inserted} = await SB.from('people').insert({...obj, user_id:U.id}).select().single();
    if (inserted) DB.people.push(inserted);
    CS();
    rPpl();
    // Open chairman's email client with pre-filled invite
    const appUrl = window.location.origin + window.location.pathname;
    const subject = encodeURIComponent("You've been added to Taskora — Founder's Office");
    const body = encodeURIComponent(
      "Hi " + name + ",\n\n" +
      "You've been added to our project management system — Taskora, Founder's Office.\n\n" +
      "To get started:\n" +
      "1. Open this link: " + appUrl + "\n" +
      "2. Click 'Create account'\n" +
      "3. Sign up using this email address: " + email + "\n\n" +
      "Once you're in, you'll see the projects and tasks assigned to you.\n\n" +
      "Regards"
    );
    window.open('mailto:' + email + '?subject=' + subject + '&body=' + body);
  }
}

async function dPpl(id) {
  if (!confirm('Delete this person? They will be unassigned from all tasks and projects.')) return;
  await delRow('people', id);
  DB.people   = DB.people.filter(x => x.id!==id);
  DB.tasks    = DB.tasks.map(t => t.assignedTo===id ? {...t, assignedTo:null} : t);
  DB.projects = DB.projects.map(pr => pr.primaryOwnerId===id ? {...pr, primaryOwnerId:null} : pr);
  rPpl();
}

function rProj() {
  const projs = DB.projects.filter(pr => {
    if (pFil==='done')   return pr.status==='done';
    if (pFil==='active') return pr.status!=='done';
    return true;
  });

  let h = '<div class="ph"><div><div class="pt">Projects</div><div class="ps">'+DB.projects.filter(pr=>pr.status!=='done').length+' active</div></div>';

  // View toggle + filter row
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">';

  h += '<div class="pls" style="margin-bottom:0;flex:1">';
  h += '<button class="pl'+(pFil==='active'&&projView==='list'?' active':'')+'" onclick="projView=\'list\';pFil=\'active\';rProj()">Active</button>';
  h += '<button class="pl'+(pFil==='done'&&projView==='list'?' active':'')+'" onclick="projView=\'list\';pFil=\'done\';rProj()">Done</button>';
  h += '<button class="pl'+(pFil==='all'&&projView==='list'?' active':'')+'" onclick="projView=\'list\';pFil=\'all\';rProj()">All</button>';

  h += '<button onclick="projView=projView===\'gantt\'?\'list\':\'gantt\';rProj()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid '+(projView==='gantt'?'rgba(99,102,241,.5)':'var(--bdr)')+';background:'+(projView==='gantt'?'rgba(99,102,241,.18)':'var(--glass)')+';color:'+(projView==='gantt'?'var(--ind-l)':'var(--txt2)')+'"><span style="font-size:14px">📊</span>'+(projView==='gantt'?'Exit Gantt':'Gantt view')+'</button>';
  h += '</div>';

  // ── GANTT VIEW ──
  if (projView === 'gantt') {
    h += rGanttFull();
    document.getElementById('tab-projects').innerHTML = h;
    return;
  }

  if (!projs.length) {
    h += '<div class="es"><span class="em">📋</span><div class="et">No projects</div><div class="ed">Create your first project and assign a primary owner</div></div>';
    document.getElementById('tab-projects').innerHTML = h;
    return;
  }

  projs.forEach(proj => {
    const owner    = DB.people.find(p => p.id===proj.primaryOwnerId);
    const mils     = DB.milestones.filter(m => m.projectId===proj.id);
    const allT     = DB.tasks.filter(t => t.projectId===proj.id);
    const dirT     = allT.filter(t => !t.milestoneId);
    const pend     = allT.filter(t => t.status!=='done').length;
    const ovdT     = allT.filter(t => isOD(t.dueDate,t.status));
    const pct      = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
    const pbs      = DB.pb.filter(r => r.projectId===proj.id).map(r => ({...r, b:DB.buildings.find(b=>b.id===r.buildingId)})).filter(r => r.b);
    const bDone    = pbs.filter(r => r.status==='done').length;
    const isExp    = !!expP[proj.id];
    const nextMil  = mils.filter(m => m.status!=='done' && m.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline))[0];
    const cardClass = proj.health==='delayed' ? ' red' : proj.health==='at_risk' ? ' amb' : '';

    // derive deadline from building completion dates if no manual deadline set
    const bDates = pbs.map(r=>r.targetCompletion).filter(Boolean);
    const derivedDeadline = bDates.length ? bDates.sort().slice(-1)[0] : null;
    const displayDeadline = proj.deadline || derivedDeadline;
    const deadlineLabel = proj.deadline ? fd(proj.deadline) : (derivedDeadline ? fd(derivedDeadline)+' ⊕' : null);

    const showGantt = !!ganttP[proj.id];

    if (pbs.length)    h += '<span style="font-size:11px;color:var(--teal);background:rgba(20,184,166,.1);border-radius:99px;padding:1px 7px">🏢 '+bDone+'/'+pbs.length+'</span>';
    h += '</div></div>';
    h += '<div style="display:flex;align-items:center;gap:5px;flex-shrink:0">';

              h += '<span onclick="cyStBS(\''+t.id+'\',\''+r.id+'\')" style="cursor:pointer;flex-shrink:0">'+bdg(t.status)+'</span>';
              h += '<span style="flex:1;font-size:12px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</span>';
              if (t.dueDate) { const dc=od?'var(--rose)':'var(--txt3)'; h += '<span style="font-size:11px;color:'+dc+';flex-shrink:0">'+(od?'⚠ ':'')+fd(t.dueDate)+'</span>'; }
              if (pe) h += '<span style="flex-shrink:0">'+av(pe.name,pe.color,18)+'</span>';
              h += '<button onclick="oBldTF(\''+r.id+'\',\''+r.projectId+'\',\''+t.id+'\')" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--txt3);flex-shrink:0;padding:0 2px">✎</button>';
              h += '</div>';
            });
            h += '<button onclick="oBldTF(\''+r.id+'\',\''+r.projectId+'\')" style="width:100%;margin-top:4px;padding:5px;border:1px dashed rgba(99,102,241,.3);border-radius:7px;background:none;color:var(--ind-l);font-size:11px;font-weight:500;cursor:pointer">+ Add task</button>';
            h += '</div>';

            h += '<span style="font-size:11px;color:var(--txt3)">No tasks yet</span>';

        h += '<div class="sr" style="'+milBdr+'" onclick="expS[\''+mil.id+'\']=!expS[\''+mil.id+'\'];rProj()">';

        if (mp) h += '<span class="bd" style="background:rgba(99,102,241,.14);color:var(--ind-l)">'+mp+'</span>';
        if (mil.deadline) h += '<span style="font-size:11px;color:'+(isOD(mil.deadline,mil.status)?'var(--rose)':'var(--txt3)')+'">'+fd(mil.deadline)+'</span>';

        h += '<button class="mb" style="font-size:11px;padding:2px 8px" onclick="event.stopPropagation();oTF(\''+proj.id+'\',\''+mil.id+'\')">+Task</button>';

        h += '<button onclick="event.stopPropagation();dMil(\''+mil.id+'\')" style="background:none;border:none;cursor:pointer;font-size:15px;color:var(--txt3)">×</button>';

          if (mt.length) h += '<div style="padding:6px 0 0 12px">'+mt.map(t=>taskRow(t)).join('')+'</div>';

      if (dirT.length) {

          const pe = DB.people.find(p => p.id===k);
          if (pe) h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;margin-top:10px">'+av(pe.name,pe.color,22)+'<span style="font-size:12px;font-weight:600;color:var(--txt2)">'+esc(pe.name)+'</span></div>';
          h += tasks.map(t => taskRow(t)).join('');

      h += '</div>'; // end expanded

    h += '</div>'; // end card

  document.getElementById('tab-projects').innerHTML = h;
}

// ── FULL PAGE GANTT — all projects + buildings ──
function rGanttFull() {
  const active = DB.projects.filter(p => p.status !== 'done');
  if (!active.length) return '<div class="es"><span class="em">📊</span><div class="et">No active projects</div><div class="ed">Create projects and assign buildings with completion dates to see the Gantt</div></div>';

  // Compute global timeline bounds
  const allDates = [];
  active.forEach(proj => {
    if (proj.deadline) allDates.push(proj.deadline);
    if (proj.created_at) allDates.push(proj.created_at.slice(0,10));
    DB.pb.filter(r => r.projectId===proj.id).forEach(r => {
      if (r.targetCompletion) allDates.push(r.targetCompletion);
    });
    DB.milestones.filter(m => m.projectId===proj.id && m.deadline).forEach(m => allDates.push(m.deadline));
  });
  allDates.push(tday());
  const sorted = [...allDates].sort();
  const minDate = new Date(sorted[0]+'T12:00:00');
  const rawMax  = new Date(sorted[sorted.length-1]+'T12:00:00');
  // ensure at least 60 days span
  if ((rawMax - minDate) < 60*86400000) rawMax.setDate(rawMax.getDate()+60);
  const maxDate = rawMax;
  const totalMs = maxDate - minDate;

  const pct = ms => Math.max(0, Math.min(100, (ms / totalMs) * 100));
  const datePct = d => pct(new Date(d+'T12:00:00') - minDate);
  const todayPct = pct(new Date(tday()+'T12:00:00') - minDate);

  const HEALTH_COLOR = {on_track:'#10b981', at_risk:'#f59e0b', delayed:'#f43f5e', not_started:'#64748b'};
  const STATUS_COLOR  = {done:'#10b981', in_progress:'#f59e0b', blocked:'#f43f5e', on_hold:'#fb923c', not_started:'#64748b'};
  const LABEL_W = 160; // px width of label column

  // Month header labels
  const months = [];
  const cur = new Date(minDate);
  cur.setDate(1);
  while (cur <= maxDate) {
    const p = pct(new Date(cur) - minDate);
    months.push({label: cur.toLocaleDateString('en-IN',{month:'short',year:'2-digit'}), pct: Math.max(0, Math.min(98, p))});
    cur.setMonth(cur.getMonth()+1);
  }

  let h = '<div style="overflow-x:auto;padding-bottom:8px">';
  h += '<div style="min-width:520px">';

  // Month ruler
  h += '<div style="display:flex;margin-bottom:6px">';
  h += '<div style="width:'+LABEL_W+'px;flex-shrink:0"></div>';
  h += '<div style="flex:1;position:relative;height:20px">';
  months.forEach(m => {
    h += '<div style="position:absolute;left:'+m.pct+'%;transform:translateX(-50%);font-size:10px;color:var(--txt3);white-space:nowrap;font-weight:500">'+m.label+'</div>';
  });
  h += '</div></div>';

  // Gridlines + today marker background strip
  h += '<div style="display:flex;margin-bottom:4px">';
  h += '<div style="width:'+LABEL_W+'px;flex-shrink:0"></div>';
  h += '<div style="flex:1;position:relative;height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden">';
  months.forEach(m => {
    h += '<div style="position:absolute;left:'+m.pct+'%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.06)"></div>';
  });
  if (todayPct >= 0 && todayPct <= 100) {
    h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--ind-l);opacity:.9"></div>';
  }
  h += '</div></div>';

  // Each project
  active.forEach(proj => {
    const owner = DB.people.find(p => p.id===proj.primaryOwnerId);
    const pbs   = DB.pb.filter(r => r.projectId===proj.id).map(r => ({...r, b:DB.buildings.find(b=>b.id===r.buildingId)})).filter(r => r.b);
    const mils  = DB.milestones.filter(m => m.projectId===proj.id && m.deadline && m.status!=='done');
    const allT  = DB.tasks.filter(t => t.projectId===proj.id);
    const taskPct = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
    const ovd   = allT.filter(t => isOD(t.dueDate,t.status)).length;

    // Compute project bar span
    const projStartStr = (proj.created_at||new Date().toISOString()).slice(0,10);
    const bDates = pbs.map(r=>r.targetCompletion).filter(Boolean);
    const projEndStr = proj.deadline || (bDates.length ? bDates.sort().slice(-1)[0] : null);
    const barStart = datePct(projStartStr);
    const barEnd   = projEndStr ? Math.max(barStart+2, datePct(projEndStr)) : barStart+3;
    const healthColor = HEALTH_COLOR[proj.health||'on_track'];

    // ── Project row ──
    h += '<div style="display:flex;align-items:center;gap:0;margin-bottom:3px;cursor:pointer" onclick="projView=\'list\';pFil=\'active\';expP[\''+proj.id+'\']=true;rProj()">';
    // Label
    h += '<div style="width:'+LABEL_W+'px;flex-shrink:0;padding-right:10px;display:flex;align-items:center;gap:6px">';
    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+proj.color+';flex-shrink:0;box-shadow:0 0 5px '+proj.color+'66"></div>';
    h += '<div style="min-width:0"><div style="font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+esc(proj.name)+'">'+esc(proj.name.length>18?proj.name.slice(0,17)+'…':proj.name)+'</div>';
    if (owner) h += '<div style="font-size:10px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(owner.name.split(' ')[0])+'</div>';
    h += '</div></div>';
    // Bar track
    h += '<div style="flex:1;position:relative;height:28px;background:rgba(255,255,255,.03);border-radius:6px;border:1px solid var(--bdr);overflow:hidden">';
    // Gridlines
    months.forEach(m => {

    });

    h += '<div style="position:absolute;left:'+barStart+'%;width:'+(barEnd-barStart)+'%;height:100%;background:'+healthColor+';opacity:.25;border-radius:5px"></div>';
    // Filled progress within bar
    if (taskPct > 0) {
      const fillW = (barEnd-barStart) * taskPct/100;
      h += '<div style="position:absolute;left:'+barStart+'%;width:'+fillW+'%;height:100%;background:'+healthColor+';opacity:.7;border-radius:5px"></div>';
    }
    // Labels inside bar
    h += '<div style="position:absolute;left:'+(barStart+0.5)+'%;top:0;bottom:0;display:flex;align-items:center;padding:0 6px;pointer-events:none">';
    h += '<span style="font-size:10px;font-weight:700;color:#fff;white-space:nowrap">'+taskPct+'%'+(ovd?' · ⚠'+ovd:'')+'</span>';
    h += '</div>';
    // Today line
    if (todayPct >= 0 && todayPct <= 100) {
      h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--ind-l);opacity:.9;z-index:3"></div>';
    }
    // Milestone diamonds
    mils.forEach(mil => {
      const mp = datePct(mil.deadline);
      h += '<div style="position:absolute;left:'+mp+'%;top:50%;transform:translate(-50%,-50%) rotate(45deg);width:8px;height:8px;background:#f59e0b;border:1px solid rgba(0,0,0,.3);z-index:4" title="'+esc(mil.name)+' — '+fd(mil.deadline)+'"></div>';
    });
    h += '</div>';
    // Right: health badge
    h += '<div style="width:56px;flex-shrink:0;padding-left:8px">'+hBdg(proj.health||'on_track')+'</div>';
    h += '</div>';

    // ── Building sub-rows ──
    if (pbs.length) {
      pbs.forEach(r => {
        const tc = r.targetCompletion;
        const secOwner = DB.people.find(p => p.id===r.secondaryOwnerId);
        const bTasks = DB.tasks.filter(t => t.buildingRefId===r.id);
        const bOD = bTasks.filter(t => isOD(t.dueDate,t.status)).length;
        const barColor = STATUS_COLOR[r.status] || '#64748b';
        const bStart = barStart; // buildings start when project starts
        const bEnd   = tc ? Math.max(bStart+2, datePct(tc)) : bStart+4;

        h += '<div style="display:flex;align-items:center;gap:0;margin-bottom:2px;cursor:pointer" onclick="event.stopPropagation();oPBS(\''+r.id+'\')">';
        // Label — indented
        h += '<div style="width:'+LABEL_W+'px;flex-shrink:0;padding-right:10px;padding-left:18px;display:flex;align-items:center;gap:5px">';
        h += '<div style="width:5px;height:5px;border-radius:50%;background:'+barColor+';flex-shrink:0;opacity:.8"></div>';
        h += '<div style="min-width:0"><div style="font-size:11px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+esc(r.b.name)+'">'+esc(r.b.name.length>20?r.b.name.slice(0,19)+'…':r.b.name)+'</div>';

        // Bar track
        h += '<div style="flex:1;position:relative;height:20px;background:rgba(255,255,255,.02);border-radius:4px;overflow:hidden">';
        months.forEach(m => {
          h += '<div style="position:absolute;left:'+m.pct+'%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.04)"></div>';
        });
        // Building bar
        h += '<div style="position:absolute;left:'+bStart+'%;width:'+(bEnd-bStart)+'%;height:100%;background:'+barColor+';opacity:'+(r.status==='done'?'.8':'.5')+';border-radius:4px;display:flex;align-items:center;padding:0 6px;overflow:hidden">';
        if (tc) h += '<span style="font-size:10px;color:#fff;font-weight:600;white-space:nowrap">'+fd(tc)+'</span>';
        h += '</div>';
        // Today line
        if (todayPct >= 0 && todayPct <= 100) {
          h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:1px;background:var(--ind-l);opacity:.7;z-index:3"></div>';
        }
        h += '</div>';
        // Right: status + overdue badge
        h += '<div style="width:56px;flex-shrink:0;padding-left:8px;display:flex;flex-direction:column;gap:2px">';
        h += bdg(r.status, BS);
        if (bOD) h += '<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">⚠ '+bOD+'</span>';
        h += '</div>';
        h += '</div>';
      });
      // Spacer
      h += '<div style="height:6px"></div>';
    }
  });

  // Today label
  if (todayPct >= 0 && todayPct <= 100) {
    h += '<div style="display:flex;margin-top:4px">';
    h += '<div style="width:'+LABEL_W+'px;flex-shrink:0"></div>';
    h += '<div style="flex:1;position:relative;height:16px">';
    h += '<div style="position:absolute;left:'+todayPct+'%;transform:translateX(-50%);font-size:10px;color:var(--ind-l);font-weight:700;white-space:nowrap">▲ Today '+fd(tday())+'</div>';
    h += '</div></div>';
  }

  // Legend
  h += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;padding:10px 14px;background:var(--glass);border-radius:10px;border:1px solid var(--bdr)">';
  h += '<span style="font-size:11px;color:var(--txt3);font-weight:600;align-self:center">Legend:</span>';
  h += '<span style="font-size:11px;color:#10b981">● On track</span>';
  h += '<span style="font-size:11px;color:#f59e0b">● At risk</span>';
  h += '<span style="font-size:11px;color:#f43f5e">● Delayed</span>';
  h += '<span style="font-size:11px;color:var(--txt2)">◆ Milestone</span>';
  h += '<span style="font-size:11px;color:var(--ind-l)">│ Today</span>';
  h += '<span style="font-size:11px;color:var(--txt3)">Dark fill = completed %</span>';
  h += '</div>';

  h += '</div></div>';
  return h;
}

// ── GANTT CHART — building-wise (inside expanded project card) ──
function rGantt(proj, pbs) {
  const allDates = pbs.map(r => r.targetCompletion).filter(Boolean);
  if (proj.deadline) allDates.push(proj.deadline);
  const projStart = (proj.created_at||new Date().toISOString()).slice(0,10);
  allDates.push(projStart);
  allDates.push(new Date().toISOString().slice(0,10));

  const sortedDates = [...allDates].sort();
  const minDate = new Date(sortedDates[0]+'T12:00:00');
  const maxDate = new Date(sortedDates[sortedDates.length-1]+'T12:00:00');
  if ((maxDate - minDate) < 30*86400000) maxDate.setDate(maxDate.getDate()+30);

  const totalMs  = maxDate - minDate;
  const todayMs  = new Date(tday()+'T12:00:00') - minDate;
  const todayPct = Math.max(0, Math.min(100, (todayMs/totalMs)*100));

  const statusColors = {done:'#10b981', in_progress:'#f59e0b', blocked:'#f43f5e', on_hold:'#fb923c', not_started:'#64748b'};

  const months = [];
  const cur = new Date(minDate);
  cur.setDate(1);
  while (cur <= maxDate) {
    const pct = ((new Date(cur) - minDate) / totalMs) * 100;
    months.push({label: cur.toLocaleDateString('en-IN',{month:'short', year:'2-digit'}), pct: Math.max(0,Math.min(98,pct))});
    cur.setMonth(cur.getMonth()+1);
  }

  let h = '<div style="margin-bottom:16px">';
  h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">📊 Building Gantt — Completion Timeline</div>';

  h += '<div style="position:relative;height:18px;margin-bottom:8px;margin-left:140px">';
  months.forEach(m => {
    h += '<div style="position:absolute;left:'+m.pct+'%;font-size:10px;color:var(--txt3);white-space:nowrap;transform:translateX(-50%)">'+m.label+'</div>';
  });
  h += '</div>';

  h += '<div>';
  pbs.forEach(r => {
    const b = r.b;
    const tc = r.targetCompletion;
    const startMs  = new Date(projStart+'T12:00:00') - minDate;
    const endMs    = tc ? (new Date(tc+'T12:00:00') - minDate) : null;
    const startPct = Math.max(0, Math.min(100, (startMs/totalMs)*100));
    const endPct   = endMs !== null ? Math.max(startPct+3, Math.min(100, (endMs/totalMs)*100)) : startPct+5;
    const barColor = statusColors[r.status] || '#64748b';

    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">';
    h += '<div style="width:132px;flex-shrink:0;font-size:11px;font-weight:500;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding-right:8px" title="'+esc(b.name)+'">'+esc(b.name.length>18?b.name.slice(0,17)+'…':b.name)+'</div>';
    h += '<div style="flex:1;position:relative;height:26px;background:rgba(255,255,255,.04);border-radius:6px;border:1px solid var(--bdr)">';
    h += '<div style="position:absolute;left:'+startPct+'%;width:'+(endPct-startPct)+'%;height:100%;background:'+barColor+';opacity:'+(r.status==='done'?'1':'.7')+';border-radius:5px;display:flex;align-items:center;padding-left:6px;overflow:hidden">';
    h += '<span style="font-size:10px;color:#fff;font-weight:600;white-space:nowrap">'+(tc?fd(tc):'No date')+'</span>';
    h += '</div>';
    if (todayPct >= 0 && todayPct <= 100) {
      h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--ind-l);opacity:.9;z-index:2;border-radius:1px"></div>';
    }
    h += '</div>';
    h += bdg(r.status, BS);
    h += '</div>';
  });

  if (todayPct >= 0 && todayPct <= 100) {
    h += '<div style="position:relative;margin-left:140px;height:16px;margin-top:2px">';
    h += '<div style="position:absolute;left:'+todayPct+'%;transform:translateX(-50%);font-size:10px;color:var(--ind-l);font-weight:600;white-space:nowrap">▲ Today</div>';
    h += '</div>';
  }

  const bDates = pbs.map(r=>r.targetCompletion).filter(Boolean);
  if (bDates.length && !proj.deadline) {
    const latest = bDates.sort().slice(-1)[0];
    h += '<div style="margin-top:12px;font-size:11px;color:var(--teal);background:rgba(20,184,166,.08);border-radius:8px;padding:7px 10px;border:1px solid rgba(20,184,166,.15)">⊕ Derived project end: <strong>'+fd(latest)+'</strong> — latest building completion. Use Edit project to set a manual deadline.</div>';
  }

  h += '</div></div>';
  return h;
}

async function cySt(id) {
  const t = DB.tasks.find(x => x.id===id);
  if (!t) return;
  const i = SCYC.indexOf(t.status);
  t.status = SCYC[(i+1) % SCYC.length];
  await SB.from('tasks').update({status:t.status}).eq('id',id).eq('user_id',U.id);
  rProj();
}
async function dTsk(id) {
  if (!confirm('Delete this task?')) return;
  await delRow('tasks', id);
  DB.tasks = DB.tasks.filter(t => t.id!==id);
  rProj();
}
async function dMil(id) {
  const m = DB.milestones.find(x => x.id===id);
  if (!confirm('Delete milestone "'+m?.name+'" and its tasks?')) return;
  await delRow('sub_projects', id);
  DB.milestones = DB.milestones.filter(x => x.id!==id);
  DB.tasks = DB.tasks.filter(t => t.milestoneId!==id);
  rProj();
}
async function dPrj(id) {
  const p = DB.projects.find(x => x.id===id);
  if (!confirm('Delete "'+p?.name+'" and all its data?')) return;
  await delRow('projects', id);
  DB.projects   = DB.projects.filter(x => x.id!==id);
  DB.milestones = DB.milestones.filter(m => m.projectId!==id);
  DB.tasks      = DB.tasks.filter(t => t.projectId!==id);
  DB.pb         = DB.pb.filter(r => r.projectId!==id);
  rProj();
}

// ── Building assignment ──
function oAsn(pid) {
  const proj = DB.projects.find(p => p.id===pid);
  const asgn = new Set(DB.pb.filter(r => r.projectId===pid).map(r => r.buildingId));
  let h = '<div class="fg"><input class="gi" id="as-s" placeholder="Search buildings…" oninput="fAsn()"></div>';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
  h += '<span id="ac" style="font-size:12px;color:var(--txt2)">'+asgn.size+' of '+DB.buildings.length+' selected</span>';
  h += '<button onclick="tgAll()" style="font-size:12px;color:var(--ind-l);background:none;border:none;cursor:pointer;font-weight:500">Select all</button></div>';
  h += '<div id="asl" style="border:1px solid var(--bdr);border-radius:10px;max-height:280px;overflow:auto;margin-bottom:14px">'+asnL(DB.buildings,asgn)+'</div>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svAsn(\''+pid+'\')">Save</button></div>';
  OS('Buildings — '+esc(proj?.name||''), h, true);
}
function asnL(blds, asgn) {
  if (!blds.length) return '<div style="padding:16px;font-size:13px;color:var(--txt2);text-align:center">No results</div>';
  return blds.map(b => {
    const chk = asgn.has(b.id) ? ' checked' : '';
    const bg  = asgn.has(b.id) ? 'rgba(99,102,241,.07)' : 'transparent';
    return '<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);background:'+bg+'"><input type="checkbox" value="'+b.id+'"'+chk+' style="accent-color:var(--ind);width:16px;height:16px" onchange="uAC()"><div><div style="font-size:13px;font-weight:500;color:var(--txt)">'+esc(b.name)+'</div><div style="font-size:11px;color:var(--txt3)">'+esc(b.city||'')+'</div></div></label>';
  }).join('');
}
function fAsn() {
  const q   = val('as-s').toLowerCase();
  const fil = DB.buildings.filter(b => !q || b.name.toLowerCase().includes(q) || (b.city||'').toLowerCase().includes(q));
  const chk = new Set([...document.querySelectorAll('#asl input:checked')].map(c => c.value));
  document.getElementById('asl').innerHTML = asnL(fil, chk);
}
function uAC() {
  const n = document.querySelectorAll('#asl input:checked').length;
  const e = document.getElementById('ac');
  if (e) e.textContent = n+' of '+DB.buildings.length+' selected';
}
function tgAll() {
  const cbs = document.querySelectorAll('#asl input[type=checkbox]');
  const all = [...cbs].every(c => c.checked);
  cbs.forEach(c => { c.checked = !all; });
  uAC();
}
async function svAsn(pid) {
  const sel   = [...document.querySelectorAll('#asl input:checked')].map(c => c.value);
  const toRm  = DB.pb.filter(r => r.projectId===pid && !sel.includes(r.buildingId));
  for (const r of toRm) await delRow('project_buildings', r.id);
  DB.pb = DB.pb.filter(r => !(r.projectId===pid && !sel.includes(r.buildingId)));
  const ex    = new Set(DB.pb.filter(r => r.projectId===pid).map(r => r.buildingId));
  const toAdd = sel.filter(bid => !ex.has(bid));
  if (toAdd.length) {
    const rows = toAdd.map(bid => ({user_id:U.id, project_id:pid, building_id:bid, status:'not_started', remarks:''}));
    const {data} = await SB.from('project_buildings').insert(rows).select();
    if (data) data.forEach(r => DB.pb.push({...r, projectId:r.project_id, buildingId:r.building_id}));
  }
  CS();
  rProj();
}

  // Target completion date

  // Remarks
  h += '<div class="fg"><label class="fl">Remarks (shown in digest)</label>';
  h += '<textarea id="pb-rm" class="gi" placeholder="e.g. Contractor confirmed. Work starts Monday.">'+esc(r.remarks||'')+'</textarea></div>';

  // ── TASKS FOR THIS BUILDING ──
  h += '<div style="border-top:1px solid var(--bdr);padding-top:14px;margin-top:6px">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h += '<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em">Tasks at this building</div>';
  h += '<button onclick="oBldTF(\''+rid+'\',\''+r.projectId+'\')" class="mb" style="font-size:11px">+ Add task</button>';
  h += '</div>';

  if (!bTasks.length) {
    h += '<div style="font-size:12px;color:var(--txt3);text-align:center;padding:10px">No tasks yet for this building.</div>';
  } else {
    bTasks.forEach(t => {
      const pe  = DB.people.find(p => p.id===t.assignedTo);
      const od  = isOD(t.dueDate, t.status);
      h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:'+(od?'rgba(244,63,94,.07)':'var(--glass)')+';border-radius:8px;border:1px solid '+(od?'rgba(244,63,94,.2)':'var(--bdr)')+';margin-bottom:5px">';

      h += '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px">';
      h += '<span onclick="cyStBS(\''+t.id+'\',\''+rid+'\')" style="cursor:pointer">'+bdg(t.status)+'</span>';

async function svBldTsk(id, pid, rid) {
  const ti = val('btf-ti').trim();
  if (!ti) return;
  const obj = {
    title: ti, notes: val('btf-no').trim(),
    assigned_to: val('btf-at')||null,
    status: val('btf-st'), priority: val('btf-pr'),
    due_date: val('btf-dd')||null, follow_up: val('btf-fu')||null,
    project_id: pid, project_building_id: rid,
    sub_project_id: null, depends_on: [],
  };
  if (id) {
    await SB.from('tasks').update(obj).eq('id',id).eq('user_id',U.id);
    DB.tasks = DB.tasks.map(x => x.id===id ? {...x,...obj, projectId:pid, buildingRefId:rid, assignedTo:obj.assigned_to, dueDate:obj.due_date, followUp:obj.follow_up} : x);
  } else {
    const {data} = await SB.from('tasks').insert({...obj, user_id:U.id}).select().single();

  }
  oPBS(rid); // return to building detail
}

async function cyStBS(taskId, rid) {
  const t = DB.tasks.find(x => x.id===taskId);

  const i = SCYC.indexOf(t.status);
  t.status = SCYC[(i+1) % SCYC.length];
  await SB.from('tasks').update({status:t.status}).eq('id',taskId).eq('user_id',U.id);
  oPBS(rid);
}

}

/* ══════════════════════════════════════════════════════
   DIGEST
══════════════════════════════════════════════════════ */
function buildMsg(person) {
  const ownedProjs = DB.projects.filter(pr => pr.primaryOwnerId===person.id && pr.status!=='done');
  if (!ownedProjs.length) return null;

  const overdueByProj = {};
  const atRiskProjs   = [];
  ownedProjs.forEach(pr => {
    const tasks = DB.tasks.filter(t => t.projectId===pr.id && t.status!=='done');
    const od    = tasks.filter(t => isOD(t.dueDate,t.status));
    if (od.length) overdueByProj[pr.id] = {proj:pr, tasks:od};
    if (pr.health==='at_risk'||pr.health==='delayed') atRiskProjs.push(pr);
  });

  const hasOD  = Object.keys(overdueByProj).length > 0;
  const hasAR  = atRiskProjs.length > 0;
  if (!hasOD && !hasAR) return null;

  let msg = '*⚠ Action Required — '+person.name+'*\n'+nowFull()+'\n';

  if (hasOD) {
    msg += '\n━━━━━━━━━━━━━━━━━━\n🔴 *OVERDUE TASKS*\n';
    Object.values(overdueByProj).forEach(({proj,tasks}) => {
      msg += '\n📁 *'+proj.name+'*\n';
      tasks.forEach(t => {
        const pe   = DB.people.find(p => p.id===t.assignedTo);
        const deps = (t.dependsOn||[]).map(id=>DB.tasks.find(x=>x.id===id)).filter(Boolean).filter(d=>d.status!=='done');
        msg += '   ⚠️ *'+t.title+'*\n';
        msg += '      Was due: '+fd(t.dueDate)+'\n';
        if (pe)         msg += '      Responsible: '+pe.name+'\n';
        if (t.notes)    msg += '      Note: '+t.notes+'\n';
        if (deps.length) msg += '      ⛓ Blocked by: '+deps.map(d=>d.title).join(', ')+'\n';
      });
    });
  }

  if (hasAR) {
    msg += '\n━━━━━━━━━━━━━━━━━━\n🟡 *PROJECTS NEEDING ATTENTION*\n';
    atRiskProjs.forEach(pr => {
      const allT   = DB.tasks.filter(t => t.projectId===pr.id);
      const pct    = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
      const nextMil = DB.milestones.filter(m=>m.projectId===pr.id&&m.status!=='done'&&m.deadline).sort((a,b)=>a.deadline.localeCompare(b.deadline))[0];
      const blocked = DB.pb.filter(r=>r.projectId===pr.id&&(r.status==='blocked'||r.status==='on_hold'));
      msg += '\n📁 *'+pr.name+'* — '+(HS[pr.health]?.l||'At Risk')+'\n';
      msg += '   Progress: '+pct+'%\n';
      if (pr.deadline)  msg += '   Deadline: '+fd(pr.deadline)+'\n';
      if (nextMil)      msg += '   Next milestone: '+nextMil.name+' ('+fd(nextMil.deadline)+')\n';
      if (blocked.length) {
        msg += '   🏢 Blocked buildings:\n';
        blocked.forEach(r => {
          const bl = DB.buildings.find(b=>b.id===r.buildingId);
          if (!bl) return;
          msg += '      • '+bl.name+(bl.city?', '+bl.city:'')+' — '+(BS[r.status]?.l||r.status)+(r.remarks?' ('+r.remarks+')':'')+'\n';
        });
      }
    });
  }

  msg += '\n━━━━━━━━━━━━━━━━━━';
  const totalOD = Object.values(overdueByProj).reduce((s,{tasks})=>s+tasks.length,0);
  if (totalOD) msg += '\n📊 *'+totalOD+' overdue task'+(totalOD!==1?'s':'')+' require immediate action*';
  return msg;
}

async function svDE(pid) {
  const el = document.getElementById('de-'+pid);
  if (!el) return;
  const content = el.value;
  DB.de[pid] = content;
  await SB.from('digest_edits').upsert({user_id:U.id,person_id:pid,content,updated_at:new Date().toISOString()},{onConflict:'user_id,person_id'});
  const ind = document.getElementById('di-'+pid);
  if (ind) { ind.textContent='Saved ✓'; ind.style.color='var(--grn)'; setTimeout(()=>{ if(ind) ind.textContent=''; },1500); }
}
async function rgDig(pid) {
  if (!confirm('Discard edits and regenerate?')) return;
  const person = DB.people.find(p => p.id===pid);
  const fresh  = buildMsg(person)||'';
  const el     = document.getElementById('de-'+pid);
  if (el) el.value = fresh;
  delete DB.de[pid];
  await SB.from('digest_edits').delete().eq('user_id',U.id).eq('person_id',pid);
  const ind = document.getElementById('di-'+pid);
  if (ind) { ind.textContent='Regenerated'; ind.style.color='var(--ind-l)'; setTimeout(()=>{ if(ind) ind.textContent=''; },1500); }
}
async function rgAll() {
  if (!confirm('Discard ALL edits and regenerate all messages?')) return;
  DB.de = {};
  await SB.from('digest_edits').delete().eq('user_id',U.id);
  rDig();
}

function rDig() {
  const owners = DB.people.filter(p => DB.projects.some(pr => pr.primaryOwnerId===p.id && pr.status!=='done'));
  const dig    = owners.map(p => {
    const auto = buildMsg(p);
    const msg  = DB.de[p.id] !== undefined ? DB.de[p.id] : auto;
    return {person:p, msg, auto, hasEdit:DB.de[p.id]!==undefined};
  }).filter(x => x.auto);

  let h = '<div class="ph"><div><div class="pt">Daily Digest</div><div class="ps">Overdue &amp; at-risk · '+nowFull()+'</div></div><button class="btn btn-g btn-sm" onclick="rgAll()">↺ Regen all</button></div>';
  h += '<div style="font-size:12px;color:var(--txt2);margin-bottom:20px;padding:10px 14px;background:var(--glass);border-radius:10px;border:1px solid var(--bdr)">Sent to project owners. Only <strong style="color:var(--rose)">overdue tasks</strong> and <strong style="color:var(--amb)">at-risk projects</strong> are included — nothing else.</div>';

  if (!dig.length) {
    h += '<div class="es"><span class="em">🎉</span><div class="et">All clear!</div><div class="ed">No overdue tasks or at-risk projects today.</div></div>';
    document.getElementById('tab-digest').innerHTML = h;
    return;
  }

  dig.forEach(({person,msg,auto,hasEdit}) => {
    const ownedProjs = DB.projects.filter(pr => pr.primaryOwnerId===person.id && pr.status!=='done');
    const totalOD    = DB.tasks.filter(t => ownedProjs.some(pr=>pr.id===t.projectId) && isOD(t.dueDate,t.status)).length;
    const atRisk     = ownedProjs.filter(pr => pr.health==='at_risk'||pr.health==='delayed').length;
    const isEd       = hasEdit && msg!==auto;

    h += '<div class="gc" style="margin-bottom:16px">';
    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
    h += av(person.name,person.color,46);
    h += '<div style="flex:1"><div style="font-size:15px;font-weight:700">'+esc(person.name)+'</div><div style="font-size:12px;color:var(--txt2)">'+esc(person.role||'Project Owner')+'</div>';
    h += '<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">';
    if (totalOD) h += '<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">🔴 '+totalOD+' overdue</span>';
    if (atRisk)  h += '<span class="bd" style="background:rgba(245,158,11,.14);color:#f59e0b">🟡 '+atRisk+' at risk</span>';
    if (isEd)    h += '<span class="bd" style="background:rgba(245,158,11,.12);color:#fbbf24">✎ Edited</span>';
    h += '</div></div>';
    h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">';
    h += '<button onclick="rgDig(\''+person.id+'\')" class="mb" style="font-size:11px">↺ Reset</button>';
    h += '<span id="di-'+person.id+'" style="font-size:11px;color:var(--txt3);min-height:14px"></span>';
    h += '</div></div>';
    h += '<textarea id="de-'+person.id+'" class="dta" oninput="svDE(\''+person.id+'\')">'+esc(msg)+'</textarea>';
    h += '<div style="display:flex;gap:10px;margin-top:10px">';
    h += '<button class="cp-b" id="cp-'+person.id+'" onclick="cpM(\''+person.id+'\')">📋 Copy</button>';
    h += '<button class="wa-b" onclick="oWA(\''+person.id+'\')">';
    h += '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>';
    h += 'WhatsApp '+esc(person.name.split(' ')[0])+'</button>';
    h += '</div></div>';
  });

  document.getElementById('tab-digest').innerHTML = h;
}

function cpM(pid) {
  const el  = document.getElementById('de-'+pid);
  const msg = el ? el.value : '';
  if (!msg) return;
  navigator.clipboard.writeText(msg).catch(()=>{}).finally(() => {
    const b = document.getElementById('cp-'+pid);
    if (b) { b.textContent='✓ Copied!'; b.classList.add('ok'); setTimeout(()=>{ b.textContent='📋 Copy'; b.classList.remove('ok'); },2000); }
  });
}
function oWA(pid) {
  const el  = document.getElementById('de-'+pid);
  const msg = el ? el.value : '';
  const p   = DB.people.find(x => x.id===pid);
  if (!p?.phone) { alert('No WhatsApp number for '+p?.name); return; }
  if (!msg) return;
  window.open('https://wa.me/'+p.phone.replace(/\D/g,'')+'?text='+encodeURIComponent(msg), '_blank');
}

/* ══════════════════════════════════════════════════════
   PROFILE
══════════════════════════════════════════════════════ */
function openProfile() {
  const email = U.email||'';
  const dn    = U.user_metadata?.display_name || email.split('@')[0] || '';
  let h = '<div style="display:flex;flex-direction:column;align-items:center;padding:10px 0 22px;border-bottom:1px solid var(--bdr);margin-bottom:22px">';
  h += '<div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--ind),var(--teal));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:12px">'+email.slice(0,2).toUpperCase()+'</div>';
  h += '<div style="font-size:16px;font-weight:700">'+esc(dn)+'</div><div style="font-size:12px;color:var(--txt3);margin-top:3px">'+esc(email)+'</div></div>';
  h += '<div class="fg"><label class="fl">Display name</label><input id="pr-dn" class="gi" placeholder="Your name" value="'+esc(dn)+'"></div>';
  h += '<div style="border-top:1px solid var(--bdr);margin:18px 0"></div>';
  h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px">Change password</div>';
  h += '<div class="fg"><label class="fl">New password</label><input id="pr-pw1" class="gi" type="password" placeholder="Min 8 characters"></div>';
  h += '<div class="fg"><label class="fl">Confirm password</label><input id="pr-pw2" class="gi" type="password" placeholder="Repeat password"></div>';
  h += '<div id="pr-msg"></div>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svProfile()">Save changes</button></div>';
  h += '<div style="border-top:1px solid var(--bdr);margin-top:22px;padding-top:16px"><button onclick="doSO()" style="width:100%;padding:11px;border-radius:var(--r-sm);background:rgba(244,63,94,.08);color:#f87171;border:1px solid rgba(244,63,94,.18);font-size:13px;font-weight:600;cursor:pointer">↪ Sign out of Taskora</button></div>';
  OS('My Account', h);
}
async function svProfile() {
  const dn  = val('pr-dn').trim();
  const pw1 = val('pr-pw1');
  const pw2 = val('pr-pw2');
  const el  = document.getElementById('pr-msg');
  const sm  = (m,ok) => { if(el) el.innerHTML='<div class="amsg '+(ok?'ok':'err')+'" style="margin-bottom:0">'+m+'</div>'; };
  let changed = false;
  if (dn) {
    const {error} = await SB.auth.updateUser({data:{display_name:dn}});
    if (error) { sm('Error: '+error.message); return; }
    document.getElementById('sb-name').textContent = dn;
    changed = true;
  }
  if (pw1||pw2) {
    if (pw1!==pw2)   { sm('Passwords do not match.'); return; }
    if (pw1.length<8) { sm('Password must be at least 8 characters.'); return; }
    const {error} = await SB.auth.updateUser({password:pw1});
    if (error) { sm('Error: '+error.message); return; }
    changed = true;
  }
  sm(changed ? 'Changes saved!' : 'No changes to save.', changed);
}

/* ── PWA ── */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

boot();
