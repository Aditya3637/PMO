        h += '<div id="act-log-'+proj.id+'"><div style="font-size:12px;color:var(--txt3);text-align:center;padding:6px">Tap \'Load history\' to view recent changes</div></div>';
        h += '</div>';
      }

      h += '</div>'; // end expanded
    }
    h += '</div>'; // end card
  });

  document.getElementById('tab-projects').innerHTML = h;
}

// ── FULL PAGE GANTT — all projects + buildings ──
function rGanttFull() {
  const active = DB.projects.filter(p => p.status !== 'done');
  if (!active.length) return '<div class="es"><span class="em">📊</span><div class="et">No active projects</div><div class="ed">Create projects and assign buildings with completion dates to see the Gantt</div></div>';

  // Compute global timeline bounds
  const allDates = [];
  active.forEach(proj => {
    if (proj.deadline) allDates.push(proj.deadline);
    if (proj.created_at) allDates.push(proj.created_at.slice(0,10));
    DB.pb.filter(r => r.projectId===proj.id).forEach(r => {
      if (r.targetCompletion) allDates.push(r.targetCompletion);
    });
    DB.milestones.filter(m => m.projectId===proj.id && m.deadline).forEach(m => allDates.push(m.deadline));
  });
  allDates.push(tday());
  const sorted = [...allDates].sort();
  const minDate = new Date(sorted[0]+'T12:00:00');
  const rawMax  = new Date(sorted[sorted.length-1]+'T12:00:00');
  // ensure at least 60 days span
  if ((rawMax - minDate) < 60*86400000) rawMax.setDate(rawMax.getDate()+60);
  const maxDate = rawMax;
  const totalMs = maxDate - minDate;

  const pct = ms => Math.max(0, Math.min(100, (ms / totalMs) * 100));
  const datePct = d => pct(new Date(d+'T12:00:00') - minDate);
  const todayPct = pct(new Date(tday()+'T12:00:00') - minDate);

  const HEALTH_COLOR = {on_track:'#10b981', at_risk:'#f59e0b', delayed:'#f43f5e', not_started:'#64748b'};
  const STATUS_COLOR  = {done:'#10b981', in_progress:'#f59e0b', blocked:'#f43f5e', on_hold:'#fb923c', not_started:'#64748b'};
  const LABEL_W = 160; // px width of label column

  // Month header labels
  const months = [];
  const cur = new Date(minDate);
  cur.setDate(1);
  while (cur <= maxDate) {
    const p = pct(new Date(cur) - minDate);
    months.push({label: cur.toLocaleDateString('en-IN',{month:'short',year:'2-digit'}), pct: Math.max(0, Math.min(98, p))});
    cur.setMonth(cur.getMonth()+1);
  }

  let h = '<div style="overflow-x:auto;padding-bottom:8px">';
  h += '<div style="min-width:520px">';

  // Month ruler
  h += '<div style="display:flex;margin-bottom:6px">';
  h += '<div style="width:'+LABEL_W+'px;flex-shrink:0"></div>';
  h += '<div style="flex:1;position:relative;height:20px">';
  months.forEach(m => {
    h += '<div style="position:absolute;left:'+m.pct+'%;transform:translateX(-50%);font-size:10px;color:var(--txt3);white-space:nowrap;font-weight:500">'+m.label+'</div>';
  });
  h += '</div></div>';

  // Gridlines + today marker background strip
  h += '<div style="display:flex;margin-bottom:4px">';
  h += '<div style="width:'+LABEL_W+'px;flex-shrink:0"></div>';
  h += '<div style="flex:1;position:relative;height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden">';
  months.forEach(m => {
    h += '<div style="position:absolute;left:'+m.pct+'%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.06)"></div>';
  });
  if (todayPct >= 0 && todayPct <= 100) {
    h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--ind-l);opacity:.9"></div>';
  }
  h += '</div></div>';

  // Each project
  active.forEach(proj => {
    const owner = DB.people.find(p => p.id===proj.primaryOwnerId);
    const pbs   = DB.pb.filter(r => r.projectId===proj.id).map(r => ({...r, b:DB.buildings.find(b=>b.id===r.buildingId)})).filter(r => r.b);
    const mils  = DB.milestones.filter(m => m.projectId===proj.id && m.deadline && m.status!=='done');
    const allT  = DB.tasks.filter(t => t.projectId===proj.id);
    const taskPct = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
    const ovd   = allT.filter(t => isOD(t.dueDate,t.status)).length;

    // Compute project bar span
    const projStartStr = (proj.created_at||new Date().toISOString()).slice(0,10);
    const bDates = pbs.map(r=>r.targetCompletion).filter(Boolean);
    const projEndStr = proj.deadline || (bDates.length ? bDates.sort().slice(-1)[0] : null);
    const barStart = datePct(projStartStr);
    const barEnd   = projEndStr ? Math.max(barStart+2, datePct(projEndStr)) : barStart+3;
    const healthColor = HEALTH_COLOR[proj.health||'on_track'];

    // ── Project row ──
    h += '<div style="display:flex;align-items:center;gap:0;margin-bottom:3px;cursor:pointer" onclick="projView=\'list\';pFil=\'active\';expP[\''+proj.id+'\']=true;rProj()">';
    // Label
    h += '<div style="width:'+LABEL_W+'px;flex-shrink:0;padding-right:10px;display:flex;align-items:center;gap:6px">';
    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+proj.color+';flex-shrink:0;box-shadow:0 0 5px '+proj.color+'66"></div>';
    h += '<div style="min-width:0"><div style="font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+esc(proj.name)+'">'+esc(proj.name.length>18?proj.name.slice(0,17)+'…':proj.name)+'</div>';
    if (owner) h += '<div style="font-size:10px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(owner.name.split(' ')[0])+'</div>';
    h += '</div></div>';
    // Bar track
    h += '<div style="flex:1;position:relative;height:28px;background:rgba(255,255,255,.03);border-radius:6px;border:1px solid var(--bdr);overflow:hidden">';
    // Gridlines
    months.forEach(m => {
      h += '<div style="position:absolute;left:'+m.pct+'%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.04)"></div>';
    });
    // Project bar
    h += '<div style="position:absolute;left:'+barStart+'%;width:'+(barEnd-barStart)+'%;height:100%;background:'+healthColor+';opacity:.25;border-radius:5px"></div>';
    // Filled progress within bar
    if (taskPct > 0) {
      const fillW = (barEnd-barStart) * taskPct/100;
      h += '<div style="position:absolute;left:'+barStart+'%;width:'+fillW+'%;height:100%;background:'+healthColor+';opacity:.7;border-radius:5px"></div>';
    }
    // Labels inside bar
    h += '<div style="position:absolute;left:'+(barStart+0.5)+'%;top:0;bottom:0;display:flex;align-items:center;padding:0 6px;pointer-events:none">';
    h += '<span style="font-size:10px;font-weight:700;color:#fff;white-space:nowrap">'+taskPct+'%'+(ovd?' · ⚠'+ovd:'')+'</span>';
    h += '</div>';
    // Today line
    if (todayPct >= 0 && todayPct <= 100) {
      h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--ind-l);opacity:.9;z-index:3"></div>';
    }
    // Milestone diamonds
    mils.forEach(mil => {
      const mp = datePct(mil.deadline);
      h += '<div style="position:absolute;left:'+mp+'%;top:50%;transform:translate(-50%,-50%) rotate(45deg);width:8px;height:8px;background:#f59e0b;border:1px solid rgba(0,0,0,.3);z-index:4" title="'+esc(mil.name)+' — '+fd(mil.deadline)+'"></div>';
    });
    h += '</div>';
    // Right: health badge
    h += '<div style="width:56px;flex-shrink:0;padding-left:8px">'+hBdg(proj.health||'on_track')+'</div>';
    h += '</div>';

    // ── Building sub-rows ──
    if (pbs.length) {
      pbs.forEach(r => {
        const tc = r.targetCompletion;
        const secOwner = DB.people.find(p => p.id===r.secondaryOwnerId);
        const bTasks = DB.tasks.filter(t => t.buildingRefId===r.id);
        const bOD = bTasks.filter(t => isOD(t.dueDate,t.status)).length;
        const barColor = STATUS_COLOR[r.status] || '#64748b';
        const bStart = barStart; // buildings start when project starts
        const bEnd   = tc ? Math.max(bStart+2, datePct(tc)) : bStart+4;

        h += '<div style="display:flex;align-items:center;gap:0;margin-bottom:2px;cursor:pointer" onclick="event.stopPropagation();oPBS(\''+r.id+'\')">';
        // Label — indented
        h += '<div style="width:'+LABEL_W+'px;flex-shrink:0;padding-right:10px;padding-left:18px;display:flex;align-items:center;gap:5px">';
        h += '<div style="width:5px;height:5px;border-radius:50%;background:'+barColor+';flex-shrink:0;opacity:.8"></div>';
        h += '<div style="min-width:0"><div style="font-size:11px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+esc(r.b.name)+'">'+esc(r.b.name.length>20?r.b.name.slice(0,19)+'…':r.b.name)+'</div>';
        if (secOwner) h += '<div style="font-size:10px;color:var(--txt3)">'+esc(secOwner.name.split(' ')[0])+'</div>';
        h += '</div></div>';
        // Bar track
        h += '<div style="flex:1;position:relative;height:20px;background:rgba(255,255,255,.02);border-radius:4px;overflow:hidden">';
        months.forEach(m => {
          h += '<div style="position:absolute;left:'+m.pct+'%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.04)"></div>';
        });
        // Building bar
        h += '<div style="position:absolute;left:'+bStart+'%;width:'+(bEnd-bStart)+'%;height:100%;background:'+barColor+';opacity:'+(r.status==='done'?'.8':'.5')+';border-radius:4px;display:flex;align-items:center;padding:0 6px;overflow:hidden">';
        if (tc) h += '<span style="font-size:10px;color:#fff;font-weight:600;white-space:nowrap">'+fd(tc)+'</span>';
        h += '</div>';
        // Today line
        if (todayPct >= 0 && todayPct <= 100) {
          h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:1px;background:var(--ind-l);opacity:.7;z-index:3"></div>';
        }
        h += '</div>';
        // Right: status + overdue badge
        h += '<div style="width:56px;flex-shrink:0;padding-left:8px;display:flex;flex-direction:column;gap:2px">';
        h += bdg(r.status, BS);
        if (bOD) h += '<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">⚠ '+bOD+'</span>';
        h += '</div>';
        h += '</div>';
      });
      // Spacer
      h += '<div style="height:6px"></div>';
    }
  });

  // Today label
  if (todayPct >= 0 && todayPct <= 100) {
    h += '<div style="display:flex;margin-top:4px">';
    h += '<div style="width:'+LABEL_W+'px;flex-shrink:0"></div>';
    h += '<div style="flex:1;position:relative;height:16px">';
    h += '<div style="position:absolute;left:'+todayPct+'%;transform:translateX(-50%);font-size:10px;color:var(--ind-l);font-weight:700;white-space:nowrap">▲ Today '+fd(tday())+'</div>';
    h += '</div></div>';
  }

  // Legend
  h += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;padding:10px 14px;background:var(--glass);border-radius:10px;border:1px solid var(--bdr)">';
  h += '<span style="font-size:11px;color:var(--txt3);font-weight:600;align-self:center">Legend:</span>';
  h += '<span style="font-size:11px;color:#10b981">● On track</span>';
  h += '<span style="font-size:11px;color:#f59e0b">● At risk</span>';
  h += '<span style="font-size:11px;color:#f43f5e">● Delayed</span>';
  h += '<span style="font-size:11px;color:var(--txt2)">◆ Milestone</span>';
  h += '<span style="font-size:11px;color:var(--ind-l)">│ Today</span>';
  h += '<span style="font-size:11px;color:var(--txt3)">Dark fill = completed %</span>';
  h += '</div>';

  h += '</div></div>';
  return h;
}

// ── GANTT CHART — building-wise (inside expanded project card) ──
function rGantt(proj, pbs) {
  const allDates = pbs.map(r => r.targetCompletion).filter(Boolean);
  if (proj.deadline) allDates.push(proj.deadline);
  const projStart = (proj.created_at||new Date().toISOString()).slice(0,10);
  allDates.push(projStart);
  allDates.push(new Date().toISOString().slice(0,10));

  const sortedDates = [...allDates].sort();
  const minDate = new Date(sortedDates[0]+'T12:00:00');
  const maxDate = new Date(sortedDates[sortedDates.length-1]+'T12:00:00');
  if ((maxDate - minDate) < 30*86400000) maxDate.setDate(maxDate.getDate()+30);

  const totalMs  = maxDate - minDate;
  const todayMs  = new Date(tday()+'T12:00:00') - minDate;
  const todayPct = Math.max(0, Math.min(100, (todayMs/totalMs)*100));

  const statusColors = {done:'#10b981', in_progress:'#f59e0b', blocked:'#f43f5e', on_hold:'#fb923c', not_started:'#64748b'};

  const months = [];
  const cur = new Date(minDate);
  cur.setDate(1);
  while (cur <= maxDate) {
    const pct = ((new Date(cur) - minDate) / totalMs) * 100;
    months.push({label: cur.toLocaleDateString('en-IN',{month:'short', year:'2-digit'}), pct: Math.max(0,Math.min(98,pct))});
    cur.setMonth(cur.getMonth()+1);
  }

  let h = '<div style="margin-bottom:16px">';
  h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">📊 Building Gantt — Completion Timeline</div>';

  h += '<div style="position:relative;height:18px;margin-bottom:8px;margin-left:140px">';
  months.forEach(m => {
    h += '<div style="position:absolute;left:'+m.pct+'%;font-size:10px;color:var(--txt3);white-space:nowrap;transform:translateX(-50%)">'+m.label+'</div>';
  });
  h += '</div>';

  h += '<div>';
  pbs.forEach(r => {
    const b = r.b;
    const tc = r.targetCompletion;
    const startMs  = new Date(projStart+'T12:00:00') - minDate;
    const endMs    = tc ? (new Date(tc+'T12:00:00') - minDate) : null;
    const startPct = Math.max(0, Math.min(100, (startMs/totalMs)*100));
    const endPct   = endMs !== null ? Math.max(startPct+3, Math.min(100, (endMs/totalMs)*100)) : startPct+5;
    const barColor = statusColors[r.status] || '#64748b';

    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">';
    h += '<div style="width:132px;flex-shrink:0;font-size:11px;font-weight:500;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding-right:8px" title="'+esc(b.name)+'">'+esc(b.name.length>18?b.name.slice(0,17)+'…':b.name)+'</div>';
    h += '<div style="flex:1;position:relative;height:26px;background:rgba(255,255,255,.04);border-radius:6px;border:1px solid var(--bdr)">';
    h += '<div style="position:absolute;left:'+startPct+'%;width:'+(endPct-startPct)+'%;height:100%;background:'+barColor+';opacity:'+(r.status==='done'?'1':'.7')+';border-radius:5px;display:flex;align-items:center;padding-left:6px;overflow:hidden">';
    h += '<span style="font-size:10px;color:#fff;font-weight:600;white-space:nowrap">'+(tc?fd(tc):'No date')+'</span>';
    h += '</div>';
    if (todayPct >= 0 && todayPct <= 100) {
      h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--ind-l);opacity:.9;z-index:2;border-radius:1px"></div>';
    }
    h += '</div>';
    h += bdg(r.status, BS);
    h += '</div>';
  });

  if (todayPct >= 0 && todayPct <= 100) {
    h += '<div style="position:relative;margin-left:140px;height:16px;margin-top:2px">';
    h += '<div style="position:absolute;left:'+todayPct+'%;transform:translateX(-50%);font-size:10px;color:var(--ind-l);font-weight:600;white-space:nowrap">▲ Today</div>';
    h += '</div>';
  }

  const bDates = pbs.map(r=>r.targetCompletion).filter(Boolean);
  if (bDates.length && !proj.deadline) {
    const latest = bDates.sort().slice(-1)[0];
    h += '<div style="margin-top:12px;font-size:11px;color:var(--teal);background:rgba(20,184,166,.08);border-radius:8px;padding:7px 10px;border:1px solid rgba(20,184,166,.15)">⊕ Derived project end: <strong>'+fd(latest)+'</strong> — latest building completion. Use Edit project to set a manual deadline.</div>';
  }

  h += '</div></div>';
  return h;
}

function asnL(blds, asgn) {
  if (!blds.length) return '<div style="padding:16px;font-size:13px;color:var(--txt2);text-align:center">No results</div>';
  return blds.map(b => {
    const chk = asgn.has(b.id) ? ' checked' : '';
    const bg  = asgn.has(b.id) ? 'rgba(99,102,241,.07)' : 'transparent';
    return '<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);background:'+bg+'"><input type="checkbox" value="'+b.id+'"'+chk+' style="accent-color:var(--ind);width:16px;height:16px" onchange="uAC()"><div><div style="font-size:13px;font-weight:500;color:var(--txt)">'+esc(b.name)+'</div><div style="font-size:11px;color:var(--txt3)">'+esc(b.city||'')+'</div></div></label>';
  }).join('');

function fAsn() {
  const q   = val('as-s').toLowerCase();
  const fil = DB.buildings.filter(b => !q || b.name.toLowerCase().includes(q) || (b.city||'').toLowerCase().includes(q));
  const chk = new Set([...document.querySelectorAll('#asl input:checked')].map(c => c.value));
  document.getElementById('asl').innerHTML = asnL(fil, chk);
}
function uAC() {
  const n = document.querySelectorAll('#asl input:checked').length;
  const e = document.getElementById('ac');
  if (e) e.textContent = n+' of '+DB.buildings.length+' selected';
}
function tgAll() {
  const cbs = document.querySelectorAll('#asl input[type=checkbox]');
  const all = [...cbs].every(c => c.checked);
  cbs.forEach(c => { c.checked = !all; });
  uAC();

  const ex    = new Set(DB.pb.filter(r => r.projectId===pid).map(r => r.buildingId));

  if (toAdd.length) {
    const rows = toAdd.map(bid => ({user_id:CHAIRMAN_UID||U.id, project_id:pid, building_id:bid, status:'not_started', remarks:''}));

  CS();
  rProj();
}

/* ══════════════════════════════════════════════════════
   DIGEST
══════════════════════════════════════════════════════ */
function buildMsg(person) {
  const today     = tday();
  const oneWeek   = new Date(); oneWeek.setDate(oneWeek.getDate()+7);
  const weekStr   = oneWeek.toISOString().slice(0,10);
  const threeDays = new Date(); threeDays.setDate(threeDays.getDate()-3);
  const threeDayStr = threeDays.toISOString().slice(0,10);

  const ownedProjs = DB.projects.filter(pr => pr.primaryOwnerId===person.id && pr.status!=='done');
  if (!ownedProjs.length) return null;

  // ── Gather every signal per project ─────────────────────────────────────
  const signals = [];

  ownedProjs.forEach(proj => {
    const allT    = DB.tasks.filter(t => t.projectId===proj.id);
    const pendT   = allT.filter(t => t.status!=='done');
    const pct     = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;

    // 1. Overdue tasks
    const overdue = pendT.filter(t => isOD(t.dueDate, t.status));

    // 2. Blocked tasks
    const blocked = pendT.filter(t => t.status==='blocked');

    // 3. Awaiting tasks
    const awaiting = pendT.filter(t => t.status==='awaiting');

    // 4. Critical overdue >3 days
    const critOD = overdue.filter(t => t.dueDate && t.dueDate < threeDayStr);

    // 5. Tasks due this week (upcoming urgency)
    const dueSoon = pendT.filter(t => t.dueDate && t.dueDate > today && t.dueDate <= weekStr && t.status!=='blocked');

    // 6. Tasks with no assignee but have a due date
    const unassigned = pendT.filter(t => !t.assignedTo && t.dueDate);

    // 7. Milestones due this week
    const milsDue = DB.milestones.filter(m =>
      m.projectId===proj.id && m.status!=='done' && m.deadline && m.deadline<=weekStr
    );

    // 8. Buildings on hold or blocked
    const pbIssues = DB.pb.filter(r =>
      r.projectId===proj.id && (r.status==='blocked'||r.status==='on_hold')
    ).map(r => ({...r, b:DB.buildings.find(b=>b.id===r.buildingId)})).filter(r=>r.b);

    // 9. Project health signal
    const healthIssue = ['delayed','at_risk','not_started'].includes(proj.health||'');

    // 10. Zero progress on active project
    const zeroProgress = allT.length > 0 && pct === 0;

    // 11. Project past deadline
    const pastDeadline = proj.deadline && proj.deadline < today && proj.status !== 'done';

    // 12. Pending documents
    const pendingDocs = DB.docs.filter(d =>
      d.entity_type==='project' && d.entity_id===proj.id && d.doc_status==='pending'
    );
    const pbPendingDocs = DB.pb
      .filter(r=>r.projectId===proj.id)
      .flatMap(r => DB.docs.filter(d=>d.entity_type==='project_building'&&d.entity_id===r.id&&d.doc_status==='pending')
        .map(d=>({...d,bName:(DB.buildings.find(b=>b.id===r.buildingId)||{}).name||''}))
      );

    const hasAnything = overdue.length||blocked.length||awaiting.length||milsDue.length||
      pbIssues.length||healthIssue||zeroProgress||pastDeadline||unassigned.length||
      pendingDocs.length||pbPendingDocs.length;

    if (hasAnything) {
      signals.push({
        proj, pct, overdue, critOD, blocked, awaiting,
        dueSoon, unassigned, milsDue, pbIssues,
        healthIssue, zeroProgress, pastDeadline,
        pendingDocs, pbPendingDocs
      });
    }
  });

  if (!signals.length) return null;

  const totalOverdue  = signals.reduce((s,x)=>s+x.overdue.length,0);
  const totalBlocked  = signals.reduce((s,x)=>s+x.blocked.length,0);
  const totalAwaiting = signals.reduce((s,x)=>s+x.awaiting.length,0);

  let msg = '*Founder\'s Office — Daily Status · '+person.name+'*\n';
  msg += fd(today)+'\n';
  msg += '━━━━━━━━━━━━━━━━━━━━━━━━\n';

  // Summary line
  const parts = [];
  if (totalOverdue)  parts.push(totalOverdue+' overdue');
  if (totalBlocked)  parts.push(totalBlocked+' blocked');
  if (totalAwaiting) parts.push(totalAwaiting+' awaiting');
  if (parts.length) msg += '🔴 Needs immediate action: '+parts.join(' · ')+'\n';
  msg += '\n';

  signals.forEach(({proj,pct,overdue,critOD,blocked,awaiting,dueSoon,unassigned,milsDue,pbIssues,healthIssue,zeroProgress,pastDeadline,pendingDocs,pbPendingDocs}) => {

    // Project header
    const healthLabel = {on_track:'✅ On Track',at_risk:'⚠️ At Risk',delayed:'🔴 Delayed',not_started:'⭕ Not Started'}[proj.health||'on_track'];
    msg += '━━━━━━━━━━━━━━━━━━━━━━━━\n';
    msg += '📁 *'+proj.name+'*';
    msg += '  '+healthLabel+'  '+pct+'% complete\n';
    if (proj.deadline) {
      const isPastDL = proj.deadline < today;
      msg += '   📅 Deadline: '+fd(proj.deadline)+(isPastDL?' 🔴 PAST DUE':'')+ '\n';
    }
    msg += '\n';

    // Critical overdue (>3 days)
    if (critOD.length) {
      msg += '   🚨 *CRITICAL — Overdue >3 days ('+critOD.length+')*\n';
      critOD.forEach(t => {
        const pe   = DB.people.find(p=>p.id===t.assignedTo);
        const daysOD = Math.floor((Date.now()-new Date(t.dueDate+'T12:00:00').getTime())/86400000);
        msg += '   • '+t.title+'\n';
        msg += '     Was due: '+fd(t.dueDate)+' ('+daysOD+' days ago)\n';
        if (pe) msg += '     Responsible: '+pe.name+'\n';
        if (t.notes) msg += '     Note: '+t.notes+'\n';
      });
      msg += '\n';
    }

    // Regular overdue (≤3 days)
    const regularOD = overdue.filter(t=>!critOD.includes(t));
    if (regularOD.length) {
      msg += '   ⚠️ *Overdue tasks ('+regularOD.length+')*\n';
      regularOD.forEach(t => {
        const pe = DB.people.find(p=>p.id===t.assignedTo);
        msg += '   • '+t.title+' — was due '+fd(t.dueDate);
        if (pe) msg += ' · '+pe.name;
        msg += '\n';
      });
      msg += '\n';
    }

    // Blocked
    if (blocked.length) {
      msg += '   🔴 *Blocked tasks ('+blocked.length+')*\n';
      blocked.forEach(t => {
        const pe   = DB.people.find(p=>p.id===t.assignedTo);
        const deps = (t.dependsOn||[]).map(id=>DB.tasks.find(x=>x.id===id)).filter(Boolean).filter(d=>d.status!=='done');
        msg += '   • '+t.title;
        if (pe) msg += ' · '+pe.name;
        msg += '\n';
        if (deps.length) msg += '     ⛓ Blocked by: '+deps.map(d=>d.title).join(', ')+'\n';
        if (t.notes) msg += '     Note: '+t.notes+'\n';
      });
      msg += '\n';
    }

    // Awaiting
    if (awaiting.length) {
      msg += '   ⏳ *Awaiting response ('+awaiting.length+')*\n';
      awaiting.forEach(t => {
        const pe = DB.people.find(p=>p.id===t.assignedTo);
        msg += '   • '+t.title;
        if (pe) msg += ' · '+pe.name;
        if (t.dueDate) msg += ' · due '+fd(t.dueDate);
        msg += '\n';
      });
      msg += '\n';
    }

    // Due this week (upcoming)
    if (dueSoon.length) {
      msg += '   📅 *Due this week ('+dueSoon.length+')*\n';
      dueSoon.slice(0,5).forEach(t => {
        const pe = DB.people.find(p=>p.id===t.assignedTo);
        msg += '   • '+t.title+' — '+fd(t.dueDate);
        if (pe) msg += ' · '+pe.name;
        msg += '\n';
      });
      if (dueSoon.length>5) msg += '   … and '+(dueSoon.length-5)+' more\n';
      msg += '\n';
    }

    // Unassigned tasks with due dates
    if (unassigned.length) {
      msg += '   👤 *Unassigned ('+unassigned.length+') — no one is responsible*\n';
      unassigned.forEach(t => {
        msg += '   • '+t.title+' — due '+fd(t.dueDate)+'\n';
      });
      msg += '\n';
    }

    // Milestones due this week
    if (milsDue.length) {
      msg += '   🏁 *Milestones due this week*\n';
      milsDue.forEach(m => {
        msg += '   • '+m.name+' — '+fd(m.deadline)+'\n';
      });
      msg += '\n';
    }

    // Buildings on hold / blocked
    if (pbIssues.length) {
      msg += '   🏢 *Buildings needing action*\n';
      pbIssues.forEach(r => {
        const statusLabel = BS[r.status]?.l||r.status;
        msg += '   • '+r.b.name+(r.b.city?', '+r.b.city:'')+' — '+statusLabel+'\n';
        if (r.remarks) msg += '     '+r.remarks+'\n';
        if (r.targetCompletion) msg += '     Target: '+fd(r.targetCompletion)+'\n';
      });
      msg += '\n';
    }

    // Pending documents
    if (pendingDocs.length||pbPendingDocs.length) {
      msg += '   📎 *Documents pending*\n';
      pendingDocs.forEach(d=>{msg+='   • '+d.name+(d.notes?' — '+d.notes:'')+'\n';});
      pbPendingDocs.forEach(d=>{msg+='   • '+d.name+(d.bName?' ('+d.bName+')':'')+(d.notes?' — '+d.notes:'')+'\n';});
      msg += '\n';
    }

    // Zero progress warning
    if (zeroProgress) {
      msg += '   ⭕ *No tasks completed yet on this project*\n\n';
    }
  });

  msg += '━━━━━━━━━━━━━━━━━━━━━━━━\n';
  msg += '📊 Summary: '+signals.length+' project'+(signals.length!==1?'s':'')+' need attention';
  if (totalOverdue)  msg += ' · '+totalOverdue+' overdue';
  if (totalBlocked)  msg += ' · '+totalBlocked+' blocked';
  if (totalAwaiting) msg += ' · '+totalAwaiting+' awaiting';
  msg += '\n\n_Sent by Taskora — Founder\'s Office_';

  return msg;
}

// ── Visual digest summary for the UI (not the WhatsApp message) ──────────────
function digestSummaryHTML(person) {
  const today    = tday();
  const oneWeek  = new Date(); oneWeek.setDate(oneWeek.getDate()+7);
  const weekStr  = oneWeek.toISOString().slice(0,10);
  const threeDayStr = new Date(Date.now()-3*86400000).toISOString().slice(0,10);

  const ownedProjs = DB.projects.filter(pr => pr.primaryOwnerId===person.id && pr.status!=='done');
  let h = '';

  ownedProjs.forEach(proj => {
    const allT   = DB.tasks.filter(t => t.projectId===proj.id);
    const pendT  = allT.filter(t => t.status!=='done');
    const pct    = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;

    const overdue  = pendT.filter(t => isOD(t.dueDate,t.status));
    const critOD   = overdue.filter(t => t.dueDate && t.dueDate < threeDayStr);
    const blocked  = pendT.filter(t => t.status==='blocked');
    const awaiting = pendT.filter(t => t.status==='awaiting');
    const dueSoon  = pendT.filter(t => t.dueDate && t.dueDate>today && t.dueDate<=weekStr);
    const unassigned = pendT.filter(t => !t.assignedTo && t.dueDate);
    const milsDue  = DB.milestones.filter(m=>m.projectId===proj.id&&m.status!=='done'&&m.deadline&&m.deadline<=weekStr);
    const pbIssues = DB.pb.filter(r=>r.projectId===proj.id&&(r.status==='blocked'||r.status==='on_hold'))
                         .map(r=>({...r,b:DB.buildings.find(b=>b.id===r.buildingId)})).filter(r=>r.b);
    const pendingDocs = DB.docs.filter(d=>d.entity_type==='project'&&d.entity_id===proj.id&&d.doc_status==='pending');

    const totalFlags = overdue.length+blocked.length+awaiting.length+milsDue.length+
                       pbIssues.length+unassigned.length+pendingDocs.length;
    if (!totalFlags && proj.health==='on_track') return;

    const healthCfg = {
      on_track:    {c:'var(--grn)',  bg:'rgba(16,185,129,.08)',  bdr:'rgba(16,185,129,.2)',  l:'On Track'},
      at_risk:     {c:'#f59e0b',    bg:'rgba(245,158,11,.08)',   bdr:'rgba(245,158,11,.2)',  l:'At Risk'},
      delayed:     {c:'var(--rose)',bg:'rgba(244,63,94,.08)',    bdr:'rgba(244,63,94,.2)',   l:'Delayed'},
      not_started: {c:'var(--txt3)',bg:'rgba(100,116,139,.08)',  bdr:'rgba(100,116,139,.2)', l:'Not Started'},
    };
    const hc = healthCfg[proj.health||'on_track'];

    h += '<div style="background:'+hc.bg+';border:1px solid '+hc.bdr+';border-radius:10px;padding:12px 14px;margin-bottom:8px">';

    // Project header row
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+proj.color+';flex-shrink:0"></div>';
    h += '<div style="flex:1;font-size:13px;font-weight:700;color:var(--txt)">'+esc(proj.name)+'</div>';
    h += '<span class="bd" style="background:'+hc.bg+';color:'+hc.c+';border:1px solid '+hc.bdr+'">'+hc.l+'</span>';
    h += '<span style="font-size:11px;color:var(--txt3)">'+pct+'%</span>';
    h += '</div>';

    // Progress bar
    h += '<div class="pw" style="margin-bottom:10px"><div class="pb" style="width:'+pct+'%;background:'+(pct===100?'var(--grn)':proj.color)+'"></div></div>';

    // Flag chips
    h += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">';
    if (critOD.length)    h += '<span class="bd" style="background:rgba(244,63,94,.2);color:var(--rose)">🚨 '+critOD.length+' critical</span>';
    else if (overdue.length) h += '<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">⚠ '+overdue.length+' overdue</span>';
    if (blocked.length)   h += '<span class="bd" style="background:rgba(244,63,94,.1);color:var(--rose)">🔴 '+blocked.length+' blocked</span>';
    if (awaiting.length)  h += '<span class="bd" style="background:rgba(168,85,247,.12);color:#c084fc">⏳ '+awaiting.length+' awaiting</span>';
    if (dueSoon.length)   h += '<span class="bd" style="background:rgba(245,158,11,.1);color:#f59e0b">📅 '+dueSoon.length+' due soon</span>';
    if (milsDue.length)   h += '<span class="bd" style="background:rgba(245,158,11,.12);color:#f59e0b">🏁 '+milsDue.length+' milestone'+(milsDue.length!==1?'s':'')+' due</span>';
    if (pbIssues.length)  h += '<span class="bd" style="background:rgba(251,146,60,.12);color:#fb923c">🏢 '+pbIssues.length+' bldg issue'+(pbIssues.length!==1?'s':'')+' </span>';
    if (unassigned.length)h += '<span class="bd" style="background:rgba(100,116,139,.12);color:var(--txt2)">👤 '+unassigned.length+' unassigned</span>';
    if (pendingDocs.length) h += '<span class="bd" style="background:rgba(99,102,241,.1);color:var(--ind-l)">📎 '+pendingDocs.length+' doc'+(pendingDocs.length!==1?'s':'')+' pending</span>';
    if (!proj.deadline)   h += '<span class="bd" style="background:rgba(100,116,139,.1);color:var(--txt3)">📅 No deadline set</span>';
    h += '</div>';

    // Inline task details
    const showTasks = [...overdue, ...blocked, ...awaiting].slice(0,6);
    if (showTasks.length) {
      showTasks.forEach(t => {
        const pe  = DB.people.find(p=>p.id===t.assignedTo);
        const od  = isOD(t.dueDate,t.status);
        const isBlk = t.status==='blocked';
        const isAwt = t.status==='awaiting';
        const rowColor = od?'rgba(244,63,94,.06)':isBlk?'rgba(244,63,94,.04)':'rgba(168,85,247,.04)';
        const icon = od?'⚠':'';
        h += '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:'+rowColor+';border-radius:7px;margin-bottom:3px">';
        if (icon) h += '<span style="font-size:11px;flex-shrink:0">'+icon+'</span>';
        h += '<span style="flex:1;font-size:12px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</span>';
        if (t.dueDate) {
          const dc = od?'var(--rose)':'var(--txt3)';
          h += '<span style="font-size:11px;color:'+dc+';flex-shrink:0">'+(od?'⚠ ':'')+fd(t.dueDate)+'</span>';
        }
        if (pe) h += '<span style="flex-shrink:0">'+av(pe.name,pe.color,18)+'</span>';
        h += '<span style="flex-shrink:0">'+bdg(t.status)+'</span>';
        h += '</div>';
      });
      const remaining = overdue.length+blocked.length+awaiting.length - showTasks.length;
      if (remaining > 0) h += '<div style="font-size:11px;color:var(--txt3);padding:3px 8px">+'+remaining+' more tasks needing attention</div>';
    }

    // Buildings
    if (pbIssues.length) {
      pbIssues.forEach(r => {
        h += '<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:rgba(251,146,60,.06);border-radius:7px;margin-bottom:3px">';
        h += '<span style="font-size:11px;flex-shrink:0">🏢</span>';
        h += '<span style="flex:1;font-size:12px">'+esc(r.b.name)+(r.b.city?', '+esc(r.b.city):'')+'</span>';
        h += bdg(r.status,BS);
        if (r.remarks) h += '<span style="font-size:11px;color:var(--txt3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.remarks)+'</span>';
        h += '</div>';
      });
    }

    h += '</div>';
  });

  return h || '<div style="font-size:12px;color:var(--txt3);text-align:center;padding:10px">All projects on track — nothing to flag</div>';
}

async function svDE(pid) {
  const el = document.getElementById('de-'+pid);
  if (!el) return;
  const content = el.value;
  DB.de[pid] = content;
  await SB.from('digest_edits').upsert({user_id:CHAIRMAN_UID||U.id,person_id:pid,content,updated_at:new Date().toISOString()},{onConflict:'user_id,person_id'});
  const ind = document.getElementById('di-'+pid);
  if (ind) { ind.textContent='Saved ✓'; ind.style.color='var(--grn)'; setTimeout(()=>{ if(ind) ind.textContent=''; },1500); }
}
async function rgDig(pid) {
  if (!confirm('Discard edits and regenerate?')) return;
  const person = DB.people.find(p => p.id===pid);
  const fresh  = buildMsg(person)||'';
  const el     = document.getElementById('de-'+pid);
  if (el) el.value = fresh;
  delete DB.de[pid];
  await SB.from('digest_edits').delete().eq('user_id',CHAIRMAN_UID||U.id).eq('person_id',pid);
  const ind = document.getElementById('di-'+pid);
  if (ind) { ind.textContent='Regenerated'; ind.style.color='var(--ind-l)'; setTimeout(()=>{ if(ind) ind.textContent=''; },1500); }
}
async function rgAll() {
  DB.de = {};
  await SB.from('digest_edits').delete().eq('user_id',CHAIRMAN_UID||U.id);
  rDig();
}

function rDig() {
  const el = document.getElementById('tab-digest');
  if (!el) return;

  // All people who own at least one active project
  const owners = DB.people.filter(p => DB.projects.some(pr => pr.primaryOwnerId===p.id && pr.status!=='done'));

  // Global summary counts across all owners
  const today   = tday();
  const allOwnerProjIds = new Set(DB.projects.filter(pr=>pr.status!=='done').map(p=>p.id));
  const totalOD     = DB.tasks.filter(t=>allOwnerProjIds.has(t.projectId)&&isOD(t.dueDate,t.status)).length;
  const totalBlocked= DB.tasks.filter(t=>allOwnerProjIds.has(t.projectId)&&t.status==='blocked').length;
  const totalAwait  = DB.tasks.filter(t=>allOwnerProjIds.has(t.projectId)&&t.status==='awaiting').length;
  const totalProjFlagged = DB.projects.filter(p=>p.status!=='done'&&['at_risk','delayed'].includes(p.health||'')).length;

  let h = '<div class="ph"><div><div class="pt">Daily Digest</div><div class="ps">Full attention report · '+nowFull()+'</div></div>';
  h += '<button class="btn btn-g btn-sm" onclick="rgAll()">↺ Regenerate all</button></div>';

  // Global summary bar
  h += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px">';
  h += '<div style="grid-column:1/-1;display:flex;gap:6px;flex-wrap:wrap">';
  if (totalOD)         h += '<div style="flex:1;text-align:center;padding:9px 8px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:var(--rose)">'+totalOD+'</div><div style="font-size:10px;color:var(--rose);margin-top:1px">Overdue tasks</div></div>';
  if (totalBlocked)    h += '<div style="flex:1;text-align:center;padding:9px 8px;background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.15);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#f87171">'+totalBlocked+'</div><div style="font-size:10px;color:#f87171;margin-top:1px">Blocked</div></div>';
  if (totalAwait)      h += '<div style="flex:1;text-align:center;padding:9px 8px;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#c084fc">'+totalAwait+'</div><div style="font-size:10px;color:#c084fc;margin-top:1px">Awaiting</div></div>';
  if (totalProjFlagged)h += '<div style="flex:1;text-align:center;padding:9px 8px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.18);border-radius:10px"><div style="font-size:18px;font-weight:700;color:#f59e0b">'+totalProjFlagged+'</div><div style="font-size:10px;color:#f59e0b;margin-top:1px">At risk / delayed</div></div>';
  if (!totalOD && !totalBlocked && !totalAwait && !totalProjFlagged) {
    h += '<div style="flex:1;padding:10px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:10px;text-align:center;font-size:13px;color:var(--grn)">🎉 All projects on track — nothing critical today</div>';
  }
  h += '</div></div>';

  if (!owners.length) {
    h += '<div class="es"><span class="em">👥</span><div class="et">No project owners yet</div><div class="ed">Assign primary owners to projects to see their digest here.</div></div>';
    el.innerHTML = h;
    return;
  }

  owners.forEach(person => {
    const ownedProjs = DB.projects.filter(pr => pr.primaryOwnerId===person.id && pr.status!=='done');
    const auto    = buildMsg(person);
    const msg     = DB.de[person.id] !== undefined ? DB.de[person.id] : (auto||'');
    const hasEdit = DB.de[person.id] !== undefined && msg !== auto;

    // Count this person's flags
    const pProjIds = new Set(ownedProjs.map(p=>p.id));
    const pOD      = DB.tasks.filter(t=>pProjIds.has(t.projectId)&&isOD(t.dueDate,t.status)).length;
    const pBlk     = DB.tasks.filter(t=>pProjIds.has(t.projectId)&&t.status==='blocked').length;
    const pAwt     = DB.tasks.filter(t=>pProjIds.has(t.projectId)&&t.status==='awaiting').length;
    const pAR      = ownedProjs.filter(p=>['at_risk','delayed'].includes(p.health||'')).length;
    const hasIssues= pOD||pBlk||pAwt||pAR;

    h += '<div class="gc" style="margin-bottom:20px;border-color:'+(hasIssues?'rgba(244,63,94,.2)':'var(--bdr)')+'">';

    // Person header
    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
    h += av(person.name,person.color,46);
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:15px;font-weight:700">'+esc(person.name)+'</div>';
    h += '<div style="font-size:12px;color:var(--txt2)">'+esc(person.role||'Project Owner')+'</div>';
    h += '<div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap">';
    if (pOD)  h += '<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">⚠ '+pOD+' overdue</span>';
    if (pBlk) h += '<span class="bd" style="background:rgba(244,63,94,.1);color:var(--rose)">🔴 '+pBlk+' blocked</span>';
    if (pAwt) h += '<span class="bd" style="background:rgba(168,85,247,.12);color:#c084fc">⏳ '+pAwt+' awaiting</span>';
    if (pAR)  h += '<span class="bd" style="background:rgba(245,158,11,.12);color:#f59e0b">🟡 '+pAR+' at risk</span>';
    if (!hasIssues) h += '<span class="bd" style="background:rgba(16,185,129,.12);color:var(--grn)">✓ All clear</span>';
    if (hasEdit) h += '<span class="bd" style="background:rgba(245,158,11,.1);color:#fbbf24">✎ Edited</span>';
    h += '</div></div>';
    h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">';
    h += '<button onclick="rgDig(\''+person.id+'\')" class="mb" style="font-size:11px">↺ Reset</button>';
    h += '<span id="di-'+person.id+'" style="font-size:11px;color:var(--txt3);min-height:14px"></span>';
    h += '</div></div>';

    // ── Visual project breakdown ──
    h += '<div style="margin-bottom:14px">';
    h += '<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Project Status</div>';
    h += digestSummaryHTML(person);
    h += '</div>';

function cpM(pid) {
  const el  = document.getElementById('de-'+pid);
  const msg = el ? el.value : '';
  if (!msg) return;
  navigator.clipboard.writeText(msg).catch(()=>{}).finally(() => {
    const b = document.getElementById('cp-'+pid);
    if (b) { b.textContent='✓ Copied!'; b.classList.add('ok'); setTimeout(()=>{ b.textContent='📋 Copy'; b.classList.remove('ok'); },2000); }
  });
}
function oWA(pid) {
  const el  = document.getElementById('de-'+pid);
  const msg = el ? el.value : '';
  const p   = DB.people.find(x => x.id===pid);
  if (!p?.phone) { alert('No WhatsApp number for '+p?.name); return; }
  if (!msg) return;
  window.open('https://wa.me/'+p.phone.replace(/\D/g,'')+'?text='+encodeURIComponent(msg), '_blank');
}

async function svProfile() {
  const dn  = val('pr-dn').trim();
  const pw1 = val('pr-pw1');
  const pw2 = val('pr-pw2');

  let changed = false;
  if (dn) {
    const {error} = await SB.auth.updateUser({data:{display_name:dn}});
    if (error) { sm('Error: '+error.message); return; }
    document.getElementById('sb-name').textContent = dn;
    changed = true;

  }

}

async function logActivity(entityType, entityId, entityName, action, fieldChanged, oldVal, newVal) {
  try {
    const uid = CHAIRMAN_UID || U.id;
    const actorName = U.user_metadata?.display_name || (U.email||'').split('@')[0] || 'Unknown';
    await SB.from('activity_log').insert({
      workspace_id: uid, actor_id: U.id, actor_name: actorName,
      entity_type: entityType, entity_id: entityId, entity_name: entityName||'',
      action, field_changed: fieldChanged||null,
      old_value: oldVal!=null ? String(oldVal) : null,
      new_value: newVal!=null ? String(newVal) : null,
    });
  } catch(e) { /* fire and forget */ }
}

async function rActivityLog(projId) {
  const el = document.getElementById('act-log-'+projId);
  if (!el) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--txt3);padding:6px 0">Loading history…</div>';
  const {data} = await SB.from('activity_log')
    .select('*').eq('workspace_id', CHAIRMAN_UID||U.id)
    .eq('entity_id', projId).order('created_at',{ascending:false}).limit(20);
  if (!data||!data.length) { el.innerHTML='<div style="font-size:12px;color:var(--txt3);padding:6px 0;text-align:center">No activity yet</div>'; return; }
  const ACTION_ICON = {created:'✨',updated:'✎',deleted:'🗑',status_changed:'🔄',assigned:'👤'};
  el.innerHTML = data.map(a => {
    const icon = ACTION_ICON[a.action]||'•';
    const ago = timeAgo(a.created_at);
    let detail = '';
    if (a.field_changed && a.old_value!=null && a.new_value!=null)
      detail = ' — '+esc(a.field_changed)+': <span style="color:var(--rose)">'+esc(a.old_value)+'</span> → <span style="color:var(--grn)">'+esc(a.new_value)+'</span>';
    else if (a.new_value) detail = ': '+esc(a.new_value);
    return '<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:12px">'
      +'<span style="flex-shrink:0;font-size:14px">'+icon+'</span>'
      +'<div style="flex:1;min-width:0"><span style="color:var(--txt);font-weight:500">'+esc(a.actor_name)+'</span>'
      +' <span style="color:var(--txt2)">'+a.action+'</span>'
      +' <span style="color:var(--txt2)">'+esc(a.entity_type)+' <em>'+esc(a.entity_name)+'</em></span>'+detail+'</div>'
      +'<span style="color:var(--txt3);flex-shrink:0;white-space:nowrap">'+ago+'</span></div>';
  }).join('');
}

function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m+'m ago';
  const h = Math.floor(m/60);
  if (h < 24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

  await SB.from('notifications').update({read:true}).eq('for_user_id',U.id).eq('read',false);

function rNotifications() {
  const el = document.getElementById('tab-notifications');
  if (!el) return;
  const unread = DB.notifications.filter(n=>!n.read);
  const NOTIF_ICON = {overdue:'⚠',due_today:'📅',blocked:'🔴',escalation:'🚨',invite_accepted:'✓',status_changed:'🔄',digest_ready:'📤',default:'🔔'};
  const NOTIF_COLOR = {overdue:'var(--rose)',due_today:'#f59e0b',blocked:'var(--rose)',escalation:'var(--rose)',invite_accepted:'var(--grn)',status_changed:'var(--ind-l)',digest_ready:'var(--teal)',default:'var(--txt2)'};

  let h = '<div class="ph"><div><div class="pt">Notifications</div><div class="ps">'+unread.length+' unread</div></div>';
  if (unread.length) h += '<button class="btn btn-g btn-sm" onclick="markAllNotifsRead()">Mark all read</button>';
  h += '</div>';

  // Generate live alerts from data (escalation engine)
  const today = tday();
  const threeDaysAgo = new Date(); threeDaysAgo.setDate(threeDaysAgo.getDate()-3);
  const threeDayStr = threeDaysAgo.toISOString().slice(0,10);
  const sevenDayStr = new Date(Date.now()-7*86400000).toISOString().slice(0,10);

  const liveAlerts = [];
  const myProjs = visibleProjects().filter(p=>p.status!=='done');
  const myProjIds = new Set(myProjs.map(p=>p.id));
  const myTasks = visibleTasks(myProjIds);

  // Overdue >3 days
  myTasks.filter(t=>t.dueDate && t.dueDate < threeDayStr && t.status!=='done').forEach(t => {
    const proj = DB.projects.find(p=>p.id===t.projectId);
    const pe = DB.people.find(p=>p.id===t.assignedTo);
    liveAlerts.push({type:'overdue',icon:'🚨',color:'var(--rose)',title:'Task overdue >3 days',body:esc(t.title)+(pe?' · '+esc(pe.name):'')+(proj?' · '+esc(proj.name):''),age:'Persistent'});
  });
  // Blocked >2 days
  myTasks.filter(t=>t.status==='blocked').forEach(t => {
    const proj = DB.projects.find(p=>p.id===t.projectId);
    liveAlerts.push({type:'blocked',icon:'🔴',color:'var(--rose)',title:'Task blocked',body:esc(t.title)+(proj?' · '+esc(proj.name):''),age:'Action needed'});
  });
  // Projects at risk >7 days (based on health — we can't track when it changed without activity log)
  myProjs.filter(p=>p.health==='delayed').forEach(p => {
    const owner = DB.people.find(pe=>pe.id===p.primaryOwnerId);
    liveAlerts.push({type:'escalation',icon:'🚨',color:'var(--rose)',title:'Project delayed',body:esc(p.name)+(owner?' · Owner: '+esc(owner.name):''),age:'Escalation'});
  });
  // Follow-ups due today
  myTasks.filter(t=>t.followUp===today && t.status!=='done').forEach(t => {
    liveAlerts.push({type:'due_today',icon:'📋',color:'#f59e0b',title:'Follow-up due today',body:esc(t.title),age:'Today'});
  });

  if (liveAlerts.length) {
    h += '<div style="font-size:11px;font-weight:700;color:var(--rose);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">⚡ Live Alerts</div>';
    liveAlerts.forEach(a => {
      h += '<div style="display:flex;gap:10px;padding:10px 12px;background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.2);border-radius:10px;margin-bottom:6px">';
      h += '<span style="font-size:18px;flex-shrink:0">'+a.icon+'</span>';
      h += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:'+a.color+'">'+a.title+'</div>';
      h += '<div style="font-size:12px;color:var(--txt2);margin-top:2px">'+a.body+'</div></div>';
      h += '<span style="font-size:11px;color:var(--txt3);flex-shrink:0;white-space:nowrap">'+a.age+'</span></div>';
    });
    h += '<div style="margin-bottom:20px"></div>';
  }

  if (!DB.notifications.length && !liveAlerts.length) {
    h += '<div class="es"><span class="em">🔔</span><div class="et">All clear</div><div class="ed">No notifications yet. Activity alerts will appear here.</div></div>';
    el.innerHTML = h;
    return;
  }

  if (DB.notifications.length) {
    h += '<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">History</div>';
    DB.notifications.forEach(n => {
      const icon = NOTIF_ICON[n.type]||NOTIF_ICON.default;
      const color = NOTIF_COLOR[n.type]||NOTIF_COLOR.default;
      h += '<div style="display:flex;gap:10px;padding:10px 12px;background:'+(n.read?'var(--glass)':'rgba(99,102,241,.07)')+';border:1px solid '+(n.read?'var(--bdr)':'rgba(99,102,241,.25)')+';border-radius:10px;margin-bottom:5px">';
      h += '<span style="font-size:16px;flex-shrink:0">'+icon+'</span>';
      h += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:'+(n.read?400:600)+';color:'+(n.read?'var(--txt2)':color)+'">'+esc(n.title)+'</div>';
      if (n.body) h += '<div style="font-size:12px;color:var(--txt2);margin-top:2px">'+esc(n.body)+'</div>';
      h += '</div><span style="font-size:11px;color:var(--txt3);flex-shrink:0;white-space:nowrap">'+timeAgo(n.created_at)+'</span></div>';
    });
  }

  el.innerHTML = h;
}

/* ══════════════════════════════════════════════════════
   PHASE 2 — ESCALATION PANEL (Command Centre)
══════════════════════════════════════════════════════ */
function rEscalationPanel() {
  const threeDayStr = new Date(Date.now()-3*86400000).toISOString().slice(0,10);
  const myProjs  = visibleProjects().filter(p=>p.status!=='done');
  const myProjIds= new Set(myProjs.map(p=>p.id));
  const myTasks  = visibleTasks(myProjIds);

  const severeOD  = myTasks.filter(t=>t.dueDate && t.dueDate<threeDayStr && t.status!=='done');
  const blocked   = myTasks.filter(t=>t.status==='blocked');
  const delayed   = myProjs.filter(p=>p.health==='delayed');

  if (!severeOD.length && !blocked.length && !delayed.length) return '';

  let h = '<div style="background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.2);border-radius:12px;padding:14px;margin-bottom:20px">';
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:18px">🚨</span><div style="font-size:13px;font-weight:700;color:var(--rose)">Escalation Required</div>';
  h += '<div style="display:flex;gap:5px;margin-left:auto">';
  if (severeOD.length) h += '<span class="bd" style="background:rgba(244,63,94,.15);color:var(--rose)">'+severeOD.length+' critical overdue</span>';
  if (blocked.length)  h += '<span class="bd" style="background:rgba(244,63,94,.12);color:var(--rose)">'+blocked.length+' blocked</span>';
  if (delayed.length)  h += '<span class="bd" style="background:rgba(244,63,94,.12);color:var(--rose)">'+delayed.length+' delayed projects</span>';
  h += '</div></div>';

  // Critical overdue tasks (>3 days)
  severeOD.slice(0,4).forEach(t => {
    const proj = DB.projects.find(p=>p.id===t.projectId);
    const pe   = DB.people.find(p=>p.id===t.assignedTo);
    const owner= proj ? DB.people.find(p=>p.id===proj.primaryOwnerId) : null;
    const daysOD = Math.floor((Date.now()-new Date(t.dueDate+'T12:00:00').getTime())/86400000);
    h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(244,63,94,.08);border-radius:8px;margin-bottom:4px">';
    h += '<span style="font-size:12px;color:var(--rose);flex-shrink:0">⚠</span>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--txt)">'+esc(t.title)+'</div>';
    h += '<div style="font-size:11px;color:var(--txt2);margin-top:1px">';
    if (proj) h += esc(proj.name)+' · ';
    if (pe)   h += esc(pe.name)+' · ';
    h += '<span style="color:var(--rose);font-weight:600">'+daysOD+' days overdue</span></div></div>';
    if (owner) h += av(owner.name,owner.color,22);
    h += '</div>';
  });

  // Blocked tasks
  blocked.slice(0,3).forEach(t => {
    const proj = DB.projects.find(p=>p.id===t.projectId);
    h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(244,63,94,.05);border-radius:8px;margin-bottom:4px">';
    h += '<span style="font-size:12px;flex-shrink:0">🔴</span>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--txt)">'+esc(t.title)+'</div>';
    if (proj) h += '<div style="font-size:11px;color:var(--txt2)">'+esc(proj.name)+'</div>';
    h += '</div><span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">Blocked</span></div>';
  });

  // Delayed projects
  delayed.slice(0,3).forEach(p => {
    const owner = DB.people.find(pe=>pe.id===p.primaryOwnerId);
    const allT = DB.tasks.filter(t=>t.projectId===p.id);
    const pct = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
    h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(244,63,94,.05);border-radius:8px;margin-bottom:4px">';
    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+p.color+';flex-shrink:0"></div>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--txt)">'+esc(p.name)+'</div>';
    if (owner) h += '<div style="font-size:11px;color:var(--txt2)">'+esc(owner.name)+' · '+pct+'% done</div>';
    h += '</div><span class="bd h-dl">Delayed</span></div>';
  });

  h += '</div>';
  return h;
}

function rDocSection(entityType, entityId) {

  const DST = {pending:{l:'Pending',c:'#f59e0b',bg:'rgba(245,158,11,.12)'},received:{l:'Received',c:'#10b981',bg:'rgba(16,185,129,.12)'},rejected:{l:'Rejected',c:'#f43f5e',bg:'rgba(244,63,94,.12)'}};

  if (!docs.length) {
    h += '<div style="font-size:12px;color:var(--txt3);text-align:center;padding:6px">No documents attached.</div>';

    docs.forEach(doc => {

      h += '<span style="font-size:14px;flex-shrink:0">📄</span>';

async function svDoc(entityType, entityId) {
  const name = val('df-n').trim(); if (!name) return;
  const obj = {workspace_id:CHAIRMAN_UID||U.id, entity_type:entityType, entity_id:entityId, name, doc_status:val('df-st'), url:val('df-u').trim(), notes:val('df-no').trim(), uploaded_by:U.id};
  const {data} = await SB.from('documents').insert(obj).select().single();
  if (data) DB.docs.push(data);
  CS();
  if (curTab==='projects') rProj();
}
async function cycleDocStatus(docId) {
  const doc = DB.docs.find(d=>d.id===docId); if (!doc) return;
  const cycle = ['pending','received','rejected'];
  const next = cycle[(cycle.indexOf(doc.doc_status)+1)%cycle.length];
  await SB.from('documents').update({doc_status:next}).eq('id',docId);
  DB.docs = DB.docs.map(d=>d.id===docId?{...d,doc_status:next}:d);
  if (curTab==='projects') rProj();
}
async function delDoc(docId, et, eid) {
  if (!confirm('Delete this document?')) return;
  await SB.from('documents').delete().eq('id',docId);
  DB.docs = DB.docs.filter(d=>d.id!==docId);
  if (curTab==='projects') rProj();
}

async function saveTemplate(projId) {
  const proj = DB.projects.find(p=>p.id===projId); if (!proj) return;
  const name = prompt('Template name:', proj.name+' (template)');
  if (!name) return;
  const mils = DB.milestones.filter(m=>m.projectId===projId).map(m=>({name:m.name,deadline_offset:null,tasks:DB.tasks.filter(t=>t.milestoneId===m.id).map(t=>({title:t.title,notes:t.notes,priority:t.priority}))}));
  const directTasks = DB.tasks.filter(t=>t.projectId===projId&&!t.milestoneId).map(t=>({title:t.title,notes:t.notes,priority:t.priority}));
  const structure = {milestones:mils, directTasks};
  const {data} = await SB.from('project_templates').insert({user_id:CHAIRMAN_UID||U.id,name,description:proj.description||'',structure}).select().single();
  if (data) { DB.templates.push(data); showToast('Template saved: '+name,'ok'); }
}

function oApplyTemplate(projId) {

  let h = '<div style="font-size:13px;color:var(--txt2);margin-bottom:14px">Select a template to apply. This adds its milestones and tasks to the project.</div>';
  h += '<div style="border:1px solid var(--bdr);border-radius:10px;overflow:auto;max-height:250px;margin-bottom:14px">';

async function applyTemplate(templateId, projId) {
  const tpl = DB.templates.find(t=>t.id===templateId); if (!tpl) return;
  const uid = CHAIRMAN_UID||U.id;
  CS();
  // Create milestones
  for (const m of (tpl.structure.milestones||[])) {
    const {data:mil} = await SB.from('sub_projects').insert({user_id:uid,project_id:projId,name:m.name,status:'not_started'}).select().single();
    if (mil) {
      DB.milestones.push({...mil,projectId:projId});
      for (const t of (m.tasks||[])) {
        const {data:task} = await SB.from('tasks').insert({user_id:uid,project_id:projId,sub_project_id:mil.id,title:t.title,notes:t.notes||'',priority:t.priority||'medium',status:'not_started',depends_on:[]}).select().single();
        if (task) DB.tasks.push({...task,projectId:projId,milestoneId:mil.id,assignedTo:null,dueDate:null,followUp:null,dependsOn:[]});
      }
    }
  }
  // Create direct tasks
  for (const t of (tpl.structure.directTasks||[])) {
    const {data:task} = await SB.from('tasks').insert({user_id:uid,project_id:projId,title:t.title,notes:t.notes||'',priority:t.priority||'medium',status:'not_started',depends_on:[]}).select().single();
    if (task) DB.tasks.push({...task,projectId:projId,milestoneId:null,assignedTo:null,dueDate:null,followUp:null,dependsOn:[]});
  }
  showToast('Template applied ✓','ok');
  rProj();
}

  // Task priority breakdown
  const priorCounts = {critical:0,high:0,medium:0,low:0};

function showToast(msg, type) {
  // Remove any existing toast
  const existing = document.getElementById('_toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.id = '_toast';
  t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:800;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;animation:fadeIn .2s;box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none';
  t.style.background = type === 'ok' ? 'var(--grn)' : type === 'err' ? 'var(--rose)' : 'var(--ind)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.remove(); }, 2800);
}

  document.body.prepend(banner);
  // Push content down
  const contentEl = document.getElementById('content');
  if (contentEl) contentEl.style.paddingTop = (banner.offsetHeight + 4) + 'px';
}

async function acceptTeamReq(reqId, personId) {
  try {
    await SB.from('team_requests').update({ status: 'accepted' }).eq('id', reqId);
    await SB.from('people').update({ invite_status: 'accepted' }).eq('id', personId);
    DB.people = DB.people.map(p => p.id === personId ? { ...p, invite_status: 'accepted' } : p);

    const { data: req } = await SB.from('team_requests').select('*').eq('id', reqId).single();
    if (req) {
      const person = DB.people.find(p => p.id === personId);
      await SB.from('workspace_access').upsert({
        chairman_user_id: req.chairman_id,
        member_user_id: U.id,
        role_level: person?.role_level || 'member',
        person_id: personId,
      }, { onConflict: 'chairman_user_id,member_user_id' });
      MY_ROLE      = person?.role_level || 'member';
      MY_PERSON_ID = personId;
      CHAIRMAN_UID = req.chairman_id;
    }
  } catch(e) {}

  const banner = document.getElementById('team-req-banner');
  if (banner) banner.remove();
  const contentEl = document.getElementById('content');
  if (contentEl) contentEl.style.paddingTop = '';

  showToast('✓ You\'re now part of Founder\'s Office!', 'ok');
  await load();
  buildNav();
  renderTab('dash');
}

async function declineTeamReq(reqId) {
  try {
    await SB.from('team_requests').update({ status: 'declined' }).eq('id', reqId);
  } catch(e) {}
  const banner = document.getElementById('team-req-banner');
  if (banner) banner.remove();
  const contentEl = document.getElementById('content');
  if (contentEl) contentEl.style.paddingTop = '';
}


let _waitingSW = null;

function applyUpdate() {
  if (_waitingSW) {
    // Tell the waiting SW to activate immediately
    _waitingSW.postMessage({ type: 'SKIP_WAITING' });
  }
  // Hide banner — reload will happen via controllerchange
  document.getElementById('update-banner').classList.remove('show');
}

function dismissUpdate() {
  document.getElementById('update-banner').classList.remove('show');
}

function showUpdateBanner() {
  const b = document.getElementById('update-banner');
  if (b) b.classList.add('show');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => {
      // ── Check for a new SW already waiting (e.g. page was refreshed) ──
      if (reg.waiting) {
        _waitingSW = reg.waiting;
        showUpdateBanner();
      }

      // ── A new SW just started installing ──
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            // New SW installed and waiting — existing content is still being served
            _waitingSW = newSW;
            showUpdateBanner();
          }
        });
      });

      // ── Periodically check for updates (every 60 minutes) ──
      setInterval(() => reg.update(), 60 * 60 * 1000);
    })
    .catch(() => {}); // Silently fail if SW not supported/blocked

  // ── When the SW controller changes (new SW took over), reload the page ──
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) {
      refreshing = true;
      window.location.reload();
    }
  });
}

boot();
