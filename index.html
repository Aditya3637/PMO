<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Taskora"/>
<meta name="theme-color" content="#0f0f1a"/>
<link rel="manifest" href="manifest.json"/>
<title>Taskora — Founder's Office</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ════════════════════════════════════════════════════
   TASKORA — ENTERPRISE DESIGN SYSTEM
   Light-first · Salesforce/Jira structure
   Charcoal accent · Neutral palette
   ════════════════════════════════════════════════════ */

/* ── LIGHT MODE (default) ──────────────────────────── */
:root {
  /* Brand accent — controlled blue, not purple */
  --ind:    #1D4ED8;
  --ind-d:  #1E40AF;
  --ind-l:  #2563EB;

  /* Semantic colours */
  --teal:   #0284C7;
  --rose:   #DC2626;
  --amb:    #D97706;
  --grn:    #059669;

  /* Surfaces — no glassmorphism, real colours */
  --bg:     #F1F5F9;     /* page background */
  --glass:  #FFFFFF;     /* card / panel surface */
  --glass2: #F8FAFC;     /* secondary surface / hover */
  --glass3: #F1F5F9;     /* tertiary / pressed */

  /* Borders */
  --bdr:    #E2E8F0;
  --bdr2:   #CBD5E1;

  /* Text */
  --txt:    #0F172A;
  --txt2:   #475569;
  --txt3:   #94A3B8;

  /* Radius — tighter for enterprise */
  --r:      6px;
  --r-sm:   5px;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 8px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 24px rgba(0,0,0,.1), 0 4px 8px rgba(0,0,0,.06);

  /* Sidebar */
  --sb-bg:  #FFFFFF;
  --sb-bdr: #E2E8F0;
  color-scheme: light;
}

/* ── DARK MODE ─────────────────────────────────────── */
html.dark {
  --ind:    #3B82F6;
  --ind-d:  #2563EB;
  --ind-l:  #60A5FA;

  --teal:   #0EA5E9;
  --rose:   #F87171;
  --amb:    #FBBF24;
  --grn:    #34D399;

  --bg:     #0F172A;
  --glass:  #1E293B;
  --glass2: #334155;
  --glass3: #475569;

  --bdr:    #334155;
  --bdr2:   #475569;

  --txt:    #F1F5F9;
  --txt2:   #CBD5E1;
  --txt3:   #64748B;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
  --shadow-md: 0 4px 8px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.2);
  --shadow-lg: 0 12px 24px rgba(0,0,0,.5), 0 4px 8px rgba(0,0,0,.3);

  --sb-bg:  #1E293B;
  --sb-bdr: #334155;
  color-scheme: dark;
}

/* ── RESET ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--txt3)}

/* ── ANIMATIONS (restrained) ────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bounceIn{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}

/* No body::before gradient — clean flat bg */
#root{min-height:100vh}

/* ── UPDATE BANNER ─────────────────────────────────── */
#update-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:var(--ind-l);color:#fff;
  display:none;align-items:center;gap:12px;
  padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0));
  box-shadow:0 -2px 12px rgba(0,0,0,.15);
}
#[update-banner.show](http://update-banner.show){display:flex}
#update-banner .ub-msg{flex:1;font-size:13px;font-weight:600}
#update-banner .ub-sub{font-size:11px;opacity:.8;margin-top:1px}
#update-banner button{padding:6px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:600;border:none;cursor:pointer}
#update-banner .ub-ok{background:#fff;color:var(--ind-l)}
#update-banner .ub-ok:hover{opacity:.92}
#update-banner .ub-skip{background:rgba(255,255,255,.2);color:#fff;margin-left:4px}

/* ── LOADING SCREEN ────────────────────────────────── */
#ls{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;transition:opacity .3s}
.spin{width:28px;height:28px;border-radius:50%;border:2px solid var(--bdr2);border-top-color:var(--ind);animation:spin .7s linear infinite}
#ls .lb{font-size:18px;font-weight:700;color:var(--txt);letter-spacing:-.02em}
#ls .ls-sub{font-size:11px;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase}

/* ── AUTH ──────────────────────────────────────────── */
#auth-scr{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);animation:fadeIn .3s}
.auth-card{background:var(--glass);border:1px solid var(--bdr);border-radius:8px;padding:36px 32px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.auth-brand{font-size:24px;font-weight:700;color:var(--txt);text-align:center;letter-spacing:-.02em;margin-bottom:4px}
.auth-tag{font-size:11px;color:var(--txt3);text-align:center;margin-bottom:28px;letter-spacing:.05em;text-transform:uppercase}
.auth-tabs{display:flex;background:var(--glass3);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:3px;margin-bottom:20px;gap:3px}
.auth-tab{flex:1;padding:7px;border-radius:4px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;background:transparent;color:var(--txt2)}
.auth-tab.on{background:var(--glass);color:var(--txt);font-weight:600;box-shadow:var(--shadow-sm);border:1px solid var(--bdr)}
.amsg{padding:10px 12px;border-radius:var(--r-sm);font-size:13px;margin-bottom:12px;line-height:1.5}
.amsg.err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.amsg.ok{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534}
html.dark .amsg.err{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.3);color:#FCA5A5}
html.dark .amsg.ok{background:rgba(5,150,105,.12);border-color:rgba(5,150,105,.3);color:#6EE7B7}

/* ── FORM ELEMENTS ─────────────────────────────────── */
.gi{width:100%;padding:9px 12px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;margin-bottom:10px}
.gi:focus{border-color:var(--ind-l);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.gi::placeholder{color:var(--txt3)}
[select.gi](http://select.gi){cursor:pointer;background:var(--glass)}
[select.gi](http://select.gi) option{background:var(--glass);color:var(--txt)}
[textarea.gi](http://textarea.gi){min-height:70px;resize:vertical;margin-bottom:0;line-height:1.6}
.fl{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;display:block}
.fg{margin-bottom:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lbl{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em}

/* ── BUTTONS ────────────────────────────────────────── */
.btn{padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit}
.btn-p{background:var(--ind-l);color:#fff;border-color:var(--ind-d)}
.btn-p:hover{background:var(--ind);filter:brightness(1.05)}
.btn-p:active{background:var(--ind-d)}
.btn-p:disabled{opacity:.5;cursor:default}
.btn-g{background:var(--glass);color:var(--txt2);border:1px solid var(--bdr)}
.btn-g:hover{background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}
.btn-g:active{background:var(--glass3)}
.btn-sm{padding:6px 12px;font-size:12px}
.br{display:flex;gap:8px}
.br .btn-g{flex:1}
.br .btn-p{flex:2}
/* Mini action button */
.mb{padding:4px 10px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);transition:all .15s}
.mb:hover{background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}
.mb:active{background:var(--glass3)}
.mb.dd{background:transparent;border-color:transparent;color:var(--txt3)}
.mb.dd:hover{background:#FEF2F2;border-color:#FECACA;color:var(--rose)}
html.dark .mb.dd:hover{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.3);color:var(--rose)}
.wa-b{flex:2;padding:10px;border-radius:var(--r-sm);font-size:13px;font-weight:600;background:#16A34A;color:#fff;border:1px solid #15803D;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:all .15s}
.wa-b:hover{background:#15803D}
.cp-b{flex:1;padding:10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;background:var(--glass);color:var(--txt2);border:1px solid var(--bdr);cursor:pointer;transition:all .15s}
.cp-b:hover{background:var(--glass2);color:var(--txt)}
.cp-b.ok{background:#F0FDF4;color:#166534;border-color:#BBF7D0}
html.dark .cp-b.ok{background:rgba(5,150,105,.12);color:var(--grn);border-color:rgba(5,150,105,.3)}

/* ── LAYOUT ─────────────────────────────────────────── */
#app{display:flex;min-height:100vh}
#sb{width:230px;background:var(--sb-bg);border-right:1px solid var(--sb-bdr);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50}
.sb-top{padding:16px 14px 10px;border-bottom:1px solid var(--bdr)}
.sb-brand{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.02em}
.sb-tag{font-size:10px;color:var(--txt3);margin-top:2px;letter-spacing:.05em;text-transform:uppercase}
.sb-div{height:1px;background:var(--bdr);margin:6px 0}
.sb-nav{flex:1;padding:6px 8px;overflow-y:auto}
/* Sidebar nav item — Jira/Salesforce style */
.sb-b{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r-sm);background:none;border:none;border-left:2px solid transparent;color:var(--txt2);font-size:13px;font-weight:400;width:100%;text-align:left;cursor:pointer;transition:all .12s;margin-bottom:1px;position:relative}
.sb-b:hover{background:var(--glass2);color:var(--txt)}
.sb-b.active{background:var(--glass2);color:var(--ind-l);border-left-color:var(--ind-l);font-weight:600}
.sb-b .ic{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-bot{padding:10px;border-top:1px solid var(--bdr)}
.prof-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);background:var(--glass2);border:1px solid var(--bdr);cursor:pointer;margin-bottom:6px;width:100%;transition:all .15s;text-align:left}
.prof-btn:hover{border-color:var(--bdr2)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--grn);flex-shrink:0}
.[sdot.sy](http://sdot.sy){background:var(--amb);animation:pulse 1.4s infinite}
.[sdot.er](http://sdot.er){background:var(--rose)}
.so-b{width:100%;padding:7px;border-radius:var(--r-sm);background:transparent;color:var(--txt3);border:1px solid var(--bdr);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.so-b:hover{background:#FEF2F2;border-color:#FECACA;color:var(--rose)}
html.dark .so-b:hover{background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.3);color:var(--rose)}
/* Theme toggle button */
.theme-btn{width:100%;padding:7px;border-radius:var(--r-sm);background:transparent;color:var(--txt3);border:1px solid var(--bdr);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.theme-btn:hover{background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}
#content{flex:1;margin-left:230px;overflow-y:auto;min-height:100vh;padding-bottom:40px}
.page{padding:22px 24px;display:none;animation:fadeIn .18s ease}
.page.active{display:block}

/* ── BOTTOM NAV (mobile) ────────────────────────────── */
#bn{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--glass);border-top:1px solid var(--bdr);z-index:100;padding-bottom:env(safe-area-inset-bottom,0);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#bn::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;min-width:56px;padding:9px 8px 8px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--txt3);cursor:pointer;transition:color .15s;position:relative}
.nb.active{color:var(--ind-l)}
.nb .ic{font-size:18px;line-height:1}
.nb .lb{font-size:10px;font-weight:500;white-space:nowrap}
@media(max-width:767px){
  #sb{transform:translateX(-100%)}
  #content{margin-left:0;padding-bottom:66px}
  #bn{display:flex}
  .page{padding:14px 16px}
}
@media(min-width:768px){#bn{display:none!important}}

/* ── CARDS ──────────────────────────────────────────── */
.gc{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:border-color .15s,box-shadow .15s}
.gc:hover{border-color:var(--bdr2);box-shadow:var(--shadow-sm)}
.[gc.red](http://gc.red){border-left:3px solid var(--rose)}
.gc.amb{border-left:3px solid var(--amb)}
.gc.exp{border-color:var(--bdr2);box-shadow:var(--shadow-md)}

/* ── STAT CARDS ─────────────────────────────────────── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.sc{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;position:relative}
.sc::after{content:'';position:absolute;top:0;right:0;bottom:0;left:0;border-radius:var(--r);background:var(--ac,var(--ind));opacity:.03;pointer-events:none}
.sn{font-size:28px;font-weight:700;line-height:1;color:var(--ac,var(--ind-l));letter-spacing:-.02em}
.sl{font-size:12px;color:var(--txt2);margin-top:4px}

/* ── PAGE HEADER ────────────────────────────────────── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--bdr)}
.pt{font-size:18px;font-weight:700;color:var(--txt);letter-spacing:-.01em}
.ps{font-size:12px;color:var(--txt3);margin-top:2px}

/* ── BADGES ─────────────────────────────────────────── */
.bd{display:inline-flex;align-items:center;font-size:11px;font-weight:500;border-radius:4px;padding:2px 7px;white-space:nowrap;border:1px solid transparent;line-height:1.4}
/* Health */
.h-ot{background:#F0FDF4;color:#166534;border-color:#BBF7D0}
.h-ar{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.h-dl{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.h-ns{background:#F8FAFC;color:#475569;border-color:#E2E8F0}
html.dark .h-ot{background:rgba(5,150,105,.12);color:var(--grn);border-color:rgba(5,150,105,.3)}
html.dark .h-ar{background:rgba(217,119,6,.12);color:var(--amb);border-color:rgba(217,119,6,.3)}
html.dark .h-dl{background:rgba(220,38,38,.12);color:var(--rose);border-color:rgba(220,38,38,.3)}
html.dark .h-ns{background:rgba(100,116,139,.1);color:var(--txt3);border-color:rgba(100,116,139,.2)}
/* Priority */
.p-cr{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.p-hi{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.p-me{background:#EFF6FF;color:#1E40AF;border-color:#BFDBFE}
.p-lo{background:#F8FAFC;color:#475569;border-color:#E2E8F0}
html.dark .p-cr{background:rgba(220,38,38,.12);color:var(--rose);border-color:rgba(220,38,38,.3)}
html.dark .p-hi{background:rgba(217,119,6,.12);color:var(--amb);border-color:rgba(217,119,6,.3)}
html.dark .p-me{background:rgba(37,99,235,.12);color:var(--ind-l);border-color:rgba(37,99,235,.3)}
html.dark .p-lo{background:rgba(100,116,139,.1);color:var(--txt3);border-color:rgba(100,116,139,.2)}

/* ── PROGRESS BARS ──────────────────────────────────── */
.pw{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.pb{height:100%;border-radius:2px;transition:width .4s ease}

/* ── FILTER PILLS ───────────────────────────────────── */
.pls{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pls::-webkit-scrollbar{display:none}
.pl{padding:4px 12px;border-radius:4px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .12s}
.pl.active{background:#EFF6FF;border-color:#BFDBFE;color:var(--ind-l);font-weight:600}
.pl:hover:not(.active){background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}
html.dark .pl.active{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:var(--ind-l)}

/* ── AVATARS ────────────────────────────────────────── */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;color:#fff;flex-shrink:0;font-size:11px}

/* ── OWNER BOX ──────────────────────────────────────── */
.owner-box{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);border:1px solid #BFDBFE;background:#EFF6FF;margin-bottom:10px}
.owner-box.empty{border-color:var(--bdr);background:var(--glass2)}
html.dark .owner-box{border-color:rgba(37,99,235,.3);background:rgba(37,99,235,.08)}
html.dark .owner-box.empty{border-color:var(--bdr);background:var(--glass2)}

/* ── COLOUR SWATCHES ────────────────────────────────── */
.sw-wrap{display:flex;gap:6px;flex-wrap:wrap}
.sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.sw.on{border-color:var(--txt);transform:scale(1.15)}
.sw:hover:not(.on){transform:scale(1.1)}

/* ── TABLE ──────────────────────────────────────────── */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:12px;background:var(--glass)}
table{width:100%;border-collapse:collapse;min-width:560px}
thead tr{background:var(--glass2)}
th{text-align:left;padding:9px 13px;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:9px 13px;border-bottom:1px solid var(--bdr);font-size:13px;color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--glass2)}

/* ── DIGEST TEXTAREA ────────────────────────────────── */
.dta{width:100%;min-height:180px;padding:12px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:12px;font-family:'SF Mono',ui-monospace,monospace;line-height:1.9;resize:vertical;outline:none;box-sizing:border-box;transition:border-color .15s,box-shadow .15s}
.dta:focus{border-color:var(--ind-l);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* ── INFO BOX ───────────────────────────────────────── */
.ih{font-size:13px;color:var(--txt2);line-height:1.6;background:var(--glass2);padding:11px 13px;border-radius:var(--r-sm);border:1px solid var(--bdr);margin-bottom:14px}

/* ── EMPTY STATE ────────────────────────────────────── */
.es{text-align:center;padding:52px 20px;color:var(--txt3)}
.es .em{font-size:40px;margin-bottom:14px;display:block}
.es .et{font-size:16px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.es .ed{font-size:13px;line-height:1.6;max-width:260px;margin:0 auto}

/* ── TASK ROW ───────────────────────────────────────── */
.tr-row{background:var(--glass);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:4px;border:1px solid var(--bdr);border-left:3px solid var(--bdr2);transition:border-color .12s}
.tr-row:hover{border-color:var(--bdr2);background:var(--glass2)}
.tr-row.od{border-left-color:var(--rose);background:#FEF2F2}
html.dark .tr-row.od{background:rgba(220,38,38,.07)}
.tm{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:4px}

/* ── MILESTONE / SEARCH ROWS ────────────────────────── */
.sr{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--glass);border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--bdr);margin-bottom:3px;transition:all .12s}
.sr:hover{background:var(--glass2);border-color:var(--bdr2)}
.bpr{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--glass);border-radius:var(--r-sm);margin-bottom:4px;border:1px solid var(--bdr);cursor:pointer;transition:all .12s}
.bpr:hover{background:var(--glass2);border-color:var(--bdr2)}

/* ── INVITE STATUS ──────────────────────────────────── */
.invite-pending{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.invite-accepted{background:#F0FDF4;color:#166534;border-color:#BBF7D0}
html.dark .invite-pending{background:rgba(217,119,6,.12);color:var(--amb);border-color:rgba(217,119,6,.3)}
html.dark .invite-accepted{background:rgba(5,150,105,.12);color:var(--grn);border-color:rgba(5,150,105,.3)}

/* ── MODAL / BOTTOM SHEET ───────────────────────────── */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:none;align-items:flex-end;justify-content:center}
#ov.op{display:flex;animation:fadeIn .12s}
#sh{background:var(--glass);border:1px solid var(--bdr);border-bottom:none;width:100%;max-width:520px;border-radius:8px 8px 0 0;max-height:92vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0) + 20px);animation:slideUp .2s ease;box-shadow:var(--shadow-lg)}
.sh-hd{width:32px;height:3px;background:var(--bdr2);border-radius:2px;margin:12px auto 0}
.sh-row{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 10px;border-bottom:1px solid var(--bdr)}
.sh-ti{font-size:15px;font-weight:600;color:var(--txt)}
.sh-cl{width:26px;height:26px;border-radius:4px;background:var(--glass2);border:1px solid var(--bdr);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .12s}
.sh-cl:hover{background:var(--glass3);color:var(--txt)}
.sh-bod{padding:16px 18px 4px}
@media(min-width:768px){
  #ov{align-items:center}
  #sh{border-radius:8px;border-bottom:1px solid var(--bdr);max-width:500px;box-shadow:var(--shadow-lg);animation:bounceIn .2s}
  #sh.wide{max-width:640px}
  .sh-hd{display:none}
}

/* ── NOTIFICATION BADGE ─────────────────────────────── */
.notif-badge{display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);min-width:17px;height:17px;border-radius:99px;background:var(--rose);color:#fff;font-size:10px;font-weight:600;align-items:center;justify-content:center;padding:0 4px}

/* ── STATE ── */
let U = null, curTab = 'dash';
let MY_ROLE = 'super_admin';
let MY_PERSON_ID = null;
let CHAIRMAN_UID = null;
let expP = {}, expS = {}, ganttP = {}, bSrch = '', bCity = '', bType = '', pFil = 'active', projView = 'list';
let _dashOwner = '__all__'; // Chairman stakeholder filter: '__all__' or a [person.id](http://person.id)
let bulkMode = false, selTasks = new Set();
let notifCount = 0;
let DB = {

};

/* ── SYNC ── */
function ss(s) {
  const d = document.getElementById('sd');
  if (!d) return;
  d.className = 'sdot' + (s==='sy' ? ' sy' : s==='er' ? ' er' : '');
}

async function load() {
  if (!U) return;
  ss('sy');
  try {
    const uid = CHAIRMAN_UID || [U.id](http://U.id);
    const myUid = [U.id](http://U.id);
    const [b,p,pr,ms,t,pb,de,th,prog,tpl,docs,notifs,sched] = await Promise.all([
      SB.from('buildings').select('*').eq('user_id',uid).order('serial'),
      SB.from('people').select('*').eq('user_id',uid).order('name'),
      SB.from('projects').select('*').eq('user_id',uid).order('created_at'),
      SB.from('sub_projects').select('*').eq('user_id',uid).order('seq').order('created_at'),
      SB.from('tasks').select('*').eq('user_id',uid).order('created_at'),
      SB.from('project_buildings').select('*').eq('user_id',uid),
      SB.from('digest_edits').select('*').eq('user_id',uid),
      SB.from('themes').select('*').eq('user_id',uid).order('seq').order('created_at'),
      SB.from('programs').select('*').eq('user_id',uid).order('seq').order('created_at'),
      SB.from('project_templates').select('*').eq('user_id',CHAIRMAN_UID||[U.id](http://U.id)).order('created_at'),
      SB.from('documents').select('*').eq('workspace_id',uid),
      SB.from('notifications').select('*').eq('for_user_id',myUid).order('created_at',{ascending:false}).limit(50),
      SB.from('digest_schedule').select('*').eq('chairman_id',CHAIRMAN_UID||[U.id](http://U.id)).maybeSingle(),
    ]);
    DB.buildings  = ([b.data](http://b.data)||[]).map(x => ({...x, softHandover:x.soft_handover, hardHandover:x.hard_handover, btype:x.btype||'operational'}));
    DB.people     = [p.data](http://p.data)||[];
    DB.projects   = ([pr.data](http://pr.data)||[]).map(x => ({...x, desc:x.description, primaryOwnerId:x.primary_stakeholder_id, health:[x.health](http://x.health)||'on_track', priority:x.priority||'medium', programId:x.program_id}));
    DB.milestones = ([ms.data](http://ms.data)||[]).map(x => ({...x, projectId:x.project_id}));
    DB.tasks      = ([t.data](http://t.data)||[]).map(x => ({...x, projectId:x.project_id, milestoneId:x.sub_project_id, buildingRefId:x.project_building_id, assignedTo:x.assigned_to, dueDate:x.due_date, followUp:x.follow_up, dependsOn:x.depends_on||[], recurringMeeting:x.recurring_meeting||false, meetingFrequency:x.meeting_frequency||'weekly', lastMeetingAt:x.last_meeting_at, nextMeetingAt:[x.next](http://x.next)_meeting_at}));
    DB.pb         = ([pb.data](http://pb.data)||[]).map(x => ({...x, projectId:x.project_id, buildingId:x.building_id, targetCompletion:[x.target](http://x.target)_completion, secondaryOwnerId:x.secondary_owner_id}));

async function delRow(tbl, id) {

/* ── AUTH ── */
function amsg(m, ok) {
  const el = document.getElementById('amsg');
  if (el) el.innerHTML = '<div class="amsg '+(ok?'ok':'err')+'">'+m+'</div>';
}
function swAT(t) {
  const si = t==='si';
  document.getElementById('at-si').classList.toggle('on', si);
  document.getElementById('at-su').classList.toggle('on', !si);
  document.getElementById('form-si').style.display = si ? '' : 'none';
  document.getElementById('form-su').style.display = si ? 'none' : '';
  document.getElementById('amsg').innerHTML = '';
}
async function doSI() {
  const email=val('si-em').trim(), pass=val('si-pw');
  if (!email||!pass) { amsg('Please enter email and password.'); return; }
  const btn = document.querySelector('#form-si .btn-p');
  if (btn) { btn.disabled=true; btn.textContent='Signing in…'; }
  const {error} = await SB.auth.signInWithPassword({email, password:pass});
  if (btn) { btn.disabled=false; btn.textContent='Sign in →'; }
  if (error) amsg(error.message==='Invalid login credentials' ? 'Incorrect email or password.' : error.message);
}
async function doSU() {
  const email=val('su-em').trim(), pass=val('su-pw');
  if (!email||!pass) { amsg('Please fill all fields.'); return; }
  if (pass.length<8) { amsg('Password must be at least 8 characters.'); return; }
  const btn = document.querySelector('#form-su .btn-p');
  if (btn) { btn.disabled=true; btn.textContent='Creating…'; }
  const {error} = await SB.auth.signUp({email, password:pass});
  if (btn) { btn.disabled=false; btn.textContent='Create account →'; }
  if (error) amsg(error.message);
}
async function doSO() { await SB.auth.signOut(); }

/* ── BOOT ── */
async function boot() {
  const {data:{session}} = await SB.auth.getSession();
  document.getElementById('ls').style.opacity = '0';
  setTimeout(() => { document.getElementById('ls').style.display='none'; }, 300);
  if (session) { U=session.user; showApp(); }
  else { document.getElementById('auth-scr').style.display='flex'; }

  SB.auth.onAuthStateChange(async (ev, ses) => {
    if (ses) {
      U = ses.user;
      document.getElementById('auth-scr').style.display = 'none';
      showApp();
    } else {
      U = null;
      document.getElementById('root').style.display = 'none';
      DB = {buildings:[],people:[],projects:[],milestones:[],tasks:[],pb:[],de:{}};
      document.getElementById('auth-scr').style.display = 'flex';
    }
  });
}

async function showApp() {
  document.getElementById('root').style.display = '';
  const email = [U.email](http://U.email)||'';
  document.getElementById('uem').textContent = email;
  document.getElementById('sb-name').textContent = U.user_metadata?.display_name||email.split('@')[0]||'Account';
  document.getElementById('sb-av').textContent = email.slice(0,2).toUpperCase();
  // Sync theme toggle button state
  updateThemeBtn(document.documentElement.classList.contains('dark'));
  IS_PLATFORM_OWNER = ([U.email](http://U.email) === PLATFORM_OWNER_EMAIL);

  // ── ROLE DETECTION ──────────────────────────────────────────────────────────
  // Check if this user is a team member in someone else's workspace
  const {data:accessRow} = await SB.from('workspace_access')
    .select('*').eq('member_user_id', [U.id](http://U.id)).maybeSingle();

  if (accessRow) {
    // Team member — load data from chairman's workspace
    MY_ROLE        = accessRow.role_level || 'member';
    MY_PERSON_ID   = accessRow.person_id;
    CHAIRMAN_UID   = accessRow.chairman_user_id;
  } else {
    // Chairman (owns this workspace)
    MY_ROLE      = 'super_admin';
    MY_PERSON_ID = null;
    CHAIRMAN_UID = [U.id](http://U.id);
  }

  await load();

  // Auto-accept invite if email matches a pending people record
  if (email) {
    const matched = DB.people.filter(p => [p.email](http://p.email) && [p.email](http://p.email).toLowerCase()===email.toLowerCase() && p.invite_status==='pending');
    for (const person of matched) {
      await SB.from('people').update({invite_status:'accepted'}).eq('id', [person.id](http://person.id));
      person.invite_status = 'accepted';
      // Also link workspace_access if not already done
      if (!accessRow && person.user_id) {
        await SB.from('workspace_access').upsert({
          chairman_user_id: person.user_id,
          member_user_id: [U.id](http://U.id),
          role_level: person.role_level||'member',
          person_id: [person.id](http://person.id),
        }, {onConflict:'chairman_user_id,member_user_id'});
      }
    }
  }

  // Check for pending team requests addressed to this user
  await checkTeamRequests();
  checkRecurringMeetingReminders();

  // Build nav based on role
  buildNav();
  renderTab(curTab);
  document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b => {
    b.addEventListener('click', () => switchTab([b.dataset.tab](http://b.dataset.tab)));
  });
}

function visibleProjects() {
  const all = DB.projects;
  if (MY_ROLE === 'super_admin') return all;
  if (MY_ROLE === 'primary_stakeholder') return all.filter(p => p.primaryOwnerId === MY_PERSON_ID);
  // member — projects they have tasks in
  const myProjIds = new Set(DB.tasks.filter(t => t.assignedTo===MY_PERSON_ID).map(t => t.projectId));
  return all.filter(p => myProjIds.has([p.id](http://p.id)));
}
function visibleTasks(projIds) {
  const all = DB.tasks.filter(t => !projIds || projIds.has(t.projectId));
  if (MY_ROLE === 'super_admin') return all;
  if (MY_ROLE === 'primary_stakeholder') return all; // all tasks in their projects
  return all.filter(t => t.assignedTo === MY_PERSON_ID);
}

/* ── MARK MEETING HELD ── */
async function markMeetingHeld(taskId) {
  const t = DB.tasks.find(x => [x.id](http://x.id) === taskId);
  if (!t) return;
  const freq = t.meetingFrequency || 'weekly';
  const freqDays = {daily:1, weekly:7, fortnightly:14, monthly:30};
  const days = freqDays[freq] || 7;
  const now  = new Date();
  const next = new Date(now); next.setDate(next.getDate() + days);
  const obj  = {
    last_meeting_at: now.toISOString(),
    next_meeting_at: next.toISOString(),
  };
  await SB.from('tasks').update(obj).eq('id', taskId).eq('user_id', CHAIRMAN_UID||[U.id](http://U.id));
  DB.tasks = [DB.tasks.map](http://DB.tasks.map)(x => [x.id](http://x.id)===taskId
    ? {...x, lastMeetingAt:obj.last_meeting_at, nextMeetingAt:[obj.next](http://obj.next)_meeting_at}
    : x);
  showToast('Meeting recorded ✓ — next due: '+fd(next.toISOString().slice(0,10)), 'ok');
  rDash();
}

function sendBrowserNotif(title, body) {

}

/* ── CHECK OVERDUE RECURRING MEETINGS (called on load) ── */
function checkRecurringMeetingReminders() {
  const today = tday();
  const overdueMeetings = DB.tasks.filter(t =>
    t.recurringMeeting && t.status !== 'done' &&
    t.nextMeetingAt && t.nextMeetingAt.slice(0,10) <= today
  );
  if (overdueMeetings.length) {
    requestNotifPerm();
    overdueMeetings.forEach(t => {
      const proj = DB.projects.find(p => [p.id](http://p.id) === t.projectId);
      sendBrowserNotif(
        '🔄 Meeting overdue: ' + t.title,
        (proj ? [proj.name](http://proj.name) + ' · ' : '') + 'This recurring meeting is due. Mark it as held when done.'
      );
    });
  }
}

function rDash() {
  const todayStr = tday();
  const tmrStr   = tmrDay();
  const isSuper  = MY_ROLE === 'super_admin';

  // For members, always show personal dashboard
  if (MY_ROLE === 'member') {
    const myProjs   = visibleProjects();
    const active    = myProjs.filter(p => p.status!=='done');
    const myProjIds = new Set([active.map](http://active.map)(p => [p.id](http://p.id)));
    const myTasks   = visibleTasks(myProjIds);
    let h = '<div class="ph"><div><div class="pt">My Dashboard</div><div class="ps">'+nowFull()+'</div></div></div>';
    h += rMemberDash(todayStr, tmrStr, myTasks);
    document.getElementById('tab-dash').innerHTML = h;
    return;
  }

  // Chairman / primary_stakeholder view
  const allVisible  = visibleProjects();
  const allActive   = allVisible.filter(p => p.status!=='done');

  // All people who own projects — used for the stakeholder filter dropdown
  const allOwners = DB.people.filter(p => allActive.some(pr => pr.primaryOwnerId===[p.id](http://p.id)));

  // Apply stakeholder filter (chairman only — primary_stakeholder always sees their own)
  let filteredOwners;
  if (!isSuper) {
    // Primary stakeholder: only themselves
    filteredOwners = allOwners.filter(p => [p.id](http://p.id) === MY_PERSON_ID);
    if (_dashOwner !== '__all__' && _dashOwner !== MY_PERSON_ID) _dashOwner = '__all__';
  } else {
    filteredOwners = (_dashOwner === '__all__') ? allOwners : allOwners.filter(p => [p.id](http://p.id) === _dashOwner);
  }

  const shownProjs  = allActive.filter(pr => filteredOwners.some(o => [o.id](http://o.id) === pr.primaryOwnerId));
  const shownProjIds = new Set([shownProjs.map](http://shownProjs.map)(p => [p.id](http://p.id)));
  const shownTasks  = DB.tasks.filter(t => shownProjIds.has(t.projectId));

  const hCounts = {on_track:0, at_risk:0, delayed:0};
  shownProjs.forEach(p => { const k = [p.health](http://p.health)||'on_track'; if (k in hCounts) hCounts[k]++; });
  const totalOD = shownTasks.filter(t => isOD(t.dueDate,t.status)).length;
  const dueSoon = shownTasks.filter(t => t.status!=='done' && (t.dueDate===todayStr||t.dueDate===tmrStr)).length;

  // Recurring meetings due today or overdue
  const recurringDue = DB.tasks.filter(t =>
    t.recurringMeeting && t.status!=='done' &&
    t.nextMeetingAt && t.nextMeetingAt.slice(0,10) <= todayStr
  );

  let h = '<div class="ph"><div><div class="pt">Command Centre</div><div class="ps">'+nowFull()+'</div></div>';

  // ── STAKEHOLDER FILTER (chairman only) ──
  if (isSuper && allOwners.length > 1) {
    h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    h += '<select class="gi" style="margin:0;width:auto;padding:7px 11px;font-size:13px" onchange="_dashOwner=this.value;rDash()">';
    h += '<option value="__all__"'+(_dashOwner==='__all__'?' selected':'')+'>All stakeholders</option>';
    allOwners.forEach(p => {
      h += '<option value="'+[p.id](http://p.id)+'"'+(_dashOwner===[p.id](http://p.id)?' selected':'')+'>'+esc([p.name](http://p.name))+(p.role?' — '+esc(p.role):'')+'</option>';
    });
    h += '</select>';
    if (_dashOwner !== '__all__') {
      h += '<button class="btn btn-g btn-sm" onclick="_dashOwner=\'__all__\';rDash()">✕ Clear filter</button>';
    }
    h += '</div>';
  }
  h += '</div>'; // end ph

  // ── HEALTH PULSE ──
  h += '<div style="display:flex;gap:6px;margin-bottom:12px">';
  if (hCounts.on_track) h += '<div style="flex:1;text-align:center;padding:10px 8px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:var(--r)"><div style="font-size:18px;font-weight:700;color:var(--grn)">'+hCounts.on_track+'</div><div style="font-size:10px;color:var(--grn);margin-top:1px">On Track</div></div>';
  if ([hCounts.at](http://hCounts.at)_risk)  h += '<div style="flex:1;text-align:center;padding:10px 8px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--r)"><div style="font-size:18px;font-weight:700;color:var(--amb)">'+[hCounts.at](http://hCounts.at)_risk+'</div><div style="font-size:10px;color:var(--amb);margin-top:1px">At Risk</div></div>';
  if (hCounts.delayed)  h += '<div style="flex:1;text-align:center;padding:10px 8px;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r)"><div style="font-size:18px;font-weight:700;color:var(--rose)">'+hCounts.delayed+'</div><div style="font-size:10px;color:var(--rose);margin-top:1px">Delayed</div></div>';
  if (!shownProjs.length) h += '<div style="flex:1;padding:10px;background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;color:var(--txt2);text-align:center">'+ (_dashOwner!=='__all__'?'No active projects for this stakeholder':'No active projects yet')+'</div>';

      h += '<div style="text-align:center;font-size:12px;color:var(--txt3)">';

async function dshCySt(id) {
  const t = DB.tasks.find(x => [x.id](http://x.id)===id);
  if (!t) return;
  const i = SCYC.indexOf(t.status);
  t.status = SCYC[(i+1) % SCYC.length];
  await SB.from('tasks').update({status:t.status}).eq('id',id).eq('user_id', CHAIRMAN_UID||[U.id](http://U.id));
  rDash();
}

// ── MEMBER DASHBOARD — shows only tasks assigned to logged-in team member ──
function rMemberDash(todayStr, tmrStr, myTasks) {
  const me = DB.people.find(p => [p.id](http://p.id)===MY_PERSON_ID);
  let h = '';
  if (me) {
    h += '<div style="display:flex;align-items:center;gap:12px;padding:14px;background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.2);border-radius:12px;margin-bottom:20px">';
    h += av([me.name](http://me.name),me.color,44);
    h += '<div><div style="font-size:15px;font-weight:700">'+esc([me.name](http://me.name))+'</div>';
    h += '<div style="font-size:12px;color:var(--teal);margin-top:2px">'+esc(me.role||'Team member')+'</div></div>';
    h += '</div>';
  }
  const pending  = myTasks.filter(t => t.status!=='done');
  const overdue  = pending.filter(t => isOD(t.dueDate,t.status));
  const todayT   = pending.filter(t => t.dueDate===todayStr);
  const tmrT     = pending.filter(t => t.dueDate===tmrStr);
  const upcoming = pending.filter(t => t.dueDate && t.dueDate>tmrStr).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,5);

  h += '<div class="sg" style="margin-bottom:20px">';
  h += '<div class="sc" style="--ac:#f87171;padding:12px"><div class="sn" style="font-size:24px">'+overdue.length+'</div><div class="sl">Overdue</div></div>';
  h += '<div class="sc" style="--ac:#fbbf24;padding:12px"><div class="sn" style="font-size:24px">'+(todayT.length+tmrT.length)+'</div><div class="sl">Due today & tomorrow</div></div>';
  h += '</div>';

  const sections = [
    {label:'⚠ Overdue', tasks:overdue, bg:'rgba(244,63,94,.07)', bdr:'rgba(244,63,94,.2)', tc:'var(--rose)'},
    {label:'📅 Today', tasks:todayT, bg:'rgba(245,158,11,.07)', bdr:'rgba(245,158,11,.2)', tc:'#f59e0b'},
    {label:'📅 Tomorrow', tasks:tmrT, bg:'rgba(99,102,241,.06)', bdr:'rgba(99,102,241,.15)', tc:'var(--ind-l)'},
    {label:'🗓 Upcoming', tasks:upcoming, bg:'var(--glass)', bdr:'var(--bdr)', tc:'var(--txt2)'},
  ];
  sections.forEach(({label,tasks,bg,bdr,tc}) => {
    if (!tasks.length) return;
    h += '<div style="font-size:11px;font-weight:700;color:'+tc+';text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">'+label+' ('+tasks.length+')</div>';
    tasks.forEach(t => {
      const proj = DB.projects.find(p => [p.id](http://p.id)===t.projectId);
      const od = isOD(t.dueDate,t.status);
      h += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:'+bg+';border:1px solid '+bdr+';border-radius:9px;margin-bottom:5px">';
      h += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+esc(t.title)+'</div>';
      h += '<div style="font-size:11px;color:var(--txt2);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap">';
      if (proj) h += '<span>'+esc([proj.name](http://proj.name))+'</span>';
      if (t.dueDate) h += '<span style="color:'+(od?'var(--rose)':tc)+';font-weight:'+(od?600:400)+'">'+(od?'⚠ ':'')+fd(t.dueDate)+'</span>';
      if (t.notes) h += '<span style="color:var(--txt3)">'+esc(t.notes.slice(0,40))+(t.notes.length>40?'…':'')+'</span>';
      h += '</div></div>';
      h += '<button onclick="mbCySt(\''+[t.id](http://t.id)+'\')" style="flex-shrink:0;padding:4px 9px;border-radius:7px;border:1px solid var(--bdr);background:var(--glass);cursor:pointer;font-size:11px;font-weight:600;color:'+(TS[t.status]?.c||'var(--txt2)')+';white-space:nowrap">'+(TS[t.status]?.l||'—')+'</button>';
      h += '</div>';
    });
    h += '<div style="margin-bottom:14px"></div>';
  });
  if (!pending.length) h += '<div class="es"><span class="em">🎉</span><div class="et">All caught up!</div><div class="ed">No pending tasks assigned to you.</div></div>';
  return h;
}
async function mbCySt(id) {

  await SB.from('tasks').update({status:t.status}).eq('id',id).eq('user_id', CHAIRMAN_UID||[U.id](http://U.id));

}

  }

    h += '<div style="font-size:12px;color:var(--txt2);margin-top:1px">'+esc(person.role||'—')+'</div>';
    if ([person.email](http://person.email)) h += '<div style="font-size:11px;color:var(--txt3);margin-top:1px">✉ '+esc([person.email](http://person.email))+'</div>';
    h += '</div>';

async function setRole(personId, newRole) {
  const superAdmins = DB.people.filter(p => p.role_level==='super_admin' && [p.id](http://p.id)!==personId);
  if (newRole==='super_admin' && superAdmins.length>=2) {
    showToast('Max 2 super admins allowed. Remove one first.','err');
    rRoles();
    return;
  }
  // Update people record
  await SB.from('people').update({role_level:newRole}).eq('id',personId).eq('user_id',CHAIRMAN_UID||[U.id](http://U.id));
  DB.people = [DB.people.map](http://DB.people.map)(p => [p.id](http://p.id)===personId ? {...p,role_level:newRole} : p);
  // Update workspace_access if exists
  await SB.from('workspace_access').update({role_level:newRole}).eq('person_id',personId).eq('chairman_user_id',[U.id](http://U.id));
  showToast('Role updated ✓','ok');
  rRoles();
}

    h += '</div>';
    if (ownedProjs.length) {
      h += '<div style="margin-top:9px;display:flex;flex-direction:column;gap:4px">';

    h += '<div style="padding:10px 13px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:var(--r-sm);margin-bottom:16px;font-size:13px;color:#1E40AF">✉ An email will open for you to send — they sign up with that address and join this workspace.</div>';

  }
  h += '<div class="fg"><label class="fl">WhatsApp</label><input id="pf-p" class="gi" type="tel" placeholder="91XXXXXXXXXX" value="'+esc(p?.phone||'')+'"></div>';
  if (isSuper) {
    h += '<div class="fg"><label class="fl">Access level</label><select id="pf-rl" class="gi">';
    [{v:'member',l:'Member — sees only their tasks'},{v:'primary_stakeholder',l:'Primary Stakeholder — sees owned projects'},{v:'super_admin',l:'Super Admin — full access'}].forEach(o=>{
      h += '<option value="'+o.v+'"'+((p?.role_level||'member')===o.v?' selected':'')+'>'+o.l+'</option>';
    });
    h += '</select></div>';
  } else {
    h += '<div style="padding:9px 12px;background:var(--glass2);border:1px solid var(--bdr);border-radius:var(--r-sm);font-size:12px;color:var(--txt3);margin-bottom:14px">Access level: <strong>Member</strong> (chairman assigns higher roles)</div>';
    h += '<input type="hidden" id="pf-rl" value="member">';
  }
  h += CP('pf-c', rc);
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svPpl(\''+( id||'')+'\')">'+( isEdit?'Save changes':'Send invite')+'</button></div>';
  OS(isEdit?'Edit person':'Invite person', h);
}

async function svPpl(id) {
  const name = val('pf-n').trim();
  if (!name) { showToast('Name is required','err'); return; }
  const email = id ? null : val('pf-e').trim();
  if (!id && !email) { showToast('Email is required','err'); return; }
  const roleLevel = val('pf-rl') || 'member';
  if (MY_ROLE === 'primary_stakeholder' && roleLevel !== 'member') {
    showToast('You can only invite members','err'); return;
  }
  const obj = {name, role:val('pf-r').trim(), phone:val('pf-p').trim(), color:val('pf-c'), role_level:roleLevel};
  if (email) [obj.email](http://obj.email) = email;
  const wuid = CHAIRMAN_UID || [U.id](http://U.id);
  if (id) {
    const {error} = await SB.from('people').update(obj).eq('id',id).eq('user_id',wuid);
    if (error) { showToast('Update failed: '+error.message,'err'); return; }
    await SB.from('workspace_access').update({role_level:roleLevel}).eq('person_id',id).eq('chairman_user_id',wuid);
    DB.people = [DB.people.map](http://DB.people.map)(x => [x.id](http://x.id)===id ? {...x,...obj} : x);
    CS(); showToast('Saved ✓','ok'); rPpl();
  } else {
    obj.invite_status = 'pending';
    const {data:ins, error} = await SB.from('people').insert({...obj, user_id:wuid}).select().single();
    if (error) { showToast('Invite failed: '+error.message,'err'); return; }
    if (ins) {
      DB.people.push({...ins});
      const cName = U.user_metadata?.display_name || ([U.email](http://U.email)||'').split('@')[0] || 'Your team';
      await SB.from('team_requests').insert({chairman_id:wuid, person_id:[ins.id](http://ins.id), invitee_email:email, chairman_name:cName, status:'pending'});
    }
    CS(); rPpl(); showToast('Invite created ✓','ok');
    const appUrl  = window.location.origin + window.location.pathname;
    const subject = encodeURIComponent("You've been invited to Taskora — Founder's Office");
    const body    = encodeURIComponent("Hi "+name+",\n\nYou've been invited to Taskora — our project management system.\n\nTo get started:\n1. Visit: "+appUrl+"\n2. Click 'Create account'\n3. Sign up with this email: "+email+"\n\nOnce signed in, accept the workspace invitation.\n\nRegards");
    [window.open](http://window.open)('mailto:'+email+'?subject='+subject+'&body='+body);
  }
}

async function dPpl(id) {
  const person = DB.people.find(x => [x.id](http://x.id)===id);
  if (!person) return;
  if (MY_ROLE === 'primary_stakeholder' && (person.role_level||'member') !== 'member') {
    showToast('Only the chairman can remove admins or primary stakeholders','err'); return;
  }
  if (!confirm('Remove '+esc([person.name](http://person.name)||'this person')+'?\n\nThey will be unassigned from all tasks and projects. Their account is not deleted — they just lose access.')) return;
  const wuid = CHAIRMAN_UID || [U.id](http://U.id);
  const {error} = await SB.from('people').delete().eq('id',id).eq('user_id',wuid);
  if (error) { showToast('Remove failed: '+error.message,'err'); return; }
  await SB.from('workspace_access').delete().eq('person_id',id).eq('chairman_user_id',wuid);
  await SB.from('team_requests').delete().eq('person_id',id);
  DB.people   = DB.people.filter(x => [x.id](http://x.id)!==id);
  DB.tasks    = [DB.tasks.map](http://DB.tasks.map)(t => t.assignedTo===id ? {...t,assignedTo:null} : t);
  DB.projects = [DB.projects.map](http://DB.projects.map)(pr => pr.primaryOwnerId===id ? {...pr,primaryOwnerId:null} : pr);
  showToast(([person.name](http://person.name)||'Person')+' removed ✓','ok');
  rPpl();
}

function canEditTask(t) {
  if (MY_ROLE === 'super_admin') return true;
  if (MY_ROLE === 'primary_stakeholder') {
    const proj = DB.projects.find(p => [p.id](http://p.id) === t.projectId);
    return !!(proj && proj.primaryOwnerId === MY_PERSON_ID);
  }
  return false;
}

  if (pe) h += av([pe.name](http://pe.name),pe.color,18)+'<span style="font-size:11px;color:var(--txt2)">'+esc([pe.name](http://pe.name).split(' ')[0])+'</span>';

    h += '</div>';
  }
  h += '</div></div>';
  return h;
}


function rProj() {
  const allVisible = visibleProjects();
  const projs = allVisible.filter(pr => {
    if (pFil==='done')   return pr.status==='done';
    if (pFil==='active') return pr.status!=='done';
    return true;
  });

  let h = '<div class="ph"><div><div class="pt">Projects</div><div class="ps">'+visibleProjects().filter(pr=>pr.status!=='done').length+' active</div></div>';
  h += '<button class="btn btn-p btn-sm" onclick="oPrF()">+ New project</button></div>';

  // View toggle + filter row
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
  // Status filters
  h += '<div class="pls" style="margin-bottom:0;flex:1">';
  h += '<button class="pl'+(pFil==='active'&&projView==='list'?' active':'')+'" onclick="projView=\'list\';pFil=\'active\';rProj()">Active</button>';
  h += '<button class="pl'+(pFil==='done'&&projView==='list'?' active':'')+'" onclick="projView=\'list\';pFil=\'done\';rProj()">Done</button>';
  h += '<button class="pl'+(pFil==='all'&&projView==='list'?' active':'')+'" onclick="projView=\'list\';pFil=\'all\';rProj()">All</button>';
  h += '</div>';
  // Gantt toggle button — right side, prominent
  h += '<button onclick="projView=projView===\'gantt\'?\'list\':\'gantt\';rProj()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid '+(projView==='gantt'?'rgba(99,102,241,.5)':'var(--bdr)')+';background:'+(projView==='gantt'?'rgba(99,102,241,.18)':'var(--glass)')+';color:'+(projView==='gantt'?'var(--ind-l)':'var(--txt2)')+'"><span style="font-size:14px">📊</span>'+(projView==='gantt'?'Exit Gantt':'Gantt view')+'</button>';
  h += '</div>';

  // ── GANTT VIEW ──
  if (projView === 'gantt') {
    h += rGanttFull();
    document.getElementById('tab-projects').innerHTML = h;
    return;
  }

  if (!projs.length) {
    h += '<div class="es"><span class="em">📋</span><div class="et">No projects</div><div class="ed">Create your first project and assign a primary owner</div></div>';
    document.getElementById('tab-projects').innerHTML = h;

  }

  projs.forEach(proj => {
    const owner    = DB.people.find(p => [p.id](http://p.id)===proj.primaryOwnerId);
    const mils     = DB.milestones.filter(m => m.projectId===[proj.id](http://proj.id));
    const allT     = DB.tasks.filter(t => t.projectId===[proj.id](http://proj.id));

    const pend     = allT.filter(t => t.status!=='done').length;
    const ovdT     = allT.filter(t => isOD(t.dueDate,t.status));
    const pct      = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
    const pbs      = DB.pb.filter(r => r.projectId===[proj.id](http://proj.id)).map(r => ({...r, b:DB.buildings.find(b=>[b.id](http://b.id)===r.buildingId)})).filter(r => r.b);
    const bDone    = pbs.filter(r => r.status==='done').length;
    const isExp    = !!expP[[proj.id](http://proj.id)];

        if (mil.deadline) h += '<span style="font-size:11px;color:'+(isOD(mil.deadline,mil.status)?'var(--rose)':'var(--txt3)')+'">'+fd(mil.deadline)+'</span>';

// ── FULL PAGE GANTT — all projects + buildings ──
function rGanttFull() {
  const active = DB.projects.filter(p => p.status !== 'done');
  if (!active.length) return '<div class="es"><span class="em">📊</span><div class="et">No active projects</div><div class="ed">Create projects and assign buildings with completion dates to see the Gantt</div></div>';

  // Compute global timeline bounds
  const allDates = [];
  active.forEach(proj => {
    if (proj.deadline) allDates.push(proj.deadline);
    if (proj.created_at) allDates.push(proj.created_at.slice(0,10));
    DB.pb.filter(r => r.projectId===[proj.id](http://proj.id)).forEach(r => {
      if (r.targetCompletion) allDates.push(r.targetCompletion);
    });
    DB.milestones.filter(m => m.projectId===[proj.id](http://proj.id) && m.deadline).forEach(m => allDates.push(m.deadline));
  });
  allDates.push(tday());
  const sorted = [...allDates].sort();
  const minDate = new Date(sorted[0]+'T12:00:00');
  const rawMax  = new Date(sorted[sorted.length-1]+'T12:00:00');
  // ensure at least 60 days span
  if ((rawMax - minDate) < 60*86400000) rawMax.setDate(rawMax.getDate()+60);
  const maxDate = rawMax;
  const totalMs = maxDate - minDate;

  const pct = ms => Math.max(0, Math.min(100, (ms / totalMs) * 100));
  const datePct = d => pct(new Date(d+'T12:00:00') - minDate);
  const todayPct = pct(new Date(tday()+'T12:00:00') - minDate);

  const HEALTH_COLOR = {on_track:'#10b981', at_risk:'#f59e0b', delayed:'#f43f5e', not_started:'#64748b'};
  const STATUS_COLOR  = {done:'#10b981', in_progress:'#f59e0b', blocked:'#f43f5e', on_hold:'#fb923c', not_started:'#64748b'};
  const LABEL_W = 160; // px width of label column

  // Month header labels
  const months = [];
  const cur = new Date(minDate);
  cur.setDate(1);
  while (cur <= maxDate) {
    const p = pct(new Date(cur) - minDate);
    months.push({label: cur.toLocaleDateString('en-IN',{month:'short',year:'2-digit'}), pct: Math.max(0, Math.min(98, p))});
    cur.setMonth(cur.getMonth()+1);
  }

  let h = '<div style="overflow-x:auto;padding-bottom:8px">';
  h += '<div style="min-width:520px">';

  // Month ruler
  h += '<div style="display:flex;margin-bottom:6px">';
  h += '<div style="width:'+LABEL_W+'px;flex-shrink:0"></div>';
  h += '<div style="flex:1;position:relative;height:20px">';
  months.forEach(m => {
    h += '<div style="position:absolute;left:'+m.pct+'%;transform:translateX(-50%);font-size:10px;color:var(--txt3);white-space:nowrap;font-weight:500">'+m.label+'</div>';
  });
  h += '</div></div>';

  // Gridlines + today marker background strip
  h += '<div style="display:flex;margin-bottom:4px">';
  h += '<div style="width:'+LABEL_W+'px;flex-shrink:0"></div>';
  h += '<div style="flex:1;position:relative;height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden">';
  months.forEach(m => {
    h += '<div style="position:absolute;left:'+m.pct+'%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.06)"></div>';
  });
  if (todayPct >= 0 && todayPct <= 100) {
    h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--ind-l);opacity:.9"></div>';
  }
  h += '</div></div>';

  // Each project
  active.forEach(proj => {
    const owner = DB.people.find(p => [p.id](http://p.id)===proj.primaryOwnerId);
    const pbs   = DB.pb.filter(r => r.projectId===[proj.id](http://proj.id)).map(r => ({...r, b:DB.buildings.find(b=>[b.id](http://b.id)===r.buildingId)})).filter(r => r.b);

    const barStart = datePct(projStartStr);

    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+proj.color+';flex-shrink:0;box-shadow:0 0 5px '+proj.color+'66"></div>';
    h += '<div style="min-width:0"><div style="font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+esc([proj.name](http://proj.name))+'">'+esc([proj.name](http://proj.name).length>18?[proj.name](http://proj.name).slice(0,17)+'…':[proj.name](http://proj.name))+'</div>';
    if (owner) h += '<div style="font-size:10px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc([owner.name](http://owner.name).split(' ')[0])+'</div>';
    h += '</div></div>';

    h += '<div style="flex:1;position:relative;height:28px;background:rgba(255,255,255,.03);border-radius:6px;border:1px solid var(--bdr);overflow:hidden">';

    // Project bar

    h += '</div>';
    // Today line
    if (todayPct >= 0 && todayPct <= 100) {

    mils.forEach(mil => {

      h += '<div style="position:absolute;left:'+mp+'%;top:50%;transform:translate(-50%,-50%) rotate(45deg);width:8px;height:8px;background:#f59e0b;border:1px solid rgba(0,0,0,.3);z-index:4" title="'+esc([mil.name](http://mil.name))+' — '+fd(mil.deadline)+'"></div>';

    if (pbs.length) {
      pbs.forEach(r => {

        const bTasks = DB.tasks.filter(t => t.buildingRefId===[r.id](http://r.id));
        const bOD = bTasks.filter(t => isOD(t.dueDate,t.status)).length;
        const barColor = STATUS_COLOR[r.status] || '#64748b';
        const bStart = barStart; // buildings start when project starts

        h += '<div style="flex:1;position:relative;height:20px;background:rgba(255,255,255,.02);border-radius:4px;overflow:hidden">';
        months.forEach(m => {
          h += '<div style="position:absolute;left:'+m.pct+'%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.04)"></div>';
        });
        // Building bar
        h += '<div style="position:absolute;left:'+bStart+'%;width:'+(bEnd-bStart)+'%;height:100%;background:'+barColor+';opacity:'+(r.status==='done'?'.8':'.5')+';border-radius:4px;display:flex;align-items:center;padding:0 6px;overflow:hidden">';
        if (tc) h += '<span style="font-size:10px;color:#fff;font-weight:600;white-space:nowrap">'+fd(tc)+'</span>';
        h += '</div>';
        // Today line
        if (todayPct >= 0 && todayPct <= 100) {
          h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:1px;background:var(--ind-l);opacity:.7;z-index:3"></div>';
        }
        h += '</div>';
        // Right: status + overdue badge
        h += '<div style="width:56px;flex-shrink:0;padding-left:8px;display:flex;flex-direction:column;gap:2px">';
        h += bdg(r.status, BS);
        if (bOD) h += '<span class="bd" style="background:rgba(244,63,94,.14);color:var(--rose)">⚠ '+bOD+'</span>';

        h += '</div>';
      });

      h += '<div style="height:6px"></div>';

  });

  // Today label
  if (todayPct >= 0 && todayPct <= 100) {
    h += '<div style="display:flex;margin-top:4px">';
    h += '<div style="width:'+LABEL_W+'px;flex-shrink:0"></div>';

  // Legend
  h += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;padding:10px 14px;background:var(--glass);border-radius:10px;border:1px solid var(--bdr)">';

  h += '<span style="font-size:11px;color:var(--txt3)">Dark fill = completed %</span>';
  h += '</div>';

  h += '</div></div>';
  return h;
}

// ── GANTT CHART — building-wise (inside expanded project card) ──
function rGantt(proj, pbs) {
  const allDates = [pbs.map](http://pbs.map)(r => r.targetCompletion).filter(Boolean);
  if (proj.deadline) allDates.push(proj.deadline);
  const projStart = (proj.created_at||new Date().toISOString()).slice(0,10);
  allDates.push(projStart);
  allDates.push(new Date().toISOString().slice(0,10));

  const sortedDates = [...allDates].sort();
  const minDate = new Date(sortedDates[0]+'T12:00:00');
  const maxDate = new Date(sortedDates[sortedDates.length-1]+'T12:00:00');
  if ((maxDate - minDate) < 30*86400000) maxDate.setDate(maxDate.getDate()+30);

  const totalMs  = maxDate - minDate;
  const todayMs  = new Date(tday()+'T12:00:00') - minDate;
  const todayPct = Math.max(0, Math.min(100, (todayMs/totalMs)*100));

  const statusColors = {done:'#10b981', in_progress:'#f59e0b', blocked:'#f43f5e', on_hold:'#fb923c', not_started:'#64748b'};

  const months = [];
  const cur = new Date(minDate);
  cur.setDate(1);
  while (cur <= maxDate) {
    const pct = ((new Date(cur) - minDate) / totalMs) * 100;
    months.push({label: cur.toLocaleDateString('en-IN',{month:'short', year:'2-digit'}), pct: Math.max(0,Math.min(98,pct))});
    cur.setMonth(cur.getMonth()+1);
  }

  let h = '<div style="margin-bottom:16px">';
  h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">📊 Building Gantt — Completion Timeline</div>';

  h += '<div style="position:relative;height:18px;margin-bottom:8px;margin-left:140px">';
  months.forEach(m => {
    h += '<div style="position:absolute;left:'+m.pct+'%;font-size:10px;color:var(--txt3);white-space:nowrap;transform:translateX(-50%)">'+m.label+'</div>';
  });
  h += '</div>';

  h += '<div>';
  pbs.forEach(r => {
    const b = r.b;
    const tc = r.targetCompletion;
    const startMs  = new Date(projStart+'T12:00:00') - minDate;
    const endMs    = tc ? (new Date(tc+'T12:00:00') - minDate) : null;
    const startPct = Math.max(0, Math.min(100, (startMs/totalMs)*100));
    const endPct   = endMs !== null ? Math.max(startPct+3, Math.min(100, (endMs/totalMs)*100)) : startPct+5;
    const barColor = statusColors[r.status] || '#64748b';

    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">';
    h += '<div style="width:132px;flex-shrink:0;font-size:11px;font-weight:500;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding-right:8px" title="'+esc([b.name](http://b.name))+'">'+esc([b.name](http://b.name).length>18?[b.name](http://b.name).slice(0,17)+'…':[b.name](http://b.name))+'</div>';
    h += '<div style="flex:1;position:relative;height:26px;background:rgba(255,255,255,.04);border-radius:6px;border:1px solid var(--bdr)">';
    h += '<div style="position:absolute;left:'+startPct+'%;width:'+(endPct-startPct)+'%;height:100%;background:'+barColor+';opacity:'+(r.status==='done'?'1':'.7')+';border-radius:5px;display:flex;align-items:center;padding-left:6px;overflow:hidden">';
    h += '<span style="font-size:10px;color:#fff;font-weight:600;white-space:nowrap">'+(tc?fd(tc):'No date')+'</span>';
    h += '</div>';
    if (todayPct >= 0 && todayPct <= 100) {
      h += '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--ind-l);opacity:.9;z-index:2;border-radius:1px"></div>';
    }
    h += '</div>';
    h += bdg(r.status, BS);
    h += '</div>';
  });

  if (todayPct >= 0 && todayPct <= 100) {
    h += '<div style="position:relative;margin-left:140px;height:16px;margin-top:2px">';
    h += '<div style="position:absolute;left:'+todayPct+'%;transform:translateX(-50%);font-size:10px;color:var(--ind-l);font-weight:600;white-space:nowrap">▲ Today</div>';
    h += '</div>';
  }

  const bDates = [pbs.map](http://pbs.map)(r=>r.targetCompletion).filter(Boolean);
  if (bDates.length && !proj.deadline) {
    const latest = bDates.sort().slice(-1)[0];
    h += '<div style="margin-top:12px;font-size:11px;color:var(--teal);background:rgba(20,184,166,.08);border-radius:8px;padding:7px 10px;border:1px solid rgba(20,184,166,.15)">⊕ Derived project end: <strong>'+fd(latest)+'</strong> — latest building completion. Use Edit project to set a manual deadline.</div>';
  }

  h += '</div></div>';
  return h;
}

function asnL(blds, asgn) {
  if (!blds.length) return '<div style="padding:16px;font-size:13px;color:var(--txt2);text-align:center">No results</div>';
  return [blds.map](http://blds.map)(b => {
    const chk = asgn.has([b.id](http://b.id)) ? ' checked' : '';
    const bg  = asgn.has([b.id](http://b.id)) ? 'rgba(99,102,241,.07)' : 'transparent';
    return '<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);background:'+bg+'"><input type="checkbox" value="'+[b.id](http://b.id)+'"'+chk+' style="accent-color:var(--ind);width:16px;height:16px" onchange="uAC()"><div><div style="font-size:13px;font-weight:500;color:var(--txt)">'+esc([b.name](http://b.name))+'</div><div style="font-size:11px;color:var(--txt3)">'+esc([b.city](http://b.city)||'')+'</div></div></label>';
  }).join('');
}
function fAsn() {
  const q   = val('as-s').toLowerCase();
  const fil = DB.buildings.filter(b => !q || [b.name](http://b.name).toLowerCase().includes(q) || ([b.city](http://b.city)||'').toLowerCase().includes(q));
  const chk = new Set([...document.querySelectorAll('#asl input:checked')].map(c => c.value));
  document.getElementById('asl').innerHTML = asnL(fil, chk);
}
function uAC() {
  const n = document.querySelectorAll('#asl input:checked').length;
  const e = document.getElementById('ac');
  if (e) e.textContent = n+' of '+DB.buildings.length+' selected';
}
function tgAll() {
  const cbs = document.querySelectorAll('#asl input[type=checkbox]');
  const all = [...cbs].every(c => c.checked);
  cbs.forEach(c => { c.checked = !all; });
  uAC();
}
async function svAsn(pid) {
  const sel   = [...document.querySelectorAll('#asl input:checked')].map(c => c.value);
  const toRm  = DB.pb.filter(r => r.projectId===pid && !sel.includes(r.buildingId));
  for (const r of toRm) await delRow('project_buildings', [r.id](http://r.id));
  DB.pb = DB.pb.filter(r => !(r.projectId===pid && !sel.includes(r.buildingId)));
  const ex    = new Set(DB.pb.filter(r => r.projectId===pid).map(r => r.buildingId));
  const toAdd = sel.filter(bid => !ex.has(bid));
  if (toAdd.length) {
    const rows = [toAdd.map](http://toAdd.map)(bid => ({user_id:CHAIRMAN_UID||[U.id](http://U.id), project_id:pid, building_id:bid, status:'not_started', remarks:''}));
    const {data} = await SB.from('project_buildings').insert(rows).select();
    if (data) data.forEach(r => DB.pb.push({...r, projectId:r.project_id, buildingId:r.building_id}));
  }
  CS();
  rProj();
}

  // ── TASKS FOR THIS BUILDING ──
  h += '<div style="border-top:1px solid var(--bdr);padding-top:14px;margin-top:6px">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h += '<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em">Tasks at this building</div>';
  h += '<button onclick="oBldTF(\''+rid+'\',\''+r.projectId+'\')" class="mb" style="font-size:11px">+ Add task</button>';

    h += '<div style="font-size:12px;color:var(--txt3);text-align:center;padding:10px">No tasks yet for this building.</div>';

      h += '<div style="font-size:13px;font-weight:500">'+esc(t.title)+'</div>';
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px">';
      h += '<span onclick="cyStBS(\''+[t.id](http://t.id)+'\',\''+rid+'\')" style="cursor:pointer">'+bdg(t.status)+'</span>';
      if (t.dueDate) { const dc=od?'var(--rose)':'var(--txt3)'; const fw=od?600:400; h += '<span style="font-size:11px;color:'+dc+';font-weight:'+fw+'">'+(od?'⚠ ':'')+fd(t.dueDate)+'</span>'; }
      if (pe) h += '<span style="display:flex;align-items:center;gap:4px">'+av([pe.name](http://pe.name),pe.color,16)+'<span style="font-size:11px;color:var(--txt2)">'+esc([pe.name](http://pe.name).split(' ')[0])+'</span></span>';
      h += '</div>';
      if (t.notes) h += '<div style="font-size:11px;color:var(--txt2);margin-top:3px;font-style:italic">'+esc(t.notes)+'</div>';
      h += '</div>';
      h += '<div style="display:flex;gap:4px;flex-shrink:0">';
      h += '<button class="mb" style="font-size:11px;padding:3px 7px" onclick="oBldTF(\''+rid+'\',\''+r.projectId+'\',\''+[t.id](http://t.id)+'\')">✎</button>';
      h += '<button class="mb dd" style="font-size:11px;padding:3px 7px" onclick="dBldTsk(\''+[t.id](http://t.id)+'\',\''+rid+'\')">×</button>';
      h += '</div></div>';
    });
  }
  h += '</div>';

  h += '<div class="br" style="margin-top:14px"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svPBS(\''+rid+'\')">Save</button></div>';
  OS('Building detail — '+esc([b.name](http://b.name)), h, true);
}

async function svPBS(rid) {
  const obj = {
    status: val('pb-st'),

    target_completion: val('pb-tc')||null,
    secondary_owner_id: val('pb-so')||null,

  rProj();
}

// Add/edit task inside a building
function oBldTF(rid, pid, id) {
  const t  = id ? DB.tasks.find(x => [x.id](http://x.id)===id) : null;
  const proj = DB.projects.find(p => [p.id](http://p.id)===pid);

  h += '</select></div>';

  h += '<div class="fg"><label class="fl">Notes</label><textarea id="btf-no" class="gi">'+esc(t?.notes||'')+'</textarea></div>';
  h += '<div class="fr"><div class="fg"><label class="fl">Status</label>'+selOpts('btf-st',t?.status||'not_started',TS)+'</div>';
  h += '<div class="fg"><label class="fl">Priority</label>'+selOpts('btf-pr',t?.priority||'medium',PR)+'</div></div>';

  h += '<div class="fg"><label class="fl">Follow-up</label><input id="btf-fu" class="gi" type="date" value="'+(t?.followUp||'')+'"></div></div>';

  OS((id?'Edit':'Add')+' task — '+esc(b?.name||''), h, true);
