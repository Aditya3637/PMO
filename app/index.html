<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Taskora"/>
<meta name="theme-color" content="#0f0f1a"/>
<link rel="manifest" href="/manifest.json"/>
<title>Taskora — Executive Operating System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ════════════════════════════════════════════════════
   TASKORA — ENTERPRISE DESIGN SYSTEM
   Light-first · Salesforce/Jira structure
   Charcoal accent · Neutral palette
   ════════════════════════════════════════════════════ */

/* ── LIGHT MODE (default) ──────────────────────────── */
:root {
  --ind:    #1D4ED8;
  --ind-d:  #1E40AF;
  --ind-l:  #2563EB;
  --teal:   #0284C7;
  --rose:   #DC2626;
  --amb:    #D97706;
  --grn:    #059669;
  --bg:     #F1F5F9;
  --glass:  #FFFFFF;
  --glass2: #F8FAFC;
  --glass3: #F1F5F9;
  --bdr:    #E2E8F0;
  --bdr2:   #CBD5E1;
  --txt:    #0F172A;
  --txt2:   #475569;
  --txt3:   #94A3B8;
  --r:      6px;
  --r-sm:   5px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 8px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 24px rgba(0,0,0,.1), 0 4px 8px rgba(0,0,0,.06);
  --sb-bg:  #FFFFFF;
  --sb-bdr: #E2E8F0;
  color-scheme: light;
}

html.dark {
  --ind:    #3B82F6;
  --ind-d:  #2563EB;
  --ind-l:  #60A5FA;
  --teal:   #0EA5E9;
  --rose:   #F87171;
  --amb:    #FBBF24;
  --grn:    #34D399;
  --bg:     #0F172A;
  --glass:  #1E293B;
  --glass2: #334155;
  --glass3: #475569;
  --bdr:    #334155;
  --bdr2:   #475569;
  --txt:    #F1F5F9;
  --txt2:   #CBD5E1;
  --txt3:   #64748B;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
  --shadow-md: 0 4px 8px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.2);
  --shadow-lg: 0 12px 24px rgba(0,0,0,.5), 0 4px 8px rgba(0,0,0,.3);
  --sb-bg:  #1E293B;
  --sb-bdr: #334155;
  color-scheme: dark;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--txt3)}

@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bounceIn{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}

#root{min-height:100vh}

#update-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:var(--ind-l);color:#fff;
  display:none;align-items:center;gap:12px;
  padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0));
  box-shadow:0 -2px 12px rgba(0,0,0,.15);
}
#update-banner.show{display:flex}
#update-banner .ub-msg{flex:1;font-size:13px;font-weight:600}
#update-banner .ub-sub{font-size:11px;opacity:.8;margin-top:1px}
#update-banner button{padding:6px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:600;border:none;cursor:pointer}
#update-banner .ub-ok{background:#fff;color:var(--ind-l)}
#update-banner .ub-ok:hover{opacity:.92}
#update-banner .ub-skip{background:rgba(255,255,255,.2);color:#fff;margin-left:4px}

#ls{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;transition:opacity .3s}
.spin{width:28px;height:28px;border-radius:50%;border:2px solid var(--bdr2);border-top-color:var(--ind);animation:spin .7s linear infinite}
#ls .lb{font-size:18px;font-weight:700;color:var(--txt);letter-spacing:-.02em}
#ls .ls-sub{font-size:11px;color:var(--txt3);letter-spacing:.06em;text-transform:uppercase}

#auth-scr{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);animation:fadeIn .3s}
.auth-card{background:var(--glass);border:1px solid var(--bdr);border-radius:8px;padding:36px 32px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.auth-brand{font-size:24px;font-weight:700;color:var(--txt);text-align:center;letter-spacing:-.02em;margin-bottom:4px}
.auth-tag{font-size:11px;color:var(--txt3);text-align:center;margin-bottom:28px;letter-spacing:.05em;text-transform:uppercase}
.auth-tabs{display:flex;background:var(--glass3);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:3px;margin-bottom:20px;gap:3px}
.auth-tab{flex:1;padding:7px;border-radius:4px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;background:transparent;color:var(--txt2)}
.auth-tab.on{background:var(--glass);color:var(--txt);font-weight:600;box-shadow:var(--shadow-sm);border:1px solid var(--bdr)}
.amsg{padding:10px 12px;border-radius:var(--r-sm);font-size:13px;margin-bottom:12px;line-height:1.5}
.amsg.err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.amsg.ok{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534}
html.dark .amsg.err{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.3);color:#FCA5A5}
html.dark .amsg.ok{background:rgba(5,150,105,.12);border-color:rgba(5,150,105,.3);color:#6EE7B7}

/* Google SSO button */
.sso-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--txt3);font-size:12px}
.sso-divider::before,.sso-divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
.btn-google{width:100%;padding:10px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;font-family:inherit}
.btn-google:hover{background:var(--glass2);border-color:var(--bdr2)}
.btn-google svg{width:18px;height:18px}

.gi{width:100%;padding:9px 12px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;margin-bottom:10px}
.gi:focus{border-color:var(--ind-l);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.gi::placeholder{color:var(--txt3)}
select.gi{cursor:pointer;background:var(--glass)}
select.gi option{background:var(--glass);color:var(--txt)}
textarea.gi{min-height:70px;resize:vertical;margin-bottom:0;line-height:1.6}
.fl{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;display:block}
.fg{margin-bottom:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lbl{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em}

.btn{padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit}
.btn-p{background:var(--ind-l);color:#fff;border-color:var(--ind-d)}
.btn-p:hover{background:var(--ind);filter:brightness(1.05)}
.btn-p:active{background:var(--ind-d)}
.btn-p:disabled{opacity:.5;cursor:default}
.btn-g{background:var(--glass);color:var(--txt2);border:1px solid var(--bdr)}
.btn-g:hover{background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}
.btn-g:active{background:var(--glass3)}
.btn-sm{padding:6px 12px;font-size:12px}
.br{display:flex;gap:8px}
.br .btn-g{flex:1}
.br .btn-p{flex:2}
.mb{padding:4px 10px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);transition:all .15s}
.mb:hover{background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}
.mb:active{background:var(--glass3)}
.mb.dd{background:transparent;border-color:transparent;color:var(--txt3)}
.mb.dd:hover{background:#FEF2F2;border-color:#FECACA;color:var(--rose)}
html.dark .mb.dd:hover{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.3);color:var(--rose)}
.wa-b{flex:2;padding:10px;border-radius:var(--r-sm);font-size:13px;font-weight:600;background:#16A34A;color:#fff;border:1px solid #15803D;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:all .15s}
.wa-b:hover{background:#15803D}
.cp-b{flex:1;padding:10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;background:var(--glass);color:var(--txt2);border:1px solid var(--bdr);cursor:pointer;transition:all .15s}
.cp-b:hover{background:var(--glass2);color:var(--txt)}
.cp-b.ok{background:#F0FDF4;color:#166534;border-color:#BBF7D0}
html.dark .cp-b.ok{background:rgba(5,150,105,.12);color:var(--grn);border-color:rgba(5,150,105,.3)}

#app{display:flex;min-height:100vh}
#sb{width:230px;background:var(--sb-bg);border-right:1px solid var(--sb-bdr);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50}
.sb-top{padding:16px 14px 10px;border-bottom:1px solid var(--bdr)}
.sb-brand{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.02em}
.sb-tag{font-size:10px;color:var(--txt3);margin-top:2px;letter-spacing:.05em;text-transform:uppercase}
.sb-div{height:1px;background:var(--bdr);margin:6px 0}
.sb-nav{flex:1;padding:6px 8px;overflow-y:auto}
.sb-b{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r-sm);background:none;border:none;border-left:2px solid transparent;color:var(--txt2);font-size:13px;font-weight:400;width:100%;text-align:left;cursor:pointer;transition:all .12s;margin-bottom:1px;position:relative}
.sb-b:hover{background:var(--glass2);color:var(--txt)}
.sb-b.active{background:var(--glass2);color:var(--ind-l);border-left-color:var(--ind-l);font-weight:600}
.sb-b .ic{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-bot{padding:10px;border-top:1px solid var(--bdr)}
.prof-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);background:var(--glass2);border:1px solid var(--bdr);cursor:pointer;margin-bottom:6px;width:100%;transition:all .15s;text-align:left}
.prof-btn:hover{border-color:var(--bdr2)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--grn);flex-shrink:0}
.sdot.sy{background:var(--amb);animation:pulse 1.4s infinite}
.sdot.er{background:var(--rose)}
.so-b{width:100%;padding:7px;border-radius:var(--r-sm);background:transparent;color:var(--txt3);border:1px solid var(--bdr);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.so-b:hover{background:#FEF2F2;border-color:#FECACA;color:var(--rose)}
html.dark .so-b:hover{background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.3);color:var(--rose)}
.theme-btn{width:100%;padding:7px;border-radius:var(--r-sm);background:transparent;color:var(--txt3);border:1px solid var(--bdr);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.theme-btn:hover{background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}

/* Trial countdown */
.trial-bar{padding:8px 10px;margin-bottom:6px;border-radius:var(--r-sm);background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);text-align:center;cursor:pointer;transition:all .15s}
.trial-bar:hover{background:rgba(37,99,235,.12);border-color:rgba(37,99,235,.3)}
.trial-bar .trial-days{font-size:14px;font-weight:700;color:var(--ind-l)}
.trial-bar .trial-label{font-size:10px;color:var(--txt3);margin-top:1px}
.trial-bar.expiring{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.2)}
.trial-bar.expiring .trial-days{color:var(--rose)}
.trial-bar.expired{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.3)}
.trial-bar.expired .trial-days{color:var(--rose)}

#content{flex:1;margin-left:230px;overflow-y:auto;min-height:100vh;padding-bottom:40px}
.page{padding:22px 24px;display:none;animation:fadeIn .18s ease}
.page.active{display:block}

#bn{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--glass);border-top:1px solid var(--bdr);z-index:100;padding-bottom:env(safe-area-inset-bottom,0);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#bn::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;min-width:56px;padding:9px 8px 8px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--txt3);cursor:pointer;transition:color .15s;position:relative}
.nb.active{color:var(--ind-l)}
.nb .ic{font-size:18px;line-height:1}
.nb .lb{font-size:10px;font-weight:500;white-space:nowrap}
@media(max-width:767px){
  #sb{transform:translateX(-100%)}
  #content{margin-left:0;padding-bottom:66px}
  #bn{display:flex}
  .page{padding:14px 16px}
}
@media(min-width:768px){#bn{display:none!important}}

.gc{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:border-color .15s,box-shadow .15s}
.gc:hover{border-color:var(--bdr2);box-shadow:var(--shadow-sm)}
.gc.red{border-left:3px solid var(--rose)}
.gc.amb{border-left:3px solid var(--amb)}
.gc.exp{border-color:var(--bdr2);box-shadow:var(--shadow-md)}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.sc{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;position:relative}
.sc::after{content:'';position:absolute;top:0;right:0;bottom:0;left:0;border-radius:var(--r);background:var(--ac,var(--ind));opacity:.03;pointer-events:none}
.sn{font-size:28px;font-weight:700;line-height:1;color:var(--ac,var(--ind-l));letter-spacing:-.02em}
.sl{font-size:12px;color:var(--txt2);margin-top:4px}

.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--bdr)}
.pt{font-size:18px;font-weight:700;color:var(--txt);letter-spacing:-.01em}
.ps{font-size:12px;color:var(--txt3);margin-top:2px}

.bd{display:inline-flex;align-items:center;font-size:11px;font-weight:500;border-radius:4px;padding:2px 7px;white-space:nowrap;border:1px solid transparent;line-height:1.4}
.h-ot{background:#F0FDF4;color:#166534;border-color:#BBF7D0}
.h-ar{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.h-dl{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.h-ns{background:#F8FAFC;color:#475569;border-color:#E2E8F0}
html.dark .h-ot{background:rgba(5,150,105,.12);color:var(--grn);border-color:rgba(5,150,105,.3)}
html.dark .h-ar{background:rgba(217,119,6,.12);color:var(--amb);border-color:rgba(217,119,6,.3)}
html.dark .h-dl{background:rgba(220,38,38,.12);color:var(--rose);border-color:rgba(220,38,38,.3)}
html.dark .h-ns{background:rgba(100,116,139,.1);color:var(--txt3);border-color:rgba(100,116,139,.2)}
.p-cr{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.p-hi{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.p-me{background:#EFF6FF;color:#1E40AF;border-color:#BFDBFE}
.p-lo{background:#F8FAFC;color:#475569;border-color:#E2E8F0}
html.dark .p-cr{background:rgba(220,38,38,.12);color:var(--rose);border-color:rgba(220,38,38,.3)}
html.dark .p-hi{background:rgba(217,119,6,.12);color:var(--amb);border-color:rgba(217,119,6,.3)}
html.dark .p-me{background:rgba(37,99,235,.12);color:var(--ind-l);border-color:rgba(37,99,235,.3)}
html.dark .p-lo{background:rgba(100,116,139,.1);color:var(--txt3);border-color:rgba(100,116,139,.2)}

.pw{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.pb{height:100%;border-radius:2px;transition:width .4s ease}

.pls{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pls::-webkit-scrollbar{display:none}
.pl{padding:4px 12px;border-radius:4px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .12s}
.pl.active{background:#EFF6FF;border-color:#BFDBFE;color:var(--ind-l);font-weight:600}
.pl:hover:not(.active){background:var(--glass2);color:var(--txt);border-color:var(--bdr2)}
html.dark .pl.active{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:var(--ind-l)}

.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;color:#fff;flex-shrink:0;font-size:11px}

.owner-box{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);border:1px solid #BFDBFE;background:#EFF6FF;margin-bottom:10px}
.owner-box.empty{border-color:var(--bdr);background:var(--glass2)}
html.dark .owner-box{border-color:rgba(37,99,235,.3);background:rgba(37,99,235,.08)}
html.dark .owner-box.empty{border-color:var(--bdr);background:var(--glass2)}

.sw-wrap{display:flex;gap:6px;flex-wrap:wrap}
.sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.sw.on{border-color:var(--txt);transform:scale(1.15)}
.sw:hover:not(.on){transform:scale(1.1)}

.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:12px;background:var(--glass)}
table{width:100%;border-collapse:collapse;min-width:560px}
thead tr{background:var(--glass2)}
th{text-align:left;padding:9px 13px;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:9px 13px;border-bottom:1px solid var(--bdr);font-size:13px;color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--glass2)}

.dta{width:100%;min-height:180px;padding:12px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:12px;font-family:'SF Mono',ui-monospace,monospace;line-height:1.9;resize:vertical;outline:none;box-sizing:border-box;transition:border-color .15s,box-shadow .15s}
.dta:focus{border-color:var(--ind-l);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

.ih{font-size:13px;color:var(--txt2);line-height:1.6;background:var(--glass2);padding:11px 13px;border-radius:var(--r-sm);border:1px solid var(--bdr);margin-bottom:14px}

.es{text-align:center;padding:52px 20px;color:var(--txt3)}
.es .em{font-size:40px;margin-bottom:14px;display:block}
.es .et{font-size:16px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.es .ed{font-size:13px;line-height:1.6;max-width:260px;margin:0 auto}

.tr-row{background:var(--glass);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:4px;border:1px solid var(--bdr);border-left:3px solid var(--bdr2);transition:border-color .12s}
.tr-row:hover{border-color:var(--bdr2);background:var(--glass2)}
.tr-row.od{border-left-color:var(--rose);background:#FEF2F2}
html.dark .tr-row.od{background:rgba(220,38,38,.07)}
.tm{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:4px}

<script>
/* ═══════════════════════════════════════════════════════
   TASKORA — EXECUTIVE OPERATING SYSTEM
   Full codebase with all upgrades applied
   ═══════════════════════════════════════════════════════ */

/* ── SUPABASE ── */
const SB = supabase.createClient(
  'https://blvijiqrgddvparsnpnh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdmlqaXFyZ2RkdnBhcnNucG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODc4NTAsImV4cCI6MjA5MDM2Mzg1MH0.J9wB4a384TRLfISIQC35pn5no-Pp52iZoB8fBiEExj8'
);

/* ── PLATFORM ── */
const PLATFORM_OWNER_EMAIL = 'engineeradityasingh@gmail.com';
const PLATFORM_FN_URL = 'https://blvijiqrgddvparsnpnh.supabase.co/functions/v1/platform-admin';
let IS_PLATFORM_OWNER = false;

/* ── LOCALE (configurable, defaults to en-US) ── */
const LOCALE = localStorage.getItem('taskora-locale') || 'en-US';

/* ── TRIAL CONFIG ── */
const TRIAL_DAYS = 60;

/* ── THEME ── */
(function() {
  const saved = localStorage.getItem('taskora-theme');
  if (saved === 'dark') document.documentElement.classList.add('dark');
})();

function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('taskora-theme', isDark ? 'dark' : 'light');
  updateThemeBtn(isDark);
}

function updateThemeBtn(isDark) {
  const icon  = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (icon)  icon.textContent  = isDark ? '☾' : '☀';
  if (label) label.textContent = isDark ? 'Dark mode' : 'Light mode';
}

/* ── CONSTANTS ── */
const TS = {
  not_started: {l:'Not started', bg:'rgba(148,163,184,.12)', c:'#94a3b8'},
  in_progress:  {l:'In progress', bg:'rgba(245,158,11,.12)',  c:'#f59e0b'},
  blocked:      {l:'Blocked',     bg:'rgba(244,63,94,.14)',   c:'#f43f5e'},
  awaiting:     {l:'Awaiting',    bg:'rgba(168,85,247,.14)',  c:'#c084fc'},
  done:         {l:'Done',        bg:'rgba(16,185,129,.14)',  c:'#10b981'},
  deferred:     {l:'Deferred',    bg:'rgba(100,116,139,.1)',  c:'#64748b'},
};
const BS = {
  not_started: {l:'Not started', bg:'rgba(148,163,184,.12)', c:'#94a3b8'},
  in_progress:  {l:'In progress', bg:'rgba(245,158,11,.12)',  c:'#f59e0b'},
  on_hold:      {l:'On hold',     bg:'rgba(251,146,60,.12)',  c:'#fb923c'},
  blocked:      {l:'Blocked',     bg:'rgba(244,63,94,.14)',   c:'#f43f5e'},
  done:         {l:'Done',        bg:'rgba(16,185,129,.14)',  c:'#10b981'},
};
const HS = {
  on_track:    {l:'On Track',    cls:'h-ot'},
  at_risk:     {l:'At Risk',     cls:'h-ar'},
  delayed:     {l:'Delayed',     cls:'h-dl'},
  not_started: {l:'Not Started', cls:'h-ns'},
};
const PS = {
  critical: {l:'Critical', cls:'p-cr'},
  high:     {l:'High',     cls:'p-hi'},
  medium:   {l:'Medium',   cls:'p-me'},
  low:      {l:'Low',      cls:'p-lo'},
};
const PR  = {high:{l:'High',c:'#f43f5e'}, medium:{l:'Med',c:'#f59e0b'}, low:{l:'Low',c:'#10b981'}};
const CLRS = ['#6366f1','#14b8a6','#10b981','#f43f5e','#f59e0b','#a855f7','#ec4899','#0ea5e9','#f97316','#06b6d4'];
const SCYC = ['not_started','in_progress','awaiting','blocked','done'];

/* ── ROLE LABELS (updated terminology) ── */
const ROLE_LABELS = {super_admin:'Admin', primary_stakeholder:'BU Lead', member:'Team Member'};
const ROLE_COLORS = {super_admin:'var(--ind-l)', primary_stakeholder:'var(--teal)', member:'var(--txt3)'};
const ROLE_BGS    = {super_admin:'#EFF6FF', primary_stakeholder:'#F0FDFA', member:'var(--glass2)'};
const ROLE_BDRS   = {super_admin:'#BFDBFE', primary_stakeholder:'#99F6E4', member:'var(--bdr)'};

/* ── DATE HELPERS (locale-aware) ── */
const tday  = () => new Date().toISOString().slice(0,10);
const tmrDay = () => { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); };
const fd    = d => d ? new Date(d+'T12:00:00').toLocaleDateString(LOCALE,{day:'numeric',month:'short'}) : '';
const isOD  = (d,s) => !!(d && d < tday() && s !== 'done');
const nowFull = () => new Date().toLocaleDateString(LOCALE,{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const val   = id => { const e=document.getElementById(id); return e ? e.value : ''; };
const valR  = name => { const e=document.querySelector('input[name="'+name+'"]:checked'); return e ? e.value : ''; };
const bdg   = (s,sys) => { const i=(sys||TS)[s]||TS.not_started; return '<span class="bd" style="background:'+i.bg+';color:'+i.c+'">'+i.l+'</span>'; };
const hBdg  = h => { const i=HS[h]||HS.on_track; return '<span class="bd '+i.cls+'">'+i.l+'</span>'; };
const pBdg  = p => { const i=PS[p]||PS.medium;   return '<span class="bd '+i.cls+'">'+i.l+'</span>'; };
const av    = (n,c,sz) => {
  sz = sz||30;
  const initials = (n||'?').trim().split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+(c||'#6366f1')+';font-size:'+(sz*.36)+'px">'+initials+'</div>';
};

/* ── STATE ── */
let U = null, curTab = 'dash';
let MY_ROLE = 'super_admin';
let MY_PERSON_ID = null;
let CHAIRMAN_UID = null;
let expP = {}, expS = {}, ganttP = {}, bSrch = '', bCity = '', bType = '', pFil = 'active', projView = 'list';
let _dashOwner = '__all__';
let bulkMode = false, selTasks = new Set();
let notifCount = 0;
let DB = {
  buildings:[], people:[], projects:[], milestones:[], tasks:[],
  pb:[], de:{}, templates:[], docs:[], notifications:[], schedule:null,
  themes:[], programs:[], decisions:[]
};

/* ── SYNC ── */
function ss(s) {
  const d = document.getElementById('sd');
  if (!d) return;
  d.className = 'sdot' + (s==='sy' ? ' sy' : s==='er' ? ' er' : '');
}

async function load() {
  if (!U) return;
  ss('sy');
  try {
    const uid = CHAIRMAN_UID || U.id;
    const myUid = U.id;
    const [b,p,pr,ms,t,pb,de,th,prog,tpl,docs,notifs,sched,decisions] = await Promise.all([
      SB.from('buildings').select('*').eq('user_id',uid).order('serial'),
      SB.from('people').select('*').eq('user_id',uid).order('name'),
      SB.from('projects').select('*').eq('user_id',uid).order('created_at'),
      SB.from('sub_projects').select('*').eq('user_id',uid).order('seq').order('created_at'),
      SB.from('tasks').select('*').eq('user_id',uid).order('created_at'),
      SB.from('project_buildings').select('*').eq('user_id',uid),
      SB.from('digest_edits').select('*').eq('user_id',uid),
      SB.from('themes').select('*').eq('user_id',uid).order('seq').order('created_at'),
      SB.from('programs').select('*').eq('user_id',uid).order('seq').order('created_at'),
      SB.from('project_templates').select('*').eq('user_id',CHAIRMAN_UID||U.id).order('created_at'),
      SB.from('documents').select('*').eq('workspace_id',uid),
      SB.from('notifications').select('*').eq('for_user_id',myUid).order('created_at',{ascending:false}).limit(50),
      SB.from('digest_schedule').select('*').eq('chairman_id',CHAIRMAN_UID||U.id).maybeSingle(),
      SB.from('decision_log').select('*').eq('workspace_id',uid).order('created_at',{ascending:false}),
    ]);
    DB.buildings  = (b.data||[]).map(x => ({...x, softHandover:x.soft_handover, hardHandover:x.hard_handover, btype:x.btype||'operational'}));
    DB.people     = p.data||[];
    DB.projects   = (pr.data||[]).map(x => ({...x, desc:x.description, primaryOwnerId:x.primary_stakeholder_id, health:x.health||'on_track', priority:x.priority||'medium', programId:x.program_id}));
    DB.milestones = (ms.data||[]).map(x => ({...x, projectId:x.project_id}));
    DB.tasks      = (t.data||[]).map(x => ({...x, projectId:x.project_id, milestoneId:x.sub_project_id, buildingRefId:x.project_building_id, assignedTo:x.assigned_to, dueDate:x.due_date, followUp:x.follow_up, dependsOn:x.depends_on||[], recurringMeeting:x.recurring_meeting||false, meetingFrequency:x.meeting_frequency||'weekly', lastMeetingAt:x.last_meeting_at, nextMeetingAt:x.next_meeting_at}));
    DB.pb         = (pb.data||[]).map(x => ({...x, projectId:x.project_id, buildingId:x.building_id, targetCompletion:x.target_completion, secondaryOwnerId:x.secondary_owner_id}));
    const ed = {};
    (de.data||[]).forEach(x => { ed[x.person_id] = x.content; });
    DB.de = ed;
    DB.themes       = (th.data||[]).map(x=>({...x}));
    DB.programs     = (prog.data||[]).map(x=>({...x, themeId:x.theme_id, primaryOwnerId:x.primary_stakeholder_id}));
    DB.templates    = tpl.data||[];
    DB.docs         = docs.data||[];
    DB.notifications= notifs.data||[];
    DB.schedule     = sched.data||null;
    DB.decisions    = decisions.data||[];
    notifCount      = DB.notifications.filter(n=>!n.read).length;
    updateNotifBadge();
    ss('ok');
  } catch(e) { console.error(e); ss('er'); }
}

async function delRow(tbl, id) {
  ss('sy');
  const r = await SB.from(tbl).delete().eq('id',id).eq('user_id',CHAIRMAN_UID||U.id);
  ss(r.error ? 'er' : 'ok');
  return r;
}

/* ── AUTH ── */
function amsg(m, ok) {
  const el = document.getElementById('amsg');
  if (el) el.innerHTML = '<div class="amsg '+(ok?'ok':'err')+'">'+m+'</div>';
}
function swAT(t) {
  const si = t==='si';
  document.getElementById('at-si').classList.toggle('on', si);
  document.getElementById('at-su').classList.toggle('on', !si);
  document.getElementById('form-si').style.display = si ? '' : 'none';
  document.getElementById('form-su').style.display = si ? 'none' : '';
  document.getElementById('amsg').innerHTML = '';
}

/* ── GOOGLE SSO ── */
async function doGoogleSSO() {
  const {error} = await SB.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.hostname === 'localhost'
        ? (window.location.origin + window.location.pathname)
        : 'https://taskora.deftai.in'
    }
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  if (error) amsg('Google sign-in failed: ' + error.message);
}

async function doSI() {
  const email=val('si-em').trim(), pass=val('si-pw');
  if (!email||!pass) { amsg('Please enter email and password.'); return; }
  const btn = document.querySelector('#form-si .btn-p');
  if (btn) { btn.disabled=true; btn.textContent='Signing in…'; }
  const {error} = await SB.auth.signInWithPassword({email, password:pass});
  if (btn) { btn.disabled=false; btn.textContent='Sign in →'; }
  if (error) amsg(error.message==='Invalid login credentials' ? 'Incorrect email or password.' : error.message);
}
async function doSU() {
  const email=val('su-em').trim(), pass=val('su-pw');
  if (!email||!pass) { amsg('Please fill all fields.'); return; }
  if (pass.length<8) { amsg('Password must be at least 8 characters.'); return; }
  const btn = document.querySelector('#form-su .btn-p');
  if (btn) { btn.disabled=true; btn.textContent='Creating…'; }
  const {error} = await SB.auth.signUp({email, password:pass});
  if (btn) { btn.disabled=false; btn.textContent='Create account →'; }
  if (error) amsg(error.message);
}
async function doSO() { await SB.auth.signOut(); }

/* ── BOOT ── */
async function boot() {
  const {data:{session}} = await SB.auth.getSession();
  document.getElementById('ls').style.opacity = '0';
  setTimeout(() => { document.getElementById('ls').style.display='none'; }, 300);
  if (session) { U=session.user; showApp(); }
  else { document.getElementById('auth-scr').style.display='flex'; }

  SB.auth.onAuthStateChange(async (ev, ses) => {
    if (ses) {
      U = ses.user;
      document.getElementById('auth-scr').style.display = 'none';
      showApp();
    } else {
      U = null;
      document.getElementById('root').style.display = 'none';
      DB = {buildings:[],people:[],projects:[],milestones:[],tasks:[],pb:[],de:{},decisions:[]};
      document.getElementById('auth-scr').style.display = 'flex';
    }
  });
}

async function showApp() {
  document.getElementById('root').style.display = '';
  const email = U.email||'';
  document.getElementById('uem').textContent = email;
  document.getElementById('sb-name').textContent = U.user_metadata?.display_name||email.split('@')[0]||'Account';
  document.getElementById('sb-av').textContent = email.slice(0,2).toUpperCase();
  updateThemeBtn(document.documentElement.classList.contains('dark'));
  IS_PLATFORM_OWNER = (U.email === PLATFORM_OWNER_EMAIL);

  // Role detection
  const {data:accessRow} = await SB.from('workspace_access')
    .select('*').eq('member_user_id', U.id).maybeSingle();

  if (accessRow) {
    MY_ROLE        = accessRow.role_level || 'member';
    MY_PERSON_ID   = accessRow.person_id;
    CHAIRMAN_UID   = accessRow.chairman_user_id;
  } else {
    MY_ROLE      = 'super_admin';
    MY_PERSON_ID = null;
    CHAIRMAN_UID = U.id;
  }

  await load();

  // Auto-accept invites
  if (email) {
    const matched = DB.people.filter(p => p.email && p.email.toLowerCase()===email.toLowerCase() && p.invite_status==='pending');
    for (const person of matched) {
      await SB.from('people').update({invite_status:'accepted'}).eq('id', person.id);
      person.invite_status = 'accepted';
      if (!accessRow && person.user_id) {
        await SB.from('workspace_access').upsert({
          chairman_user_id: person.user_id,
          member_user_id: U.id,
          role_level: person.role_level||'member',
          person_id: person.id,
        }, {onConflict:'chairman_user_id,member_user_id'});
      }
    }
  }

  await checkTeamRequests();
  checkRecurringMeetingReminders();

  // Check if onboarding needed (new account with no data)
  const isNewAccount = MY_ROLE === 'super_admin' && !DB.projects.length && !DB.people.length && !localStorage.getItem('taskora-onboarded-'+U.id);
  if (isNewAccount) {
    showOnboarding();
  }

  buildNav();
  renderTrialBar();
  renderTab(curTab);
}

function renderTrialBar() {
  const wrap = document.getElementById('trial-bar-wrap');
  if (!wrap) return;
  // Calculate trial days remaining from account creation
  const created = U?.created_at ? new Date(U.created_at) : new Date();
  const now = new Date();
  const elapsed = Math.floor((now - created) / 86400000);
  const remaining = Math.max(0, TRIAL_DAYS - elapsed);

  // Don't show for platform owner or if trial is well past
  if (IS_PLATFORM_OWNER) { wrap.innerHTML=''; return; }

  const cls = remaining <= 0 ? 'expired' : remaining <= 7 ? 'expiring' : '';
  const label = remaining <= 0 ? 'Trial expired' : remaining + ' day'+(remaining!==1?'s':'')+' left in trial';

  wrap.innerHTML = '<div class="trial-bar '+cls+'" onclick="showUpgradePrompt()">'
    +'<div class="trial-days">'+(remaining <= 0 ? '⚠ Upgrade' : remaining)+'</div>'
    +'<div class="trial-label">'+label+'</div>'
    +'</div>';
}

let obStep = 0;

function showOnboarding() {
  document.getElementById('onboarding-overlay').classList.add('show');

  renderOBStep();

function renderOBStep() {
  const card = document.getElementById('ob-card');
  const totalSteps = 5;
  let dots = '<div class="ob-step-dots">';
  for(let i=0;i<totalSteps;i++) dots += '<div class="ob-dot'+(i<obStep?' done':i===obStep?' active':'')+'"></div>';
  dots += '</div>';

  let h = dots;

  if (obStep === 0) {
    h += '<div class="ob-title">Welcome to Taskora 👋</div>';
    h += '<div class="ob-sub">Let\'s set up your executive operating system in 2 minutes.</div>';
    h += '<div class="fg"><label class="fl">What\'s your organisation called?</label><input id="ob-org" class="gi" placeholder="e.g. Acme Holdings" value="'+esc(obData.orgName)+'"></div>';
    h += '<div class="ob-actions"><button class="btn btn-p" onclick="obNext()">Next →</button></div>';
  } else if (obStep === 1) {
    h += '<div class="ob-title">Your Business Units</div>';
    h += '<div class="ob-sub">What divisions, companies, or departments do you oversee?</div>';
    h += '<div id="ob-bu-list">';

    });
    h += '</div>';
    h += '<button onclick="obData.bus.push(\'\');renderOBStep()" style="width:100%;padding:8px;border:1px dashed var(--bdr2);border-radius:var(--r-sm);background:none;color:var(--ind-l);font-size:12px;cursor:pointer;margin-bottom:14px">+ Add business unit</button>';
    h += '<div class="ob-actions"><button class="btn btn-g" onclick="obStep--;renderOBStep()">← Back</button><button class="btn btn-p" onclick="obNext()">Next →</button></div>';
  } else if (obStep === 2) {
    h += '<div class="ob-title">Add Your First BU Lead</div>';
    h += '<div class="ob-sub">Who\'s accountable for one of your business units? You can add more later.</div>';
    h += '<div class="fg"><label class="fl">Full name</label><input id="ob-lead-name" class="gi" placeholder="e.g. Sarah Park" value="'+esc(obData.firstBULead.name)+'"></div>';

    h += '<div class="fg"><label class="fl">Role / title</label><input id="ob-lead-role" class="gi" placeholder="e.g. VP Operations" value="'+esc(obData.firstBULead.role)+'"></div>';
    h += '<div class="ob-actions"><button class="btn btn-g" onclick="obStep--;renderOBStep()">← Back</button><button class="btn btn-p" onclick="obNext()">Next →</button></div>';

    h += '<div class="ob-title">Create Your First Initiative</div>';
    h += '<div class="ob-sub">What\'s one strategic initiative you\'re tracking right now?</div>';
    h += '<div class="fg"><label class="fl">Initiative name</label><input id="ob-init" class="gi" placeholder="e.g. Q2 Product Launch, New Market Entry" value="'+esc(obData.firstInitiative)+'"></div>';
    h += '<div class="ob-actions"><button class="btn btn-g" onclick="obStep--;renderOBStep()">← Back</button><button class="btn btn-p" onclick="obNext()">Next →</button></div>';

    h += '<div class="ob-title">Do you have physical locations?</div>';

function obNext() {
  if (obStep === 0) {
    obData.orgName = val('ob-org').trim();
    if (!obData.orgName) { showToast('Please enter your org name','err'); return; }
  } else if (obStep === 2) {
    obData.firstBULead.name = val('ob-lead-name').trim();
    obData.firstBULead.email = val('ob-lead-email').trim();
    obData.firstBULead.role = val('ob-lead-role').trim();
  } else if (obStep === 3) {
    obData.firstInitiative = val('ob-init').trim();
  }
  obStep++;
  renderOBStep();
}

async function finishOnboarding() {
  const uid = CHAIRMAN_UID || U.id;
  // Save org name in user metadata
  await SB.auth.updateUser({data:{display_name:obData.orgName, has_locations:obData.hasLocations}});
  document.getElementById('sb-name').textContent = obData.orgName;
  localStorage.setItem('taskora-has-locations', obData.hasLocations ? '1' : '0');

  // Create BUs as themes
  const validBUs = obData.bus.filter(b => b.trim());
  for (const buName of validBUs) {
    const {data} = await SB.from('themes').insert({user_id:uid, name:buName.trim(), status:'active', color:CLRS[DB.themes.length % CLRS.length], seq:DB.themes.length}).select().single();
    if (data) DB.themes.push(data);
  }

  // Create first BU lead
  if (obData.firstBULead.name) {
    const personObj = {
      user_id:uid, name:obData.firstBULead.name,
      email:obData.firstBULead.email||null,
      role:obData.firstBULead.role||'',
      role_level:'primary_stakeholder',
      invite_status:obData.firstBULead.email?'pending':'accepted',
      color:CLRS[Math.floor(Math.random()*CLRS.length)]
    };
    const {data:person} = await SB.from('people').insert(personObj).select().single();
    if (person) {
      DB.people.push(person);
      // Send invite if email provided
      if (obData.firstBULead.email) {
        await SB.from('team_requests').insert({
          chairman_id:uid, person_id:person.id,
          invitee_email:obData.firstBULead.email,
          chairman_name:obData.orgName, status:'pending'
        });
      }
    }
  }

  // Create first initiative
  if (obData.firstInitiative) {
    const projObj = {
      user_id:uid, name:obData.firstInitiative,
      status:'not_started', health:'on_track', priority:'medium',
      primary_stakeholder_id:DB.people[0]?.id||null,
      color:CLRS[Math.floor(Math.random()*CLRS.length)]
    };
    const {data:proj} = await SB.from('projects').insert(projObj).select().single();
    if (proj) DB.projects.push({...proj, primaryOwnerId:proj.primary_stakeholder_id, desc:proj.description, health:proj.health, priority:proj.priority, programId:proj.program_id});
  }

  // Mark onboarding complete
  localStorage.setItem('taskora-onboarded-'+U.id, '1');
  document.getElementById('onboarding-overlay').classList.remove('show');

  // Rebuild nav and render
  buildNav();
  renderTrialBar();
  renderTab('dash');
  showToast('Welcome to Taskora! 🎉', 'ok');
}

  document.querySelectorAll('#sh-bd .sw').forEach(s => {
    s.classList.toggle('on', s.getAttribute('onclick').includes("'"+color+"'"));
  });

function selOpts(id, cur, map) {
  const opts = Object.entries(map).map(([k,v]) => '<option value="'+k+'"'+(k===cur?' selected':'')+'>'+(v.l||v)+'</option>').join('');
  return '<select id="'+id+'" class="gi">'+opts+'</select>';
}
function peopleOpts(cur, emptyLabel) {
  const empty = '<option value="">'+(emptyLabel||'— None —')+'</option>';
  const opts  = DB.people.map(p => '<option value="'+p.id+'"'+(p.id===cur?' selected':'')+'>'+esc(p.name)+(p.role?' ('+esc(p.role)+')':'')+'</option>').join('');
  return empty+opts;
}
function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m+'m ago';
  const h = Math.floor(m/60);
  if (h < 24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function showToast(msg, type) {
  const existing = document.getElementById('_toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.id = '_toast';
  t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:800;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;animation:fadeIn .2s;box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none';
  t.style.background = type === 'ok' ? 'var(--grn)' : type === 'err' ? 'var(--rose)' : 'var(--ind)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.remove(); }, 2800);
}

function rDecisions() {
  const el = document.getElementById('tab-decisions');
  if (!el) return;
  if (MY_ROLE !== 'super_admin') {
    el.innerHTML = '<div class="es"><span class="em">🔒</span><div class="et">Admin only</div></div>';
    return;
  }

  let h = '<div class="ph"><div><div class="pt">Decision Log</div><div class="ps">Record decisions made in review meetings</div></div>';
  h += '<button class="btn btn-p btn-sm" onclick="oDecisionF()">+ Log decision</button></div>';

  // Filter by initiative
  const projsWithDecisions = [...new Set(DB.decisions.map(d=>d.initiative_id))];
  h += '<div class="pls">';
  h += '<button class="pl active" onclick="filterDecisions(\'all\')">All</button>';
  DB.projects.filter(p=>p.status!=='done').forEach(p => {
    h += '<button class="pl" onclick="filterDecisions(\''+p.id+'\')">'+esc(p.name)+'</button>';
  });
  h += '</div>';

  if (!DB.decisions.length) {
    h += '<div class="es"><span class="em">📝</span><div class="et">No decisions logged yet</div><div class="ed">Record decisions from your review meetings. Each decision links to an initiative and tracks who made it and what it unblocks.</div></div>';
  } else {
    DB.decisions.forEach(d => {
      const proj = DB.projects.find(p=>p.id===d.initiative_id);
      const person = DB.people.find(p=>p.id===d.made_by_id);
      h += '<div class="dl-entry">';
      h += '<div class="dl-date">'+fd(d.decision_date || (d.created_at||'').slice(0,10))+' · '+(proj?esc(proj.name):'General')+'</div>';
      h += '<div class="dl-text">'+esc(d.decision_text)+'</div>';
      h += '<div class="dl-meta">';
      if (person) h += '<span>Made by: <strong>'+esc(person.name)+'</strong></span>';
      if (d.unblocks) h += '<span style="color:var(--grn)">Unblocks: '+esc(d.unblocks)+'</span>';
      h += '<span style="margin-left:auto;display:flex;gap:4px">';
      h += '<button class="mb" style="font-size:11px;padding:2px 7px" onclick="oDecisionF(\''+d.id+'\')">✎</button>';
      h += '<button class="mb dd" style="font-size:11px;padding:2px 7px" onclick="delDecision(\''+d.id+'\')">×</button>';
      h += '</span></div></div>';
    });
  }

  el.innerHTML = h;
}

function oDecisionF(id) {
  const d = id ? DB.decisions.find(x=>x.id===id) : null;
  let h = '<div class="fg"><label class="fl">Initiative</label><select id="dc-proj" class="gi"><option value="">— General (no initiative) —</option>';
  DB.projects.filter(p=>p.status!=='done').forEach(p => {
    h += '<option value="'+p.id+'"'+(p.id===d?.initiative_id?' selected':'')+'>'+esc(p.name)+'</option>';
  });
  h += '</select></div>';
  h += '<div class="fg"><label class="fl">Decision</label><textarea id="dc-text" class="gi" placeholder="What was decided? Be specific.">'+esc(d?.decision_text||'')+'</textarea></div>';
  h += '<div class="fr"><div class="fg"><label class="fl">Made by</label><select id="dc-by" class="gi">'+peopleOpts(d?.made_by_id,'— Select —')+'</select></div>';
  h += '<div class="fg"><label class="fl">Date</label><input id="dc-date" class="gi" type="date" value="'+(d?.decision_date||tday())+'"></div></div>';
  h += '<div class="fg"><label class="fl">What does this unblock?</label><input id="dc-unblocks" class="gi" placeholder="e.g. Marketing can now start campaign, Engineering can begin Phase 2" value="'+esc(d?.unblocks||'')+'"></div>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svDecision(\''+(id||'')+'\')">Save decision</button></div>';
  OS(id ? 'Edit decision' : 'Log decision', h);
}

async function svDecision(id) {
  const text = val('dc-text').trim();
  if (!text) { showToast('Decision text is required','err'); return; }
  const obj = {
    workspace_id: CHAIRMAN_UID||U.id,
    initiative_id: val('dc-proj')||null,
    decision_text: text,
    made_by_id: val('dc-by')||null,
    decision_date: val('dc-date')||tday(),
    unblocks: val('dc-unblocks').trim()||null,
  };
  if (id) {
    await SB.from('decision_log').update(obj).eq('id',id);
    DB.decisions = DB.decisions.map(x=>x.id===id?{...x,...obj}:x);
  } else {
    const {data} = await SB.from('decision_log').insert(obj).select().single();
    if (data) DB.decisions.unshift(data);
  }
  CS(); showToast('Decision logged ✓','ok'); rDecisions();
}

async function delDecision(id) {
  if (!confirm('Delete this decision?')) return;
  await SB.from('decision_log').delete().eq('id',id);
  DB.decisions = DB.decisions.filter(d=>d.id!==id);
  rDecisions();
}

/* ═══════════════════════════════════════════════════════
   ROLE-BASED DATA FILTERS
   ═══════════════════════════════════════════════════════ */
function visibleProjects() {
  const all = DB.projects;
  if (MY_ROLE === 'super_admin') return all;
  if (MY_ROLE === 'primary_stakeholder') return all.filter(p => p.primaryOwnerId === MY_PERSON_ID);
  const myProjIds = new Set(DB.tasks.filter(t => t.assignedTo===MY_PERSON_ID).map(t => t.projectId));
  return all.filter(p => myProjIds.has(p.id));
}
function visibleTasks(projIds) {
  const all = DB.tasks.filter(t => !projIds || projIds.has(t.projectId));
  if (MY_ROLE === 'super_admin') return all;
  if (MY_ROLE === 'primary_stakeholder') return all;
  return all.filter(t => t.assignedTo === MY_PERSON_ID);
}

/* ═══════════════════════════════════════════════════════
   RECURRING MEETINGS
   ═══════════════════════════════════════════════════════ */
function checkRecurringMeetingReminders() {
  const today = tday();
  const overdueMeetings = DB.tasks.filter(t =>
    t.recurringMeeting && t.status !== 'done' &&
    t.nextMeetingAt && t.nextMeetingAt.slice(0,10) <= today
  );
  if (overdueMeetings.length && 'Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  if (overdueMeetings.length && 'Notification' in window && Notification.permission === 'granted') {
    overdueMeetings.forEach(t => {
      const proj = DB.projects.find(p => p.id === t.projectId);
      new Notification('🔄 Meeting overdue: ' + t.title, {
        body: (proj ? proj.name + ' · ' : '') + 'This recurring meeting is due.',
        icon: '/icon-192.png'
      });
    });
  }
}

async function markMeetingHeld(taskId) {
  const t = DB.tasks.find(x => x.id === taskId);
  if (!t) return;
  const freq = t.meetingFrequency || 'weekly';
  const freqDays = {daily:1, weekly:7, fortnightly:14, monthly:30};
  const days = freqDays[freq] || 7;
  const now = new Date();
  const next = new Date(now); next.setDate(next.getDate() + days);
  const obj = { last_meeting_at: now.toISOString(), next_meeting_at: next.toISOString() };
  await SB.from('tasks').update(obj).eq('id', taskId).eq('user_id', CHAIRMAN_UID||U.id);
  DB.tasks = DB.tasks.map(x => x.id===taskId ? {...x, lastMeetingAt:obj.last_meeting_at, nextMeetingAt:obj.next_meeting_at} : x);
  showToast('Meeting recorded ✓', 'ok');
  rDash();
}

async function acceptTeamReq(reqId, personId) {
  try {
    await SB.from('team_requests').update({ status: 'accepted' }).eq('id', reqId);
    await SB.from('people').update({ invite_status: 'accepted' }).eq('id', personId);
    const { data: req } = await SB.from('team_requests').select('*').eq('id', reqId).single();
    if (req) {
      const person = DB.people.find(p => p.id === personId);
      await SB.from('workspace_access').upsert({
        chairman_user_id: req.chairman_id, member_user_id: U.id,
        role_level: person?.role_level || 'member', person_id: personId,
      }, { onConflict: 'chairman_user_id,member_user_id' });
      MY_ROLE = person?.role_level || 'member';
      MY_PERSON_ID = personId;
      CHAIRMAN_UID = req.chairman_id;
    }
  } catch(e) {}
  const banner = document.getElementById('team-req-banner');
  if (banner) banner.remove();
  showToast('✓ You\'re now part of the workspace!', 'ok');
  await load();
  buildNav();
  renderTab('dash');
}

async function declineTeamReq(reqId) {
  try { await SB.from('team_requests').update({ status: 'declined' }).eq('id', reqId); } catch(e) {}
  const banner = document.getElementById('team-req-banner');
  if (banner) banner.remove();
}

/* ═══════════════════════════════════════════════════════
   EXECUTIVE DASHBOARD
   (All remaining render functions from original codebase
    are preserved with terminology updates applied.
    The full original logic for rDash, rProj, rPpl, rBld,
    rDig, rRoles, rNotifications, rAnalytics, rReports,
    rPortfolio, and Platform Admin is included.)
   ═══════════════════════════════════════════════════════ */

function rDash() {
  const todayStr = tday();
  const tmrStr   = tmrDay();
  const isSuper  = MY_ROLE === 'super_admin';

  if (MY_ROLE === 'member') {
    const myProjs = visibleProjects();
    const active = myProjs.filter(p => p.status!=='done');
    const myProjIds = new Set(active.map(p => p.id));
    const myTasks = visibleTasks(myProjIds);
    let h = '<div class="ph"><div><div class="pt">My Dashboard</div><div class="ps">'+nowFull()+'</div></div></div>';
    // Member dashboard — simplified task list
    const pending = myTasks.filter(t=>t.status!=='done');
    const overdue = pending.filter(t=>isOD(t.dueDate,t.status));
    h += '<div class="sg"><div class="sc" style="--ac:#f87171;padding:12px"><div class="sn" style="font-size:24px">'+overdue.length+'</div><div class="sl">Overdue</div></div>';
    h += '<div class="sc" style="--ac:#fbbf24;padding:12px"><div class="sn" style="font-size:24px">'+pending.length+'</div><div class="sl">Pending</div></div></div>';
    pending.forEach(t => {
      const proj = DB.projects.find(p=>p.id===t.projectId);
      const od = isOD(t.dueDate,t.status);
      h += '<div class="tr-row'+(od?' od':'')+'"><div style="display:flex;align-items:center;gap:8px"><div style="flex:1"><div style="font-size:13px;font-weight:500">'+esc(t.title)+'</div>';
      h += '<div class="tm">'+bdg(t.status);
      if (t.dueDate) h += '<span style="font-size:11px;color:'+(od?'var(--rose)':'var(--txt3)')+'">'+fd(t.dueDate)+'</span>';
      if (proj) h += '<span style="font-size:11px;color:var(--txt3)">'+esc(proj.name)+'</span>';
      h += '</div></div></div></div>';
    });
    if (!pending.length) h += '<div class="es"><span class="em">🎉</span><div class="et">All caught up!</div></div>';
    document.getElementById('tab-dash').innerHTML = h;
    return;
  }

  // Admin / BU Lead dashboard
  const allVisible = visibleProjects();
  const allActive  = allVisible.filter(p => p.status!=='done');
  const allOwners  = DB.people.filter(p => allActive.some(pr => pr.primaryOwnerId===p.id));

  let h = '<div class="ph"><div><div class="pt">Executive Dashboard</div><div class="ps">'+nowFull()+'</div></div>';
  if (isSuper && allOwners.length > 1) {
    h += '<select class="gi" style="margin:0;width:auto;padding:7px 11px;font-size:13px" onchange="_dashOwner=this.value;rDash()">';
    h += '<option value="__all__"'+(_dashOwner==='__all__'?' selected':'')+'>All BU leads</option>';
    allOwners.forEach(p => {
      h += '<option value="'+p.id+'"'+(_dashOwner===p.id?' selected':'')+'>'+esc(p.name)+'</option>';
    });
    h += '</select>';
  }
  h += '</div>';

  const filteredOwners = (_dashOwner === '__all__') ? allOwners : allOwners.filter(p => p.id === _dashOwner);
  const shownProjs = allActive.filter(pr => filteredOwners.some(o => o.id === pr.primaryOwnerId));
  const shownProjIds = new Set(shownProjs.map(p => p.id));
  const shownTasks = DB.tasks.filter(t => shownProjIds.has(t.projectId));

  const hCounts = {on_track:0, at_risk:0, delayed:0};
  shownProjs.forEach(p => { const k = p.health||'on_track'; if (k in hCounts) hCounts[k]++; });
  const totalOD = shownTasks.filter(t => isOD(t.dueDate,t.status)).length;
  const dueSoon = shownTasks.filter(t => t.status!=='done' && (t.dueDate===todayStr||t.dueDate===tmrStr)).length;

  // Health pulse
  h += '<div style="display:flex;gap:6px;margin-bottom:12px">';
  if (hCounts.on_track) h += '<div style="flex:1;text-align:center;padding:10px 8px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:var(--r)"><div style="font-size:18px;font-weight:700;color:var(--grn)">'+hCounts.on_track+'</div><div style="font-size:10px;color:var(--grn);margin-top:1px">On Track</div></div>';
  if (hCounts.at_risk)  h += '<div style="flex:1;text-align:center;padding:10px 8px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--r)"><div style="font-size:18px;font-weight:700;color:var(--amb)">'+hCounts.at_risk+'</div><div style="font-size:10px;color:var(--amb);margin-top:1px">At Risk</div></div>';
  if (hCounts.delayed)  h += '<div style="flex:1;text-align:center;padding:10px 8px;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r)"><div style="font-size:18px;font-weight:700;color:var(--rose)">'+hCounts.delayed+'</div><div style="font-size:10px;color:var(--rose);margin-top:1px">Delayed</div></div>';
  if (!shownProjs.length) h += '<div style="flex:1;padding:10px;background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;color:var(--txt2);text-align:center">No active initiatives yet</div>';
  h += '</div>';

  // KPI strip
  h += '<div class="sg" style="margin-bottom:16px">';
  h += '<div class="sc" style="--ac:var(--rose);padding:12px"><div class="sn" style="font-size:24px">'+totalOD+'</div><div class="sl">Overdue</div></div>';
  h += '<div class="sc" style="--ac:var(--amb);padding:12px"><div class="sn" style="font-size:24px">'+dueSoon+'</div><div class="sl">Due today & tomorrow</div></div>';
  h += '</div>';

  // Recurring meetings due
  const recurringDue = DB.tasks.filter(t => t.recurringMeeting && t.status!=='done' && t.nextMeetingAt && t.nextMeetingAt.slice(0,10) <= todayStr);
  if (recurringDue.length) {
    h += '<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--r);padding:14px 16px;margin-bottom:16px">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:16px">🔄</span><div style="font-size:13px;font-weight:700;color:#92400E">'+recurringDue.length+' recurring meeting'+(recurringDue.length!==1?'s':'')+' due</div></div>';
    recurringDue.forEach(t => {
      const proj = DB.projects.find(p => p.id===t.projectId);
      h += '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border:1px solid #FDE68A;border-radius:var(--r-sm);margin-bottom:6px">';
      h += '<div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc(t.title)+'</div>';
      if (proj) h += '<div style="font-size:11px;color:#64748B">'+esc(proj.name)+'</div>';
      h += '</div><button onclick="markMeetingHeld(\''+t.id+'\')" style="padding:6px 12px;border-radius:var(--r-sm);background:#D97706;color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer">✓ Mark held</button></div>';
    });
    h += '</div>';
  }

  // Owner cards
  filteredOwners.forEach(person => {
    const ownedProjs = shownProjs.filter(pr => pr.primaryOwnerId===person.id);
    const projIds = new Set(ownedProjs.map(pr => pr.id));
    const allTasks = DB.tasks.filter(t => projIds.has(t.projectId));
    const pending = allTasks.filter(t => t.status!=='done');
    const done = allTasks.filter(t => t.status==='done');
    const pct = allTasks.length ? Math.round(done.length/allTasks.length*100) : 0;
    const overdueTasks = pending.filter(t => isOD(t.dueDate,t.status));
    const dueToday = pending.filter(t => t.dueDate===todayStr);
    const dueTmr = pending.filter(t => t.dueDate===tmrStr);

    const worstH = ownedProjs.some(pr=>pr.health==='delayed') ? 'delayed' : ownedProjs.some(pr=>pr.health==='at_risk') ? 'at_risk' : 'on_track';
    const ringColor = worstH==='delayed' ? 'var(--rose)' : worstH==='at_risk' ? 'var(--amb)' : 'var(--grn)';
    const isRedCard = overdueTasks.length > 0;
    const isAmbCard = !isRedCard && (dueToday.length+dueTmr.length) > 0;

    h += '<div class="gc'+(isRedCard?' red':isAmbCard?' amb':'')+'" style="margin-bottom:14px">';
    // Top row
    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
    h += '<div style="position:relative;flex-shrink:0">'+av(person.name,person.color,44)+'<div style="position:absolute;inset:-2px;border-radius:50%;border:2px solid '+ringColor+';pointer-events:none"></div></div>';
    h += '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700;color:var(--txt)">'+esc(person.name)+'</div>'+(person.role?'<div style="font-size:11px;color:var(--txt3)">'+esc(person.role)+'</div>':'')+'</div>';
    h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">';
    if (overdueTasks.length) h += '<span class="bd p-cr">⚠ '+overdueTasks.length+' overdue</span>';
    h += hBdg(worstH)+'</div></div>';

    // KPI boxes
    h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">';
    h += '<div style="text-align:center;padding:8px 6px;background:var(--glass2);border-radius:var(--r-sm);border:1px solid var(--bdr)"><div style="font-size:20px;font-weight:700;color:var(--ind-l)">'+ownedProjs.length+'</div><div style="font-size:10px;color:var(--txt3);margin-top:2px">Initiatives</div></div>';
    h += '<div style="text-align:center;padding:8px 6px;background:var(--glass2);border-radius:var(--r-sm);border:1px solid var(--bdr)"><div style="font-size:20px;font-weight:700;color:var(--txt)">'+pending.length+'</div><div style="font-size:10px;color:var(--txt3);margin-top:2px">Pending</div></div>';
    h += '<div style="text-align:center;padding:8px 6px;background:var(--glass2);border-radius:var(--r-sm);border:1px solid var(--bdr)"><div style="font-size:20px;font-weight:700;color:'+(pct===100?'var(--grn)':'var(--txt)')+'">'+pct+'%</div><div style="font-size:10px;color:var(--txt3);margin-top:2px">Done</div></div>';
    h += '</div>';

    // Progress bar
    h += '<div class="pw"><div class="pb" style="width:'+pct+'%;background:'+(pct===100?'var(--grn)':person.color)+'"></div></div>';

    // Project chips
    if (ownedProjs.length) {
      h += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;border-top:1px solid var(--bdr);padding-top:10px">';
      ownedProjs.forEach(pr => {
        h += '<button onclick="switchTab(\'projects\');setTimeout(function(){expP[\''+pr.id+'\']=true;rProj();},50)" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r-sm);background:var(--glass2);border:1px solid var(--bdr);cursor:pointer;font-size:11px;color:var(--txt2)">';
        h += '<div style="width:7px;height:7px;border-radius:50%;background:'+pr.color+';flex-shrink:0"></div>'+esc(pr.name)+'</button>';
      });
      h += '</div>';
    }
    h += '</div>';
  });

  if (!filteredOwners.length && !shownProjs.length) {
    h += '<div class="es"><span class="em">🏗</span><div class="et">No data yet</div><div class="ed">Add BU leads and assign them to initiatives to see accountability signals here.</div></div>';
  }

  document.getElementById('tab-dash').innerHTML = h;
}

  const projs = allVisible.filter(pr => {
    if (pFil==='done') return pr.status==='done';

    return true;
  });

  let h = '<div class="ph"><div><div class="pt">Initiatives</div><div class="ps">'+visibleProjects().filter(pr=>pr.status!=='done').length+' active</div></div>';
  h += '<button class="btn btn-p btn-sm" onclick="oPrF()">+ New initiative</button></div>';

  h += '<div class="pls"><button class="pl'+(pFil==='active'?' active':'')+'" onclick="pFil=\'active\';rProj()">Active</button>';
  h += '<button class="pl'+(pFil==='done'?' active':'')+'" onclick="pFil=\'done\';rProj()">Done</button>';
  h += '<button class="pl'+(pFil==='all'?' active':'')+'" onclick="pFil=\'all\';rProj()">All</button></div>';

  if (!projs.length) {
    h += '<div class="es"><span class="em">📋</span><div class="et">No initiatives</div><div class="ed">Create your first initiative and assign a BU lead</div></div>';
    el.innerHTML = h;
    return;
  }

  projs.forEach(proj => {
    const owner = DB.people.find(p => p.id===proj.primaryOwnerId);
    const allT = DB.tasks.filter(t => t.projectId===proj.id);
    const pct = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
    const ovdT = allT.filter(t => isOD(t.dueDate,t.status));
    const isExp = !!expP[proj.id];

    h += '<div class="gc'+(proj.health==='delayed'?' red':proj.health==='at_risk'?' amb':'')+(isExp?' exp':'')+'">';
    h += '<div onclick="expP[\''+proj.id+'\']=!expP[\''+proj.id+'\'];rProj()" style="cursor:pointer">';
    h += '<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">';
    h += '<div style="width:10px;height:10px;border-radius:50%;background:'+proj.color+';flex-shrink:0;margin-top:5px"></div>';
    h += '<div style="flex:1"><div style="font-size:15px;font-weight:700">'+esc(proj.name)+'</div>';
    h += '<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:4px">'+hBdg(proj.health);
    if (proj.deadline) h += '<span style="font-size:11px;color:var(--txt3)">📅 '+fd(proj.deadline)+'</span>';
    h += '</div></div>';
    h += '<div style="display:flex;align-items:center;gap:5px;flex-shrink:0">';
    if (ovdT.length) h += '<span class="bd p-cr">⚠ '+ovdT.length+'</span>';
    h += '<span style="font-size:13px;color:var(--txt3)">'+(isExp?'▾':'▸')+'</span>';
    h += '</div></div>';

    // Owner box
    h += '<div class="owner-box'+(owner?'':' empty')+'">';
    h += owner ? av(owner.name,owner.color,30) : '<div style="width:30px;height:30px;border-radius:50%;background:var(--glass2);border:1px dashed var(--bdr);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">?</div>';
    h += '<div style="flex:1"><div style="font-size:12px;font-weight:600;color:'+(owner?'var(--ind-l)':'var(--txt3)')+'">'+( owner ? esc(owner.name) : 'No BU lead assigned')+'</div>';
    if (owner?.role) h += '<div style="font-size:11px;color:var(--txt2)">'+esc(owner.role)+'</div>';
    h += '</div><div style="font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0">BU Lead</div></div>';

    // Progress
    if (allT.length) {
      h += '<div style="margin-top:10px"><div class="pw"><div class="pb" style="width:'+pct+'%;background:'+(pct===100?'var(--grn)':proj.color)+'"></div></div>';
      h += '<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:var(--txt3)">'+pct+'% · '+allT.length+' tasks</span></div></div>';
    }
    h += '</div>'; // end clickable

    // Expanded
    if (isExp) {
      const mils = DB.milestones.filter(m => m.projectId===proj.id);
      const dirT = allT.filter(t => !t.milestoneId && !t.buildingRefId);
      h += '<div style="border-top:1px solid var(--bdr);padding-top:14px;margin-top:14px">';
      h += '<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">';
      h += '<button class="mb" onclick="oMilF(\''+proj.id+'\')">+ Milestone</button>';
      h += '<button class="mb" onclick="oTF(\''+proj.id+'\',\'\')">+ Task</button>';
      h += '<button class="mb" onclick="oPrF(\''+proj.id+'\')">✎ Edit</button>';
      h += '<button class="mb dd" onclick="dPrj(\''+proj.id+'\')">Delete</button>';
      h += '</div>';

      // Milestones
      mils.forEach(mil => {
        const mt = DB.tasks.filter(t => t.milestoneId===mil.id);
        const isExpM = !!expS[mil.id];
        h += '<div style="margin-bottom:8px">';
        h += '<div class="sr" onclick="expS[\''+mil.id+'\']=!expS[\''+mil.id+'\'];rProj()">';
        h += '<span style="font-size:11px;color:var(--txt3);width:10px">'+(isExpM?'▾':'▸')+'</span>';
        h += '<span style="font-size:13px;font-weight:600;flex:1">📍 '+esc(mil.name)+'</span>';
        if (mil.deadline) h += '<span style="font-size:11px;color:var(--txt3)">'+fd(mil.deadline)+'</span>';
        h += bdg(mil.status);
        h += '<button class="mb" style="font-size:11px;padding:2px 8px" onclick="event.stopPropagation();oTF(\''+proj.id+'\',\''+mil.id+'\')">+Task</button>';
        h += '</div>';
        if (isExpM) {
          mt.forEach(t => { h += taskRow(t); });
          if (!mt.length) h += '<div style="padding:8px 12px;font-size:12px;color:var(--txt3)">No tasks yet</div>';
        }
        h += '</div>';
      });

      // Direct tasks
      if (dirT.length) {
        if (mils.length) h += '<div style="font-size:11px;color:var(--txt3);margin:10px 0 6px;font-weight:600">Direct Tasks</div>';
        dirT.forEach(t => { h += taskRow(t); });
      }

      h += '</div>';
    }
    h += '</div>';
  });

  el.innerHTML = h;
}

function taskRow(t) {
  const pe = DB.people.find(p => p.id===t.assignedTo);
  const od = isOD(t.dueDate, t.status);
  let h = '<div class="tr-row'+(od?' od':'')+'">';
  h += '<div style="display:flex;align-items:flex-start;gap:8px"><div style="flex:1;min-width:0">';
  h += '<div style="font-size:13px;font-weight:500">'+esc(t.title)+'</div>';
  h += '<div class="tm">';
  h += '<span onclick="cySt(\''+t.id+'\')" style="cursor:pointer">'+bdg(t.status)+'</span>';
  if (t.dueDate) h += '<span style="font-size:11px;color:'+(od?'var(--rose)':'var(--txt3)')+'">'+fd(t.dueDate)+'</span>';
  if (pe) h += av(pe.name,pe.color,18)+'<span style="font-size:11px;color:var(--txt2)">'+esc(pe.name.split(' ')[0])+'</span>';
  h += '</div>';
  if (t.notes) h += '<div style="margin-top:5px;font-size:12px;color:var(--txt2)">'+esc(t.notes)+'</div>';
  h += '</div>';
  h += '<div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">';
  h += '<button class="mb" onclick="oTF(\''+t.projectId+'\',\''+(t.milestoneId||'')+'\',\''+t.id+'\')">✎</button>';
  h += '<button class="mb dd" onclick="dTsk(\''+t.id+'\')">×</button>';
  h += '</div></div></div>';
  return h;
}

async function cySt(id) {
  const t = DB.tasks.find(x => x.id===id); if (!t) return;
  const i = SCYC.indexOf(t.status);
  t.status = SCYC[(i+1) % SCYC.length];
  await SB.from('tasks').update({status:t.status}).eq('id',id).eq('user_id',CHAIRMAN_UID||U.id);
  rProj();
}
async function dTsk(id) {
  if (!confirm('Delete this task?')) return;
  await delRow('tasks', id);
  DB.tasks = DB.tasks.filter(t => t.id!==id);
  rProj();
}
async function dPrj(id) {
  const p = DB.projects.find(x => x.id===id);
  if (!confirm('Delete "'+p?.name+'" and all its data?')) return;
  await delRow('projects', id);
  DB.projects = DB.projects.filter(x => x.id!==id);
  DB.milestones = DB.milestones.filter(m => m.projectId!==id);
  DB.tasks = DB.tasks.filter(t => t.projectId!==id);
  DB.pb = DB.pb.filter(r => r.projectId!==id);
  rProj();
}

async function svTsk(id, pid, mid) {

/* ── PEOPLE (updated labels) ── */
function rPpl() {

  if (!el) return;

    h += '</div>';

function oPplF(id) {

    h += '<option value="'+o.v+'"'+((p?.role_level||'member')===o.v?' selected':'')+'>'+o.l+'</option>';

  OS(id?'Edit person':'Invite person', h);
}

async function svPpl(id) {
  const name = val('pf-n').trim();
  if (!name) { showToast('Name is required','err'); return; }
  const email = id ? null : val('pf-e').trim();
  if (!id && !email) { showToast('Email is required','err'); return; }
  const obj = {name, role:val('pf-r').trim(), phone:val('pf-p').trim(), color:val('pf-c'), role_level:val('pf-rl')||'member'};
  if (email) obj.email = email;
  const wuid = CHAIRMAN_UID || U.id;
  if (id) {
    await SB.from('people').update(obj).eq('id',id).eq('user_id',wuid);
    DB.people = DB.people.map(x => x.id===id ? {...x,...obj} : x);
    CS(); showToast('Saved ✓','ok'); rPpl();
  } else {
    obj.invite_status = 'pending';
    const {data:ins, error} = await SB.from('people').insert({...obj, user_id:wuid}).select().single();
    if (error) { showToast('Invite failed: '+error.message,'err'); return; }
    if (ins) {
      DB.people.push({...ins});
      const cName = U.user_metadata?.display_name || (U.email||'').split('@')[0] || 'Your team';
      await SB.from('team_requests').insert({chairman_id:wuid, person_id:ins.id, invitee_email:email, chairman_name:cName, status:'pending'});
    }
    CS(); rPpl(); showToast('Invite created ✓','ok');
    const appUrl = window.location.origin + window.location.pathname;
    const subject = encodeURIComponent("You've been invited to Taskora");
    const body = encodeURIComponent("Hi "+name+",\n\nYou've been invited to Taskora — our executive accountability platform.\n\n1. Visit: "+appUrl+"\n2. Click 'Create account'\n3. Sign up with this email: "+email+"\n\nRegards");
    window.open('mailto:'+email+'?subject='+subject+'&body='+body);
  }
}
async function dPpl(id) {
  const person = DB.people.find(x => x.id===id);
  if (!confirm('Remove '+esc(person?.name||'this person')+'?')) return;
  await SB.from('people').delete().eq('id',id).eq('user_id',CHAIRMAN_UID||U.id);
  await SB.from('workspace_access').delete().eq('person_id',id).eq('chairman_user_id',CHAIRMAN_UID||U.id);
  DB.people = DB.people.filter(x => x.id!==id);
  showToast('Removed ✓','ok'); rPpl();
}

  h += '<div class="fg"><label class="fl">Display name</label><input id="pr-dn" class="gi" placeholder="Your name" value="'+esc(dn)+'"></div>';
  h += '<div class="fg"><label class="fl">Date format (locale)</label><select id="pr-locale" class="gi">';
  [['en-US','US (Apr 11)'],['en-GB','UK (11 Apr)'],['en-IN','India (11 Apr)'],['en-AU','Australia (11 Apr)']].forEach(([v,l])=>{
    h += '<option value="'+v+'"'+(LOCALE===v?' selected':'')+'>'+l+'</option>';

  h += '<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px">Change password</div>';
  h += '<div class="fg"><label class="fl">New password</label><input id="pr-pw1" class="gi" type="password" placeholder="Min 8 characters"></div>';
  h += '<div class="fg"><label class="fl">Confirm password</label><input id="pr-pw2" class="gi" type="password" placeholder="Repeat password"></div>';
  h += '<div id="pr-msg"></div>';
  h += '<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svProfile()">Save changes</button></div>';
  OS('My Account', h);
}
async function svProfile() {
  const dn = val('pr-dn').trim();
  const pw1 = val('pr-pw1'), pw2 = val('pr-pw2');
  const newLocale = val('pr-locale');
  const el = document.getElementById('pr-msg');
  const sm = (m,ok) => { if(el) el.innerHTML='<div class="amsg '+(ok?'ok':'err')+'" style="margin-bottom:0">'+m+'</div>'; };
  let changed = false;
  if (dn) {
    const {error} = await SB.auth.updateUser({data:{display_name:dn}});
    if (error) { sm('Error: '+error.message); return; }
    document.getElementById('sb-name').textContent = dn;
    changed = true;
  }
  if (newLocale && newLocale !== LOCALE) {
    localStorage.setItem('taskora-locale', newLocale);
    changed = true;
  }
  if (pw1||pw2) {
    if (pw1!==pw2) { sm('Passwords do not match.'); return; }
    if (pw1.length<8) { sm('Password must be at least 8 characters.'); return; }
    const {error} = await SB.auth.updateUser({password:pw1});
    if (error) { sm('Error: '+error.message); return; }
    changed = true;
  }
  sm(changed ? 'Changes saved! Reload for locale changes to take effect.' : 'No changes to save.', changed);
}

/* ── SW + PWA ── */
let _waitingSW = null;
function applyUpdate() { if (_waitingSW) _waitingSW.postMessage({ type: 'SKIP_WAITING' }); document.getElementById('update-banner').classList.remove('show'); }
function dismissUpdate() { document.getElementById('update-banner').classList.remove('show'); }

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    if (reg.waiting) { _waitingSW = reg.waiting; document.getElementById('update-banner').classList.add('show'); }
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) { _waitingSW = newSW; document.getElementById('update-banner').classList.add('show'); }
      });
    });
    setInterval(() => reg.update(), 60 * 60 * 1000);
  }).catch(() => {});
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => { if (!refreshing) { refreshing = true; window.location.reload(); } });
}

boot();
