<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Taskora"/>
<meta name="theme-color" content="#0f0f1a"/>
<link rel="manifest" href="/manifest.json"/>
<title>Taskora — Executive Operating System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ════════════════════════════════════════════════════
   TASKORA — ENTERPRISE DESIGN SYSTEM
   ════════════════════════════════════════════════════ */

:root {
  --ind: #1D4ED8; --ind-d: #1E40AF; --ind-l: #2563EB;
  --teal: #0284C7; --rose: #DC2626; --amb: #D97706; --grn: #059669;
  --bg: #F1F5F9; --glass: #FFFFFF; --glass2: #F8FAFC; --glass3: #F1F5F9;
  --bdr: #E2E8F0; --bdr2: #CBD5E1;
  --txt: #0F172A; --txt2: #475569; --txt3: #94A3B8;
  --r: 6px; --r-sm: 5px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 8px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 24px rgba(0,0,0,.1);
  --sb-bg: #FFFFFF; --sb-bdr: #E2E8F0;
  color-scheme: light;
}
html.dark {
  --ind: #3B82F6; --ind-d: #2563EB; --ind-l: #60A5FA;
  --teal: #0EA5E9; --rose: #F87171; --amb: #FBBF24; --grn: #34D399;
  --bg: #0F172A; --glass: #1E293B; --glass2: #334155; --glass3: #475569;
  --bdr: #334155; --bdr2: #475569;
  --txt: #F1F5F9; --txt2: #CBD5E1; --txt3: #64748B;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow-md: 0 4px 8px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 24px rgba(0,0,0,.5);
  --sb-bg: #1E293B; --sb-bdr: #334155;
  color-scheme: dark;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
#ls{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;transition:opacity .3s}
.spin{width:28px;height:28px;border-radius:50%;border:2px solid var(--bdr2);border-top-color:var(--ind);animation:spin .7s linear infinite}
#auth-scr{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{background:var(--glass);border:1px solid var(--bdr);border-radius:8px;padding:36px 32px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.auth-brand{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px}
.auth-tag{font-size:11px;color:var(--txt3);text-align:center;margin-bottom:28px}
.auth-tabs{display:flex;background:var(--glass3);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:3px;margin-bottom:20px;gap:3px}
.auth-tab{flex:1;padding:7px;border-radius:4px;border:none;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--txt2)}
.auth-tab.on{background:var(--glass);color:var(--txt);font-weight:600;box-shadow:var(--shadow-sm)}
.gi{width:100%;padding:9px 12px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--glass);color:var(--txt);font-size:13px;outline:none;margin-bottom:10px}
.gi:focus{border-color:var(--ind-l);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.btn{padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s}
.btn-p{background:var(--ind-l);color:#fff;border-color:var(--ind-d)}
.btn-g{background:var(--glass);color:var(--txt2);border:1px solid var(--bdr)}
.btn-sm{padding:6px 12px;font-size:12px}
.br{display:flex;gap:8px}
.br .btn-g{flex:1}
.br .btn-p{flex:2}
.mb{padding:4px 10px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2)}
.mb.dd{background:transparent;border-color:transparent;color:var(--txt3)}
.mb.dd:hover{background:#FEF2F2;border-color:#FECACA;color:var(--rose)}
.fl{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;display:block}
.fg{margin-bottom:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#app{display:flex;min-height:100vh}
#sb{width:230px;background:var(--sb-bg);border-right:1px solid var(--sb-bdr);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50}
.sb-top{padding:16px 14px 10px;border-bottom:1px solid var(--bdr)}
.sb-brand{font-size:15px;font-weight:700}
.sb-tag{font-size:10px;color:var(--txt3);margin-top:2px;text-transform:uppercase}
.sb-nav{flex:1;padding:6px 8px;overflow-y:auto}
.sb-b{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r-sm);background:none;border:none;border-left:2px solid transparent;color:var(--txt2);font-size:13px;width:100%;text-align:left;cursor:pointer}
.sb-b:hover{background:var(--glass2);color:var(--txt)}
.sb-b.active{background:var(--glass2);color:var(--ind-l);border-left-color:var(--ind-l);font-weight:600}
.sb-b .ic{font-size:14px;width:18px;text-align:center}
.sb-bot{padding:10px;border-top:1px solid var(--bdr)}
.prof-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);background:var(--glass2);border:1px solid var(--bdr);cursor:pointer;width:100%}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--grn);flex-shrink:0}
.so-b{width:100%;padding:7px;border-radius:var(--r-sm);background:transparent;color:var(--txt3);border:1px solid var(--bdr);font-size:12px;cursor:pointer}
.theme-btn{width:100%;padding:7px;border-radius:var(--r-sm);background:transparent;color:var(--txt3);border:1px solid var(--bdr);font-size:12px;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
#content{flex:1;margin-left:230px;overflow-y:auto;min-height:100vh;padding-bottom:40px}
.page{padding:22px 24px;display:none;animation:fadeIn .18s ease}
.page.active{display:block}
#bn{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--glass);border-top:1px solid var(--bdr);z-index:100;overflow-x:auto}
.nb{flex:0 0 auto;min-width:56px;padding:9px 8px 8px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--txt3);cursor:pointer}
.nb.active{color:var(--ind-l)}
@media(max-width:767px){#sb{transform:translateX(-100%)}#content{margin-left:0;padding-bottom:66px}#bn{display:flex}.page{padding:14px 16px}}
@media(min-width:768px){#bn{display:none!important}}
.gc{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:10px}
.gc.red{border-left:3px solid var(--rose)}
.gc.amb{border-left:3px solid var(--amb)}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--bdr)}
.pt{font-size:18px;font-weight:700}
.ps{font-size:12px;color:var(--txt3);margin-top:2px}
.bd{display:inline-flex;align-items:center;font-size:11px;font-weight:500;border-radius:4px;padding:2px 7px;border:1px solid transparent}
.h-ot{background:#F0FDF4;color:#166534;border-color:#BBF7D0}
.h-ar{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.h-dl{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.p-cr{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.p-hi{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.p-me{background:#EFF6FF;color:#1E40AF;border-color:#BFDBFE}
html.dark .h-ot{background:rgba(5,150,105,.12);color:var(--grn)}
html.dark .h-ar{background:rgba(217,119,6,.12);color:var(--amb)}
html.dark .h-dl{background:rgba(220,38,38,.12);color:var(--rose)}
.pw{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.pb{height:100%;border-radius:2px}
.pls{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto}
.pl{padding:4px 12px;border-radius:4px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--glass);color:var(--txt2);white-space:nowrap;cursor:pointer}
.pl.active{background:#EFF6FF;border-color:#BFDBFE;color:var(--ind-l);font-weight:600}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;color:#fff;flex-shrink:0}
.owner-box{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);border:1px solid #BFDBFE;background:#EFF6FF;margin-bottom:10px}
.owner-box.empty{border-color:var(--bdr);background:var(--glass2)}
.sw-wrap{display:flex;gap:6px;flex-wrap:wrap}
.sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.sw.on{border-color:var(--txt);transform:scale(1.15)}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:12px;background:var(--glass)}
table{width:100%;border-collapse:collapse;min-width:560px}
th{text-align:left;padding:9px 13px;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;border-bottom:1px solid var(--bdr)}
td{padding:9px 13px;border-bottom:1px solid var(--bdr);font-size:13px}
.tr-row{background:var(--glass);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:4px;border:1px solid var(--bdr);border-left:3px solid var(--bdr2)}
.tr-row.od{border-left-color:var(--rose);background:#FEF2F2}
.tm{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:4px}
.sr{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--glass);border-radius:var(--r-sm);cursor:pointer;border:1px solid var(--bdr);margin-bottom:3px}
.es{text-align:center;padding:52px 20px;color:var(--txt3)}
.es .em{font-size:40px;margin-bottom:14px;display:block}
.es .et{font-size:16px;font-weight:600;color:var(--txt2);margin-bottom:6px}
.es .ed{font-size:13px;max-width:260px;margin:0 auto}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:none;align-items:flex-end;justify-content:center}
#ov.op{display:flex}
#sh{background:var(--glass);border:1px solid var(--bdr);border-bottom:none;width:100%;max-width:520px;border-radius:8px 8px 0 0;max-height:92vh;overflow-y:auto}
.sh-hd{width:32px;height:3px;background:var(--bdr2);border-radius:2px;margin:12px auto 0}
.sh-row{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 10px;border-bottom:1px solid var(--bdr)}
.sh-ti{font-size:15px;font-weight:600}
.sh-cl{width:26px;height:26px;border-radius:4px;background:var(--glass2);border:1px solid var(--bdr);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.sh-bod{padding:16px 18px 4px}
@media(min-width:768px){#ov{align-items:center}#sh{border-radius:8px;border-bottom:1px solid var(--bdr);max-width:500px}.sh-hd{display:none}}
</style>
</head>
<body>

<div id="ls"><div class="spin"></div><div class="lb">Taskora</div><div class="ls-sub">Executive Operating System</div></div>

<div id="auth-scr" style="display:none">
  <div class="auth-card">
    <div class="auth-brand">Taskora</div>
    <div class="auth-tag">Run every business unit from one screen</div>
    <div class="auth-tabs">
      <button id="at-si" class="auth-tab on" onclick="swAT('si')">Sign in</button>
      <button id="at-su" class="auth-tab" onclick="swAT('su')">Create account</button>
    </div>
    <div id="amsg"></div>
    <div id="form-si">
      <input class="gi" id="si-em" type="email" placeholder="Email address"/>
      <input class="gi" id="si-pw" type="password" placeholder="Password"/>
      <button class="btn btn-p" style="width:100%;margin-top:4px" onclick="doSI()">Sign in →</button>
    </div>
    <div id="form-su" style="display:none">
      <input class="gi" id="su-em" type="email" placeholder="Email address"/>
      <input class="gi" id="su-pw" type="password" placeholder="Password (min 8)"/>
      <button class="btn btn-p" style="width:100%;margin-top:4px" onclick="doSU()">Create account →</button>
    </div>
  </div>
</div>

<div id="root" style="display:none">
  <div id="app">
    <div id="sb">
      <div class="sb-top">
        <div class="sb-brand">Taskora</div>
        <div class="sb-tag">Executive Operating System</div>
      </div>
      <div class="sb-nav"></div>
      <div class="sb-bot">
        <button class="prof-btn" onclick="openProfile()">
          <div id="sb-av" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ind),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff">?</div>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600" id="sb-name">Account</div>
            <div style="font-size:10px;color:var(--txt3)" id="uem">—</div>
          </div>
          <div class="sdot" id="sd"></div>
        </button>
        <button class="so-b" onclick="doSO()">↪ Sign out</button>
        <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"><span id="theme-icon">☀</span> <span id="theme-label">Light mode</span></button>
      </div>
    </div>
    <div id="content">
      <div id="tab-dash" class="page active"></div>
      <div id="tab-projects" class="page"></div>
      <div id="tab-people" class="page"></div>
      <div id="tab-buildings" class="page"></div>
      <div id="tab-digest" class="page"></div>
      <div id="tab-roles" class="page"></div>
      <div id="tab-notifications" class="page"></div>
      <div id="tab-analytics" class="page"></div>
      <div id="tab-reports" class="page"></div>
      <div id="tab-decisions" class="page"></div>
      <div id="tab-portfolio" class="page"></div>
    </div>
    <div id="bn"></div>
  </div>
</div>

<div id="ov"><div id="sh"><div class="sh-hd"></div><div class="sh-row"><div class="sh-ti" id="sh-ti"></div><button class="sh-cl" onclick="CS()">×</button></div><div class="sh-bod" id="sh-bd"></div></div></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// TASKORA — COMPLETE WORKING IMPLEMENTATION
// ═══════════════════════════════════════════════════════════════════════════

const SB_URL = 'https://blvijiqrgddvparsnpnh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdmlqaXFyZ2RkdnBhcnNucG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODc4NTAsImV4cCI6MjA5MDM2Mzg1MH0.J9wB4a384TRLfISIQC35pn5no-Pp52iZoB8fBiEExj8';
const SB = window.supabase?.createClient ? window.supabase.createClient(SB_URL, SB_KEY) : null;

let U = null, curTab = 'dash', MY_ROLE = 'super_admin', MY_PERSON_ID = null, CHAIRMAN_UID = null;
let DB = { buildings:[], people:[], projects:[], milestones:[], tasks:[], pb:[], decisions:[], notifications:[] };
let expP = {}, expS = {};

const TS = { not_started:{l:'Not started'}, in_progress:{l:'In progress'}, blocked:{l:'Blocked'}, awaiting:{l:'Awaiting'}, done:{l:'Done'} };
const HS = { on_track:{l:'On Track',cls:'h-ot'}, at_risk:{l:'At Risk',cls:'h-ar'}, delayed:{l:'Delayed',cls:'h-dl'}, not_started:{l:'Not Started',cls:'h-ns'} };
const PS = { critical:{l:'Critical',cls:'p-cr'}, high:{l:'High',cls:'p-hi'}, medium:{l:'Medium',cls:'p-me'}, low:{l:'Low',cls:'p-me'} };
const CLRS = ['#6366f1','#14b8a6','#10b981','#f43f5e','#f59e0b','#a855f7','#ec4899','#0ea5e9','#f97316','#06b6d4'];
const SCYC = ['not_started','in_progress','awaiting','blocked','done'];

const tday = () => new Date().toISOString().slice(0,10);
const fd = d => d ? new Date(d+'T12:00:00').toLocaleDateString('en-US',{day:'numeric',month:'short'}) : '';
const isOD = (d,s) => !!(d && d < tday() && s !== 'done');
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const val = id => document.getElementById(id)?.value || '';
const bdg = (s) => `<span class="bd">${TS[s]?.l||s}</span>`;
const hBdg = h => `<span class="bd ${HS[h]?.cls||'h-ns'}">${HS[h]?.l||'Not Started'}</span>`;
const av = (n,c,sz=30) => `<div class="av" style="width:${sz}px;height:${sz}px;background:${c||'#6366f1'};font-size:${sz*.36}px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:600">${(n||'?').slice(0,2).toUpperCase()}</div>`;

function hideLoader() {
  const loader = document.getElementById('ls');
  if(!loader) return;
  loader.style.opacity = '0';
  setTimeout(() => { loader.style.display = 'none'; }, 300);
}

function showAuthMessage(msg) {
  const auth = document.getElementById('auth-scr');
  if(auth) auth.style.display = 'flex';
  const box = document.getElementById('amsg');
  if(box) box.innerHTML = `<div class="amsg err">${esc(msg)}</div>`;
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:800;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;color:#fff;background:${type==='ok'?'var(--grn)':'var(--rose)'};animation:fadeIn .2s`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
function CS() { document.getElementById('ov').classList.remove('op'); }
function OS(ti, html, wide) {
  document.getElementById('sh-ti').textContent = ti;
  document.getElementById('sh-bd').innerHTML = html;
  document.getElementById('sh').classList.toggle('wide', !!wide);
  document.getElementById('ov').classList.add('op');
}
function CP(fid, cur) {
  return '<div class="fg"><label class="fl">Colour</label><div class="sw-wrap">' + 
    CLRS.map(c => `<div class="sw${c===cur?' on':''}" style="background:${c}" onclick="SC('${fid}','${c}')"></div>`).join('') +
    '</div><input type="hidden" id="'+fid+'" value="'+(cur||CLRS[0])+'"></div>';
}
function SC(fid, color) { document.getElementById(fid).value = color; document.querySelectorAll('#sh-bd .sw').forEach(s => s.classList.toggle('on', s.style.background === color)); }
function selOpts(id, cur, map) { return `<select id="${id}" class="gi">${Object.entries(map).map(([k,v]) => `<option value="${k}"${k===cur?' selected':''}>${v.l||v}</option>`).join('')}</select>`; }
function peopleOpts(cur) { return '<option value="">— None —</option>' + DB.people.map(p => `<option value="${p.id}"${p.id===cur?' selected':''}>${esc(p.name)}${p.role?' ('+esc(p.role)+')':''}</option>`).join(''); }

async function load() {
  if(!U) return;
  const uid = CHAIRMAN_UID || U.id;
  try {
    const [b,p,pr,ms,t,pb,decisions,notifs] = await Promise.all([
      SB.from('buildings').select('*').eq('user_id',uid),
      SB.from('people').select('*').eq('user_id',uid),
      SB.from('projects').select('*').eq('user_id',uid),
      SB.from('sub_projects').select('*').eq('user_id',uid),
      SB.from('tasks').select('*').eq('user_id',uid),
      SB.from('project_buildings').select('*').eq('user_id',uid),
      SB.from('decision_log').select('*').eq('workspace_id',uid),
      SB.from('notifications').select('*').eq('for_user_id',U.id),
    ]);
    DB.buildings = b.data||[];
    DB.people = p.data||[];
    DB.projects = (pr.data||[]).map(x => ({...x, primaryOwnerId:x.primary_stakeholder_id, health:x.health||'on_track'}));
    DB.milestones = (ms.data||[]).map(x => ({...x, projectId:x.project_id}));
    DB.tasks = (t.data||[]).map(x => ({...x, projectId:x.project_id, milestoneId:x.sub_project_id, assignedTo:x.assigned_to, dueDate:x.due_date}));
    DB.pb = pb.data||[];
    DB.decisions = decisions.data||[];
    DB.notifications = notifs.data||[];
  } catch(e) { console.error(e); }
}

// ═══════════════════════════════════════════════════════════════════════════
// AUTHENTICATION
// ═══════════════════════════════════════════════════════════════════════════

function swAT(t) {
  const si = t === 'si';
  document.getElementById('at-si').classList.toggle('on', si);
  document.getElementById('at-su').classList.toggle('on', !si);
  document.getElementById('form-si').style.display = si ? '' : 'none';
  document.getElementById('form-su').style.display = si ? 'none' : '';
  document.getElementById('amsg').innerHTML = '';
}

async function doSI() {
  const email = val('si-em').trim(), pass = val('si-pw');
  if(!email||!pass) { document.getElementById('amsg').innerHTML='<div class="amsg err">Please enter email and password.</div>'; return; }
  const {error} = await SB.auth.signInWithPassword({email, password:pass});
  if(error) document.getElementById('amsg').innerHTML='<div class="amsg err">'+error.message+'</div>';
}

async function doSU() {
  const email = val('su-em').trim(), pass = val('su-pw');
  if(!email||!pass) { document.getElementById('amsg').innerHTML='<div class="amsg err">Please fill all fields.</div>'; return; }
  if(pass.length<8) { document.getElementById('amsg').innerHTML='<div class="amsg err">Password must be at least 8 characters.</div>'; return; }
  const {error} = await SB.auth.signUp({email, password:pass});
  if(error) document.getElementById('amsg').innerHTML='<div class="amsg err">'+error.message+'</div>';
  else document.getElementById('amsg').innerHTML='<div class="amsg ok">Check your email to confirm!</div>';
}

async function doSO() { await SB.auth.signOut(); }

function toggleTheme() {

// ═══════════════════════════════════════════════════════════════════════════
// EXECUTIVE DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════

function rDash() {
  const active = DB.projects.filter(p => p.status !== 'done');
  const owners = DB.people.filter(p => active.some(pr => pr.primaryOwnerId === p.id));
  
  let h = `<div class="ph"><div><div class="pt">Executive Dashboard</div><div class="ps">${active.length} active initiatives · ${owners.length} BU leads</div></div></div>`;
  
  // Health summary
  const hCounts = {on_track:0, at_risk:0, delayed:0};
  active.forEach(p => { const k = p.health||'on_track'; if(k in hCounts) hCounts[k]++; });
  h += `<div style="display:flex;gap:6px;margin-bottom:16px">`;
  if(hCounts.on_track) h += `<div style="flex:1;text-align:center;padding:10px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:var(--r)"><div style="font-size:18px;font-weight:700;color:var(--grn)">${hCounts.on_track}</div><div>On Track</div></div>`;
  if(hCounts.at_risk) h += `<div style="flex:1;text-align:center;padding:10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--r)"><div style="font-size:18px;font-weight:700;color:var(--amb)">${hCounts.at_risk}</div><div>At Risk</div></div>`;
  if(hCounts.delayed) h += `<div style="flex:1;text-align:center;padding:10px;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r)"><div style="font-size:18px;font-weight:700;color:var(--rose)">${hCounts.delayed}</div><div>Delayed</div></div>`;
  h += `</div>`;
  
  if(!owners.length) {
    h += `<div class="es"><span class="em">🏗</span><div class="et">No BU leads yet</div><div class="ed">Add people and assign them as BU leads to initiatives.</div></div>`;
    document.getElementById('tab-dash').innerHTML = h;
    return;
  }
  
  owners.forEach(person => {
    const ownedProjs = active.filter(pr => pr.primaryOwnerId === person.id);
    const projIds = new Set(ownedProjs.map(p => p.id));
    const allTasks = DB.tasks.filter(t => projIds.has(t.projectId));
    const pending = allTasks.filter(t => t.status !== 'done');
    const overdue = pending.filter(t => isOD(t.dueDate, t.status));
    const pct = allTasks.length ? Math.round(allTasks.filter(t=>t.status==='done').length/allTasks.length*100) : 0;
    const worstH = ownedProjs.some(p=>p.health==='delayed') ? 'delayed' : ownedProjs.some(p=>p.health==='at_risk') ? 'at_risk' : 'on_track';
    
    h += `<div class="gc" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="position:relative">${av(person.name,person.color,44)}<div style="position:absolute;inset:-2px;border-radius:50%;border:2px solid ${worstH==='delayed'?'var(--rose)':worstH==='at_risk'?'var(--amb)':'var(--grn)'};pointer-events:none"></div></div>
        <div style="flex:1"><div style="font-size:15px;font-weight:700">${esc(person.name)}</div>${person.role?`<div style="font-size:11px;color:var(--txt3)">${esc(person.role)}</div>`:''}</div>
        <div>${hBdg(worstH)}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
        <div style="text-align:center;padding:8px;background:var(--glass2);border-radius:var(--r-sm)"><div style="font-size:20px;font-weight:700;color:var(--ind-l)">${ownedProjs.length}</div><div>Initiatives</div></div>
        <div style="text-align:center;padding:8px;background:var(--glass2);border-radius:var(--r-sm)"><div style="font-size:20px;font-weight:700;color:${overdue.length?'var(--rose)':'var(--txt)'}">${pending.length}</div><div>Pending</div></div>
        <div style="text-align:center;padding:8px;background:var(--glass2);border-radius:var(--r-sm)"><div style="font-size:20px;font-weight:700;color:${pct===100?'var(--grn)':'var(--txt)'}">${pct}%</div><div>Done</div></div>
      </div>
      <div class="pw"><div class="pb" style="width:${pct}%;background:${person.color}"></div></div>`;
    
    if(overdue.length) {
      h += `<div style="margin-top:12px;border-top:1px solid var(--bdr);padding-top:10px"><div style="font-size:11px;font-weight:700;color:var(--rose);margin-bottom:6px">⚠ Overdue (${overdue.length})</div>`;
      overdue.slice(0,3).forEach(t => {
        h += `<div style="padding:6px 0;font-size:12px">• ${esc(t.title)} — due ${fd(t.dueDate)}</div>`;
      });
      h += `</div>`;
    }
    h += `</div>`;
  });
  
  document.getElementById('tab-dash').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════════════════════
// PROJECTS (Initiatives)
// ═══════════════════════════════════════════════════════════════════════════

function rProj() {
  const active = DB.projects.filter(p => p.status !== 'done');
  let h = `<div class="ph"><div><div class="pt">Initiatives</div><div class="ps">${active.length} active</div></div><button class="btn btn-p btn-sm" onclick="oPrF()">+ New initiative</button></div>`;
  
  if(!DB.projects.length) {
    h += `<div class="es"><span class="em">📋</span><div class="et">No initiatives yet</div><div class="ed">Create your first initiative and assign a BU lead.</div></div>`;
    document.getElementById('tab-projects').innerHTML = h;
    return;
  }
  
  DB.projects.forEach(proj => {
    const owner = DB.people.find(p => p.id === proj.primaryOwnerId);
    const allT = DB.tasks.filter(t => t.projectId === proj.id);
    const pct = allT.length ? Math.round(allT.filter(t=>t.status==='done').length/allT.length*100) : 0;
    const overdue = allT.filter(t => isOD(t.dueDate, t.status));
    const isExp = !!expP[proj.id];
    
    h += `<div class="gc${proj.health==='delayed'?' red':proj.health==='at_risk'?' amb':''}">
      <div onclick="expP['${proj.id}']=!expP['${proj.id}'];rProj()" style="cursor:pointer">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:10px;height:10px;border-radius:50%;background:${proj.color}"></div>
          <div style="flex:1"><div style="font-size:15px;font-weight:700">${esc(proj.name)}</div><div style="display:flex;gap:5px;margin-top:4px">${hBdg(proj.health)}${proj.deadline?`<span style="font-size:11px;color:var(--txt3)">📅 ${fd(proj.deadline)}</span>`:''}</div></div>
          <div><span class="bd p-cr">⚠ ${overdue.length}</span><span style="margin-left:8px">${isExp?'▾':'▸'}</span></div>
        </div>
        <div class="owner-box${owner?'':' empty'}">
          ${owner ? av(owner.name,owner.color,30) : '<div style="width:30px;height:30px;border-radius:50%;background:var(--glass2);border:1px dashed var(--bdr);display:flex;align-items:center;justify-content:center">?</div>'}
          <div style="flex:1"><div style="font-size:12px;font-weight:600;color:${owner?'var(--ind-l)':'var(--txt3)'}">${owner ? esc(owner.name) : 'No BU lead assigned'}</div></div>
        </div>
        ${allT.length ? `<div class="pw"><div class="pb" style="width:${pct}%;background:${proj.color}"></div><div style="font-size:11px;color:var(--txt3);margin-top:4px">${pct}% · ${allT.length} tasks</div></div>` : ''}
      </div>`;
    
    if(isExp) {
      const milestones = DB.milestones.filter(m => m.projectId === proj.id);
      const directTasks = allT.filter(t => !t.milestoneId);
      
      h += `<div style="border-top:1px solid var(--bdr);padding-top:14px;margin-top:14px">
        <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
          <button class="mb" onclick="oMilF('${proj.id}')">+ Milestone</button>
          <button class="mb" onclick="oTF('${proj.id}','')">+ Task</button>
          <button class="mb" onclick="oPrF('${proj.id}')">✎ Edit</button>
          <button class="mb dd" onclick="dPrj('${proj.id}')">Delete</button>
        </div>`;
      
      milestones.forEach(mil => {
        const mt = DB.tasks.filter(t => t.milestoneId === mil.id);
        const isExpM = !!expS[mil.id];
        h += `<div style="margin-bottom:8px">
          <div class="sr" onclick="expS['${mil.id}']=!expS['${mil.id}'];rProj()">
            <span>${isExpM?'▾':'▸'}</span><span style="flex:1;font-weight:600">📍 ${esc(mil.name)}</span>${mil.deadline?`<span>${fd(mil.deadline)}</span>`:''}${bdg(mil.status)}<button class="mb" style="padding:2px 8px" onclick="event.stopPropagation();oTF('${proj.id}','${mil.id}')">+Task</button>
          </div>`;
        if(isExpM && mt.length) {
          mt.forEach(t => { h += taskRow(t); });
        }
        h += `</div>`;
      });
      
      directTasks.forEach(t => { h += taskRow(t); });
      h += `</div>`;
    }
    h += `</div>`;
  });
  
  document.getElementById('tab-projects').innerHTML = h;
}

function taskRow(t) {
  const pe = DB.people.find(p => p.id === t.assignedTo);
  const od = isOD(t.dueDate, t.status);
  return `<div class="tr-row${od?' od':''}">
    <div style="display:flex;align-items:flex-start;gap:8px">
      <div style="flex:1"><div style="font-size:13px;font-weight:500">${esc(t.title)}</div>
      <div class="tm">${bdg(t.status)}${t.dueDate?`<span style="font-size:11px;color:${od?'var(--rose)':'var(--txt3)'}">${fd(t.dueDate)}</span>`:''}${pe?av(pe.name,pe.color,18)+'<span style="font-size:11px">'+esc(pe.name.split(' ')[0])+'</span>':''}</div></div>
      <div><button class="mb" onclick="oTF('${t.projectId}','${t.milestoneId||''}','${t.id}')">✎</button><button class="mb dd" onclick="dTsk('${t.id}')">×</button></div>
    </div>
  </div>`;
}

async function cySt(id) {
  const t = DB.tasks.find(x => x.id === id);
  if(!t) return;
  const i = SCYC.indexOf(t.status);
  t.status = SCYC[(i+1) % SCYC.length];
  await SB.from('tasks').update({status:t.status}).eq('id',id);
  rProj();
}
async function dTsk(id) {
  if(!confirm('Delete this task?')) return;
  await SB.from('tasks').delete().eq('id',id);
  DB.tasks = DB.tasks.filter(t => t.id !== id);
  rProj();
}
async function dPrj(id) {
  if(!confirm('Delete this initiative and all its data?')) return;
  await SB.from('projects').delete().eq('id',id);
  DB.projects = DB.projects.filter(p => p.id !== id);
  DB.milestones = DB.milestones.filter(m => m.projectId !== id);
  DB.tasks = DB.tasks.filter(t => t.projectId !== id);
  rProj();
}

function oPrF(id) {
  const p = id ? DB.projects.find(x => x.id === id) : null;
  let h = `<div class="fg"><label class="fl">BU Lead</label><select id="pf-ps" class="gi"><option value="">— Select —</option>${DB.people.map(pe=>`<option value="${pe.id}"${pe.id===p?.primaryOwnerId?' selected':''}>${esc(pe.name)}${pe.role?' ('+esc(pe.role)+')':''}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Initiative name</label><input id="pf-n" class="gi" placeholder="e.g. Q2 Product Launch" value="${esc(p?.name||'')}"></div>
    <div class="fg"><label class="fl">Description</label><textarea id="pf-d" class="gi">${esc(p?.description||'')}</textarea></div>
    <div class="fr"><div class="fg"><label class="fl">Status</label>${selOpts('pf-s',p?.status||'not_started',TS)}</div>
    <div class="fg"><label class="fl">Health</label>${selOpts('pf-h',p?.health||'on_track',HS)}</div></div>
    <div class="fr"><div class="fg"><label class="fl">Priority</label>${selOpts('pf-pr',p?.priority||'medium',PS)}</div>
    <div class="fg"><label class="fl">Deadline</label><input id="pf-dl" class="gi" type="date" value="${p?.deadline||''}"></div></div>${CP('pf-c',p?.color)}<div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svPr('${id||''}')">Save</button></div>`;
  OS(id?'Edit initiative':'New initiative', h);
}

async function svPr(id) {
  const nm = val('pf-n').trim();
  if(!nm) { showToast('Name required','err'); return; }
  const obj = { name:nm, description:val('pf-d').trim(), primary_stakeholder_id:val('pf-ps')||null, status:val('pf-s'), health:val('pf-h'), priority:val('pf-pr'), deadline:val('pf-dl')||null, color:val('pf-c') };
  if(id) {
    await SB.from('projects').update(obj).eq('id',id);
    Object.assign(DB.projects.find(p=>p.id===id), obj, {primaryOwnerId:obj.primary_stakeholder_id});
  } else {
    const {data} = await SB.from('projects').insert({...obj, user_id:CHAIRMAN_UID||U.id}).select().single();
    if(data) DB.projects.push({...data, primaryOwnerId:data.primary_stakeholder_id});
  }
  CS(); rProj();
}

function oMilF(pid, id) {
  const m = id ? DB.milestones.find(x=>x.id===id) : null;
  let h = `<div class="fg"><label class="fl">Milestone name</label><input id="mf-n" class="gi" value="${esc(m?.name||'')}"></div>
    <div class="fr"><div class="fg"><label class="fl">Target date</label><input id="mf-d" class="gi" type="date" value="${m?.deadline||''}"></div>

}
async function svMil(id, pid) {
  const nm = val('mf-n').trim();
  if(!nm) return;
  const obj = { name:nm, deadline:val('mf-d')||null, status:val('mf-s') };
  if(id) {
    await SB.from('sub_projects').update(obj).eq('id',id);
    Object.assign(DB.milestones.find(m=>m.id===id), obj);
  } else {
    const {data} = await SB.from('sub_projects').insert({...obj, project_id:pid, user_id:CHAIRMAN_UID||U.id}).select().single();
    if(data) DB.milestones.push({...data, projectId:data.project_id});
  }
  CS(); rProj();
}

function oTF(pid, mid, id) {
  const t = id ? DB.tasks.find(x=>x.id===id) : null;
  let h = `<div class="fg"><label class="fl">Task title</label><input id="tf-ti" class="gi" value="${esc(t?.title||'')}"></div>
    <div class="fg"><label class="fl">Assigned to</label><select id="tf-at" class="gi"><option value="">— Unassigned —</option>${DB.people.map(p=>`<option value="${p.id}"${p.id===t?.assignedTo?' selected':''}>${esc(p.name)}</option>`).join('')}</select></div>

async function svTsk(id, pid, mid) {
  const ti = val('tf-ti').trim();
  if(!ti) return;
  const obj = { title:ti, notes:val('tf-no').trim(), assigned_to:val('tf-at')||null, status:val('tf-st'), priority:val('tf-pr'), due_date:val('tf-dd')||null, follow_up:val('tf-fu')||null, project_id:pid, sub_project_id:mid||null };
  if(id) {
    await SB.from('tasks').update(obj).eq('id',id);

    const {data} = await SB.from('tasks').insert({...obj, user_id:CHAIRMAN_UID||U.id}).select().single();

  }
  CS(); rProj();
}

async function svPpl(id) {
  const name = val('pf-n').trim();
  if(!name) { showToast('Name required','err'); return; }
  const obj = { name, role:val('pf-r').trim(), phone:val('pf-p').trim(), color:val('pf-c'), role_level:val('pf-rl') };
  if(!id) obj.email = val('pf-e').trim();
  if(id) {
    await SB.from('people').update(obj).eq('id',id);
    Object.assign(DB.people.find(p=>p.id===id), obj);
    CS(); showToast('Saved','ok'); rPpl();
  } else {
    if(!obj.email) { showToast('Email required','err'); return; }
    obj.invite_status = 'pending';
    const {data} = await SB.from('people').insert({...obj, user_id:CHAIRMAN_UID||U.id}).select().single();
    if(data) DB.people.push(data);
    CS(); showToast('Invite created','ok'); rPpl();
    window.open(`mailto:${obj.email}?subject=You've been invited to Taskora&body=Sign up at ${window.location.origin} with this email.`);
  }
}

async function dPpl(id) {
  if(!confirm('Delete this person?')) return;
  await SB.from('people').delete().eq('id',id);
  DB.people = DB.people.filter(p=>p.id!==id);
  rPpl();
}

// ═══════════════════════════════════════════════════════════════════════════
// BUILDINGS (simple version)
// ═══════════════════════════════════════════════════════════════════════════

function rBld() {
  let h = `<div class="ph"><div><div class="pt">Buildings</div><div class="ps">${DB.buildings.length} locations</div></div><button class="btn btn-p btn-sm" onclick="oBldF()">+ Add</button></div>`;

  } else {
    h += `<div class="tw"><table><thead><tr><th>Name</th><th>City</th><th>Code</th><th>Type</th><th></th></tr></thead><tbody>`;
    DB.buildings.forEach(b => {
      h += `<tr><td style="font-weight:600">${esc(b.name)}</td><td>${esc(b.city||'—')}</td><td>${esc(b.code||'—')}</td><td>${b.btype==='new'?'New':'Operational'}</td><td><button class="mb" onclick="oBldF('${b.id}')">✎</button><button class="mb dd" onclick="dBld('${b.id}')">×</button></td></tr>`;
    });
    h += `</tbody></table></div>`;
  }
  document.getElementById('tab-buildings').innerHTML = h;

function oBldF(id) {
  const b = id ? DB.buildings.find(x=>x.id===id) : null;
  let h = `<div class="fg"><label class="fl">Building name</label><input id="bf-n" class="gi" value="${esc(b?.name||'')}"></div>
    <div class="fr"><div class="fg"><label class="fl">City</label><input id="bf-ci" class="gi" value="${esc(b?.city||'')}"></div>
    <div class="fg"><label class="fl">Code</label><input id="bf-co" class="gi" value="${esc(b?.code||'')}"></div></div>
    <div class="fg"><label class="fl">Type</label><select id="bf-ty" class="gi"><option value="operational"${b?.btype!=='new'?' selected':''}>Operational</option><option value="new"${b?.btype==='new'?' selected':''}>New</option></select></div>
    <div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svBld('${id||''}')">Save</button></div>`;
  OS(id?'Edit building':'Add building', h);
}
async function svBld(id) {
  const name = val('bf-n').trim();
  if(!name) return;
  const obj = { name, city:val('bf-ci').trim(), code:val('bf-co').trim(), btype:val('bf-ty') };
  if(id) {
    await SB.from('buildings').update(obj).eq('id',id);
    Object.assign(DB.buildings.find(b=>b.id===id), obj);
  } else {
    const {data} = await SB.from('buildings').insert({...obj, user_id:CHAIRMAN_UID||U.id}).select().single();
    if(data) DB.buildings.push(data);
  }
  CS(); rBld();
}
async function dBld(id) {
  if(!confirm('Delete this building?')) return;
  await SB.from('buildings').delete().eq('id',id);
  DB.buildings = DB.buildings.filter(b=>b.id!==id);
  rBld();
}

// ═══════════════════════════════════════════════════════════════════════════
// DIGEST (Daily Briefing)
// ═══════════════════════════════════════════════════════════════════════════

function rDig() {
  const owners = DB.people.filter(p => DB.projects.some(pr => pr.primaryOwnerId === p.id && pr.status !== 'done'));
  let h = `<div class="ph"><div><div class="pt">Daily Briefing</div><div class="ps">Executive accountability report · ${new Date().toLocaleDateString()}</div></div></div>`;
  if(!owners.length) {
    h += `<div class="es"><span class="em">📤</span><div class="et">No BU leads with initiatives</div><div class="ed">Assign BU leads to initiatives to generate briefings.</div></div>`;
  } else {
    owners.forEach(person => {
      const ownedProjs = DB.projects.filter(pr => pr.primaryOwnerId === person.id && pr.status !== 'done');
      const pIds = new Set(ownedProjs.map(p=>p.id));
      const overdue = DB.tasks.filter(t=>pIds.has(t.projectId) && isOD(t.dueDate,t.status));
      h += `<div class="gc"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">${av(person.name,person.color,44)}
        <div><div style="font-size:15px;font-weight:700">${esc(person.name)}</div><div style="font-size:12px;color:var(--txt2)">${ownedProjs.length} initiatives · ${overdue.length} overdue</div></div>
      </div><div style="border-top:1px solid var(--bdr);padding-top:12px"><div class="dta" style="min-height:120px;font-family:monospace;white-space:pre-wrap">Daily briefing for ${person.name}:\n\n${overdue.length ? '⚠️ Overdue tasks: ' + overdue.map(t=>t.title).join(', ') : '✓ No overdue tasks'}\n\nRegards,\nTaskora</div></div></div>`;
    });
  }
  document.getElementById('tab-digest').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════════════════════

function rAnalytics() {
  const active = DB.projects.filter(p=>p.status!=='done');

    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px">
      <div class="sc" style="--ac:var(--ind-l);padding:14px"><div class="sn">${active.length}</div><div>Active initiatives</div></div>
      <div class="sc" style="--ac:var(--rose);padding:14px"><div class="sn">${overdue.length}</div><div>Overdue tasks</div></div>
      <div class="sc" style="--ac:var(--grn);padding:14px"><div class="sn">${DB.tasks.filter(t=>t.status==='done').length}</div><div>Completed tasks</div></div>
      <div class="sc" style="--ac:var(--teal);padding:14px"><div class="sn">${DB.people.length}</div><div>Team members</div></div>

// ═══════════════════════════════════════════════════════════════════════════
// REPORTS
// ═══════════════════════════════════════════════════════════════════════════

function rReports() {
  document.getElementById('tab-reports').innerHTML = `<div class="ph"><div><div class="pt">Reports</div><div class="ps">Performance analysis</div></div><button class="btn btn-p btn-sm" onclick="exportReport()">⬇ Export CSV</button></div>
    <div class="ih">Select a report type and period to generate stakeholder performance data.</div>`;
}

function exportReport() {
  let csv = "Initiative,Status,BU Lead,Task Count,Completed,Overdue\n";
  DB.projects.forEach(p => {
    const tasks = DB.tasks.filter(t=>t.projectId===p.id);
    const owner = DB.people.find(pe=>pe.id===p.primaryOwnerId);
    csv += `"${p.name}","${p.status}","${owner?.name||'Unassigned'}",${tasks.length},${tasks.filter(t=>t.status==='done').length},${tasks.filter(t=>isOD(t.dueDate,t.status)).length}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `taskora_report_${tday()}.csv`;
  a.click();
  showToast('Report exported','ok');
}

// DECISIONS

function rDecisions() {
  let h = `<div class="ph"><div><div class="pt">Decision Log</div><div class="ps">Record key decisions</div></div><button class="btn btn-p btn-sm" onclick="oDecisionF()">+ Log decision</button></div>`;
  if(!DB.decisions.length) {
    h += `<div class="es"><span class="em">📝</span><div class="et">No decisions logged yet</div><div class="ed">Record decisions from your review meetings.</div></div>`;
  } else {
    DB.decisions.forEach(d => {
      h += `<div class="gc" style="border-left:3px solid var(--ind-l)"><div style="font-size:11px;color:var(--txt3)">${fd(d.decision_date||d.created_at?.slice(0,10))}</div><div style="font-size:14px;font-weight:600;margin:6px 0">${esc(d.decision_text)}</div>${d.unblocks?`<div style="font-size:12px;color:var(--grn)">↳ Unblocks: ${esc(d.unblocks)}</div>`:''}</div>`;
    });
  }
  document.getElementById('tab-decisions').innerHTML = h;
}

function oDecisionF(id) {
  const d = id ? DB.decisions.find(x=>x.id===id) : null;
  let h = `<div class="fg"><label class="fl">Decision</label><textarea id="dc-text" class="gi" placeholder="What was decided?">${esc(d?.decision_text||'')}</textarea></div>
    <div class="fg"><label class="fl">What does this unblock?</label><input id="dc-un" class="gi" value="${esc(d?.unblocks||'')}"></div>
    <div class="br"><button class="btn btn-g" onclick="CS()">Cancel</button><button class="btn btn-p" onclick="svDecision('${id||''}')">Save</button></div>`;
  OS('Log decision', h);
}
async function svDecision(id) {
  const text = val('dc-text').trim();
  if(!text) return;
  const obj = { workspace_id:CHAIRMAN_UID||U.id, decision_text:text, unblocks:val('dc-un').trim()||null, decision_date:tday() };
  if(id) {
    await SB.from('decision_log').update(obj).eq('id',id);
    Object.assign(DB.decisions.find(d=>d.id===id), obj);
  } else {
    const {data} = await SB.from('decision_log').insert(obj).select().single();
    if(data) DB.decisions.unshift(data);
  }
  CS(); showToast('Decision logged','ok'); rDecisions();
}

  buLeads.forEach(lead => {
    const initiatives = DB.projects.filter(p => p.primaryOwnerId === lead.id && p.status !== 'done');

function buildNav() {
  const sbNav = document.querySelector('.sb-nav');
  if(sbNav) {
    sbNav.innerHTML = `
      <button class="sb-b active" data-tab="dash"><span class="ic">⌂</span> Dashboard</button>
      <button class="sb-b" data-tab="portfolio"><span class="ic">🗂</span> Org Structure</button>
      <button class="sb-b" data-tab="projects"><span class="ic">📋</span> Initiatives</button>
      <button class="sb-b" data-tab="people"><span class="ic">👥</span> People</button>
      <button class="sb-b" data-tab="buildings"><span class="ic">🏢</span> Locations</button>
      <button class="sb-b" data-tab="digest"><span class="ic">📤</span> Daily Briefing</button>
      <button class="sb-b" data-tab="decisions"><span class="ic">📝</span> Decision Log</button>
      <button class="sb-b" data-tab="notifications"><span class="ic">🔔</span> Notifications</button>
      <button class="sb-b" data-tab="analytics"><span class="ic">📊</span> Analytics</button>
      <button class="sb-b" data-tab="reports"><span class="ic">📈</span> Reports</button>
      <button class="sb-b" data-tab="roles"><span class="ic">🔑</span> Roles & Access</button>`;
  }
  const bn = document.getElementById('bn');
  if(bn) {
    bn.innerHTML = `
      <button class="nb active" data-tab="dash"><span class="ic">⌂</span><span class="lb">Home</span></button>
      <button class="nb" data-tab="projects"><span class="ic">📋</span><span class="lb">Initiatives</span></button>
      <button class="nb" data-tab="people"><span class="ic">👥</span><span class="lb">People</span></button>
      <button class="nb" data-tab="digest"><span class="ic">📤</span><span class="lb">Briefing</span></button>
      <button class="nb" onclick="openProfile()"><span class="ic">👤</span><span class="lb">Me</span></button>`;
  }
  document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });
}

function switchTab(id) {
  curTab = id;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${id}`)?.classList.add('active');
  document.querySelectorAll('.sb-b[data-tab],.nb[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  if(id === 'dash') rDash();
  else if(id === 'projects') rProj();
  else if(id === 'people') rPpl();
  else if(id === 'buildings') rBld();
  else if(id === 'digest') rDig();
  else if(id === 'roles') rRoles();
  else if(id === 'notifications') rNotifications();
  else if(id === 'analytics') rAnalytics();
  else if(id === 'reports') rReports();
  else if(id === 'decisions') rDecisions();
  else if(id === 'portfolio') rPortfolio();
}

async function showApp() {
  document.getElementById('root').style.display = '';
  const email = U.email || '';
  document.getElementById('uem').textContent = email;
  document.getElementById('sb-name').textContent = email.split('@')[0];
  document.getElementById('sb-av').textContent = email.slice(0,2).toUpperCase();
  CHAIRMAN_UID = U.id;
  await load();
  buildNav();
  rDash();
}

async function boot() {
  if(!SB) {
    hideLoader();
    showAuthMessage('Unable to load authentication service. Check your internet connection and refresh.');
    return;
  }

  try {
    const {data:{session}, error} = await Promise.race([
      SB.auth.getSession(),
      new Promise((_, reject) => setTimeout(() => reject(new Error('Authentication service timed out.')), 8000))
    ]);

    if(error) throw error;

    hideLoader();
    if(session) { U = session.user; await showApp(); }
    else { document.getElementById('auth-scr').style.display = 'flex'; }

    SB.auth.onAuthStateChange(async (ev, ses) => {
      if(ses) { U = ses.user; await showApp(); }
      else { window.location.reload(); }
    });
  } catch (err) {
    console.error(err);
    hideLoader();
    showAuthMessage(err?.message || 'Unable to initialize login. Please refresh and try again.');
  }
}

boot();
</script>
